// ── KPI HELPERS ───────────────────────────────────────────────
function parsePct(v){if(!v)return 0;const n=parseFloat(String(v).replace('%','').replace(',','.').trim());return isNaN(n)?0:Math.round(n);}
function parseKPINum(v){if(!v)return null;const s=String(v).trim();if(!s||s==='-'||s==='0')return null;const n=parseFloat(s.replace(/[^0-9.]/g,''));return isNaN(n)?null:n;}
function tsvToWeekly(rows){
  const weekly={W1:{},W2:{},W3:{},W4:{},W5:{}};
  const MAP={'booking':'booking','unit ready':'ready_stock','sp3k':'sp3k','akad':'akad','temuan kecepatan':'kecepatan','temuan fraud':'fraud','complain produk (afs)':'afs','complain non produk':'non_produk','complain utility':'utility','complain berulang':'berulang','lahan baru':'lahan_baru','realisasi sistemasi':'sistemasi','jumlah sistem':'sistem_dampak','kepuasan penggunaan':'kepuasan_sistem','pemenuhan sdm':'sdm_rekrut','perrfomance sdm':'performa_sdm','performance sdm':'performa_sdm','retensi sdm':'retensi_sdm','pencairan':'pencairan','budgeting':'budgeting'};
  function findId(name){const n=(name||'').toLowerCase().trim();for(const[k,v] of Object.entries(MAP)){if(n.includes(k))return v;}return null;}
  rows.forEach(r=>{
    const id=findId(r.sub);if(!id)return;
    [['W1','w1'],['W2','w2'],['W3','w3'],['W4','w4']].forEach(([wk,rk])=>{
      const d=r[rk];if(!d)return;
      weekly[wk][id]={aktual:parseKPINum(d.aktual),pct:parsePct(d.pct)};
    });
  });
  ['W1','W2','W3','W4','W5'].forEach(w=>{if(!Object.keys(weekly[w]).length)weekly[w]=null;});
  return weekly;
}
function parseKPICorpTSV(text){
  const lines=text.trim().split(/\r?\n/);
  let start=0;
  for(let i=0;i<Math.min(6,lines.length);i++){
    const c=lines[i].split('\t');
    if(c[3]&&(c[3].toLowerCase().includes('sub indikator')||c[3].toLowerCase().includes('booking')||c[3].toLowerCase().includes('unit ready'))){start=c[3].toLowerCase().includes('sub')?i+2:i;break;}
  }
  let lastDiv='',lastInd='';
  const rows=[];const totals={W1:null,W2:null,W3:null,W4:null};
  for(let i=start;i<lines.length;i++){
    const c=lines[i].split('\t').map(x=>(x||'').trim());
    if((c[0]||c[1]||'').toLowerCase().includes('total')){
      const rowTxt=lines[i];
      ['1','2','3','4'].forEach(n=>{
        const re=new RegExp('W'+n+'\\t+([\\d.]+%?)\\t+([\\d.]+%?)');
        const m=rowTxt.match(re);
        if(m)totals['W'+n]={bobot:parsePct(m[1]),skor:parsePct(m[2])};
      });
      continue;
    }
    if(c[0])lastDiv=c[0];if(c[1])lastInd=c[1];
    const sub=c[3];
    if(!sub||sub.toLowerCase().includes('target')||sub.toLowerCase().includes('indikator')||sub.toLowerCase().includes('bobot'))continue;
    rows.push({divisi:lastDiv,indikator:lastInd,bobotSub:c[4],sub,
      w1:{target:c[6],aktual:c[7],pct:c[8],nilai:c[9]},
      w2:{target:c[10],aktual:c[11],pct:c[12],nilai:c[13]},
      w3:{target:c[14],aktual:c[15],pct:c[16],nilai:c[17]},
      w4:{target:c[18],aktual:c[19],pct:c[20],nilai:c[21]},
    });
  }
  return{rows,totals,weekly:tsvToWeekly(rows)};
}

// ── BOOKING INPUT ─────────────────────────────────────────────
function BookingInput({onSave}){
  const [mode,setMode]=useState('actuals');
  const [tsv,setTsv]=useState('');
  const [preview,setPreview]=useState(null);
  const [done,setDone]=useState(false);
  const [err,setErr]=useState('');

  function parseTSV(){
    setErr('');setPreview(null);setDone(false);
    const lines=tsv.trim().split(/\r?\n/).filter(function(l){return l.trim();});
    if(lines.length<2){setErr('Data terlalu sedikit');return;}
    var year=new Date().getFullYear()+'';
    var headerLineIdx=0;
    if(mode==='actuals'){
      for(var li=0;li<Math.min(lines.length,3);li++){const ym=lines[li].match(/\b(20\d{2})\b/);if(ym){year=ym[1];break;}}
      headerLineIdx=lines.findIndex(function(l){return Object.keys(MONTH_IDX).some(function(m){return l.includes(m);});});
      if(headerLineIdx===-1){setErr('Header bulan tidak ditemukan');return;}
    }else{
      headerLineIdx=lines.findIndex(function(l){return Object.keys(MONTH_IDX).some(function(m){return l.includes(m);});});
      if(headerLineIdx===-1)headerLineIdx=0;
    }
    const sep=lines[headerLineIdx].includes('\t')?'\t':',';
    const headers=lines[headerLineIdx].split(sep).map(function(h){return h.trim();});
    const colMonths={};
    headers.forEach(function(h,i){if(i===0)return;var m=MONTH_IDX[h];if(m)colMonths[i]=m;});
    if(Object.keys(colMonths).length===0){setErr('Kolom bulan tidak ditemukan');return;}
    const result={};
    const SKIP=['Grand Total','grand total','GRAND TOTAL','Total'];
    lines.slice(headerLineIdx+1).forEach(function(line){
      if(!line.trim())return;
      const parts=line.split(sep);
      const proj=(parts[0]||'').trim();
      if(!proj||SKIP.some(function(s){return proj.startsWith(s);}))return;
      var rowTotal=0;
      const projData={};
      Object.entries(colMonths).forEach(function(e){var ci=parseInt(e[0]),mn=e[1];var raw=(parts[ci]||'').trim().replace(/,/g,'');var val=parseInt(raw);if(!isNaN(val)&&val>0){projData[mn]=val;rowTotal+=val;}});
      if(rowTotal>0)result[proj]=projData;
    });
    const pc=Object.keys(result).length;
    if(pc===0){setErr('Tidak ada data proyek ditemukan — cek format');return;}
    setPreview({year,result,pc});
  }

  function doSave(){
    if(!preview)return;
    var patch={};
    if(mode==='actuals')patch={actuals:{[preview.year]:preview.result}};
    else patch={targets:{[preview.year]:preview.result}};
    onSave(patch);setDone(true);setTsv('');setPreview(null);
  }

  return(
    <div className="p-4 pb-10 md:px-6">
      <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-4">
        <div className="text-[12px] font-extrabold text-blue-800 mb-1">📈 Import Data Booking</div>
        <div className="text-[11px] text-blue-700">Copy dari spreadsheet → paste. Import Aktual dan Target secara terpisah.</div>
      </div>
      <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1 mb-4">
        <button className={`flex-1 py-2.5 rounded-xl text-[11px] font-bold st as ${mode==='actuals'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={function(){setMode('actuals');setPreview(null);setDone(false);}}>📊 Aktual</button>
        <button className={`flex-1 py-2.5 rounded-xl text-[11px] font-bold st as ${mode==='targets'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={function(){setMode('targets');setPreview(null);setDone(false);}}>🎯 Target</button>
      </div>
      <div className="text-[10px] text-stone-400 mb-2">{mode==='actuals'?'Dari spreadsheet BOOKING YYYY → Select All → Ctrl+C → Paste':'Dari spreadsheet target → Select All → Ctrl+C → Paste'}</div>
      <textarea className="w-full min-h-[160px] p-3 rounded-2xl border border-stone-200 bg-stone-50 text-[10px] font-mono focus:outline-none focus:ring-2 focus:ring-stone-400 resize-y mb-4" value={tsv} onChange={function(e){setTsv(e.target.value);setPreview(null);setDone(false);}} placeholder={mode==='actuals'?'BOOKING 2026\n\nProject Area\tJan\tFeb\t...\nProyek A\t10\t15':'Project\tJan\tFeb\t...\nProyek A\t29\t34'}/>
      {err&&<div className="p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
      {done&&<div className="p-3 rounded-xl bg-emerald-50 border border-emerald-100 text-[11px] text-emerald-700 mb-4">✅ Data {mode==='actuals'?'Aktual':'Target'} {preview&&preview.year} tersimpan!</div>}
      <button className={`w-full py-3.5 rounded-2xl text-[12px] font-extrabold st as mb-4 ${!tsv.trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-900 text-white shadow-float'}`} onClick={parseTSV} disabled={!tsv.trim()}>🔍 Parse & Preview</button>
      {preview&&<div className="afi">
        <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-soft mb-4">
          <div className="text-[12px] font-bold text-stone-800 mb-3">{preview.pc} proyek · {preview.year} · {mode==='actuals'?'Aktual':'Target'}</div>
          <div className="overflow-x-auto"><table className="w-full text-[10px]" style={{minWidth:380}}>
            <thead><tr className="bg-stone-50 border-b border-stone-100 text-[9px] text-stone-400 uppercase"><th className="px-2 py-1.5 text-left">Proyek</th>{[1,2,3,4,5,6].map(function(m){return<th key={m} className="px-2 py-1.5 text-center">{MONTH_LBL[m]}</th>;})}<th className="px-2 py-1.5 text-center font-bold">Total</th></tr></thead>
            <tbody className="divide-y divide-stone-100">
              {Object.entries(preview.result).slice(0,10).map(function(e){var proj=e[0],months=e[1];var tot=Object.values(months).reduce(function(s,v){return s+v;},0);return(<tr key={proj} className="hover:bg-stone-50"><td className="px-2 py-1.5 font-medium text-stone-700 max-w-[140px] truncate" title={proj}>{proj}</td>{[1,2,3,4,5,6].map(function(m){return<td key={m} className="px-2 py-1.5 text-center text-stone-600">{months[m]||'—'}</td>;})}<td className="px-2 py-1.5 text-center font-bold text-stone-800">{tot}</td></tr>);})}
              {preview.pc>10&&<tr><td colSpan={8} className="px-2 py-1.5 text-center text-[9px] text-stone-400">+{preview.pc-10} proyek lainnya</td></tr>}
            </tbody>
          </table></div>
        </div>
        <button className="w-full py-3.5 rounded-2xl bg-emerald-600 text-white text-[12px] font-bold shadow-md as st" onClick={doSave}>✓ Simpan Data {mode==='actuals'?'Aktual':'Target'} {preview.year}</button>
      </div>}
    </div>
  );
}

Extract item-item backlog dari input berikut. Setiap item harus:

[{"konteks":"...","isi":"...","action":"...","fungsiKPI":"...","kategori":"...","blokWaktu":"...","prioritas":"..."}]`});

        <div className="flex justify-between items-center mb-4">

          <div className="flex bg-stone-100 p-1 rounded-xl border border-stone-200">
            {['CEO','PA','PDCA'].map(s=><button key={s} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold st ${sumber===s?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setSumber(s)}>{s}</button>)}
          </div>
        </div>
        <textarea className="w-full min-h-[130px] p-4 rounded-2xl border border-stone-200 bg-stone-50 text-[13px] text-stone-800 focus:outline-none focus:ring-2 focus:ring-stone-400 st resize-y placeholder-stone-400 leading-relaxed shadow-inner mb-4" value={text} onChange={e=>setText(e.target.value)} placeholder={"Tumpahkan pikiran, arahan, laporan, atau masalah...\n\nContoh:\nCashflow Bekasi negatif perlu keputusan CEO segera. Konten Q2 belum ada blueprint. Rekrutmen posisi kritis mandek."}/>
        {imgSrc&&<div className="mb-4 relative inline-block"><img src={imgSrc} alt="" className="h-20 w-auto rounded-xl border border-stone-200 shadow-sm object-cover"/><button onClick={removeImg} className="absolute -top-2 -right-2 bg-stone-900 text-white w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold shadow-md">✕</button></div>}
        <div className="flex gap-2 mb-4">
          <input type="file" accept="image/*" ref={fileRef} onChange={handleImg} className="hidden"/>
          <button className="flex-1 py-2.5 px-4 rounded-xl border border-stone-200 bg-white text-[11px] font-bold text-stone-700 as st flex items-center justify-center gap-2" onClick={()=>fileRef.current&&fileRef.current.click()}><span>📎</span> Lampirkan Screenshot / MOM</button>
        </div>
        {err&&<div className="p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
        <div className="flex items-start gap-2.5 p-3 rounded-xl bg-blue-50 border border-blue-100 mb-4">
          <span className="text-blue-400 text-sm mt-0.5">✨</span>
          <div className="text-[10px] text-blue-700 leading-relaxed"><strong className="font-bold">AI akan extract</strong> — Konteks · Isi/Issue · Action · Fungsi KPI · Kategori · Blok Waktu · Prioritas. Preview dulu sebelum simpan.</div>
        </div>
        <button className={`w-full py-4 rounded-2xl text-[12px] font-extrabold flex justify-center items-center gap-2 st as ${loading||(!text.trim()&&!imgB64)?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-900 text-white shadow-float'}`} onClick={extract} disabled={loading||(!text.trim()&&!imgB64)}>
          {loading?<><span className="w-4 h-4 border-2 border-stone-400 border-t-white rounded-full animate-spin"/><span>AI menganalisis...</span></>:<span>✨ Ekstrak ke Backlog via AI</span>}
        </button>
      </div>

      {preview.length>0&&(
        <div className="afi">
          <div className="flex items-center justify-between mb-3 px-1">
            <div className="text-[12px] font-bold text-stone-700">{preview.length} item ditemukan — cek sebelum simpan</div>
            <button className="text-[10px] text-stone-400 font-semibold hover:text-stone-600" onClick={()=>setPreview([])}>✕ Reset</button>
          </div>
          <div className="space-y-3 mb-4">
            {preview.map((item,i)=>{const k=KPI5.find(x=>x.id===item.fungsiKPI);return(
              <div key={i} className="bg-white rounded-2xl border border-stone-200 shadow-sm overflow-hidden relative">
                <div className={`absolute left-0 top-0 bottom-0 w-1 ${k?k.bg:'bg-stone-200'}`}/>
                <div className="p-3.5 pl-4">
                  <div className={`text-[9px] font-extrabold uppercase tracking-widest mb-1 ${k?k.color:'text-stone-400'}`}>{item.konteks}</div>
                  <div className="text-[12px] font-bold text-stone-800 leading-snug mb-2">{item.isi}</div>
                  {item.action&&<div className="flex items-start gap-1.5 bg-amber-50 rounded-lg p-2 border border-amber-100 mb-2.5"><span className="text-amber-500 text-xs mt-0.5">⚡</span><div className="text-[10px] font-semibold text-amber-800">{item.action}</div></div>}
                  <div className="flex gap-1.5 flex-wrap"><KC id={item.fungsiKPI} sm/><BC id={item.blokWaktu}/><PriBadge p={item.prioritas}/></div>
                </div>
              </div>
            );})}
          </div>
          <button className="w-full py-3.5 rounded-2xl bg-emerald-600 text-white text-[12px] font-bold shadow-md as st" onClick={addAll}>✓ Simpan {preview.length} item ke Backlog</button>
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────
function Dashboard({weekly,kpiCorp,dashMonth,onChangeMonth,booking,backlog,jadwal}){
  const [open,setOpen]=useState(null);
  const availMonths=Object.keys(kpiCorp||{}).sort().reverse();
  const active=WEEKS.filter(w=>weekly[w]);
  const last=weekly[active[active.length-1]];
  const crits=[];
  if(last){if((last.booking&&last.booking.pct||0)<50)crits.push({l:'Booking',p:last.booking&&last.booking.pct,k:'finansial'});if(last.fraud&&last.fraud.pct===0)crits.push({l:'Temuan Fraud',note:'ada 1.29%',k:'operasional'});if((last.lahan_baru&&last.lahan_baru.pct||0)===0)crits.push({l:'Lahan Baru',p:0,k:'riset'});if((last.sdm_rekrut&&last.sdm_rekrut.pct||0)<50)crits.push({l:'SDM Rekrut',p:last.sdm_rekrut&&last.sdm_rekrut.pct,k:'people'});}

  // ── AUTO-FLAG: Backlog anomalies ──
  var today=todayStr();
  var flags=[];
  var blList=backlog||[];
  // overdue
  var overdue=blList.filter(function(it){return it.deadline&&it.deadline<today&&it.status!=='selesai'&&it.status!=='didelegasikan';});
  if(overdue.length>0)flags.push({icon:'🔴',label:'Backlog Overdue',val:overdue.length+'×',sub:'deadline lewat belum selesai',color:'#f43f5e'});
  // multi-postpone
  var multiPost=blList.filter(function(it){return(it.postponeHistory||[]).length>=3&&it.status!=='selesai';});
  if(multiPost.length>0)flags.push({icon:'🟠',label:'Multi-Postpone ≥3×',val:multiPost.length+'×',sub:'perlu eskalasi atau drop',color:'#f59e0b'});
  // long pending NF
  var pendingNF=blList.filter(function(it){return it.needFeedback&&!it.feedbackStatus;});
  var longNF=pendingNF.filter(function(it){return it.tanggal&&Math.round((new Date(today)-new Date(it.tanggal))/86400000)>5;});
  if(longNF.length>0)flags.push({icon:'🟡',label:'Feedback Terlambat >5h',val:longNF.length+'×',sub:'menunggu respon CEO >5 hari',color:'#eab308'});
  // D6: output fill rate
  var allJItems=[];Object.keys(jadwal||{}).forEach(function(d){(jadwal[d]||[]).forEach(function(it){allJItems.push({...it,_date:d});});});
  var nonMtg=allJItems.filter(function(it){return it.jenisKegiatan&&!it.jenisKegiatan.includes('Meeting')&&it.jenisKegiatan!=='Personal'&&it._date<=today;});
  var filled=nonMtg.filter(function(it){return it.outputKeputusan&&it.outputKeputusan.trim().length>10;});
  var fillPct=nonMtg.length>0?Math.round(filled.length/nonMtg.length*100):null;
  if(fillPct!==null&&fillPct<60)flags.push({icon:'📝',label:'Output Fill Rate Rendah',val:fillPct+'%',sub:'target >60% — '+filled.length+'/'+nonMtg.length+' terisi',color:'#6366f1'});

  // ── RINGKASAN: KPI Strip ──
  var curMonth=dashMonth||(new Date().toISOString().slice(0,7));
  var jamBulanIni=0;
  Object.keys(jadwal||{}).forEach(function(d){
    if(d.slice(0,7)===curMonth)(jadwal[d]||[]).forEach(function(it){jamBulanIni=Math.round((jamBulanIni+getDur(it.jamMulai,it.jamSelesai))*10)/10;});
  });
  var blAktif=(backlog||[]).filter(function(it){return it.status==='baru'||it.status==='postponed';}).length;
  var nfQueue=(backlog||[]).filter(function(it){return it.needFeedback&&!it.feedbackStatus;}).length;

  // ── DONT AUDIT: scan 14 hari terakhir ──
  var cutoff14=new Date();cutoff14.setDate(cutoff14.getDate()-14);
  var cut14=cutoff14.toISOString().slice(0,10);
  var recentItems=[];
  Object.keys(jadwal||{}).forEach(function(d){if(d>=cut14)(jadwal[d]||[]).forEach(function(it){recentItems.push({...it,_date:d});});});

  var DONT_RULES=[
    {id:'upload_konten',label:'Upload/Posting konten sendiri',why:'Eksekusi level EA atau tim Zaffan — bukan CEO',rec:'Delegasi ke EA; CEO cukup approve draft',
     test:function(it){var d=((it.detailKegiatan||'')+' '+(it.outputKeputusan||'')).toLowerCase();return/upload.*postingan|upload.*ig|posting.*ig|post.*instagram|upload.*konten/.test(d);}},
    {id:'ops_detail',label:'Meeting detail operasional kecil',why:'Keputusan teknis level COO/PM — ukuran, material, vendor minor',rec:'COO yang putuskan; CEO hanya intervensi jika strategic',
     test:function(it){var d=((it.detailKegiatan||'')+' '+(it.outputKeputusan||'')).toLowerCase();return it.jenisKegiatan&&it.jenisKegiatan.indexOf('Meeting Review')===0&&/aspal|paving|kanstin|bollard|material jalan|warna cat|ukuran|vendor kecil/.test(d);}},
  ];
  var DONT_FOUND=[];
  DONT_RULES.forEach(function(rule){
    var matches=recentItems.filter(function(it){try{return rule.test(it);}catch(e){return false;}});
    if(matches.length>0)DONT_FOUND.push({rule:rule,matches:matches});
  });

  // DO coverage check (last 7 hari)
  var cutoff7=new Date();cutoff7.setDate(cutoff7.getDate()-7);
  var cut7=cutoff7.toISOString().slice(0,10);
  var recent7=recentItems.filter(function(it){return it._date>=cut7;});
  var DO_CHECKS=[
    {id:'deepwork',label:'Deepwork / OKR / Strategis',jenis:'Deepwork Strategic'},
    {id:'external',label:'Ketemu External / Networking',jenis:'Ketemu External'},
    {id:'engage',label:'Employee Engage',jenis:'Employee Engage'},
    {id:'konten',label:'Bikin Konten CEO',jenis:'Bikin Konten'},
  ];
  var DO_ABSENT=DO_CHECKS.filter(function(chk){
    return!recent7.some(function(it){return it.jenisKegiatan===chk.jenis;});
  });
  const SC={y:'text-amber-600',r:'text-red-600',g:'text-emerald-600'};
  const scC=(s)=>s>=80?'text-emerald-600':s>=60?'text-amber-600':'text-red-600';
  // Booking summary
  const currYr=new Date().getFullYear()+'';
  const currMo=new Date().getMonth()+1;
  const prevMo=currMo===1?12:currMo-1;
  const prevYr=currMo===1?(parseInt(currYr)-1)+'':currYr;
  const bkAct=(booking&&booking.actuals&&booking.actuals[currYr])||{};
  const bkTgt=(booking&&booking.targets&&booking.targets[currYr])||{};
  const bkPrevAct=(booking&&booking.actuals&&booking.actuals[prevYr])||{};
  const totalAct=Object.values(bkAct).reduce(function(s,p){return s+(p[currMo]||0);},0);
  const totalTgt=Object.values(bkTgt).reduce(function(s,p){return s+(p[currMo]||0);},0);
  const totalPrev=Object.values(bkPrevAct).reduce(function(s,p){return s+(p[prevMo]||0);},0);
  const bkPct=totalTgt>0?Math.round(totalAct/totalTgt*100):null;
  const bkDelta=totalPrev>0?totalAct-totalPrev:null;
  const hasBooking=totalAct>0||totalTgt>0;
  return(
    <div className="afi pb-4">

      {/* ── RINGKASAN: KPI STRIP ── */}
      <div className="px-4 pt-4 pb-3">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3">📋 Ringkasan</div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5">
          {(function(){
            var cards=[
              {label:'Jam Bulan Ini',val:jamBulanIni+'h',sub:curMonth,col:'#3b82f6',bg:'#eff6ff'},
              {label:'Backlog Aktif',val:blAktif+'×',sub:'baru + postponed',col:blAktif>10?'#f43f5e':blAktif>5?'#f59e0b':'#10b981',bg:blAktif>10?'#fff1f2':blAktif>5?'#fffbeb':'#f0fdf4'},
              {label:'NF Pending',val:nfQueue+'×',sub:'menunggu CEO',col:nfQueue>3?'#f43f5e':nfQueue>0?'#f59e0b':'#10b981',bg:nfQueue>3?'#fff1f2':nfQueue>0?'#fffbeb':'#f0fdf4'},
              {label:'Output Fill Rate',val:fillPct!==null?fillPct+'%':'–',sub:'kegiatan non-meeting',col:fillPct===null?'#94a3b8':fillPct>=80?'#10b981':fillPct>=60?'#f59e0b':'#f43f5e',bg:fillPct===null?'#f8fafc':fillPct>=80?'#f0fdf4':fillPct>=60?'#fffbeb':'#fff1f2'},
            ];
            return cards.map(function(c,i){
              return(
                <div key={i} className="rounded-2xl p-3.5 border" style={{background:c.bg,borderColor:c.col+'33'}}>
                  <div className="text-[9px] font-bold uppercase tracking-wider mb-1.5" style={{color:c.col}}>{c.label}</div>
                  <div className="text-[22px] font-black leading-none mb-1" style={{color:c.col}}>{c.val}</div>
                  <div className="text-[9px] text-stone-400">{c.sub}</div>
                </div>
              );
            });
          })()}
        </div>
      </div>

      {/* ── DO/DONT AUDIT ── */}
      {(DONT_FOUND.length>0||DO_ABSENT.length>0)&&(
        <div className="mx-4 mb-4 rounded-2xl border border-stone-200 bg-white overflow-hidden shadow-soft">
          <div className="px-4 py-2.5 border-b border-stone-100 flex items-center justify-between">
            <span className="text-[10px] font-extrabold text-stone-500 uppercase tracking-widest">🔍 DO / DONT Audit · 14 hari terakhir</span>
          </div>
          {DONT_FOUND.length>0&&(
            <div className="px-4 py-3 border-b border-stone-100">
              <div className="text-[9px] font-bold text-red-500 uppercase tracking-widest mb-2">DONT — Ditemukan</div>
              {DONT_FOUND.map(function(f){
                return(
                  <div key={f.rule.id} className="mb-3 last:mb-0 bg-red-50 border border-red-100 rounded-xl p-3">
                    <div className="flex items-start gap-2 mb-1">
                      <span className="text-[9px] font-black text-red-600 bg-red-100 px-1.5 py-0.5 rounded flex-shrink-0">DONT</span>
                      <span className="text-[11px] font-bold text-stone-800">{f.rule.label}</span>
                    </div>
                    <div className="text-[9px] text-stone-500 mb-1 pl-1">{f.rule.why}</div>
                    <div className="text-[9px] text-stone-400 pl-1">→ {f.rule.rec}</div>
                    <div className="mt-2 space-y-1">
                      {f.matches.slice(0,3).map(function(it){
                        return(
                          <div key={it.id} className="flex items-center gap-2 text-[9px] text-stone-500">
                            <span className="font-mono text-stone-400">{it._date.slice(5)}</span>
                            <span>{(it.detailKegiatan||'').slice(0,55)}</span>
                          </div>
                        );
                      })}
                      {f.matches.length>3&&<div className="text-[9px] text-stone-400">+{f.matches.length-3} lainnya</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {DO_ABSENT.length>0&&(
            <div className="px-4 py-3">
              <div className="text-[9px] font-bold text-amber-600 uppercase tracking-widest mb-2">DO — Absen 7 hari terakhir</div>
              <div className="space-y-1.5">
                {DO_ABSENT.map(function(chk){
                  return(
                    <div key={chk.id} className="flex items-center gap-2">
                      <span className="text-[9px] font-black text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded flex-shrink-0">✗</span>
                      <span className="text-[11px] text-stone-600">{chk.label}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="px-4 pt-2 pb-2 flex items-center justify-between">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">KPI Corporate</div>
        <div className="flex items-center gap-2">
          {availMonths.length>0?(
            <select className="px-2.5 py-1.5 rounded-xl border border-stone-200 bg-white text-[11px] font-semibold focus:outline-none as" value={dashMonth} onChange={e=>onChangeMonth(e.target.value)}>
              {availMonths.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleDateString('id-ID',{month:'long',year:'numeric'})}</option>)}
            </select>
          ):<span className="text-[10px] text-stone-300 italic">Data hardcoded — import via Dump → 📊 KPI</span>}
          {kpiCorp?.[dashMonth]&&<span className="text-[9px] bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded-full font-bold">✓ Imported</span>}
        </div>
      </div>
      <div className="flex gap-3 overflow-x-auto px-4 pb-3 scrollbar-hide">
        {WEEKS.map(function(w,wi){const sc=calcScore(weekly[w]);const has=!!weekly[w];const prevW=wi>0?WEEKS[wi-1]:null;const prevSc=prevW&&weekly[prevW]?calcScore(weekly[prevW]):null;const delta=has&&prevSc!==null?sc-prevSc:null;return(
          <div key={w} className={`flex-shrink-0 text-center p-3 rounded-2xl border min-w-[76px] ${has?'bg-white border-stone-200 shadow-soft':'bg-stone-50 border-stone-200/50 opacity-50'}`}>
            <div className="text-[10px] font-bold text-stone-400 mb-1">{w}</div>
            {has?<><div className={`text-2xl font-black leading-none tracking-tight ${scC(sc)}`}>{sc}<span className="text-sm font-bold">%</span></div>{delta!==null&&<div className={`text-[10px] font-bold mt-0.5 ${delta>0?'text-emerald-500':delta<0?'text-red-500':'text-stone-300'}`}>{delta>0?'↑':delta<0?'↓':'→'}{Math.abs(delta)}</div>}<div className="text-[9px] text-stone-400 mt-0.5">dari 100</div></>:<div className="text-xl font-black text-stone-300">—</div>}
          </div>
        );})}
      </div>
      {crits.length>0&&<div className="mx-4 mb-4 p-3.5 rounded-2xl bg-red-50 border border-red-100"><div className="text-[11px] font-bold text-red-700 mb-2 flex items-center gap-1.5"><span>🚨</span>Perlu perhatian CEO</div>{crits.map((c,i)=><div key={i} className="flex justify-between items-center mb-1.5 last:mb-0"><span className="text-[11px] text-red-800 font-medium">● {c.l}{c.note?` — ${c.note}`:''}</span><div className="flex gap-1.5">{c.p!==undefined&&<Pct p={c.p} sm/>}<KC id={c.k} sm/></div></div>)}</div>}
      {flags.length>0&&(
        <div className="mx-4 mb-4 rounded-2xl border border-amber-200 bg-amber-50 overflow-hidden">
          <div className="px-4 py-2.5 border-b border-amber-200 flex items-center gap-1.5">
            <span>⚡</span>
            <span className="text-[11px] font-bold text-amber-800">Auto-Flag Sistem</span>
            <span className="ml-auto text-[9px] font-bold text-amber-600 bg-amber-100 px-2 py-0.5 rounded-full">{flags.length} alert</span>
          </div>
          <div className="divide-y divide-amber-100">
            {flags.map(function(f,i){
              return(
                <div key={i} className="flex items-center justify-between px-4 py-2.5">
                  <div className="flex items-center gap-2.5 min-w-0">
                    <span className="text-[14px] flex-shrink-0">{f.icon}</span>
                    <div className="min-w-0">
                      <div className="text-[11px] font-bold text-stone-800">{f.label}</div>
                      <div className="text-[9px] text-stone-500">{f.sub}</div>
                    </div>
                  </div>
                  <span className="text-[13px] font-black flex-shrink-0 ml-3" style={{color:f.color}}>{f.val}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {hasBooking&&<div className="mx-4 mb-4 bg-white border border-stone-200 rounded-2xl shadow-soft p-4">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3">📈 Booking {MONTH_LBL[currMo]} {currYr}</div>
        <div className="flex items-end gap-4 flex-wrap">
          <div><div className="text-3xl font-black text-stone-900">{totalAct}</div><div className="text-[10px] text-stone-400">aktual unit</div></div>
          {totalTgt>0&&<><div className="text-stone-300 text-xl">÷</div><div><div className="text-2xl font-black text-stone-500">{totalTgt}</div><div className="text-[10px] text-stone-400">target</div></div><div className="text-stone-300 text-xl">=</div><div><div className={`text-3xl font-black ${bkPct===null?'text-stone-300':bkPct>=80?'text-emerald-600':bkPct>=60?'text-amber-600':'text-red-600'}`}>{bkPct!==null?bkPct+'%':'—'}</div>{bkDelta!==null&&<div className={`text-[10px] font-bold ${bkDelta>=0?'text-emerald-500':'text-red-500'}`}>{bkDelta>=0?'↑+':'↓'}{bkDelta} vs {MONTH_LBL[prevMo]}</div>}</div></>}
        </div>
      </div>}
      <div className="space-y-2 px-4 md:grid md:grid-cols-2 md:gap-3 md:space-y-0 md:px-6 md:pb-4 md:items-start">
        {GROUPS.map(g=>{const isO=open===g.id;return(
          <div key={g.id} className="bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-soft">
            <div className={`p-3 flex justify-between items-center cursor-pointer st hover:bg-stone-50 ${isO?'border-b border-stone-100':''}`} onClick={()=>setOpen(isO?null:g.id)}>
              <div><div className="text-[13px] font-bold text-stone-800 flex items-center gap-1.5">{g.icon} {g.name} <span className="text-[10px] text-stone-400 font-medium">({g.bobot}%)</span></div><div className="text-[10px] text-stone-400 mt-0.5 ml-5">{g.div}</div></div>

// ── JADWAL FILTER HELPER ─────────────────────────────────────
function applyJadwalFilter(items,filter){
  return items.filter(it=>{
    const kat=it.kategori||'Personal';
    if(filter.kategori&&filter.kategori.length>0&&filter.kategori.indexOf(kat)===-1)return false;
    if(filter.belumOutput&&(it.outputKeputusan||'').trim())return false;
    if(filter.belumSiap){
      const clDef=PRE_CHECKLIST[it.jenisKegiatan];
      if(clDef){
        const clItems=clDef._subs?(it.meetingSubType?clDef[it.meetingSubType]||[]:[]):(Array.isArray(clDef)?clDef:[]);
        const done=it.checklistDone||{};
        const allWajibDone=clItems.filter(c=>c.wajib).every(c=>done[c.id]);
        if(allWajibDone)return false;
      }
    }
    return true;
  });
}

// Helper: parse "HH:MM" to minutes since midnight
function timeToMin(t){if(!t)return 0;const p=t.split(':');return parseInt(p[0]||0)*60+parseInt(p[1]||0);}
function nowTimeStr(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function getItemState(item){
  const now=timeToMin(nowTimeStr());
  const start=timeToMin(item.jamMulai||'00:00');
  const end=timeToMin(item.jamSelesai||'23:59');
  if(!item.jamMulai)return'upcoming';
  if(now>=start&&now<end)return'current';
  if(now>=end)return'past';
  return'upcoming';
}
function getChecklistInfo(item){
  var clDef=PRE_CHECKLIST[item.jenisKegiatan]||null;
  if(!clDef)return{total:0,checked:0};
  var hasSubs=clDef._subs;
  var subType=item.meetingSubType||null;
  var clItems=hasSubs?(subType?(clDef[subType]||[]):[]):(Array.isArray(clDef)?clDef:[]);
  var clDone=item.checklistDone||{};
  var total=clItems.length;
  var checked=clItems.filter(function(c){return clDone[c.id];}).length;
  return{total:total,checked:checked};
}

            {showExport&&<div className="absolute right-4 mt-1 bg-white border border-stone-200 rounded-2xl shadow-float z-30 overflow-hidden afi" style={{minWidth:160}}>
              <div className="px-3 py-2 text-[9px] font-extrabold text-stone-400 uppercase tracking-wider border-b border-stone-100">Export Jadwal CSV</div>

                <button key={r[0]} className="w-full text-left px-3 py-2.5 text-[11px] font-medium text-stone-700 hover:bg-stone-50 border-b border-stone-100 last:border-0 as" onClick={function(){exportJadwalCSV(jadwal,backlog,r[0]);setShowExport(false);}}>{r[1]}</button>
              );})}
            </div>}
          </div>
        </div>

      {/* Now banner */}
      {isToday&&currentItem&&<div className="mx-4 md:mx-6 mb-3 px-3 py-2 bg-blue-50 border border-blue-200 rounded-xl flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse flex-shrink-0"/>
        <span className="text-[11px] font-bold text-blue-700 flex-1">{currentItem.detailKegiatan}</span>
        <span className="text-[10px] text-blue-500 tabular-nums whitespace-nowrap">{currentItem.jamMulai}–{currentItem.jamSelesai}</span>
      </div>}
      {isToday&&!currentItem&&nextItem&&<div className="mx-4 md:mx-6 mb-3 px-3 py-2 bg-stone-50 border border-stone-200 rounded-xl flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"/>
        <span className="text-[11px] text-stone-500 flex-1">Berikutnya: <strong>{nextItem.detailKegiatan}</strong></span>
        <span className="text-[10px] text-stone-400 whitespace-nowrap">{nextItem.jamMulai}</span>
      </div>}

      {/* Full schedule table */}
      <div className="mx-4 md:mx-6 mb-6 rounded-2xl border border-stone-200 overflow-hidden shadow-soft" style={{overflowX:'auto'}}>
        {dayItems.length===0&&blSched.length===0
          ?<div className="py-10 text-center"><div className="text-3xl mb-2 opacity-20">📅</div><div className="text-[12px] font-bold text-stone-400 mb-1">Belum ada kegiatan</div><div className="text-[10px] text-stone-300">Tap + di blok waktu untuk menambah</div></div>
          :<table className="w-full md:min-w-[640px]">
            <thead>
              <tr className="bg-stone-50 border-b border-stone-200">
                <th className="px-2 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Jam</th>
                <th className="px-2 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Kat</th>
                <th className="hidden md:table-cell px-2 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Jenis</th>
                <th className="px-2.5 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Kegiatan</th>
                <th className="hidden md:table-cell px-2 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">KPI</th>
                <th className="px-1.5 py-2.5 text-center text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">✓CL</th>
                <th className="px-1.5 py-2.5 text-center text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Out</th>
                <th className="px-2 py-2.5"></th>

              {BLOKS.map(function(blok){
                var items=getBlokItems(blok.id);

                ];

// ── CONVERT OUTPUT → MoM (AI batch end-of-day) ──────────────────
function ConvertOutputModal({dayItemsAll,today,onAddMomBatch,onClose}){
  const itemsWithOutput=dayItemsAll.filter(function(it){return(it.outputKeputusan||'').trim().length>0;});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [preview,setPreview]=useState(null); // array of {activityId,activityName,jenisKegiatan,items:[...]}
  const [excluded,setExcluded]=useState({}); // activityId -> true
  const [done,setDone]=useState(false);

  function toggleExclude(aid){setExcluded(function(p){var n={...p};n[aid]=!n[aid];return n;});}

  async function doConvert(){
    setErr('');setLoading(true);
    try{
      function sanitize(s){return(s||'').replace(/["'\\\n\r\t<>]/g,' ').replace(/\s+/g,' ').trim();}
      var allItems=itemsWithOutput;
      if(allItems.length>8){setErr('Terlalu banyak kegiatan ('+allItems.length+'). Pilih max 8 kegiatan atau filter dulu.');setLoading(false);return;}
      var payload=allItems.map(function(it){return{id:it.id,n:sanitize(it.detailKegiatan).slice(0,40),j:(it.jenisKegiatan||'').split(' ')[0],o:sanitize(it.outputKeputusan).slice(0,150)};});
      var prompt='Extract action items dari kegiatan CEO RSP ini. Personal/olahraga = hasItems:false. '
        +'Field tiap item: k(konteks,max25), a(action,max70), j(Immediately/Konsep/Feedback), p(pic/null), d(deadline YYYY-MM-DD/null). '
        +'Data:'+JSON.stringify(payload)+' '
        +'Return ONLY JSON array: [{"id":"...","hasItems":true,"items":[{"k":"...","a":"...","j":"...","p":null,"d":null}]}]';
      var raw=await callAI([{role:'user',content:prompt}],2048);
      var clean=raw.replace(/```json|```/g,'').trim();
      var parsed=null;
      // Try 1: direct parse
      try{parsed=JSON.parse(clean);}catch(e1){
        // Try 2: cut at last valid ']'
        var attempts=[
          function(){var i=clean.lastIndexOf('}]');return i>0?clean.slice(0,i+2):null;},
          function(){var i=clean.lastIndexOf(']');return i>0?clean.slice(0,i+1):null;},
          function(){var i=clean.lastIndexOf('}');return i>0?clean.slice(0,i+1)+']':null;},
        ];
        for(var ai=0;ai<attempts.length;ai++){
          var s=attempts[ai]();
          if(s){try{parsed=JSON.parse(s);break;}catch(e2){continue;}}
        }
      }
      if(!parsed)throw new Error('Gagal parse response AI. Coba lagi atau kurangi jumlah kegiatan.');
      var withItems=parsed.filter(function(p){return p.hasItems&&p.items&&p.items.length>0;}).map(function(p){
        return{id:p.id,name:p.name||p.n||'',hasItems:p.hasItems,items:(p.items||[]).map(function(it){
          return{konteks:it.k||it.konteks||'',action:it.a||it.action||'',jenis:it.j||it.jenis||'Immediately',pic:it.p||it.pic||null,deadline:it.d||it.deadline||null};
        })};
      });
      setPreview(withItems);
      setLoading(false);
    }catch(e){
      setErr('Gagal: '+e.message);
      setLoading(false);
    }
  }

  function doConfirm(){
    var toSave=preview.filter(function(p){return!excluded[p.id];});
    var entries=toSave.map(function(p){
      return{
        id:'MOM-'+genId(),
        tanggal:today,
        meetingName:p.name,
        gcalDesc:'',
        items:(p.items||[]).map(function(it){return{id:'MI-'+genId(),konteks:it.konteks||'',action:it.action||'',jenis:it.jenis||'',pic:it.pic||'',deadline:it.deadline||'',status:'pending'};}),
        sumber:p.id,
        createdAt:todayStr(),
      };
    });
    if(entries.length>0&&onAddMomBatch)onAddMomBatch(entries);
    setDone(true);
  }

  return(
    <div className="fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] overflow-y-auto shadow-2xl" onClick={function(e){e.stopPropagation();}}>
        <div className="p-5 border-b border-stone-100 flex items-center justify-between sticky top-0 bg-white z-10">
          <div>
            <div className="text-[14px] font-extrabold text-stone-900">🤖 Convert Output → MoM</div>
            <div className="text-[10px] text-stone-400 mt-0.5">{itemsWithOutput.length} kegiatan punya output hari ini</div>
          </div>
          <button className="w-7 h-7 rounded-full bg-stone-100 text-stone-500 flex items-center justify-center as st" onClick={onClose}>✕</button>
        </div>

        <div className="p-5">
          {!preview&&!done&&<>
            {itemsWithOutput.length===0
              ?<div className="text-center py-8"><div className="text-3xl mb-2 opacity-30">📭</div><div className="text-[12px] font-bold text-stone-400">Belum ada output diisi hari ini</div></div>
              :<>
                <div className="text-[11px] text-stone-500 leading-relaxed mb-4">AI akan baca {itemsWithOutput.length} catatan output hari ini, lalu extract action item / keputusan yang konkret jadi format MoM. Kegiatan personal tanpa keputusan akan dilewati otomatis.</div>
                <div className="space-y-1.5 mb-4 max-h-40 overflow-y-auto bg-stone-50 rounded-xl p-2.5 border border-stone-200">
                  {itemsWithOutput.map(function(it){return(
                    <div key={it.id} className="text-[10px] text-stone-600 flex items-center gap-1.5"><span className="text-stone-300">•</span><span className="font-mono text-stone-400">{it.jamMulai}</span><span className="font-semibold truncate">{it.detailKegiatan}</span></div>
                  );})}
                </div>
                {err&&<div className="p-2.5 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
                <button className={'w-full py-3 rounded-xl text-[12px] font-extrabold as st '+(loading?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-violet-600 text-white shadow-md')} disabled={loading} onClick={doConvert}>
                  {loading?'⏳ AI menganalisis...':'✨ Convert Sekarang'}
                </button>
              </>
            }
          </>}

          {preview&&!done&&<>
            {preview.length===0
              ?<div className="text-center py-8"><div className="text-3xl mb-2 opacity-30">🤷</div><div className="text-[12px] font-bold text-stone-400">AI tidak menemukan action item</div><div className="text-[10px] text-stone-300 mt-1">Semua kegiatan personal / tanpa keputusan konkret</div></div>
              :<>
                <div className="text-[11px] font-bold text-stone-600 mb-3">{preview.length} kegiatan menghasilkan action item — cek sebelum simpan</div>
                <div className="space-y-3 mb-4">
                  {preview.map(function(p){
                    var isExcl=!!excluded[p.id];
                    return(
                      <div key={p.id} className={'rounded-xl border overflow-hidden '+(isExcl?'border-stone-200 bg-stone-50 opacity-50':'border-violet-200 bg-violet-50/30')}>
                        <div className="px-3 py-2 flex items-center justify-between bg-white border-b border-stone-100">
                          <div className="text-[11px] font-bold text-stone-800 truncate flex-1">{p.name}</div>
                          <button className="text-[9px] font-bold text-stone-400 as ml-2" onClick={function(){toggleExclude(p.id);}}>{isExcl?'↩ Sertakan':'✕ Kecualikan'}</button>
                        </div>
                        <div className="px-3 py-2 space-y-1.5">
                          {(p.items||[]).map(function(it,idx){return(
                            <div key={idx} className="text-[10px] leading-snug">
                              <span className="font-bold text-violet-700">{it.konteks}</span>
                              <span className="text-stone-600"> — {it.action}</span>
                              {it.pic&&<span className="text-stone-400"> · {it.pic}</span>}
                              {it.deadline&&<span className="text-stone-400"> · {it.deadline}</span>}
                            </div>
                          );})}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <button className="w-full py-3 rounded-xl bg-emerald-600 text-white text-[12px] font-extrabold as st shadow-md" onClick={doConfirm}>✓ Simpan {preview.filter(function(p){return!excluded[p.id];}).length} MoM Entry</button>
              </>
            }
          </>}

          {done&&<div className="text-center py-8"><div className="text-3xl mb-2">✅</div><div className="text-[12px] font-bold text-emerald-600 mb-3">Berhasil disimpan ke MoM!</div><button className="px-4 py-2 rounded-xl bg-stone-900 text-white text-[11px] font-bold as st" onClick={onClose}>Tutup</button></div>}
        </div>
      </div>
    </div>
  );
}

function JadwalMingguan({backlog,jadwal,filter,onUpdateJadwal,onRemoveJadwal,onUpdateBacklog}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [selDates,setSelDates]=useState({});
  const [expandId,setExpandId]=useState(null);
  const [editOut,setEditOut]=useState({});
  const [editGcal,setEditGcal]=useState({});
  const [editChecklistNotes,setEditChecklistNotes]=useState({});
  const getMon=function(offset){var mon=new Date();var diff=mon.getDay()===0?6:mon.getDay()-1;mon.setDate(mon.getDate()-diff+offset*7);return mon;};
  const mon=getMon(weekOffset);
  const days=Array.from({length:7},function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return{date:d.toISOString().slice(0,10),lbl:d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'}),isToday:d.toISOString().slice(0,10)===todayStr(),dow:d.getDay()};});
  const weekLabel=(function(){var s=days[0];var e=days[6];var sm=new Date(s.date+'T12:00:00').toLocaleDateString('id-ID',{month:'short'});var em=new Date(e.date+'T12:00:00').toLocaleDateString('id-ID',{month:'short'});var sn=new Date(s.date+'T12:00:00').getDate();var en=new Date(e.date+'T12:00:00').getDate();return s.date.slice(0,7)===e.date.slice(0,7)?sn+'–'+en+' '+sm:sn+' '+sm+' – '+en+' '+em;})();

  function goWeek(dir){setWeekOffset(function(p){return p+dir;});setSelDates({});setExpandId(null);}
  function goToday(){setWeekOffset(0);setSelDates({});setExpandId(null);}
  var anySelected=Object.values(selDates).some(function(v){return v;});
  function toggleDate(date){setSelDates(function(p){var n={...p};n[date]=!n[date];return n;});}
  function clearDates(){setSelDates({});}

  var allRows=[];
  days.forEach(function(d){
    if(anySelected&&!selDates[d.date])return;
    var its=filter?applyJadwalFilter(jadwal[d.date]||[],filter):(jadwal[d.date]||[]);
    its.slice().sort(function(a,b){return (a.jamMulai||'').localeCompare(b.jamMulai||'');}).forEach(function(it){
      allRows.push({...it,_date:d.date,_lbl:d.lbl,_isToday:d.isToday,_dow:d.dow});
    });
  });

  var totalItems=allRows.length;
  var adaOutput=allRows.filter(function(it){return it.outputKeputusan&&it.outputKeputusan.trim();}).length;

  function openExpand(it){
    var id=it.id;
    if(expandId===id){setExpandId(null);return;}
    setExpandId(id);
    setEditOut(function(p){var n={...p};if(n[id]===undefined)n[id]=it.outputKeputusan||'';return n;});
    setEditGcal(function(p){var n={...p};if(n[id]===undefined)n[id]=it.gcalDesc||'';return n;});
    setEditChecklistNotes(function(p){var n={...p};if(n[id]===undefined)n[id]=it.checklistNotes||{};return n;});
  }

  function saveRow(it){
    if(!onUpdateJadwal)return;
    onUpdateJadwal(it._date,it.id,{outputKeputusan:editOut[it.id]||'',gcalDesc:editGcal[it.id]||'',checklistNotes:editChecklistNotes[it.id]||{}});
    setExpandId(null);
  }

  function deleteRow(it){
    if(!onRemoveJadwal)return;
    var msg='Hapus kegiatan ini dari Jadwal?';
    if(it.masalahBacklogId)msg+='\n\nItem Backlog terkait akan dikembalikan ke status "Baru".';
    if(!confirm(msg))return;
    onRemoveJadwal(it._date,it.id);
    if(it.masalahBacklogId&&onUpdateBacklog){onUpdateBacklog(it.masalahBacklogId,{status:'baru'});}
    setExpandId(null);
  }

  function toggleCheck(it,cid){
    if(!onUpdateJadwal)return;
    var done=it.checklistDone||{};
    onUpdateJadwal(it._date,it.id,{checklistDone:{...done,[cid]:!done[cid]}});
  }

  return(
    <div className="afi pb-8">
      {/* Week navigator */}
      <div className="px-4 pt-4 pb-3 flex items-center justify-between">
        <div>
          <div className="text-[13px] font-extrabold text-stone-800">{weekLabel}</div>
          <div className="text-[10px] text-stone-400 mt-0.5">{totalItems} kegiatan · {adaOutput} ada output{anySelected?' · filter aktif':''}</div>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={function(){goWeek(-1);}} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">‹</button>
          {weekOffset!==0&&<button onClick={goToday} className="px-2.5 py-1.5 rounded-lg text-[10px] font-bold border as st bg-stone-800 text-white border-stone-800">Minggu ini</button>}
          <button onClick={function(){goWeek(1);}} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">›</button>
        </div>
      </div>

      {/* Day filter pills */}
      <div className="px-4 mb-3">
        <div className="flex gap-1.5 overflow-x-auto pb-1">
          {anySelected&&<button onClick={clearDates} className="flex-shrink-0 px-2.5 py-1.5 rounded-lg border text-[10px] font-bold as st bg-stone-800 text-white border-stone-800">✕ Reset</button>}
          {days.map(function(d){
            var count=(filter?applyJadwalFilter(jadwal[d.date]||[],filter):(jadwal[d.date]||[])).length;
            var isSel=!!selDates[d.date];
            var isWE=d.dow===0||d.dow===6;
            return(
              <button key={d.date} onClick={function(){toggleDate(d.date);}}
                className={`flex-shrink-0 px-2.5 py-1.5 rounded-lg border text-center as st ${
                  isSel?'bg-stone-900 border-stone-900 text-white shadow-sm':
                  d.isToday?'bg-blue-50 border-blue-300 text-blue-700':
                  count>0?'bg-white border-stone-200 text-stone-700 hover:bg-stone-50':
                  'bg-stone-50 border-stone-100 text-stone-300'
                } ${isWE&&!isSel?'opacity-60':''}`}>
                <div className="text-[9px] font-bold whitespace-nowrap">{d.lbl}</div>
                <div className="text-[11px] font-black">{count>0?count:'–'}</div>
              </button>
            );
          })}
        </div>
        {anySelected&&<div className="text-[9px] text-stone-400 mt-1.5">
          Menampilkan: {days.filter(function(d){return selDates[d.date];}).map(function(d){return d.lbl;}).join(', ')}
        </div>}
      </div>

      {/* Table */}
      {allRows.length===0
        ?<div className="px-4 py-12 text-center"><div className="text-3xl mb-2 opacity-30">📅</div><div className="text-[12px] font-bold text-stone-400">{anySelected?'Tidak ada kegiatan di tanggal yang dipilih':'Tidak ada kegiatan minggu ini'}</div></div>
        :<div className="mx-4 rounded-2xl border border-stone-200 overflow-hidden shadow-soft overflow-x-auto">
          <table className="w-full" style={{minWidth:720}}>
            <thead>
              <tr className="bg-stone-50 border-b border-stone-200">

          </table>

      }
