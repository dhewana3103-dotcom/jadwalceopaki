// ── HEATMAP ───────────────────────────────────────────────────
function Heatmap({backlog}){
  // Kolom: 7 kategori kegiatan
  const COLS=[
    {id:'deepwork',label:'Deepwork Strategic',short:'Deepwork',match:'deepwork'},
    {id:'meet_s',label:'Meeting Strategic',short:'Meet. Strategic',match:'strategic'},
    {id:'meet_r',label:'Meeting Review Ops',short:'Meet. Review',match:'review'},
    {id:'external',label:'Ketemu External',short:'Ketemu Ext.',match:'external'},
    {id:'konten',label:'Bikin Konten',short:'Konten',match:'konten'},
    {id:'genba',label:'Genba',short:'Genba',match:'genba'},
    {id:'engage',label:'Employee Engage',short:'Engage',match:'engage'},
  ];
  // Valid combinations per fungsi KPI
  const VALID={
    finansial:['deepwork','meet_s','meet_r','external'],
    branding:['deepwork','meet_s','meet_r','konten','external'],
    riset:['deepwork','meet_s','meet_r','external','genba'],
    operasional:['meet_s','meet_r','external','genba'],
    people:['deepwork','meet_r','konten','external','engage'],
  };
  const cntCell=(kpiId,colId)=>{
    const col=COLS.find(x=>x.id===colId);if(!col)return 0;
    return backlog.filter(it=>it.fungsiKPI===kpiId&&(it.kategori||'').toLowerCase().includes(col.match)).length;
  };
  const allC=KPI5.flatMap(k=>COLS.map(c=>cntCell(k.id,c.id)));
  const maxC=Math.max(1,...allC);
  const tot=Math.max(1,backlog.length);
  const gaps=KPI5.filter(k=>backlog.filter(it=>it.fungsiKPI===k.id).length===0);

  return(
    <div className="afi pb-4">
      {/* Matrix title */}
      <div className="px-4 pt-5 pb-1 md:px-6">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest mb-0.5">Heatmap — Fungsi KPI × Kategori Kegiatan</div>
        <div className="text-[10px] text-stone-400">✕ = tidak relevan · warna makin gelap = makin banyak aktivitas backlog</div>
      </div>

      {/* Matrix grid */}
      <div className="overflow-x-auto px-4 md:px-6 pb-5 mt-3">
        <div style={{minWidth:480}}>
          {/* Column headers */}
          <div style={{display:'grid',gridTemplateColumns:`88px repeat(7,1fr)`,gap:3,marginBottom:6}}>
            <div/>
            {COLS.map(c=><div key={c.id} style={{textAlign:'center',padding:'0 2px'}}>
              <div style={{fontSize:8,fontWeight:800,color:'#78716c',lineHeight:1.25,letterSpacing:'.05em',textTransform:'uppercase'}}>{c.short}</div>
            </div>)}
          </div>
          {/* KPI rows */}
          {KPI5.map(k=>(
            <div key={k.id} style={{display:'grid',gridTemplateColumns:`88px repeat(7,1fr)`,gap:3,marginBottom:3}}>
              <div style={{display:'flex',alignItems:'center',paddingRight:8}}>
                <span style={{fontSize:10,fontWeight:800,color:k.hex,lineHeight:1.2,letterSpacing:'-.2px'}}>{k.short}</span>
              </div>
              {COLS.map(c=>{
                const valid=(VALID[k.id]||[]).includes(c.id);
                const n=cntCell(k.id,c.id);
                const alpha=n===0?0:Math.round((0.2+(n/maxC)*0.75)*255).toString(16).padStart(2,'0');
                if(!valid)return(
                  <div key={c.id} title={`${k.label} × ${c.label} — tidak relevan`}
                    style={{aspectRatio:'1',borderRadius:5,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#d6d3d1',fontWeight:700}}>✕</div>
                );
                return(
                  <div key={c.id} title={`${k.label} × ${c.label}: ${n} item`}
                    style={{aspectRatio:'1',borderRadius:5,background:n===0?'#fafaf9':`${k.hex}${alpha}`,border:`1px solid ${n===0?'#e7e5e4':k.hex+'33'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:n===0?'transparent':n/maxC>0.5?'#fff':k.hex,transition:'all .15s'}}>
                    {n>0?n:''}
                  </div>
                );
              })}
            </div>
          ))}
          {/* Legend */}
          <div style={{display:'flex',gap:10,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:9,color:'#a8a29e',fontWeight:700}}>LEGEND:</span>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#d6d3d1',fontWeight:700}}>✕</div><span style={{fontSize:9,color:'#a8a29e'}}>Tidak relevan</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#fafaf9',border:'1px solid #e7e5e4'}}/><span style={{fontSize:9,color:'#a8a29e'}}>0 item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED855'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Ada item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED8dd'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Banyak</span></div>
          </div>
        </div>
      </div>

      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>

      {/* Distribusi per kategori (dari backlog) */}
      <div className="px-4 pb-2 md:px-6 text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Distribusi Backlog per Kategori</div>
      <div className="px-4 md:px-6 space-y-2 pb-5">
        {COLS.map(c=>{const n=backlog.filter(it=>(it.kategori||'').toLowerCase().includes(c.match)).length;const maxN=Math.max(1,...COLS.map(x=>backlog.filter(it=>(it.kategori||'').toLowerCase().includes(x.match)).length));return(
          <div key={c.id} className="flex items-center gap-3">
            <div className="text-[10px] font-bold text-stone-500 text-right flex-shrink-0 leading-tight" style={{width:120}}>{c.label}</div>
            <div className="flex-1 h-6 bg-stone-100 rounded-lg overflow-hidden border border-stone-200/50">
              <div className="h-full flex items-center justify-end px-2 min-w-[28px] rounded-lg" style={{width:`${Math.max(n===0?0:(n/maxN)*100,n>0?6:0)}%`,background:n===0?'#e7e5e4':'#44403c'}}>
                <span className="text-[10px] font-bold text-white">{n}x</span>
              </div>
            </div>
          </div>
        );})}
      </div>

      {/* Coverage + gap alert */}
      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>
      <div className="px-4 pb-2 md:px-6 text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Coverage Backlog per Fungsi</div>
      <div className="px-4 md:px-6 space-y-3 pb-4">
        {KPI5.map(k=>{const t=backlog.filter(it=>it.fungsiKPI===k.id).length;const d=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='selesai').length;const b=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='baru').length;return(
          <div key={k.id}><div className="flex justify-between items-end mb-1.5"><span className={`text-[11px] font-bold ${k.color}`}>{k.label}</span><span className="text-[10px] text-stone-400">{d}/{t}{b>0&&<span className="text-red-500 ml-1 font-bold">({b} baru)</span>}</span></div>
          <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden relative border border-stone-200/50"><div className={`absolute left-0 top-0 bottom-0 ${k.bg}`} style={{width:`${(t/tot)*100}%`}}/><div className="absolute left-0 top-0 bottom-0 rounded-full" style={{width:`${(d/tot)*100}%`,background:k.hex}}/></div>
          </div>
        );})}
      </div>
      {gaps.length>0&&<div className="mx-4 md:mx-6 p-3.5 rounded-2xl bg-red-50 border border-red-100"><div className="text-[11px] font-bold text-red-700 mb-1">⚠️ Blind Spot — belum ada backlog:</div><div className="text-[11px] text-red-800">{gaps.map(k=>k.label).join(' · ')}</div></div>}
    </div>
  );
}

// ── ANALISA TAB ───────────────────────────────────────────────
function AnalisaTab({backlog,jadwal,kpiCorp,dashMonth,mom}){
  const [entityFilter,setEntityFilter]=useState('all');
  const stats=computeAnalisaFiltered(jadwal||{},entityFilter);
  const today=todayStr();

  const blBaru=backlog.filter(function(it){return it.status==='baru';}).length;
  const blDijadwalkan=backlog.filter(function(it){return it.status==='dijadwalkan';}).length;
  const blSelesai=backlog.filter(function(it){return it.status==='selesai';}).length;
  const blPostponed=backlog.filter(function(it){return it.status==='postponed';}).length;
  const blUrgent=backlog.filter(function(it){return it.prioritas==='tinggi'&&it.status!=='selesai';}).length;
  const blOverdue=backlog.filter(function(it){var d=it.deadline;return d&&d<today&&it.status!=='selesai';}).length;
  const multiPost=backlog.filter(function(it){return(it.postponeHistory||[]).length>=3&&it.status!=='selesai';}).length;

  // ── D6: Disiplin Sistem CEO ──
  const curMonth=dashMonth||today.slice(0,7);
  const monthJadwalItems=[];
  Object.keys(jadwal||{}).forEach(function(date){
    if(date.slice(0,7)===curMonth){(jadwal[date]||[]).forEach(function(it){monthJadwalItems.push({...it,_date:date});});}
  });
  const totalJadwalBulan=monthJadwalItems.length;
  let postponeEventsBulan=0;
  backlog.forEach(function(b){(b.postponeHistory||[]).forEach(function(h){if(h.tanggal&&h.tanggal.slice(0,7)===curMonth)postponeEventsBulan++;});});
  const postponeRate=totalJadwalBulan>0?Math.round(postponeEventsBulan/totalJadwalBulan*100):null;

  const nowT=nowTimeStr();
  const pastNonMeeting=monthJadwalItems.filter(function(it){
    var isMt=it.jenisKegiatan&&(it.jenisKegiatan.includes('Meeting')||it.jenisKegiatan.includes('External'));
    if(isMt)return false;
    return it._date<today||(it._date===today&&it.jamSelesai&&it.jamSelesai<=nowT);
  });
  const filledCount=pastNonMeeting.filter(function(it){return it.outputKeputusan&&it.outputKeputusan.trim();}).length;
  const outputFillRate=pastNonMeeting.length>0?Math.round(filledCount/pastNonMeeting.length*100):null;

  const resolvedBulan=backlog.filter(function(it){return it.feedbackTs&&it.feedbackTs.slice(0,7)===curMonth&&it.tanggal;});
  let avgResponseDays=null;
  if(resolvedBulan.length>0){
    var totalDays=0;
    resolvedBulan.forEach(function(it){var d=Math.max(0,Math.round((new Date(it.feedbackTs)-new Date(it.tanggal))/86400000));totalDays+=d;});
    avgResponseDays=Math.round(totalDays/resolvedBulan.length*10)/10;
  }
  const pendingQueue=backlog.filter(function(it){return it.needFeedback&&!it.feedbackStatus;});
  let avgPendingAge=null;
  if(pendingQueue.length>0){
    var totalAge=0;
    pendingQueue.forEach(function(it){totalAge+=Math.max(0,Math.round((new Date(today)-new Date(it.tanggal))/86400000));});
    avgPendingAge=Math.round(totalAge/pendingQueue.length*10)/10;
  }

  const TARGET_PCT={finansial:25,branding:25,riset:15,operasional:30,people:5};
  const coverageGaps=KPI5.map(function(k){
    var actual=0;
    if(stats&&stats.coverage){stats.coverage.forEach(function(c){if(c.kpi.id===k.id)actual=c.hours;});}
    var totalH=stats?stats.totalHours:0;
    var actualPct=totalH>0?Math.round(actual/totalH*100):0;
    var target=TARGET_PCT[k.id]||20;
    return{kpi:k,actual:actual,actualPct:actualPct,target:target,gap:actualPct-target};
  });

  // D1 — dari MoM decisions
  const corpData=(kpiCorp&&kpiCorp[dashMonth])?kpiCorp[dashMonth]:null;
  const weekly=(corpData&&corpData.weekly)?corpData.weekly:INIT_W;
  const allDecisions=[];
  (mom||[]).forEach(function(entry){(entry.items||[]).forEach(function(item){if(item.isDecision&&item.domain){allDecisions.push({...item,meetingDate:entry.tanggal,meetingName:entry.meetingName});}});});
  const d1Data=DOMAINS.map(function(d){
    var decs=allDecisions.filter(function(dec){return dec.domain===d.id;});
    var sesuai=decs.filter(function(dec){return dec.pdcaCheck==='sesuai';}).length;
    var total=decs.length;
    var pct=total>0?Math.round(sesuai/total*100):null;
    var jam=0;if(stats&&stats.coverage){stats.coverage.forEach(function(c){if(c.kpi.id===d.kpiId)jam=c.hours;});}
    var corpGroup=GROUPS.find(function(g){return g.id===d.kpiCorpGroup;});
    var act2=WEEKS.filter(function(w){return weekly[w];});
    var lastW3=act2.length>0?act2[act2.length-1]:null;
    var yScore=null;
    if(lastW3&&weekly[lastW3]&&corpGroup){yScore=Math.round(corpGroup.items.reduce(function(s,i){var v=weekly[lastW3][i.id];return s+(v?Math.min(v.pct,100)*i.bobot/corpGroup.bobot:0);},0));}
    return{d:d,decs:decs,sesuai:sesuai,total:total,pct:pct,jam:jam,yScore:yScore};
  });

  function heatCls(v){if(!v)return'bg-stone-100 text-stone-400';if(v<=3)return'bg-sky-100 text-sky-800';if(v<=7)return'bg-sky-300 text-sky-900';if(v<=12)return'bg-sky-500 text-white';return'bg-sky-700 text-white';}

  return(
    <div className="afi pb-8">

      {/* ── ENTITY FILTER ── */}
      <div className="px-4 pt-4 md:px-6 mb-4">
        <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1 overflow-x-auto">
          {[['all','🏢 Semua'],['RSP','🏠 RSP'],['BT','🧵 BT'],['TKB','🏗 TKB'],['Personal','👤 Personal']].map(function(opt){
            var id=opt[0],lbl=opt[1];
            return(<button key={id} onClick={function(){setEntityFilter(id);}} className={`flex-1 py-2 rounded-xl text-[10px] font-bold st as whitespace-nowrap px-2 ${entityFilter===id?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`}>{lbl}</button>);
          })}
        </div>
      </div>

      {/* ── GAP CARDS: BACKLOG ── */}
      <div className="px-4 md:px-6 mb-5">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3">📋 Status Backlog</div>
        <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
          <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-soft">
            <div className="text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2">Total</div>
            <div className="text-3xl font-black text-stone-900 mb-2">{backlog.length}</div>
            <div className="space-y-0.5">
              <div className="flex justify-between text-[10px]"><span className="text-stone-400">Baru</span><span className="font-bold text-red-500">{blBaru}</span></div>
              <div className="flex justify-between text-[10px]"><span className="text-stone-400">Dijadwalkan</span><span className="font-bold text-blue-500">{blDijadwalkan}</span></div>
              <div className="flex justify-between text-[10px]"><span className="text-stone-400">Selesai</span><span className="font-bold text-emerald-600">{blSelesai}</span></div>
            </div>
          </div>
          <div className={`border rounded-2xl p-4 shadow-soft ${blUrgent>0?'bg-red-50 border-red-100':'bg-white border-stone-200'}`}>
            <div className="text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2">Prioritas Tinggi</div>
            <div className={`text-3xl font-black mb-1 ${blUrgent>3?'text-red-600':blUrgent>0?'text-amber-600':'text-emerald-600'}`}>{blUrgent}</div>
            <div className={`text-[10px] font-semibold ${blUrgent>0?'text-red-400':'text-stone-400'}`}>{blUrgent>0?'belum selesai':'semua clear'}</div>
          </div>
          <div className={`border rounded-2xl p-4 shadow-soft ${blOverdue>0?'bg-orange-50 border-orange-100':'bg-white border-stone-200'}`}>

              <tbody className="divide-y divide-stone-100">
                {JENIS_KEGIATAN.map(function(j){var wVals=stats.weekKeys.map(function(w){return stats.byJenis[j][w]||0;});var tot2=Math.round(wVals.reduce(function(s,v){return s+v;},0)*10)/10;if(wVals.every(function(v){return!v;}))return null;return(<tr key={j} className="hover:bg-stone-50/50"><td className="px-3 py-2 font-semibold text-stone-700 whitespace-nowrap">{JENIS_SHORT[j]||j}</td>{wVals.map(function(v,i){return<td key={i} className="px-2 py-2 text-center"><div className={'h-7 rounded flex items-center justify-center font-bold '+heatCls(v)}>{v||'–'}</div></td>;})}<td className="px-2 py-2 text-center font-black text-stone-800">{tot2}h</td></tr>);})}

function computeAnalisaFiltered(jadwal,entity){
  if(!entity||entity==='all')return computeAnalisa(jadwal);
  const filt={};
  Object.entries(jadwal||{}).forEach(([date,items])=>{filt[date]=(items||[]).filter(it=>it.kategori===entity);});
  return computeAnalisa(filt);
}
function getWeekDays(){
  const days=[];const today=new Date();const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  for(let i=0;i<6;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push({dateStr:d.toISOString().slice(0,10),dayShort:d.toLocaleDateString('id-ID',{weekday:'short'}),num:d.getDate(),isToday:d.toISOString().slice(0,10)===todayStr()});}
  return days;
}

function AnalisaJadwal({backlog,jadwal,onAddJadwal,onBatchAddJadwal,onAddBacklog,onUpdateBacklog}){
  const [entityFilter,setEntityFilter]=useState('all');
  const [expandedDays,setExpandedDays]=useState(()=>new Set([todayStr()]));
  function toggleDay(d){setExpandedDays(p=>{const n=new Set(p);n.has(d)?n.delete(d):n.add(d);return n;});}
  const stats=computeAnalisaFiltered(jadwal||{},entityFilter);
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiErr,setAiErr]=useState('');
  const [showAI,setShowAI]=useState(false);
  const [rekoms,setRekoms]=useState([]);
  const [takingId,setTakingId]=useState(null);
  const [takeForm,setTakeForm]=useState({});
  const [showBin,setShowBin]=useState(false);
  const [recycleBin,setRecycleBin]=useState(()=>{try{return JSON.parse(localStorage.getItem('rsp_recycle_bin')||'[]');}catch{return[];}});

  const remainDays=React.useMemo(()=>{
    const days=[];const today=new Date();const dow=today.getDay();
    const dUntilSat=dow===6?0:(dow===0?6:6-dow);
    for(let i=0;i<=dUntilSat;i++){const d=new Date(today);d.setDate(today.getDate()+i);if(d.getDay()===0)continue;days.push({dateStr:d.toISOString().slice(0,10),dayName:d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'})});}
    return days;
  },[]);
  const satStr=remainDays.length>0?remainDays[remainDays.length-1].dateStr:todayStr()||todayStr();

  function syncBin(arr){setRecycleBin(arr);try{localStorage.setItem('rsp_recycle_bin',JSON.stringify(arr));}catch(e){}}
  function addToBin(item){syncBin([...recycleBin,{...item,rejectedAt:todayStr()}]);}
  function removeFromBin(id){syncBin(recycleBin.filter(it=>it.id!==id));}

  function buildPrompt(){
    const td=todayStr();
    const schedLines=remainDays.map(d=>{
      const its=(jadwal[d.dateStr]||[]).sort((a,b)=>(a.jamMulai||'').localeCompare(b.jamMulai||''));
      return `${d.dayName}(${d.dateStr}): ${its.length?its.map(it=>`${it.jamMulai}-${it.jamSelesai} "${it.detailKegiatan}"[${JENIS_SHORT[it.jenisKegiatan]||it.jenisKegiatan}]`).join(' | '):'KOSONG'}`;
    }).join('\n');
    const blLines=backlog.filter(it=>!['selesai','ditolak'].includes(it.status)).slice(0,12)
      .map(it=>`[${it.id}] ${it.konteks}: ${it.action||it.isi} | ${it.prioritas}${it.postponeCount?` | postpone:${it.postponeCount}x`:''}`).join('\n')||'(kosong)';
    const kpiStr=stats?stats.coverage.map(c=>`${c.kpi.short}:${c.hours}h`).join(', '):'(belum ada data)';
    // Postpone stats for pattern analysis
    const postponedItems=backlog.filter(function(it){return(it.postponeHistory||[]).length>0;});
    const totalPp=backlog.reduce(function(s,it){return s+((it.postponeHistory||[]).length);},0);
    const ppByClear=postponedItems.filter(function(it){const h=it.postponeHistory||[];return h.length>0&&h[h.length-1].tipe==='clear';}).length;
    const ppByUnclear=postponedItems.filter(function(it){const h=it.postponeHistory||[];return h.length>0&&h[h.length-1].tipe==='unclear';}).length;
    const ppByKPI={};KPI5.forEach(function(k){ppByKPI[k.short]=postponedItems.filter(function(it){return it.fungsiKPI===k.id;}).length;});
    const ppKPIStr=Object.entries(ppByKPI).filter(function(e){return e[1]>0;}).map(function(e){return e[0]+':'+e[1];}).join(', ')||'tidak ada';
    const ppAlasanStr=postponedItems.slice(0,5).map(function(it){const h=it.postponeHistory||[];return h.map(function(p){return `"${p.alasan}"`;}).join(', ');}).join(' | ')||'tidak ada';
    const postponeBlock=totalPp>0?`\nPOSTIPONE CEO (R6 — harus dianalisa):\n- Total item pernah dipostpone: ${postponedItems.length} item, ${totalPp}x total\n- Ada jadwal baru: ${ppByClear}x | Belum jelas: ${ppByUnclear}x\n- KPI paling sering dipostpone: ${ppKPIStr}\n- Alasan yang tercatat: ${ppAlasanStr}\n`:'';
    return `PERAN: AI Scheduling Assistant CEO PT Raja Sukses Properindo.

RULES:
R1·WAKTU: 05:00-22:00. Protected: makan 3x30mnt, olahraga 2jam/hari. Senin-Jumat full. Sabtu max 15:00. Minggu off.
R2·KPI TARGET/minggu: Operasional 30%, Finansial 25%, Branding 25%, Riset 15%, People 5%. RSP=semua KPI. BT=Branding(B2B,premium Jkt&Cirebon). TKB=Finansial+People.
R3·KONTEN: min 1x max 3x/minggu. Pair: Genba+Konten, Speech/BedahBuku+Konten.
R4·MEETING COO/CMO: preferensi di luar 09:00-17:00.
R5·DEEPWORK: boleh tiap hari. Pagi <09:00 prioritas marketing/branding.
R6·PERF.APPRAISAL: min 1x/minggu, Meeting Review RSP, bisa gabung COO.
R7·PAIRING: Genba sekalian Konten. Speech/BedahBuku sekalian Konten.
R8·BACKLOG: Immediately ikuti deadline MoM. Postpone>=3 wajib jadwalkan.
R9·PAGI(05-09): Fokus marketing/branding/review konten. Hindari meeting internal tim.${postponeBlock}

HARI INI: ${td}. SISA MINGGU sampai Sabtu ${satStr}:
${schedLines}

BACKLOG PENDING:
${blLines}

KPI AKTUAL MINGGU INI: ${kpiStr}

Return HANYA JSON valid (no markdown):
{
  "ringkasan":[{"tag":"...","label":"...","value":"...","sub":"...","type":"danger|warning|success|info"}],
  "temuan":[{"fungsi":"...","status":"...","txt":"...","type":"danger|warning|success|info"}],
  "pola":[{"slot":"...","issue":"...","fix":"..."}],
  "postponePola":{"total":0,"kesimpulan":"...","rekomendasi":"..."},
  "rekomendasi":[{"id":"RK-1","kegiatan":"judul singkat","jenisKegiatan":"Deepwork Strategic|Meeting Strategic/Problem Solving/Approval|Meeting Review Operasional + Evaluasi Tim|Ketemu External|Bikin Konten|Genba|Employee Engage","kategori":"RSP|BT|TKB|Personal","fungsiKPI":"finansial|branding|riset|operasional|people","suggestTanggal":"YYYY-MM-DD","suggestJam":"HH:MM","suggestJamSelesai":"HH:MM","alasan":"1-2 kalimat","fromBacklogId":"BL-xxx atau null","prioritas":"tinggi|sedang","pairing":"nama aktivitas atau null"}]
}
Buat 5-8 rekomendasi. Prioritas: backlog tinggi+postpone>=3, lalu gap KPI, lalu rules. Hindari clash slot. suggestTanggal harus ${td} s.d. ${satStr}. Jangan Minggu. Kalau ada postpone pattern yang merah, wajib masuk temuan.`;
  }

  async function runAnalisa(){
    setAiLoading(true);setAiErr('');setShowAI(true);setAiResult(null);setRekoms([]);
    try{
      const txt=await callAI([{role:'user',content:buildPrompt()}],3000);
      const clean=txt.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);
      setAiResult(parsed);
      setRekoms((parsed.rekomendasi||[]).map(r=>({...r,status:'pending',id:r.id||('RK-'+genId())})));
    }catch(e){setAiErr('Gagal: '+e.message);}
    setAiLoading(false);
  }

  function handleTake(r){
    setTakingId(r.id);
    setTakeForm({tanggal:r.suggestTanggal||remainDays[0]&&remainDays[0].dateStr||todayStr(),jamMulai:r.suggestJam||'08:00',jamSelesai:r.suggestJamSelesai||'10:00',kategori:r.kategori||'RSP',detailKegiatan:r.kegiatan,jenisKegiatan:r.jenisKegiatan,relateMilestone:r.fungsiKPI});
  }
  function confirmTake(r){
    const item={id:'SJ-'+genId(),tanggal:takeForm.tanggal,jamMulai:takeForm.jamMulai,jamSelesai:takeForm.jamSelesai,kategori:takeForm.kategori,jenisKegiatan:takeForm.jenisKegiatan,detailKegiatan:takeForm.detailKegiatan,masalahBacklogId:r.fromBacklogId||'',masalahText:'',relateMilestone:takeForm.relateMilestone,outputKeputusan:''};
    onAddJadwal(takeForm.tanggal,item);
    if(r.fromBacklogId){onUpdateBacklog(r.fromBacklogId,{status:'dijadwalkan',tanggal:takeForm.tanggal,blokWaktu:getBlokFromTime(takeForm.jamMulai)});}
    setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'taken'}:x));
    setTakingId(null);
  }
  function handlePostpone(r){
    const bl=r.fromBacklogId?backlog.find(b=>b.id===r.fromBacklogId):null;
    const newCount=(bl&&bl.postponeCount||0)+1;
    if(newCount>=3&&!confirm(`Postpone ke-${newCount}x. Sudah melampaui batas — lanjutkan?`))return;
    if(bl){
      const newHistory=[...(bl.postponeHistory||[]),{tanggal:todayStr(),alasan:'Dipostpone oleh AI (rekomendasi ditolak)',tipe:'unclear'}];
      onUpdateBacklog(bl.id,{postponeCount:newCount, postponeHistory:newHistory});
    }
    else{onAddBacklog([{id:'BL-'+genId(),sumber:'AI',tanggal:todayStr(),konteks:'Rekomendasi AI',isi:r.kegiatan,action:r.kegiatan,ekspektasi:'',pic:null,deadline:null,fungsiKPI:r.fungsiKPI,kategori:r.jenisKegiatan,blokWaktu:'sore-review',prioritas:r.prioritas,status:'postponed',postponeCount:1,postponeHistory:[{tanggal:todayStr(),alasan:'Dipostpone oleh AI sejak awal',tipe:'unclear'}],notes:'Rekomendasi AI ditolak'}]);}
    setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'postponed'}:x));
    }
  function handleReject(r){addToBin(r);setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'rejected'}:x));}
  function restoreFromBin(item){removeFromBin(item.id);setRekoms(p=>[...p,{...item,status:'pending',rejectedAt:undefined}]);setShowAI(true);}

  const pendingRekoms=rekoms.filter(r=>r.status==='pending');
  const doneRekoms=rekoms.filter(r=>r.status!=='pending');
  const typeMap={danger:'bg-red-100 text-red-700',warning:'bg-amber-100 text-amber-700',success:'bg-emerald-100 text-emerald-700',info:'bg-blue-100 text-blue-700'};
  const typeBorderMap={danger:'border-red-200',warning:'border-amber-200',success:'border-emerald-200',info:'border-blue-200'};
  const typeBgMap={danger:'bg-red-500',warning:'bg-amber-400',success:'bg-emerald-500',info:'bg-blue-500'};

  function heatCls(v){if(!v)return'bg-stone-100 text-stone-400';if(v<=3)return'bg-sky-100 text-sky-800';if(v<=7)return'bg-sky-300 text-sky-900';if(v<=12)return'bg-sky-500 text-white';return'bg-sky-700 text-white';}

  return(
    <div className="afi pb-8">

                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div><div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Kategori</div><select className="w-full px-2 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.kategori||'RSP'} onChange={e=>setTakeForm(p=>({...p,kategori:e.target.value}))}>{['RSP','BT','TKB','Personal'].map(k=><option key={k}>{k}</option>)}</select></div>
                            <div><div className="text-[9px] font-bold text-stone-400 uppercase mb-1">KPI</div><select className="w-full px-2 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.relateMilestone||'operasional'} onChange={e=>setTakeForm(p=>({...p,relateMilestone:e.target.value}))}>{KPI5.map(k=><option key={k.id} value={k.id}>{k.short}</option>)}</select></div>
                          </div>
                          <div className="flex gap-2">
                            <button className="flex-1 py-2.5 rounded-xl bg-emerald-600 text-white text-[11px] font-bold as st" onClick={()=>confirmTake(r)}>✅ Masukkan ke Jadwal</button>
                            <button className="px-3 py-2 rounded-xl bg-stone-100 text-stone-500 text-[11px] font-bold border border-stone-200 as st" onClick={()=>setTakingId(null)}>Batal</button>
                          </div>
                        </div>
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </>}
        </>}
      </div>}

      {/* RECYCLE BIN */}
      {recycleBin.length>0&&<div className="px-4 md:px-6 mt-4">
        <div className="h-px bg-stone-200 mb-4"/>
        <button className="flex items-center gap-2 mb-3 as" onClick={()=>setShowBin(p=>!p)}>
          <span className="text-[11px] font-extrabold text-stone-400 uppercase tracking-widest">🗑 Recycle Bin</span>
          <span className="text-[10px] bg-stone-200 text-stone-500 px-2 py-0.5 rounded-full font-bold">{recycleBin.length}</span>
          <span className="text-[10px] text-stone-400">{showBin?'▲':'▼'}</span>
        </button>
        {showBin&&<div className="space-y-2">
          {recycleBin.map(item=>(
            <div key={item.id} className="bg-stone-50 border border-stone-200 rounded-xl p-3 flex items-center gap-3">
              <div className="flex-1 min-w-0">
                <div className="text-[11px] font-bold text-stone-600 truncate">{item.kegiatan}</div>
                <div className="text-[9px] text-stone-400 mt-0.5">{item.suggestTanggal} · {JENIS_SHORT[item.jenisKegiatan]||item.jenisKegiatan} · Ditolak {item.rejectedAt}</div>
              </div>
              <div className="flex gap-1.5 flex-shrink-0">
                <button className="px-2.5 py-1.5 rounded-lg bg-blue-50 text-blue-600 text-[9px] font-bold border border-blue-100 as st" onClick={()=>restoreFromBin(item)}>↩ Restore</button>
                <button className="px-2.5 py-1.5 rounded-lg bg-red-50 text-red-400 text-[9px] font-bold border border-red-100 as st" onClick={()=>{if(confirm('Hapus permanen?'))removeFromBin(item.id);}}>🗑</button>
              </div>
            </div>
          ))}
        </div>}
      </div>}
    </div>
  );
}

// ── MOM LIST ──────────────────────────────────────────────────
function MoMList({mom,onDelete,onUpdateMom,onAddKeputusan}){
  const [expId,setExpId]=useState(null);
  const [expItemId,setExpItemId]=useState(null);
  const [hasilTexts,setHasilTexts]=useState({});
  const [decisionExpId,setDecisionExpId]=useState(null);
  const [decisionForms,setDecisionForms]=useState({});
  const [reviewExpId,setReviewExpId]=useState(null);
  const [reviewForms,setReviewForms]=useState({});
  const sorted=[...mom].sort((a,b)=>b.tanggal.localeCompare(a.tanggal));

  function updateItemStatus(momId,itemId,patch){
    const entry=mom.find(m=>m.id===momId);if(!entry)return;
    const newItems=entry.items.map(it=>it.id===itemId?{...it,...patch}:it);
    onUpdateMom(momId,{items:newItems});
  }

  function saveHasil(momEntry,item){
    const txt=hasilTexts[item.id]||'';if(!txt.trim())return;
    updateItemStatus(momEntry.id,item.id,{hasil:txt,status:'selesai'});
    onAddKeputusan({
      id:'KP-'+genId(),
      tanggal:todayStr(),
      backlogId:null,
      konteks:momEntry.meetingName.slice(0,50),
      deskripsi:item.action,
      fungsiKPI:'operasional',
      dampak:item.jenis==='Immediately'?'tinggi':'sedang',
      status:'disampaikan',
      output:txt,
      updateTL:'',
      sumber:'MoM: '+momEntry.meetingName
    });
    setHasilTexts(p=>({...p,[item.id]:''}));
    setExpItemId(null);
  }

  function saveDecision(momEntry,item){
    var form=decisionForms[item.id]||{};
    if(!form.domain)return;
    updateItemStatus(momEntry.id,item.id,{isDecision:true,domain:form.domain,ekspektasiY:form.ekspektasiY||'',pdcaCheck:'belum'});
    setDecisionExpId(null);
  }
  function savePdcaCheck(momEntry,item,check){
    updateItemStatus(momEntry.id,item.id,{pdcaCheck:check});
  }
  function removeDecision(momEntry,item){
    updateItemStatus(momEntry.id,item.id,{isDecision:false,domain:null,ekspektasiY:'',pdcaCheck:null});
  }

  const STATUS_CFG={
    pending:{lbl:'Pending',bg:'bg-stone-100',color:'text-stone-500'},
    'in-progress':{lbl:'Dikerjakan',bg:'bg-amber-50',color:'text-amber-700'},
    selesai:{lbl:'Selesai',bg:'bg-emerald-50',color:'text-emerald-700'},
    'perlu-review':{lbl:'Perlu Review CEO',bg:'bg-blue-50',color:'text-blue-700'},
  };

  if(sorted.length===0)return(
    <div className="px-4 py-16 text-center">
      <div className="text-4xl mb-3 opacity-30">📝</div>
      <div className="text-[13px] font-bold text-stone-400">Belum ada MoM</div>
      <div className="text-[11px] text-stone-300 mt-1">Import notulensi via Dump → 📥 MoM</div>
    </div>
  );

  return(
    <div className="pb-8 afi">
      <div className="px-4 pt-4 pb-2 flex items-center justify-between">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Minutes of Meeting</div>
        <span className="text-[10px] bg-stone-100 text-stone-500 px-2.5 py-1 rounded-full font-bold">{sorted.length} meeting</span>
      </div>
      <div className="px-4 space-y-3 md:px-6">
        {sorted.map(entry=>{
          const isExp=expId===entry.id;
          const actionItems=entry.items.filter(it=>it.jenis!=='Feedback'&&!it.needCeoReview);
          const reviewItems=entry.items.filter(it=>it.needCeoReview);
          const feedbackItems=entry.items.filter(it=>it.jenis==='Feedback');
          const doneCount=entry.items.filter(it=>it.status==='selesai').length;
          const reviewCount=entry.items.filter(it=>it.status==='perlu-review').length;
          const dateLabel=new Date(entry.tanggal+'T12:00:00').toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
          return(
            <div key={entry.id} className="bg-white rounded-2xl border border-stone-200 shadow-soft overflow-hidden">
              {/* Header */}
              <div className="p-4 cursor-pointer hover:bg-stone-50 st" onClick={()=>setExpId(isExp?null:entry.id)}>
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="text-[12px] font-extrabold text-stone-900 leading-snug mb-1.5">{entry.meetingName}</div>
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <span className="text-[10px] font-mono text-stone-400">{dateLabel}</span>
                      <span className="text-[10px] bg-stone-100 text-stone-500 px-1.5 py-0.5 rounded font-bold">{entry.items.length} item</span>
                      {actionItems.length>0&&<span className="text-[10px] bg-amber-50 text-amber-700 px-1.5 py-0.5 rounded font-bold border border-amber-100">{actionItems.length} action</span>}
                      {doneCount>0&&<span className="text-[10px] bg-emerald-50 text-emerald-700 px-1.5 py-0.5 rounded font-bold border border-emerald-100">✓ {doneCount} selesai</span>}
                      {reviewCount>0&&<span className="text-[10px] bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded font-bold border border-blue-100">⚑ {reviewCount} review CEO</span>}
                    </div>
                  </div>
                  <div className="flex items-center gap-1.5 flex-shrink-0">
                    <button className="py-1 px-2 rounded-lg text-[9px] font-bold bg-red-50 text-red-400 border border-red-100 as st" onClick={e=>{e.stopPropagation();if(confirm('Hapus MoM ini?'))onDelete(entry.id);}}>🗑</button>
                    <span className={`text-stone-400 text-[10px] ${isExp?'rotate-180':''}`}>▼</span>
                  </div>
                </div>
              </div>

              {/* Expanded */}
              {isExp&&<div className="border-t border-stone-100">
                {entry.gcalDesc&&entry.gcalDesc.trim()&&<div className="px-4 py-3 bg-stone-50 border-b border-stone-100">
                  <div className="text-[9px] font-extrabold text-stone-400 uppercase tracking-wider mb-1">Deskripsi Calendar</div>
                  <div className="text-[11px] text-stone-600 leading-relaxed whitespace-pre-wrap">{linkify(entry.gcalDesc)}</div>
                </div>}

                {/* Action Items — with update per item */}
                {actionItems.length>0&&<div className="px-4 py-3 border-b border-stone-100">
                  <div className="text-[9px] font-extrabold text-amber-600 uppercase tracking-wider mb-3">Action Items ({actionItems.length})</div>
                  <div className="space-y-2.5">
                    {actionItems.map((it,i)=>{
                      const st=STATUS_CFG[it.status||'pending']||STATUS_CFG.pending;
                      const isExpItem=expItemId===it.id;
                      const hasHasil=it.hasil&&it.hasil.trim();
                      return(
                        <div key={it.id||i} className={`rounded-xl border overflow-hidden ${isExpItem?'border-stone-300':'border-stone-200'}`}>
                          {/* Item header */}
                          <div className="p-3">
                            <div className="flex items-start gap-2 mb-1.5">
                              <span className="text-[10px] font-black text-stone-400 flex-shrink-0 mt-0.5">{i+1}.</span>
                              <div className="flex-1 min-w-0">
                                <div className="text-[11px] font-semibold text-stone-800 leading-snug mb-1">{it.action}</div>
                                <div className="flex gap-1.5 flex-wrap items-center">
                                  {it.pic&&<span className="text-[9px] text-stone-500">👤 {it.pic}</span>}
                                  {it.deadline&&<span className="text-[9px] text-stone-500">📅 {it.deadline}</span>}
                                  <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${it.jenis==='Immediately'?'bg-red-100 text-red-700':'bg-stone-100 text-stone-500'}`}>{it.jenis}</span>
                                  {/* Status badge */}
                                  <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${st.bg} ${st.color}`}>{st.lbl}</span>
                                </div>
                              </div>
                            </div>

                            {/* Hasil preview kalau sudah ada */}
                            {hasHasil&&!isExpItem&&<div className="ml-5 mt-1 px-2.5 py-2 bg-emerald-50 border border-emerald-100 rounded-lg">
                              <div className="text-[8px] font-extrabold text-emerald-600 uppercase tracking-wider mb-0.5">Hasil dari PIC</div>
                              <div className="text-[11px] text-emerald-800 font-medium leading-snug">{it.hasil}</div>
                            </div>}

                            {/* Decision badge */}
                            {it.isDecision&&<div className="ml-5 mt-1.5 px-2.5 py-2 bg-violet-50 border border-violet-100 rounded-lg">
                              <div className="flex items-center justify-between mb-0.5">
                                <div className="flex items-center gap-1.5 flex-wrap">
                                  <span className="text-[8px] font-extrabold text-violet-500 uppercase tracking-wider">⊛ Decision</span>
                                  {it.domain&&<span className={'text-[9px] font-bold px-1.5 py-0.5 rounded '+((DOMAINS.find(function(d){return d.id===it.domain;})||{}).bg||'bg-stone-100')+' '+((DOMAINS.find(function(d){return d.id===it.domain;})||{}).color||'text-stone-500')}>{(DOMAINS.find(function(d){return d.id===it.domain;})||{}).label||it.domain}</span>}
                                  {it.pdcaCheck&&<span className={'text-[9px] font-bold px-1.5 py-0.5 rounded '+(it.pdcaCheck==='sesuai'?'bg-emerald-100 text-emerald-700':it.pdcaCheck==='tidak'?'bg-red-100 text-red-600':'bg-stone-100 text-stone-500')}>{it.pdcaCheck==='sesuai'?'✓ Sesuai':it.pdcaCheck==='tidak'?'✗ Tidak':'⏳ Belum'}</span>}
                                </div>
                                {hasHasil&&<div className="flex gap-1 flex-shrink-0">
                                  {[['sesuai','✓'],['tidak','✗'],['belum','⏳']].map(function(opt){var chk=opt[0],lbl=opt[1];return(<button key={chk} onClick={function(){savePdcaCheck(entry,it,chk);}} className={'py-0.5 px-1.5 rounded text-[9px] font-black as st '+(it.pdcaCheck===chk?(chk==='sesuai'?'bg-emerald-500 text-white':chk==='tidak'?'bg-red-400 text-white':'bg-stone-500 text-white'):'bg-stone-200 text-stone-500')}>{lbl}</button>);})}</div>}
                              </div>
                              {it.ekspektasiY&&<div className="text-[10px] text-violet-600 leading-relaxed"><span className="font-semibold">Y:</span> {it.ekspektasiY}</div>}
                              {!hasHasil&&<div className="text-[9px] text-violet-400 italic">PDCA check tersedia setelah PIC input hasil</div>}
                            </div>}

                            {/* Action buttons */}
                            <div className="ml-5 mt-2 flex gap-1.5 flex-wrap">
                              {/* Status quick-change */}
                              {['in-progress','perlu-review'].map(s=>{
                                const sc=STATUS_CFG[s];
                                if(s==='perlu-review'){return(
                                  <button key={s} className={`py-1 px-2 rounded-lg text-[9px] font-bold border as st ${it.needCeoReview?`${sc.bg} ${sc.color} border-current`:'bg-stone-50 text-stone-400 border-stone-200'}`}
                                    onClick={function(){if(it.needCeoReview){updateItemStatus(entry.id,it.id,{needCeoReview:false,ceoReviewBrief:null,ceoReviewStatus:null});}else{setReviewExpId(reviewExpId===it.id?null:it.id);}}}>
                                    {sc.lbl}
                                  </button>
                                );}
                                return(
                                  <button key={s} className={`py-1 px-2 rounded-lg text-[9px] font-bold border as st ${(it.status||'pending')===s?`${sc.bg} ${sc.color} border-current`:'bg-stone-50 text-stone-400 border-stone-200'}`}
                                    onClick={()=>updateItemStatus(entry.id,it.id,{status:(it.status||'pending')===s?'pending':s})}>
                                    {sc.lbl}
                                  </button>
                                );
                              })}
                              <button className={`py-1 px-2.5 rounded-lg text-[9px] font-bold border as st ${isExpItem?'bg-stone-800 text-white border-stone-800':'bg-stone-100 text-stone-600 border-stone-200'}`}
                              onClick={function(){var cur=hasilTexts[it.id]!==undefined?hasilTexts[it.id]:(it.hasil||'');setExpItemId(isExpItem?null:it.id);setHasilTexts(function(p){var n={...p};n[it.id]=cur;return n;});}}>
                                {hasHasil?'✏️ Edit Hasil':'✍️ Input Hasil'}
                              </button>
                              {!it.isDecision&&<button className={`py-1 px-2 rounded-lg text-[9px] font-bold border as st ${decisionExpId===it.id?'bg-violet-600 text-white border-violet-600':'bg-violet-50 text-violet-600 border-violet-200'}`} onClick={function(){setDecisionExpId(decisionExpId===it.id?null:it.id);}}>⊛ Decision</button>}
                              {it.isDecision&&<button className="py-1 px-2 rounded-lg text-[9px] font-bold border bg-violet-100 text-violet-600 border-violet-200 as st" onClick={function(){removeDecision(entry,it);}}>⊛ Hapus</button>}
                              {!it.pdcaFlag&&<button className="py-1 px-2 rounded-lg text-[9px] font-bold border bg-stone-50 text-stone-500 border-stone-200 as st" onClick={function(){updateItemStatus(entry.id,it.id,{pdcaFlag:true});}}>📊 PDCA</button>}
                              {it.pdcaFlag&&<button className="py-1 px-2 rounded-lg text-[9px] font-bold border bg-stone-200 text-stone-600 border-stone-300 as st" onClick={function(){updateItemStatus(entry.id,it.id,{pdcaFlag:false});}}>📊 ✓</button>}
                            </div>
                          </div>

                          {/* Expand: input hasil */}
                          {isExpItem&&<div className="border-t border-stone-200 p-3 bg-stone-50">
                            <div className="text-[9px] font-extrabold text-stone-500 uppercase tracking-wider mb-1.5">Hasil / Update dari PIC</div>
                            <div className="text-[9px] text-stone-400 mb-2">Setelah simpan → otomatis masuk ke Keputusan & Tracking</div>
                            <textarea
                              className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[12px] focus:outline-none focus:ring-2 focus:ring-stone-400 resize-y mb-2"
                              rows={3}
                              placeholder={'Apa yang sudah dikerjakan PIC?\nContoh: "Laporan cashflow Bekasi sudah dibuat, negatif Rp 120jt, sudah diserahkan 4 Juni"'}
                              value={hasilTexts[it.id]!==undefined?hasilTexts[it.id]:(it.hasil||'')}
                              onChange={e=>setHasilTexts(p=>({...p,[it.id]:e.target.value}))}
                            />
                            <div className="flex gap-2">
                              <button className="flex-1 py-2 rounded-xl border border-stone-200 bg-white text-[10px] font-bold text-stone-500 as st"
                                onClick={()=>setExpItemId(null)}>Batal</button>
                              <button className={`flex-2 py-2 px-4 rounded-xl text-[10px] font-bold as st ${!(hasilTexts[it.id]||'').trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-emerald-600 text-white'}`}
                                onClick={()=>saveHasil(entry,it)}
                                disabled={!(hasilTexts[it.id]||'').trim()}>
                                Simpan → Keputusan & Tracking
                              </button>
                            </div>
                          </div>}

                          {/* Expand: Review form */}
                          {reviewExpId===it.id&&!it.needCeoReview&&<div className="border-t border-blue-200 p-3 bg-blue-50/60">
                            <div className="text-[9px] font-extrabold text-blue-600 uppercase tracking-wider mb-3">📤 Flag untuk Review CEO</div>
                            <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Tipe</div>
                            <div className="flex gap-1.5 flex-wrap mb-3">{[['decision','Need Decision','bg-red-500 text-white'],['approval','Need Approval','bg-amber-500 text-white'],['info','Need Info','bg-blue-500 text-white'],['fyi','FYI','bg-stone-500 text-white']].map(function(opt){var id=opt[0],lbl=opt[1],actC=opt[2];return(<button key={id} className={'px-2.5 py-1.5 rounded-xl text-[10px] font-bold border st as '+((reviewForms[it.id]||{}).tipe===id?actC+' border-transparent':'bg-white text-stone-600 border-stone-200')} onClick={function(){setReviewForms(function(p){var n={...p};n[it.id]={...(p[it.id]||{}),tipe:id};return n;});}}>{lbl}</button>);})}</div>
                            <div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Konteks *</div>
                            <textarea className="w-full p-2.5 rounded-xl border border-blue-200 bg-white text-[12px] focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3 resize-none" rows={2} placeholder="Konteks untuk CEO..." value={(reviewForms[it.id]||{}).konteks||''} onChange={function(e){var v=e.target.value;setReviewForms(function(p){var n={...p};n[it.id]={...(p[it.id]||{}),konteks:v};return n;});}}/>
                            <div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Pertimbangan</div>
                            <textarea className="w-full p-2.5 rounded-xl border border-blue-200 bg-white text-[12px] focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3 resize-none" rows={2} placeholder="Analisa singkat..." value={(reviewForms[it.id]||{}).pertimbangan||''} onChange={function(e){var v=e.target.value;setReviewForms(function(p){var n={...p};n[it.id]={...(p[it.id]||{}),pertimbangan:v};return n;});}}/>

                            <div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Link Dokumen</div>
                            <input className="w-full px-3 py-2 rounded-xl border border-blue-200 bg-white text-[12px] focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3" placeholder="https://..." value={(reviewForms[it.id]||{}).link||''} onChange={function(e){var v=e.target.value;setReviewForms(function(p){var n={...p};n[it.id]={...(p[it.id]||{}),link:v};return n;});}}/>
                            <div className="text-[9px] font-bold text-stone-500 uppercase mb-1">No. T-Approval</div>
                            <input className="w-full px-3 py-2 rounded-xl border border-blue-200 bg-white text-[12px] focus:outline-none focus:ring-2 focus:ring-blue-400 mb-4" placeholder="TA-XXXX (jika ada)" value={(reviewForms[it.id]||{}).noTApproval||''} onChange={function(e){var v=e.target.value;setReviewForms(function(p){var n={...p};n[it.id]={...(p[it.id]||{}),noTApproval:v};return n;});}}/>
                            <div className="flex gap-2">
                              <button className="flex-1 py-2 rounded-xl border border-stone-200 bg-white text-[10px] font-bold text-stone-500 as st" onClick={function(){setReviewExpId(null);}}>Batal</button>
                              <button className={'flex-1 py-2 rounded-xl text-[10px] font-bold as st '+(!((reviewForms[it.id]||{}).tipe&&(reviewForms[it.id]||{}).konteks)?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-blue-600 text-white')} disabled={!((reviewForms[it.id]||{}).tipe&&(reviewForms[it.id]||{}).konteks)} onClick={function(){var f=reviewForms[it.id]||{};updateItemStatus(entry.id,it.id,{needCeoReview:true,ceoReviewBrief:{tipe:f.tipe,konteks:f.konteks,pertimbangan:f.pertimbangan||'',opsi:f.opsi||'',link:f.link||'',noTApproval:f.noTApproval||''},ceoReviewStatus:'queue'});setReviewExpId(null);}}>📤 Masukkan ke Queue</button>
                            </div>
                          </div>}
                          {decisionExpId===it.id&&!it.isDecision&&<div className="border-t border-violet-200 p-3 bg-violet-50/60">

    if(!gTok||!gCalId){alert('Connect Google Calendar dulu di ⚙️');return;}
    setPulling(true);
    fetchGCalEvents(gTok,gCalId,dateMin,dateMax).then(function(evs){
      var byDate={};
      evs.forEach(function(ev){
        if(!ev.start)return;
        var item=gCalEventToJadwal(ev);
        if(!item.tanggal)return;
        if(!byDate[item.tanggal])byDate[item.tanggal]=[];
        byDate[item.tanggal].push(item);
      });
      // Merge dengan jadwal yang sudah ada — pakai functional update agar dapat state terbaru
      setJadwal(function(currentJadwal){
        var n={...currentJadwal};
        // Kumpulkan semua gcalEventId yang balik dari GCal
        var returnedIds={};
        evs.forEach(function(ev){if(ev.id)returnedIds[ev.id]=true;});
        // Tandai orphan: ada di app + punya gcalEventId + gak ada di response + tanggal dalam range pull
        Object.keys(n).forEach(function(date){
          if(date>=dateMin&&date<=dateMax){
            n[date]=(n[date]||[]).map(function(it){
              if(it.gcalEventId&&!returnedIds[it.gcalEventId])return{...it,gcalOrphaned:true};
              if(it.gcalOrphaned&&it.gcalEventId&&returnedIds[it.gcalEventId])return{...it,gcalOrphaned:false};
              return it;
            });
          }
        });
        Object.keys(byDate).forEach(function(date){
          if(!n[date])n[date]=[];

        return n;
      });

  const setST=(t,v)=>setSub(p=>({...p,[t]:v}));

  const nc=backlog.filter(it=>it.status==='baru'&&!it.hideFromBacklogList).length;
  const paQueueCount=backlog.filter(it=>(it.status==='baru'||it.status==='postponed')&&!it.needFeedback&&!it.pdcaFlag).length;
  const belumCount=keputusan.filter(k=>k.status==='disampaikan'||k.status==='proses').length;
  const nfCount=backlog.filter(function(it){return it.needFeedback&&!it.feedbackStatus;}).length+(function(){var c=0;(mom||[]).forEach(function(e){(e.items||[]).forEach(function(i){if(i.needCeoReview&&i.ceoReviewStatus==='queue')c++;});});return c;})();
  const pdcaCount=backlog.filter(function(it){return it.pdcaFlag;}).length+(function(){var c=0;(mom||[]).forEach(function(e){(e.items||[]).forEach(function(i){if(i.ceoReviewStatus==='info-tambahan'||i.pdcaFlag)c++;});});return c;})();

  const TABS=[
    {id:'dashboard',ico:'📊',lbl:'Dash'},
    {id:'jadwal',ico:'📅',lbl:'Jadwal',subs:[{id:'harian',lbl:'Harian'},{id:'mingguan',lbl:'Mingguan'},{id:'bulanan',lbl:'Bulanan'}]},
    {id:'dump'},
    {id:'backlog',ico:'📋',lbl:'Backlog',subs:[{id:'need_feedback',lbl:'Need Feedback'},{id:'backlog',lbl:'Backlog'},{id:'kamar_pa',lbl:'Kamar PA'},{id:'keputusan',lbl:'Keputusan & Tracking'},{id:'pdca',lbl:'PDCA'},{id:'arsip',lbl:'Riwayat & Arsip'}]},
    {id:'resume',ico:'📈',lbl:'Resume',subs:[{id:'analisa',lbl:'Analisa'},{id:'rekomendasi',lbl:'Rekomendasi'}]},
  ];
  const AT=TABS.find(t=>t.id===tab);

  if(!ready)return<div className="flex items-center justify-center min-h-screen text-stone-400 font-bold text-sm" style={{fontFamily:'"Plus Jakarta Sans",sans-serif'}}>Memuat...</div>;

  return(
    <div id="ac">
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} gTok={gTok} gCalId={gCalId} gCals={gCals} gBusy={gBusy} onConnect={connectCal} onPickCal={pickCal} onForceSync={forceSyncNow} syncMsg={syncMsg} onResetJadwal={resetJadwal} onResetBacklog={resetBacklog} onResetKeputusan={resetKeputusan} onPullGCal={pullFromGCal} pulling={pulling} onFixPersonalJenis={fixPersonalJenis} trusmiUrl={trusmiUrl} trusmiKey={trusmiKey} lastMomSync={lastMomSync} onSaveTrusmi={function(u,k){setTrusmiUrl(u);setTrusmiKey(k);sv('trusmiUrl',u);sv('trusmiKey',k);}}/>}
      {/* ── DESKTOP SIDEBAR ── */}
      <aside className="hidden md:flex md:flex-col md:w-56 md:flex-shrink-0 md:sticky md:top-0 md:h-screen md:border-r md:border-stone-200 md:bg-white md:shadow-[2px_0_12px_rgba(0,0,0,0.04)] md:z-50">
        <Sidebar tab={tab} sub={sub} setTab={setTab} setST={setST} nc={nc} belumCount={belumCount}/>
      </aside>

      {/* ── MAIN CONTENT AREA ── */}
      <div className="flex-1 min-w-0 flex flex-col">
        {/* Header */}
        <div className="sticky top-0 z-40 gn border-b border-stone-200">
          <div className="flex justify-between items-center px-4 py-3 md:px-6">
            {/* Mobile: show app name. Desktop: hidden (shown in sidebar) */}
            <div className="md:hidden">
              <div className="text-[16px] font-black tracking-tight text-stone-900 leading-none mb-1">CEO GTD OS</div>
              <div className="text-[10px] font-semibold text-stone-400">PT Raja Sukses Properindo · {new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'short'})}</div>
            </div>
            {/* Desktop: show current tab name */}
            <div className="hidden md:block">
              <div className="text-[18px] font-extrabold text-stone-900 tracking-tight">{AT&&AT.id==='dashboard'?'Dashboard KPI':AT&&AT.id==='jadwal'?'Jadwal CEO':AT&&AT.id==='dump'?'Dump Think':AT&&AT.id==='backlog'?'Backlog':AT&&AT.id==='resume'?'Resume Agenda':'CEO GTD OS'}</div>
              <div className="text-[11px] text-stone-400 font-medium mt-0.5">{new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div className="flex items-center gap-2">
              <div className={`px-3 py-1.5 rounded-full text-[10px] font-bold flex items-center gap-1.5 border ${nc>0?'bg-red-50 text-red-600 border-red-200 shadow-sm':'bg-stone-100 text-stone-500 border-stone-200'}`}>
                <span>{backlog.length} total</span>
                {nc>0&&<><span className="w-1 h-1 rounded-full bg-red-500"/><span>{nc} baru</span></>}
              </div>
              <button onClick={function(){if(getSB())pullFromSB();}} className="w-8 h-8 rounded-full flex items-center justify-center text-[13px] border as st bg-stone-100 border-stone-200 text-stone-500" title="Sync dari Supabase">🔄</button>
              <button onClick={()=>setShowSettings(true)} className={`w-8 h-8 rounded-full flex items-center justify-center text-[14px] border as st ${!getApiKey()?'bg-amber-50 border-amber-200 text-amber-600':'bg-stone-100 border-stone-200 text-stone-500'}`} title="Pengaturan & API Key">⚙️</button>
            </div>
          </div>
          {/* Sub-tabs */}
          {AT&&AT.subs&&(
            <div className="flex bg-stone-50/80 border-t border-stone-200 md:px-2">
              {AT.subs.map(s=>(
                <button key={s.id} className={`flex-1 md:flex-none md:px-6 py-2.5 text-[11px] font-bold st relative flex items-center justify-center gap-1.5 ${sub[tab]===s.id?'text-stone-900':'text-stone-400'}`} onClick={()=>setST(tab,s.id)}>
                  {s.lbl}
                  {s.id==='keputusan'&&belumCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-amber-500 text-white text-[8px] font-black rounded-full">{belumCount}</span>}
                  {s.id==='need_feedback'&&nfCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-violet-600 text-white text-[8px] font-black rounded-full">{nfCount}</span>}
                  {s.id==='kamar_pa'&&paQueueCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-blue-500 text-white text-[8px] font-black rounded-full">{paQueueCount}</span>}
                  {s.id==='pdca'&&pdcaCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-stone-600 text-white text-[8px] font-black rounded-full">{pdcaCount}</span>}
                  {sub[tab]===s.id&&<div className="absolute bottom-0 left-1/4 right-1/4 md:left-4 md:right-4 h-0.5 bg-stone-800 rounded-t-md"/>}
                </button>
              ))}
            </div>
          )}
          {/* Filter chips — jadwal only */}
          {tab==='jadwal'&&<div className="px-3 py-2 flex items-center gap-1.5 flex-wrap border-t border-stone-100 bg-white/90 backdrop-blur overflow-x-auto">
            {[['RSP','bg-blue-100 text-blue-700 border-blue-200'],['BT','bg-emerald-100 text-emerald-700 border-emerald-200'],['TKB','bg-amber-100 text-amber-700 border-amber-200'],['Personal','bg-stone-100 text-stone-600 border-stone-300']].map(([k,ac])=>(
              <button key={k} onClick={()=>toggleKat(k)} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.kategori[k]?ac:'bg-white text-stone-300 border-stone-200'}`}>{k}</button>
            ))}
            <div className="w-px h-4 bg-stone-200 flex-shrink-0 mx-0.5"/>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumOutput:!f.belumOutput}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumOutput?'bg-amber-100 text-amber-700 border-amber-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Output</button>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumSiap:!f.belumSiap}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumSiap?'bg-red-100 text-red-600 border-red-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Siap</button>
            {(!jadwalFilter.kategori.RSP||!jadwalFilter.kategori.BT||!jadwalFilter.kategori.TKB||!jadwalFilter.kategori.Personal||jadwalFilter.belumOutput||jadwalFilter.belumSiap)&&<button onClick={()=>setJadwalFilter({kategori:{RSP:true,BT:true,TKB:true,Personal:true},belumOutput:false,belumSiap:false})} className="px-2 py-1 rounded-full text-[9px] font-bold border border-stone-200 bg-stone-50 text-stone-400 as st flex-shrink-0 ml-auto">Reset ✕</button>}
          </div>}
        </div>

        {/* Content */}
        <div className="flex-1 pb-24 md:pb-8 md:max-w-5xl md:w-full md:mx-auto md:px-0">
          {tab==='dashboard'&&<Dashboard weekly={dashWeekly} kpiCorp={kpiCorp} dashMonth={dashMonth} onChangeMonth={setDashMonth} booking={booking}/>}
          {tab==='jadwal'&&sub.jadwal==='harian'&&<JadwalHarian backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onRemoveJadwal={removeFromJadwal} onUpdateJadwal={updateJadwal} onUpdate={updI} onAddKeputusan={addK} filter={jadwalFilter} gcalOn={!!(gTok&&gCalId)} onPushItem={pushItem} onPushDay={pushDay} onAddMomBatch={batchAddMom}/>}
          {tab==='jadwal'&&sub.jadwal==='mingguan'&&<JadwalMingguan backlog={backlog} jadwal={jadwal} filter={jadwalFilter} onUpdateJadwal={updateJadwal} onRemoveJadwal={removeFromJadwal} onUpdateBacklog={updI}/>}
          {tab==='jadwal'&&sub.jadwal==='bulanan'&&<JadwalBulanan jadwal={jadwal} filter={jadwalFilter}/>}
          {tab==='dump'&&<DumpPage onAdd={addI} onAddKeputusan={addK} onAddJadwal={addToJadwal} onBatchAddJadwal={batchAddToJadwal} onUpdateJadwal={updateJadwal} onResetICSBatch={resetJadwalBatch} onSaveKpiCorp={saveKpiCorp} onSaveKpiCeo={saveKpiCeo} onSaveBooking={saveBooking} onAddMom={addMom} jadwal={jadwal} backlog={backlog} onDone={()=>{setTab('backlog');setST('backlog','backlog');}}/>}
          {tab==='backlog'&&sub.backlog==='need_feedback'&&<NeedFeedbackTab backlog={backlog} onUpdate={updI} onAddKeputusan={addK} mom={mom} onUpdateMom={updMom} onAddBacklog={addI}/>}
          {tab==='backlog'&&sub.backlog==='backlog'&&<BacklogList backlog={backlog} onUpdate={updI} onDelete={delI} onAddKeputusan={addK} onAddMom={addMom}/>}
          {tab==='backlog'&&sub.backlog==='kamar_pa'&&<KamarPATab backlog={backlog} onUpdateBacklog={updI} onAddJadwal={addToJadwal}/>}
          {tab==='backlog'&&sub.backlog==='keputusan'&&<Keputusan keputusan={keputusan} onUpdate={updK} onDelete={delK} onAddKeputusan={addK}/>}
          {tab==='backlog'&&sub.backlog==='pdca'&&<PdcaTab backlog={backlog} onUpdateBacklog={updI} mom={mom} onUpdateMom={updMom} onDeleteMom={delMom} onAddKeputusan={addK} onSyncMom={trusmiKey?syncTrusmiMom:null} syncingMom={syncingMom} lastMomSync={lastMomSync} onResetMomSync={trusmiKey?function(){var kept=(mom||[]).filter(function(m){return!m._trusmiId;});setMom(kept);sv('mom',kept);sbSave('mom',kept);setLastMomSync('');sv('lastMomSync','');}:null}/>}
          {tab==='backlog'&&sub.backlog==='arsip'&&<RiwayatSampahTab sampah={sampah} onRestore={restoreSampah} onHardDel={hardDelSampah}/>}
          {tab==='resume'&&sub.resume==='analisa'&&<AnalisaTab backlog={backlog} jadwal={jadwal} kpiCorp={kpiCorp} dashMonth={dashMonth} mom={mom}/>}
          {tab==='resume'&&sub.resume==='rekomendasi'&&<AnalisaJadwal backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onAddBacklog={addI} onUpdateBacklog={updI}/>}
        </div>

        {/* ── MOBILE BOTTOM NAV (hidden on desktop) ── */}
        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-200 z-50 rounded-t-3xl shadow-nav">
          <div className="flex justify-between items-end h-[68px] relative px-2">
            {[TABS[0],TABS[1]].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} className={`flex flex-col items-center flex-1 pb-3 st ${tab===t.id?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
                <span className="text-[22px] mb-1">{t.ico}</span>
                <span className={`text-[9px] ${tab===t.id?'font-extrabold':'font-semibold'}`}>{t.lbl}</span>
              </button>
            ))}
            <div className="flex-1 flex justify-center pb-5 relative">
              <button onClick={()=>setTab('dump')} className={`absolute bottom-5 w-14 h-14 rounded-full flex items-center justify-center text-[26px] shadow-fab border-[3px] border-white z-50 st as ${tab==='dump'?'bg-stone-900 text-white rotate-45':'bg-stone-800 text-white'}`}>{tab==='dump'?'✕':'＋'}</button>
            </div>
            <button onClick={()=>setTab('backlog')} className={`flex flex-col items-center flex-1 pb-3 relative st ${tab==='backlog'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              {nc>0&&<span className="absolute top-1.5 right-4 w-2 h-2 bg-red-500 rounded-full border border-white"/>}
              <span className="text-[22px] mb-1">📋</span>
              <span className={`text-[9px] ${tab==='backlog'?'font-extrabold':'font-semibold'}`}>Backlog</span>
            </button>
            <button onClick={()=>setTab('resume')} className={`flex flex-col items-center flex-1 pb-3 st ${tab==='resume'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              <span className="text-[22px] mb-1">📈</span>
              <span className={`text-[9px] ${tab==='resume'?'font-extrabold':'font-semibold'}`}>Resume</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
