}

// ── JADWAL BULANAN ────────────────────────────────────────────
function JadwalBulanan({jadwal,filter}){
  const [monthOffset,setMonthOffset]=useState(0);
  const now=new Date();
  const year=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getFullYear();
  const month=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getMonth();
  const monthStr=new Date(year,month,1).toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  const monthKey=`${year}-${String(month+1).padStart(2,'0')}`;

  // Collect all items in this month
  const allItems=Object.entries(jadwal||{}).flatMap(([date,items])=>{
    if(!date.startsWith(monthKey))return[];
    const its=filter?applyJadwalFilter(items||[],filter):(items||[]);
    return its.map(it=>({...it,tanggal:date}));
  });

  // Stats
  const totalKegiatan=allItems.length;
  const totalJam=Math.round(allItems.reduce((s,it)=>s+getDur(it.jamMulai,it.jamSelesai),0)*10)/10;
  const adaOutput=allItems.filter(it=>it.outputKeputusan&&it.outputKeputusan.trim()).length;

  // Group by jenis
  const byJenis={};
  JENIS_KEGIATAN.forEach(j=>{byJenis[j]=allItems.filter(it=>it.jenisKegiatan===j).length;});

  // Group by KPI
  const byKpi={};
  KPI5.forEach(k=>{byKpi[k.id]=allItems.filter(it=>it.relateMilestone===k.id).length;});

  // Group by kategori
  const byKat={RSP:0,BT:0,TKB:0,Personal:0};
  allItems.forEach(it=>{if(byKat[it.kategori]!==undefined)byKat[it.kategori]++;});

  // Days in month with count
  const daysInMonth=new Date(year,month+1,0).getDate();
  const calDays=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(year,month,i+1);
    const ds=d.toISOString().slice(0,10);
    const its=filter?applyJadwalFilter(jadwal[ds]||[],filter):(jadwal[ds]||[]);
    return{ds,num:i+1,dow:d.getDay(),count:its.length};
  });
  const firstDow=calDays[0].dow;
  const padStart=firstDow===0?6:firstDow-1;
  const maxCount=Math.max(1,...calDays.map(d=>d.count));

  return(
    <div className="afi pb-8">
      {/* Month navigator */}
      <div className="px-4 pt-4 pb-3 flex items-center justify-between">
        <button onClick={()=>setMonthOffset(p=>p-1)} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">‹</button>
        <div className="text-center">
          <div className="text-[14px] font-extrabold text-stone-900">{monthStr}</div>
          {monthOffset!==0&&<button onClick={()=>setMonthOffset(0)} className="text-[10px] text-stone-400 underline as">Kembali ke bulan ini</button>}
        </div>
        <button onClick={()=>setMonthOffset(p=>p+1)} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">›</button>
      </div>

      {/* Summary cards */}
      <div className="px-4 grid grid-cols-3 gap-3 mb-5">
        {[['Total Kegiatan',totalKegiatan,'📅'],['Total Jam',totalJam+'h','⏱'],['Ada Output',adaOutput+'x','✅']].map(([l,v,e])=>(
          <div key={l} className="bg-white border border-stone-200 rounded-2xl p-3 text-center shadow-soft">
            <div className="text-xl mb-0.5">{e}</div>
            <div className="text-xl font-black text-stone-900">{v}</div>
            <div className="text-[9px] text-stone-400 font-medium">{l}</div>
          </div>
        ))}
      </div>

      {/* Calendar heatmap */}
      <div className="px-4 mb-5">
        <div className="bg-white border border-stone-200 rounded-2xl p-3 shadow-soft">
          <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-2">Kalender — kepadatan kegiatan</div>
          <div className="grid grid-cols-7 gap-1 mb-1">
            {['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map(d=><div key={d} className="text-center text-[8px] font-bold text-stone-400">{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {Array.from({length:padStart},(_,i)=><div key={'p'+i}/>)}
            {calDays.map(d=>{
              const intensity=d.count===0?'bg-stone-100 text-stone-400':d.count<3?'bg-blue-100 text-blue-700':d.count<6?'bg-blue-300 text-blue-900':d.count<9?'bg-blue-500 text-white':'bg-blue-700 text-white';
              const isToday=d.ds===todayStr();
              return(
                <div key={d.ds} className={`rounded-lg h-8 flex flex-col items-center justify-center ${intensity} ${isToday?'ring-2 ring-amber-400':''}`}>
                  <div className="text-[9px] font-bold leading-none">{d.num}</div>
                  {d.count>0&&<div className="text-[7px] leading-none opacity-80">{d.count}x</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Breakdown by kategori */}
      <div className="px-4 mb-4">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-2">Per Entitas</div>
        <div className="grid grid-cols-4 gap-2">
          {[['RSP','bg-blue-50 border-blue-200 text-blue-700'],['BT','bg-emerald-50 border-emerald-200 text-emerald-700'],['TKB','bg-amber-50 border-amber-200 text-amber-700'],['Personal','bg-stone-50 border-stone-200 text-stone-600']].map(([k,c])=>(
            <div key={k} className={`rounded-xl p-2.5 text-center border ${c}`}>
              <div className="text-xl font-black">{byKat[k]||0}</div>
              <div className="text-[9px] font-bold">{k}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Breakdown by jenis */}
      <div className="px-4 mb-4">
        <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-soft">
          <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-3">Per Jenis Kegiatan</div>
          <div className="space-y-2.5">
            {JENIS_KEGIATAN.map(j=>{const n=byJenis[j]||0;const pct=totalKegiatan>0?Math.round((n/totalKegiatan)*100):0;const jc=JENIS_COLOR[j]||'bg-stone-100 text-stone-600';return(
              <div key={j} className="flex items-center gap-2">
                <span className={`flex-shrink-0 px-1.5 py-0.5 rounded text-[8px] font-bold ${jc}`} style={{minWidth:80,textAlign:'center'}}>{JENIS_SHORT[j]||j}</span>
                <div className="flex-1 h-2.5 bg-stone-100 rounded-full overflow-hidden"><div className="h-full bg-stone-600 rounded-full" style={{width:pct+'%'}}/></div>
                <span className="text-[10px] font-bold text-stone-600 tabular-nums w-8 text-right">{n}x</span>
              </div>
            );})}
          </div>
        </div>
      </div>

      {/* Breakdown by KPI */}
      <div className="px-4">
        <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-soft">
          <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-3">Per Fungsi KPI</div>
          <div className="space-y-2.5">
            {KPI5.map(k=>{const n=byKpi[k.id]||0;const pct=totalKegiatan>0?Math.round((n/totalKegiatan)*100):0;return(
              <div key={k.id} className="flex items-center gap-2">
                <span className={`flex-shrink-0 text-[9px] font-black ${k.color}`} style={{minWidth:56}}>{k.short}</span>
                <div className="flex-1 h-2.5 bg-stone-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:pct+'%',background:k.hex}}/></div>
                <span className="text-[10px] font-bold text-stone-600 tabular-nums">{pct}%</span>
                <span className="text-[10px] text-stone-400 tabular-nums w-6 text-right">{n}x</span>
              </div>
            );})}
          </div>
        </div>
      </div>

      {!totalKegiatan&&<div className="px-4 py-10 text-center"><div className="text-4xl mb-3 opacity-30">📅</div><div className="text-[13px] font-bold text-stone-400">Belum ada kegiatan di bulan ini</div></div>}
    </div>
  );
}

// ── HEATMAP ───────────────────────────────────────────────────
function Heatmap({backlog}){
  // Kolom: 7 kategori kegiatan
  const COLS=[
    {id:'deepwork',label:'Deepwork Strategic',short:'Deepwork',match:'deepwork'},
    {id:'meet_s',label:'Meeting Strategic',short:'Meet. Strategic',match:'strategic'},
    {id:'meet_r',label:'Meeting Review Ops',short:'Meet. Review',match:'review'},
    {id:'external',label:'Ketemu External',short:'Ketemu Ext.',match:'external'},
    {id:'konten',label:'Bikin Konten',short:'Konten',match:'konten'},
    {id:'genba',label:'Genba',short:'Genba',match:'genba'},
    {id:'engage',label:'Employee Engage',short:'Engage',match:'engage'},
  ];
  // Valid combinations per fungsi KPI
  const VALID={
    finansial:['deepwork','meet_s','meet_r','external'],
    branding:['deepwork','meet_s','meet_r','konten','external'],
    riset:['deepwork','meet_s','meet_r','external','genba'],
    operasional:['meet_s','meet_r','external','genba'],
    people:['deepwork','meet_r','konten','external','engage'],
  };
  const cntCell=(kpiId,colId)=>{
    const col=COLS.find(x=>x.id===colId);if(!col)return 0;
    return backlog.filter(it=>it.fungsiKPI===kpiId&&(it.kategori||'').toLowerCase().includes(col.match)).length;
  };
  const allC=KPI5.flatMap(k=>COLS.map(c=>cntCell(k.id,c.id)));
  const maxC=Math.max(1,...allC);
  const tot=Math.max(1,backlog.length);
  const gaps=KPI5.filter(k=>backlog.filter(it=>it.fungsiKPI===k.id).length===0);

  return(
    <div className="afi pb-4">
      {/* Matrix title */}
      <div className="px-4 pt-5 pb-1 md:px-6">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest mb-0.5">Heatmap — Fungsi KPI × Kategori Kegiatan</div>
        <div className="text-[10px] text-stone-400">✕ = tidak relevan · warna makin gelap = makin banyak aktivitas backlog</div>
      </div>

      {/* Matrix grid */}
      <div className="overflow-x-auto px-4 md:px-6 pb-5 mt-3">
        <div style={{minWidth:480}}>
          {/* Column headers */}
          <div style={{display:'grid',gridTemplateColumns:`88px repeat(7,1fr)`,gap:3,marginBottom:6}}>
            <div/>
            {COLS.map(c=><div key={c.id} style={{textAlign:'center',padding:'0 2px'}}>
              <div style={{fontSize:8,fontWeight:800,color:'#78716c',lineHeight:1.25,letterSpacing:'.05em',textTransform:'uppercase'}}>{c.short}</div>
            </div>)}
          </div>
          {/* KPI rows */}
          {KPI5.map(k=>(
            <div key={k.id} style={{display:'grid',gridTemplateColumns:`88px repeat(7,1fr)`,gap:3,marginBottom:3}}>
              <div style={{display:'flex',alignItems:'center',paddingRight:8}}>
                <span style={{fontSize:10,fontWeight:800,color:k.hex,lineHeight:1.2,letterSpacing:'-.2px'}}>{k.short}</span>
              </div>
              {COLS.map(c=>{
                const valid=(VALID[k.id]||[]).includes(c.id);
                const n=cntCell(k.id,c.id);
                const alpha=n===0?0:Math.round((0.2+(n/maxC)*0.75)*255).toString(16).padStart(2,'0');
                if(!valid)return(
                  <div key={c.id} title={`${k.label} × ${c.label} — tidak relevan`}
                    style={{aspectRatio:'1',borderRadius:5,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#d6d3d1',fontWeight:700}}>✕</div>
                );
                return(
                  <div key={c.id} title={`${k.label} × ${c.label}: ${n} item`}
                    style={{aspectRatio:'1',borderRadius:5,background:n===0?'#fafaf9':`${k.hex}${alpha}`,border:`1px solid ${n===0?'#e7e5e4':k.hex+'33'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:n===0?'transparent':n/maxC>0.5?'#fff':k.hex,transition:'all .15s'}}>
                    {n>0?n:''}
                  </div>
                );
              })}
            </div>
          ))}
          {/* Legend */}
          <div style={{display:'flex',gap:10,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:9,color:'#a8a29e',fontWeight:700}}>LEGEND:</span>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#d6d3d1',fontWeight:700}}>✕</div><span style={{fontSize:9,color:'#a8a29e'}}>Tidak relevan</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#fafaf9',border:'1px solid #e7e5e4'}}/><span style={{fontSize:9,color:'#a8a29e'}}>0 item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED855'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Ada item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED8dd'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Banyak</span></div>
          </div>
        </div>
      </div>

      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>

      {/* Distribusi per kategori (dari backlog) */}
      <div className="px-4 pb-2 md:px-6 text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Distribusi Backlog per Kategori</div>
      <div className="px-4 md:px-6 space-y-2 pb-5">
        {COLS.map(c=>{const n=backlog.filter(it=>(it.kategori||'').toLowerCase().includes(c.match)).length;const maxN=Math.max(1,...COLS.map(x=>backlog.filter(it=>(it.kategori||'').toLowerCase().includes(x.match)).length));return(
          <div key={c.id} className="flex items-center gap-3">
            <div className="text-[10px] font-bold text-stone-500 text-right flex-shrink-0 leading-tight" style={{width:120}}>{c.label}</div>
            <div className="flex-1 h-6 bg-stone-100 rounded-lg overflow-hidden border border-stone-200/50">
              <div className="h-full flex items-center justify-end px-2 min-w-[28px] rounded-lg" style={{width:`${Math.max(n===0?0:(n/maxN)*100,n>0?6:0)}%`,background:n===0?'#e7e5e4':'#44403c'}}>
                <span className="text-[10px] font-bold text-white">{n}x</span>
              </div>
            </div>
          </div>
        );})}
      </div>

      {/* Coverage + gap alert */}
      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>
      <div className="px-4 pb-2 md:px-6 text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Coverage Backlog per Fungsi</div>
      <div className="px-4 md:px-6 space-y-3 pb-4">
        {KPI5.map(k=>{const t=backlog.filter(it=>it.fungsiKPI===k.id).length;const d=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='selesai').length;const b=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='baru').length;return(
          <div key={k.id}><div className="flex justify-between items-end mb-1.5"><span className={`text-[11px] font-bold ${k.color}`}>{k.label}</span><span className="text-[10px] text-stone-400">{d}/{t}{b>0&&<span className="text-red-500 ml-1 font-bold">({b} baru)</span>}</span></div>
          <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden relative border border-stone-200/50"><div className={`absolute left-0 top-0 bottom-0 ${k.bg}`} style={{width:`${(t/tot)*100}%`}}/><div className="absolute left-0 top-0 bottom-0 rounded-full" style={{width:`${(d/tot)*100}%`,background:k.hex}}/></div>
          </div>
        );})}
      </div>
      {gaps.length>0&&<div className="mx-4 md:mx-6 p-3.5 rounded-2xl bg-red-50 border border-red-100"><div className="text-[11px] font-bold text-red-700 mb-1">⚠️ Blind Spot — belum ada backlog:</div><div className="text-[11px] text-red-800">{gaps.map(k=>k.label).join(' · ')}</div></div>}
    </div>
  );
}

// ── ANALISA TAB ───────────────────────────────────────────────
function AnalisaTab({backlog,jadwal,kpiCorp,dashMonth,mom,kpiCeo,targetBobot}){
  const [entityFilter,setEntityFilter]=useState('all');
  const [heatTip,setHeatTip]=useState(null);
  const [weekOff,setWeekOff]=useState(0);
  const today=todayStr();

  // ── Week filtering ──
  function getMonStr(offset){
    var t=new Date();var dow=t.getDay();
    var m=new Date(t);m.setDate(t.getDate()-(dow===0?6:dow-1)+offset*7);
    return m.toISOString().slice(0,10);
  }
  var monStr=getMonStr(weekOff);
  var weekDates=[];
  for(var wi=0;wi<7;wi++){var wd=new Date(monStr+'T12:00:00');wd.setDate(wd.getDate()+wi);weekDates.push(wd.toISOString().slice(0,10));}
  var sunStr=weekDates[6];
  var weekLbl=(function(){var m=new Date(monStr+'T12:00:00');var s=new Date(sunStr+'T12:00:00');return m.getDate()+' – '+s.getDate()+' '+m.toLocaleDateString('id-ID',{month:'long',year:'numeric'});})();
  // Filter jadwal ke minggu yang dipilih
  var weekJadwal={};
  weekDates.forEach(function(d){if(jadwal[d])weekJadwal[d]=jadwal[d];});

  const stats=computeAnalisaFiltered(weekJadwal,entityFilter);

  const blBaru=backlog.filter(function(it){return it.status==='baru';}).length;
  const blDijadwalkan=backlog.filter(function(it){return it.status==='dijadwalkan';}).length;
  const blSelesai=backlog.filter(function(it){return it.status==='selesai';}).length;
  const blPostponed=backlog.filter(function(it){return it.status==='postponed';}).length;
  const blUrgent=backlog.filter(function(it){return it.prioritas==='tinggi'&&it.status!=='selesai';}).length;
  const blOverdue=backlog.filter(function(it){var d=it.deadline;return d&&d<today&&it.status!=='selesai';}).length;
  const multiPost=backlog.filter(function(it){return(it.postponeHistory||[]).length>=3&&it.status!=='selesai';}).length;

  // ── D6: Disiplin Sistem CEO ──
  const curMonth=dashMonth||today.slice(0,7);
  const monthJadwalItems=[];
  Object.keys(weekJadwal).forEach(function(date){
    if(date.slice(0,7)===curMonth){(jadwal[date]||[]).forEach(function(it){monthJadwalItems.push({...it,_date:date});});}
  });
  const totalJadwalBulan=monthJadwalItems.length;
  let postponeEventsBulan=0;
  backlog.forEach(function(b){(b.postponeHistory||[]).forEach(function(h){if(h.tanggal&&h.tanggal.slice(0,7)===curMonth)postponeEventsBulan++;});});
  const postponeRate=totalJadwalBulan>0?Math.round(postponeEventsBulan/totalJadwalBulan*100):null;

  const nowT=nowTimeStr();
  const pastNonMeeting=monthJadwalItems.filter(function(it){
    var isMt=it.jenisKegiatan&&(it.jenisKegiatan.includes('Meeting')||it.jenisKegiatan.includes('External'));
    if(isMt)return false;
    return it._date<today||(it._date===today&&it.jamSelesai&&it.jamSelesai<=nowT);
  });
  const filledCount=pastNonMeeting.filter(function(it){return it.outputKeputusan&&it.outputKeputusan.trim();}).length;
  const outputFillRate=pastNonMeeting.length>0?Math.round(filledCount/pastNonMeeting.length*100):null;

  const resolvedBulan=backlog.filter(function(it){return it.feedbackTs&&it.feedbackTs.slice(0,7)===curMonth&&it.tanggal;});
  let avgResponseDays=null;
  if(resolvedBulan.length>0){
    var totalDays=0;
    resolvedBulan.forEach(function(it){var d=Math.max(0,Math.round((new Date(it.feedbackTs)-new Date(it.tanggal))/86400000));totalDays+=d;});
    avgResponseDays=Math.round(totalDays/resolvedBulan.length*10)/10;
  }
  const pendingQueue=backlog.filter(function(it){return it.needFeedback&&!it.feedbackStatus;});
  let avgPendingAge=null;
  if(pendingQueue.length>0){
    var totalAge=0;
    pendingQueue.forEach(function(it){totalAge+=Math.max(0,Math.round((new Date(today)-new Date(it.tanggal))/86400000));});
    avgPendingAge=Math.round(totalAge/pendingQueue.length*10)/10;
  }

  const TARGET_PCT=targetBobot||{finansial:25,branding:25,riset:15,operasional:30,people:5};
  const coverageGaps=KPI5.map(function(k){
    var actual=0;
    if(stats&&stats.coverage){stats.coverage.forEach(function(c){if(c.kpi.id===k.id)actual=c.hours;});}
    var totalH=stats?stats.totalHours:0;
    var actualPct=totalH>0?Math.round(actual/totalH*100):0;
    var target=TARGET_PCT[k.id]||20;
    return{kpi:k,actual:actual,actualPct:actualPct,target:target,gap:actualPct-target};
  });

  // D1 — dari MoM decisions
  const corpData=(kpiCorp&&kpiCorp[dashMonth])?kpiCorp[dashMonth]:null;
  const weekly=(corpData&&corpData.weekly)?corpData.weekly:INIT_W;
  const allDecisions=[];
  (mom||[]).forEach(function(entry){(entry.items||[]).forEach(function(item){if(item.isDecision&&item.domain){allDecisions.push({...item,meetingDate:entry.tanggal,meetingName:entry.meetingName});}});});
  const d1Data=DOMAINS.map(function(d){
    var decs=allDecisions.filter(function(dec){return dec.domain===d.id;});
    var sesuai=decs.filter(function(dec){return dec.pdcaCheck==='sesuai';}).length;
    var total=decs.length;
    var pct=total>0?Math.round(sesuai/total*100):null;
    var jam=0;if(stats&&stats.coverage){stats.coverage.forEach(function(c){if(c.kpi.id===d.kpiId)jam=c.hours;});}
    var corpGroup=GROUPS.find(function(g){return g.id===d.kpiCorpGroup;});
    var act2=WEEKS.filter(function(w){return weekly[w];});
    var lastW3=act2.length>0?act2[act2.length-1]:null;
    var yScore=null;
    if(lastW3&&weekly[lastW3]&&corpGroup){yScore=Math.round(corpGroup.items.reduce(function(s,i){var v=weekly[lastW3][i.id];return s+(v?Math.min(v.pct,100)*i.bobot/corpGroup.bobot:0);},0));}
    return{d:d,decs:decs,sesuai:sesuai,total:total,pct:pct,jam:jam,yScore:yScore};
  });

  function heatCls(v){if(!v)return'bg-stone-100 text-stone-400';if(v<=3)return'bg-sky-100 text-sky-800';if(v<=7)return'bg-sky-300 text-sky-900';if(v<=12)return'bg-sky-500 text-white';return'bg-sky-700 text-white';}

  // ── Heatmap K1-K7 per hari ──
  var K_DEF=[
    {id:'K1',lbl:'K1 · Deepwork',kw:'Deepwork',col:'#3b82f6'},
    {id:'K2',lbl:'K2 · Strategis',kw:'Strategis',col:'#0ea5e9'},
    {id:'K3',lbl:'K3 · Review',kw:'Review',col:'#f59e0b'},
    {id:'K4',lbl:'K4 · Konten',kw:'Konten',col:'#10b981'},
    {id:'K5',lbl:'K5 · Genba',kw:'Genba',col:'#14b8a6'},
    {id:'K6',lbl:'K6 · External',kw:'External',col:'#a855f7'},
    {id:'K7',lbl:'K7 · Engage',kw:'Engage',col:'#f43f5e'},
  ];
  var heatMap={};
  K_DEF.forEach(function(k){heatMap[k.id]={};weekDates.forEach(function(d){heatMap[k.id][d]=0;});});
  weekDates.forEach(function(d){
    (weekJadwal[d]||[]).forEach(function(it){
      var j=it.jenisKegiatan||'';var h=getDur(it.jamMulai,it.jamSelesai);
      K_DEF.forEach(function(k){if(j.indexOf(k.kw)!==-1)heatMap[k.id][d]=Math.round((heatMap[k.id][d]+h)*10)/10;});
    });
  });
  var heatTotals={};K_DEF.forEach(function(k){heatTotals[k.id]=Math.round(weekDates.reduce(function(s,d){return s+(heatMap[k.id][d]||0);},0)*10)/10;});

  // ── Jam & pct per fungsi ──
  var totalJamMinggu=Math.round(weekDates.reduce(function(s,d){return s+(weekJadwal[d]||[]).reduce(function(ss,it){return ss+getDur(it.jamMulai,it.jamSelesai);},0);},0)*10)/10;
  var JFMAP={'Deepwork':['finansial','branding','riset','people'],'Meeting Strategis':['finansial','branding','riset','operasional'],'Meeting Review':['finansial','branding','riset','operasional','people'],'Bikin Konten':['branding','people'],'Genba':['riset','operasional'],'Ketemu External':['finansial','branding','riset','operasional','people'],'Employee Engage':['people']};
  var jamFungsi={finansial:0,branding:0,operasional:0,riset:0,people:0};
  weekDates.forEach(function(d){(weekJadwal[d]||[]).forEach(function(it){var j=it.jenisKegiatan||'';var h=getDur(it.jamMulai,it.jamSelesai);var fs=JFMAP[j];if(fs){var share=h/fs.length;fs.forEach(function(f){jamFungsi[f]=(jamFungsi[f]||0)+share;});}});});
  Object.keys(jamFungsi).forEach(function(k){jamFungsi[k]=Math.round(jamFungsi[k]*10)/10;});
  var pctFungsi={};Object.keys(jamFungsi).forEach(function(k){pctFungsi[k]=totalJamMinggu>0?Math.round(jamFungsi[k]/totalJamMinggu*100):0;});
  var TB={finansial:(targetBobot&&targetBobot.finansial)||25,branding:(targetBobot&&targetBobot.branding)||25,operasional:(targetBobot&&targetBobot.operasional)||30,riset:(targetBobot&&targetBobot.riset)||15,people:(targetBobot&&targetBobot.people)||5};

  function fStatus(pct,target){var r=target>0?pct/target:1;if(pct===0&&target>0)return{lbl:'Kritis 🔴',cls:'text-rose-600 bg-rose-50 border-rose-200'};if(r<0.5)return{lbl:'Under ⚠️',cls:'text-amber-600 bg-amber-50 border-amber-200'};if(r>1.4)return{lbl:'Over ⚠️',cls:'text-amber-600 bg-amber-50 border-amber-200'};return{lbl:'OK ✅',cls:'text-emerald-600 bg-emerald-50 border-emerald-200'};}
  function hexRgb(h){var r=parseInt(h.slice(1,3),16);var g=parseInt(h.slice(3,5),16);var b=parseInt(h.slice(5,7),16);return r+','+g+','+b;}
  function cellSt(h,col){if(!h)return{background:'#f1f5f9',color:'#94a3b8'};var a=h>=3?1:h>=2?0.8:h>=1?0.55:0.3;return{background:'rgba('+hexRgb(col)+','+a+')',color:a>0.55?'white':col,fontWeight:700};}
  var dayLbls=['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
  var FNMETA=[{id:'finansial',lbl:'Finansial',col:'#f43f5e'},{id:'branding',lbl:'Branding',col:'#10b981'},{id:'operasional',lbl:'Operasional',col:'#f59e0b'},{id:'riset',lbl:'Riset',col:'#3b82f6'},{id:'people',lbl:'People',col:'#a855f7'}];
  var totalAktivitas=Object.values(weekJadwal).reduce(function(s,a){return s+a.length;},0);
  var kontenJam=heatTotals['K4']||0;
  var extJam=heatTotals['K6']||0;
  var engageCount=weekDates.reduce(function(s,d){return s+(weekJadwal[d]||[]).filter(function(it){return it.jenisKegiatan&&it.jenisKegiatan.indexOf('Engage')!==-1;}).length;},0);

  return(
    <div className="pb-10" style={{fontFamily:'Inter,sans-serif',background:'#f8fafc',minHeight:'100vh'}}>

      {/* WEEK NAV */}
      <div className="px-4 md:px-6 pt-4 pb-3 flex items-center justify-between border-b border-slate-200 bg-white">
        <button onClick={function(){setWeekOff(weekOff-1);}} className="px-3 py-1.5 rounded-xl border border-slate-200 bg-white text-[11px] font-bold text-slate-600 as st">← Lalu</button>
        <div className="text-center">
          <div className="text-[13px] font-extrabold text-slate-900">{weekOff===0?'Minggu Ini':weekOff===-1?'Minggu Lalu':Math.abs(weekOff)+' Minggu Lalu'}</div>
          <div className="text-[10px] text-slate-400">{weekLbl} · {totalAktivitas} aktivitas · {totalJamMinggu}h produktif</div>
        </div>
        <button onClick={function(){setWeekOff(Math.min(weekOff+1,0));}} disabled={weekOff===0} className={'px-3 py-1.5 rounded-xl border border-slate-200 text-[11px] font-bold as st '+(weekOff===0?'bg-slate-50 text-slate-300 cursor-not-allowed':'bg-white text-slate-600')}>Depan →</button>
      </div>

      {/* ENTITY FILTER */}
      <div className="px-4 md:px-6 pt-3 pb-2 bg-white border-b border-slate-100">
        <div className="flex gap-1.5 flex-wrap">
          {[['all','🏢 Semua'],['RSP','🏠 RSP'],['BT','🧵 BT'],['TKB','🏗 TKB'],['Personal','👤 Personal']].map(function(opt){
            var isA=entityFilter===opt[0];
            return<button key={opt[0]} onClick={function(){setEntityFilter(opt[0]);}} className={'px-3 py-1 rounded-full text-[10px] font-bold as '+(isA?'bg-slate-900 text-white':'bg-slate-100 text-slate-500')}>{opt[1]}</button>;
          })}
        </div>
      </div>

      {totalAktivitas===0
        ?<div className="mx-4 mt-8 bg-white rounded-xl border border-slate-200 p-10 text-center"><div className="text-4xl mb-3 opacity-20">📅</div><div className="text-[13px] font-bold text-slate-400">Tidak ada aktivitas minggu ini</div><div className="text-[10px] text-slate-300 mt-1">Isi jadwal untuk melihat analisa</div></div>
        :<div>

        {/* SUMMARY CARDS */}
        <div className="px-4 md:px-6 pt-4 grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          {(function(){
            var cards=[
              {lbl:'Total Produktif',val:totalJamMinggu+'h',sub:totalAktivitas+' aktivitas',col:'#3b82f6',status:null},
              {lbl:'Finansial vs Target',val:pctFungsi['finansial']+'%',sub:'Target '+TB.finansial+'%',col:'#f43f5e',status:fStatus(pctFungsi['finansial'],TB.finansial)},
              {lbl:'Jam Konten (K4)',val:kontenJam+'h',sub:'External: '+extJam+'h',col:'#10b981',status:null},
              {lbl:'Budaya (K7)',val:engageCount+'×',sub:'Employee Engage sesi',col:'#a855f7',status:null},
            ];
            return cards.map(function(c,i){
              return(
                <div key={i} className="bg-white rounded-xl border border-slate-200 p-4 relative overflow-hidden" style={{boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
                  <div className="absolute top-0 right-0 w-1 h-full" style={{background:c.col}}/>
                  <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">{c.lbl}</div>
                  <div className="text-[26px] font-extrabold leading-none mb-1" style={{color:c.col}}>{c.val}</div>
                  <div className="text-[9px] text-slate-400">{c.sub}</div>
                  {c.status&&<span className={'mt-2 inline-block text-[9px] font-bold px-2 py-0.5 rounded-full border '+c.status.cls}>{c.status.lbl}</span>}
                </div>
              );
            });
          })()}
        </div>

        {/* HEATMAP K1-K7 */}
        <div className="mx-4 md:mx-6 mb-4 bg-white rounded-xl border border-slate-200 overflow-hidden" style={{boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
          <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between flex-wrap gap-2">
            <div>
              <div className="text-[12px] font-bold text-slate-800">Heatmap Aktivitas · K1–K7 per Hari</div>
              <div className="text-[9px] text-slate-400 mt-0.5">{weekLbl} · jam per jenis kegiatan</div>
            </div>
            <div className="flex gap-1.5 flex-wrap">
              {K_DEF.map(function(k){return<span key={k.id} className="text-[8px] font-bold px-1.5 py-0.5 rounded" style={{background:k.col+'22',color:k.col}}>{k.id}</span>;})}</div>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',minWidth:540}}>
              <thead>
                <tr style={{background:'#f8fafc',borderBottom:'1px solid #e2e8f0'}}>
                  <th style={{padding:'8px 12px',textAlign:'left',fontSize:9,color:'#94a3b8',fontWeight:700,width:130}}>Kategori</th>
                  {weekDates.map(function(d,i){return<th key={d} style={{padding:'8px 6px',textAlign:'center',fontSize:9,color:'#64748b',fontWeight:700,background:i===5?'#f8fafc':'inherit'}}>{dayLbls[i]}<br/><span style={{color:'#94a3b8',fontWeight:400}}>{d.slice(8)}/{d.slice(5,7)}</span></th>;})}
                  <th style={{padding:'8px 10px',textAlign:'center',fontSize:9,color:'#94a3b8',fontWeight:700}}>Total</th>
                </tr>
              </thead>
              <tbody>
                {K_DEF.map(function(k){
                  var rowTotal=heatTotals[k.id]||0;
                  return(
                    <tr key={k.id} style={{borderBottom:'1px solid #f1f5f9'}}>
                      <td style={{padding:'7px 12px',fontSize:10,fontWeight:600,color:'#334155',whiteSpace:'nowrap'}}>
                        <span style={{display:'inline-block',width:8,height:8,borderRadius:2,background:k.col,marginRight:6,verticalAlign:'middle'}}/>
                        {k.lbl}
                      </td>
                      {weekDates.map(function(d,i){
                        var h=heatMap[k.id][d]||0;
                        var st=cellSt(h,k.col);
                        return<td key={d} style={{padding:'5px 4px',textAlign:'center',background:i===5?'#fafafa':'inherit'}}>
                          <div style={{...st,borderRadius:6,padding:'5px 4px',fontSize:10,minHeight:26,display:'flex',alignItems:'center',justifyContent:'center'}}>{h?h+'h':'—'}</div>
                        </td>;
                      })}
                      <td style={{padding:'7px 10px',textAlign:'center',fontWeight:700,fontSize:11,color:rowTotal?'#334155':'#94a3b8'}}>{rowTotal?rowTotal+'h':'—'}</td>
                    </tr>
                  );
                })}
                <tr style={{background:'#f8fafc',borderTop:'2px solid #e2e8f0'}}>
                  <td style={{padding:'8px 12px',fontSize:10,fontWeight:700,color:'#1e293b'}}>Total/Hari</td>
                  {weekDates.map(function(d,i){
                    var dayTotal=Math.round(K_DEF.reduce(function(s,k){return s+(heatMap[k.id][d]||0);},0)*10)/10;
                    return<td key={d} style={{padding:'8px 6px',textAlign:'center',fontWeight:700,fontSize:10,color:dayTotal?'#1e293b':'#94a3b8',background:i===5?'#f1f5f9':'inherit'}}>{dayTotal?dayTotal+'h':'—'}</td>;
                  })}
                  <td style={{padding:'8px 10px',textAlign:'center',fontWeight:800,fontSize:11,color:'#1e293b'}}>{totalJamMinggu}h</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        {/* DISTRIBUSI + COVERAGE */}
        <div className="px-4 md:px-6 mb-4 grid grid-cols-1 lg:grid-cols-2 gap-4">

          {/* Distribusi per Jenis */}
          <div className="bg-white rounded-xl border border-slate-200 p-4" style={{boxShadow:'0 2px 8px rgba(0,0,0,0.05)'}}>
            <div className="text-[12px] font-bold text-slate-800 mb-0.5">Distribusi Aktivitas (Jam)</div>
            <div className="text-[9px] text-slate-400 mb-3">Per jenis kegiatan minggu ini</div>
            <div className="space-y-2">
              {(function(){
                var rows=K_DEF.map(function(k){return{lbl:k.lbl.split('·')[1].trim(),jam:heatTotals[k.id]||0,col:k.col};}).filter(function(r){return r.jam>0;}).sort(function(a,b){return b.jam-a.jam;});
                var maxH=rows.length?rows[0].jam:1;
                return rows.map(function(r){
                  var pct=Math.round(r.jam/totalJamMinggu*100);
                  return(
                    <div key={r.lbl} className="flex items-center gap-2">

function KonsistensiTab({jadwal}){
  var [weekOff,setWeekOff]=useState(0);
  var [expandEnt,setExpandEnt]=useState('RSP');
  function getMonStr(offset){var t=new Date();var dow=t.getDay();var m=new Date(t);m.setDate(t.getDate()-(dow===0?6:dow-1)+offset*7);return m.toISOString().slice(0,10);}
  var monStr=getMonStr(weekOff);
  var weekDates=[];
  for(var di=0;di<7;di++){var dd=new Date(monStr+'T12:00:00');dd.setDate(dd.getDate()+di);weekDates.push(dd.toISOString().slice(0,10));}
  var satStr=weekDates[5];
  var weekLbl=(function(){var m=new Date(monStr+'T12:00:00');var s=new Date(satStr+'T12:00:00');return m.getDate()+'–'+s.getDate()+' '+m.toLocaleDateString('id-ID',{month:'short'});})();
  var weekItems=[];
  weekDates.forEach(function(date){(jadwal[date]||[]).forEach(function(it){weekItems.push({id:it.id,_date:date,detailKegiatan:it.detailKegiatan||'',outputKeputusan:it.outputKeputusan||''});});});
  function matchRitual(rit){return weekItems.filter(function(it){var txt=(it.detailKegiatan+' '+it.outputKeputusan).toLowerCase();return rit.kw.some(function(k){return txt.indexOf(k)!==-1;});});}
  var ENT_COL={Personal:'#94a3b8',RSP:'#f43f5e',BT:'#3b82f6',TKB:'#f59e0b',Holding:'#a855f7'};
  var ENT_ICON={Personal:'👤',RSP:'🏠',BT:'🧵',TKB:'🧺',Holding:'🏢'};
  var ENTS=['Personal','RSP','BT','TKB','Holding'];
  var entData=ENTS.map(function(ent){
    var defs=RITUAL_DEFS[ent]||[];var totalPts=0;var achPts=0;
    var results=defs.map(function(rit){var matches=matchRitual(rit);var achieved=Math.min(rit.freq,matches.length);var status=matches.length===0?'miss':achieved>=rit.freq?'done':'partial';totalPts+=rit.freq;achPts+=achieved;return{rit:rit,matches:matches,achieved:achieved,status:status};});
    var pct=totalPts>0?Math.round(achPts/totalPts*100):null;
    var done=results.filter(function(r){return r.status==='done';}).length;
    var partial=results.filter(function(r){return r.status==='partial';}).length;
    var miss=results.filter(function(r){return r.status==='miss';}).length;
    return{ent:ent,results:results,pct:pct,done:done,partial:partial,miss:miss,total:defs.length,totalPts:totalPts,achPts:achPts};
  });
  var overallPts=entData.reduce(function(s,e){return s+e.totalPts;},0);
  var overallAch=entData.reduce(function(s,e){return s+e.achPts;},0);
  var overallPct=overallPts>0?Math.round(overallAch/overallPts*100):null;
  function scoreCol(p){return p===null?'#94a3b8':p>=80?'#10b981':p>=60?'#f59e0b':'#f43f5e';}
  function pctCls(p){return p===null?'text-stone-300':p>=80?'text-emerald-600':p>=60?'text-amber-600':'text-red-500';}
  function renderStatusBadge(status){if(status==='done')return<span className="text-[9px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded-full flex-shrink-0">✅</span>;if(status==='partial')return<span className="text-[9px] font-bold text-amber-600 bg-amber-50 border border-amber-200 px-1.5 py-0.5 rounded-full flex-shrink-0">⚠️</span>;return<span className="text-[9px] font-bold text-red-500 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded-full flex-shrink-0">❌</span>;}
  return(
    <div className="pb-8">
      <div className="px-4 md:px-6 pt-4 pb-3 flex items-center justify-between">
        <button onClick={function(){setWeekOff(weekOff-1);}} className="px-3 py-1.5 rounded-xl border border-stone-200 bg-white text-[11px] font-bold text-stone-600 as st">← Lalu</button>
        <div className="text-center"><div className="text-[12px] font-black text-stone-800">{weekLbl}</div><div className="text-[9px] text-stone-400">{weekItems.length} aktivitas</div></div>
        <button onClick={function(){setWeekOff(Math.min(weekOff+1,0));}} disabled={weekOff===0} className={'px-3 py-1.5 rounded-xl border border-stone-200 text-[11px] font-bold as st '+(weekOff===0?'bg-stone-50 text-stone-300 cursor-not-allowed':'bg-white text-stone-600')}>Depan →</button>
      </div>
      <div className="mx-4 md:mx-6 mb-4 bg-white border border-stone-200 rounded-2xl p-4 shadow-soft">
        <div className="flex items-center gap-4">
          <div className={'text-[40px] font-black leading-none '+pctCls(overallPct)}>{overallPct!==null?overallPct+'%':'–'}</div>
          <div className="flex-1">
            <div className="text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-1.5">Konsistensi Kuncian Jadwal · {weekLbl}</div>
            <div className="w-full h-2 bg-stone-100 rounded-full overflow-hidden mb-2"><div className="h-full rounded-full" style={{width:(overallPct||0)+'%',background:scoreCol(overallPct)}}/></div>
            <div className="flex gap-3 flex-wrap text-[10px]">
              <span className="text-emerald-600">✅ {entData.reduce(function(s,e){return s+e.done;},0)} penuh</span>
              <span className="text-amber-600">⚠️ {entData.reduce(function(s,e){return s+e.partial;},0)} partial</span>
              <span className="text-red-500">❌ {entData.reduce(function(s,e){return s+e.miss;},0)} tidak dilakukan</span>
            </div>
          </div>
        </div>
      </div>
      <div className="px-4 md:px-6 mb-4 grid grid-cols-2 md:grid-cols-5 gap-2.5">
        {entData.map(function(e){var col=scoreCol(e.pct);var isExp=expandEnt===e.ent;return(
          <button key={e.ent} onClick={function(){setExpandEnt(isExp?null:e.ent);}} className={'rounded-2xl p-3 text-left border as transition-all w-full '+(isExp?'shadow-md':'border-stone-200 bg-white shadow-soft')} style={isExp?{background:ENT_COL[e.ent]+'14',borderColor:ENT_COL[e.ent]+'55'}:{}}>
            <div className="flex items-center gap-1.5 mb-2"><span className="text-[13px]">{ENT_ICON[e.ent]}</span><span className="text-[10px] font-bold text-stone-600">{e.ent}</span></div>
            <div className="text-[22px] font-black leading-none mb-1" style={{color:col}}>{e.pct!==null?e.pct+'%':'–'}</div>
            <div className="text-[9px] text-stone-400 mb-2">{e.done}/{e.total} penuh</div>
            <div className="w-full h-1.5 bg-stone-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:(e.pct||0)+'%',background:col}}/></div>
          </button>
        );})}
      </div>
      {expandEnt&&(function(){var eData=null;for(var i=0;i<entData.length;i++){if(entData[i].ent===expandEnt){eData=entData[i];break;}}if(!eData)return null;var col=ENT_COL[expandEnt];
        return(<div className="mx-4 md:mx-6 bg-white border border-stone-200 rounded-2xl shadow-soft overflow-hidden">
          <div className="px-4 py-3 border-b border-stone-100 flex items-center gap-2.5" style={{borderLeftWidth:3,borderLeftColor:col}}>
            <span className="text-[16px]">{ENT_ICON[expandEnt]}</span>
            <div className="flex-1"><div className="text-[11px] font-extrabold text-stone-700">{expandEnt}</div><div className="text-[9px] text-stone-400">{eData.done} penuh · {eData.partial} partial · {eData.miss} tidak dilakukan</div></div>
            <div className="text-[22px] font-black" style={{color:scoreCol(eData.pct)}}>{eData.pct!==null?eData.pct+'%':'–'}</div>
          </div>
          <div className="divide-y divide-stone-100">
            {eData.results.map(function(row){return(
              <div key={row.rit.id} className="px-4 py-3">
                <div className="flex items-start gap-2">
                  {renderStatusBadge(row.status)}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap"><span className="text-[11px] font-bold text-stone-700">{row.rit.label}</span><span className="text-[9px] text-stone-400">{row.achieved}/{row.rit.freq}×</span></div>
                    {row.matches.length>0?(
                      <div className="mt-1 space-y-0.5">{row.matches.slice(0,3).map(function(it){return(<div key={it.id} className="flex items-center gap-2 text-[9px] text-stone-500"><span className="font-mono text-stone-400 flex-shrink-0">{it._date.slice(5)}</span><span className="truncate">{it.detailKegiatan.slice(0,65)}</span></div>);})}{row.matches.length>3&&<div className="text-[9px] text-stone-400 pl-1">+{row.matches.length-3} lainnya</div>}</div>
                    ):(
                      <div className="text-[9px] text-red-400 mt-0.5">Tidak ditemukan di jadwal minggu ini</div>
                    )}
                  </div>
                </div>
              </div>
            );})}
          </div>
        </div>);
      })()}
    </div>
  );
}

function PenilaianEATab({jadwal}){
  var allItems=[];
  Object.keys(jadwal||{}).sort().forEach(function(date){(jadwal[date]||[]).forEach(function(it){if(it.ea){allItems.push({id:it.id,_date:date,ea:it.ea,kategori:it.kategori||'',outputKeputusan:it.outputKeputusan||''});}});});
  function computeEA(name){
    var items=allItems.filter(function(it){return it.ea===name;});if(items.length===0)return null;
    var nonPersonal=items.filter(function(it){return it.kategori!=='Personal';});
    var filled=nonPersonal.filter(function(it){return it.outputKeputusan.trim().length>20;});
    var thin=items.filter(function(it){return it.outputKeputusan.trim().length<20;});
    var richItems=nonPersonal.filter(function(it){return it.outputKeputusan.trim().length>0;});
    var totalLen=richItems.reduce(function(s,it){return s+it.outputKeputusan.trim().length;},0);
    var avgRich=richItems.length>0?Math.round(totalLen/richItems.length):0;
    var fillRate=nonPersonal.length>0?Math.round(filled.length/nonPersonal.length*100):0;
    var thinRate=items.length>0?Math.round(thin.length/items.length*100):0;
    var richScore=Math.min(Math.round(avgRich/150*100),100);
    var score=Math.round(fillRate*0.5+richScore*0.3+(100-thinRate)*0.2);
    return{name:name,total:items.length,nonPersonal:nonPersonal.length,filled:filled.length,thin:thin.length,avgRich:avgRich,fillRate:fillRate,thinRate:thinRate,richScore:richScore,score:score};
  }
  function gradeCol(s){return s>=80?'#10b981':s>=65?'#3b82f6':s>=50?'#f59e0b':'#f43f5e';}
  function gradeLbl(s){return s>=80?'Sangat Baik':s>=65?'Baik':s>=50?'Cukup':'Perlu Perbaikan';}
  function renderRing(score,col){var sz=72;var r=(sz-10)/2;var c=2*Math.PI*r;var off=c*(1-score/100);return(<svg width={sz} height={sz} viewBox={'0 0 '+sz+' '+sz}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#f1f5f9" strokeWidth="8"/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={col} strokeWidth="8" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} transform={'rotate(-90 '+sz/2+' '+sz/2+')'}/><text x={sz/2} y={sz/2+7} textAnchor="middle" fontFamily="sans-serif" fontSize="20" fontWeight="700" fill="#1e293b">{score}</text></svg>);}
  function renderMetricBar(label,val,note){var col=val>=80?'#10b981':val>=60?'#f59e0b':'#f43f5e';return(<div className="mb-3"><div className="flex justify-between text-[11px] mb-1"><span className="text-stone-600 font-medium">{label}</span><span className="font-black" style={{color:col}}>{val}/100</span></div><div className="w-full h-2 bg-stone-100 rounded-full overflow-hidden"><div className="h-full rounded-full" style={{width:val+'%',background:col}}/></div>{note&&<div className="text-[9px] text-stone-400 mt-0.5 pl-2 border-l-2 border-stone-200 leading-relaxed">{note}</div>}</div>);}

function getWeekDays(){
  const days=[];const today=new Date();const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  for(let i=0;i<6;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push({dateStr:d.toISOString().slice(0,10),dayShort:d.toLocaleDateString('id-ID',{weekday:'short'}),num:d.getDate(),isToday:d.toISOString().slice(0,10)===todayStr()});}
  return days;
}

function AnalisaJadwal({backlog,jadwal}){
  var [loading,setLoading]=useState(false);
  var [result,setResult]=useState('');
  var [err,setErr]=useState('');

  // Build context for AI
  function buildCtx(){
    var today=todayStr();
    // Current week dates
    var t=new Date();var dow=t.getDay();
    var mon=new Date(t);mon.setDate(t.getDate()-(dow===0?6:dow-1));
    var weekDates=[];for(var i=0;i<6;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);weekDates.push(d.toISOString().slice(0,10));}
    // Computed metrics
    var jadwalLines=[];var totalJam=0;
    var jamFungsi={finansial:0,branding:0,operasional:0,riset:0,people:0};
    var JFMAP={'Deepwork Strategic':['finansial','branding','riset','people'],'Meeting Strategic/Problem Solving/Approval':['finansial','branding','riset','operasional'],'Meeting Review Operasional + Evaluasi Tim':['finansial','branding','riset','operasional','people'],'Bikin Konten':['branding','people'],'Genba':['riset','operasional'],'Ketemu External':['finansial','branding','riset','operasional','people'],'Employee Engage':['people']};
    weekDates.forEach(function(date){
      var items=(jadwal[date]||[]);
      if(items.length){
        jadwalLines.push(date+':');
        items.forEach(function(it){
          var h=getDur(it.jamMulai,it.jamSelesai);totalJam+=h;
          var fs=JFMAP[it.jenisKegiatan];if(fs){var share=h/fs.length;fs.forEach(function(f){jamFungsi[f]=(jamFungsi[f]||0)+share;});}
          jadwalLines.push('  '+it.jamMulai+'-'+it.jamSelesai+' ['+it.kategori+'/'+it.jenisKegiatan+'] '+it.detailKegiatan+(it.outputKeputusan?' ✓':''));
        });
      }
    });
    totalJam=Math.round(totalJam*10)/10;
    var pct={};Object.keys(jamFungsi).forEach(function(k){pct[k]=totalJam>0?Math.round(jamFungsi[k]/totalJam*100):0;});
    var metrikLines=[
      'Total jam: '+totalJam+'h',
      'Finansial: '+pct.finansial+'% (target 25%) '+(pct.finansial===0?'→ KRITIS':pct.finansial<15?'→ under':'→ OK'),
      'Branding: '+pct.branding+'% (target 25%) '+(pct.branding===0?'→ KRITIS':pct.branding<15?'→ under':'→ OK'),
      'Operasional: '+pct.operasional+'% (target 30%) '+(pct.operasional<18?'→ under':'→ OK'),
      'Riset: '+pct.riset+'% (target 15%) '+(pct.riset===0?'→ KRITIS':pct.riset<8?'→ under':'→ OK'),
      'People: '+pct.people+'% (target 5%)',
    ];
    var urgent=backlog.filter(function(b){return b.status==='baru'&&!b.needFeedback&&!b.pdcaFlag;}).slice(0,8);
    var blLines=urgent.map(function(b){return'- '+(b.postponeCount>=3?'[POSTPONE '+b.postponeCount+'x] ':'')+b.isi+(b.deadline?' dl:'+b.deadline:'');});
    return 'Hari ini: '+today+'\n\nMETRIK:\n'+metrikLines.join('\n')+'\n\nJADWAL:\n'+(jadwalLines.length?jadwalLines.join('\n'):'(kosong)')+'\n\nBACKLOG:\n'+(blLines.length?blLines.join('\n'):'(kosong)');
  }

  async function run(){
    setLoading(true);setErr('');setResult('');
    try{
      var ctx=buildCtx();
      var prompt='Kamu PDCA Manager RSP. Evaluasi minggu CEO Pak Ibnu.\n\n'+ctx+'\n\nFormat 3 section:\n\n## Ringkasan Eksekutif\n3 kalimat: total jam + fungsi kritis. Masalah terbesar. Satu hal positif. Langsung.\n\n## Temuan Minggu Ini\n| Fungsi | Status | Catatan |\n|---|---|---|\nIsi 6 baris: Finansial/Branding/Operasional/Riset/People/Backlog. Status: Kritis/Under/OK\n\n## Rekomendasi Jadwal\n| Aktivitas | Jenis | Kapan | Alasan |\n|---|---|---|---|\n4-5 rekomendasi konkret berdasarkan gap KPI.';
      var txt=await callAI([{role:'user',content:prompt}],2000);
      setResult(txt.trim());
    }catch(e){setErr('Gagal: '+e.message);}
    setLoading(false);
  }

  // Parse markdown table to JSX
  function renderMdTable(text){
    var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.startsWith('|');});
    if(lines.length<2)return null;
    var headers=lines[0].split('|').map(function(c){return c.trim();}).filter(Boolean);
    var rows=lines.slice(2).map(function(l){return l.split('|').map(function(c){return c.trim();}).filter(Boolean);});
    return(
      <div className="overflow-x-auto">
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
          <thead><tr style={{background:'#1e293b',color:'white'}}>
            {headers.map(function(h,i){return<th key={i} style={{padding:'8px 12px',textAlign:'left',fontSize:10,fontWeight:700,letterSpacing:'0.05em'}}>{h}</th>;})}
          </tr></thead>
          <tbody>
            {rows.map(function(row,ri){return(
              <tr key={ri} style={{background:ri%2===0?'#ffffff':'#f8fafc',borderBottom:'1px solid #e2e8f0'}}>
                {headers.map(function(_,ci){
                  var cell=row[ci]||'';
                  var bg=cell.indexOf('🔴')!==-1?'#fff1f2':cell.indexOf('⚠')!==-1?'#fffbeb':cell.indexOf('✅')!==-1?'#f0fdf4':cell.indexOf('Kritis')!==-1?'#fff1f2':cell.indexOf('Under')!==-1?'#fffbeb':'';
                  return<td key={ci} style={{padding:'9px 12px',color:'#334155',lineHeight:1.5,background:bg||'inherit'}}>{cell}</td>;
                })}
              </tr>
            );})}
          </tbody>
        </table>
      </div>
    );
  }

  function renderResult(){
    if(!result)return null;
    var sections=[];
    var curTitle='';var curLines=[];
    result.split('\n').forEach(function(line){
      if(line.match(/^##\s/)){
        if(curLines.length)sections.push({title:curTitle,lines:curLines});
        curTitle=line.replace(/^##\s*/,'');curLines=[];
      } else {curLines.push(line);}
    });
    if(curLines.length)sections.push({title:curTitle,lines:curLines});
    if(!sections.length)sections=[{title:'',lines:result.split('\n')}];
    return sections.map(function(sec,i){
      var tableText=sec.lines.join('\n');
      var rendered=renderMdTable(tableText);
      return(
        <div key={i} className="mb-5">
          {sec.title&&<div className="text-[11px] font-extrabold text-slate-700 uppercase tracking-widest mb-2 flex items-center gap-2"><span className="w-1 h-4 rounded bg-slate-900 inline-block"/>{sec.title}</div>}
          {rendered
            ?<div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">{rendered}</div>
            :<div className="text-[12px] text-slate-700 bg-white rounded-xl border border-slate-200 p-4 leading-relaxed whitespace-pre-wrap">{tableText.trim()}</div>}
        </div>
      );
    });
  }


  return(
    <div className="pb-10">
      <div className="px-4 md:px-6 pt-4 pb-3 border-b border-slate-200 flex items-center justify-between">
        <div>
          <div className="text-[13px] font-bold text-slate-800">Analisa + Rekomendasi</div>
          <div className="text-[10px] text-slate-400 mt-0.5">AI baca jadwal &amp; backlog minggu ini → flag masalah + rekomendasi</div>
        </div>
        <button onClick={run} disabled={loading} className={'px-4 py-2 rounded-xl text-[11px] font-bold as st '+(loading?'bg-slate-200 text-slate-400 cursor-not-allowed':'bg-slate-900 text-white')}>
          {loading?'Menganalisa...':'🤖 Analisa Sekarang'}
        </button>
      </div>
      <div className="px-4 md:px-6 pt-4">
        {err&&<div className="mb-3 px-4 py-3 bg-rose-50 border border-rose-200 rounded-xl text-[11px] text-rose-600 font-medium">{err}</div>}
        {!result&&!loading&&!err&&(
          <div className="text-center py-12">
            <div className="text-4xl mb-3 opacity-20">🤖</div>
            <div className="text-[13px] font-bold text-slate-400 mb-1">Belum ada analisa</div>
            <div className="text-[10px] text-slate-400">Klik "Analisa Sekarang" untuk mendapat temuan dan rekomendasi jadwal minggu ini</div>
          </div>
        )}
        {loading&&(
          <div className="text-center py-12">
            <div className="text-3xl mb-3 animate-pulse">🤖</div>
            <div className="text-[12px] font-bold text-slate-500">Membaca jadwal dan backlog...</div>
            <div className="text-[10px] text-slate-400 mt-1">Biasanya 5-10 detik</div>
          </div>
        )}
        {result&&!loading&&<div>{renderResult()}</div>}
      </div>
    </div>
  );
}


function MoMList({mom,onDelete,onUpdateMom,onAddKeputusan}){

  const [reviewForms,setReviewForms]=useState({});
  const sorted=[...mom].sort((a,b)=>b.tanggal.localeCompare(a.tanggal));

  function updateItemStatus(momId,itemId,patch){
    const entry=mom.find(m=>m.id===momId);if(!entry)return;
    const newItems=entry.items.map(it=>it.id===itemId?{...it,...patch}:it);
    onUpdateMom(momId,{items:newItems});
  }

  function saveHasil(momEntry,item){
    const txt=hasilTexts[item.id]||'';if(!txt.trim())return;
    updateItemStatus(momEntry.id,item.id,{hasil:txt,status:'selesai',_localHasil:true});
    onAddKeputusan({
      id:'KP-'+genId(),

      backlogId:null,
      konteks:momEntry.meetingName.slice(0,50),
      deskripsi:item.action,
      fungsiKPI:'operasional',
      dampak:item.jenis==='Immediately'?'tinggi':'sedang',
      status:'disampaikan',
      output:txt,
      updateTL:'',
      sumber:'MoM: '+momEntry.meetingName
    });
    setHasilTexts(p=>({...p,[item.id]:''}));
    setExpItemId(null);
  }

  function saveDecision(momEntry,item){
    var form=decisionForms[item.id]||{};
    if(!form.domain)return;
    updateItemStatus(momEntry.id,item.id,{isDecision:true,domain:form.domain,ekspektasiY:form.ekspektasiY||'',pdcaCheck:'belum'});
    setDecisionExpId(null);
  }
  function savePdcaCheck(momEntry,item,check){
    updateItemStatus(momEntry.id,item.id,{pdcaCheck:check});
  }

    updateItemStatus(momEntry.id,item.id,{isDecision:false,domain:null,ekspektasiY:'',pdcaCheck:null});
  }

  const STATUS_CFG={

function exportCSV(filename,headers,rows){
  var csv=[headers.join(',')].concat(rows.map(function(r){
    return r.map(function(v){var s=String(v===null||v===undefined?'':v);return'"'+s.replace(/"/g,'""')+'"';}).join(',');
  })).join('\n');
  var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

  function pullFromGCal(dateMin,dateMax){
    if(!gTok||!gCalId){alert('Connect Google Calendar dulu di ⚙️');return;}
    setPulling(true);
    fetchGCalEvents(gTok,gCalId,dateMin,dateMax).then(function(evs){
      var byDate={};
      evs.forEach(function(ev){
        if(!ev.start)return;
        var item=gCalEventToJadwal(ev);
        if(!item.tanggal)return;
        if(!byDate[item.tanggal])byDate[item.tanggal]=[];
        byDate[item.tanggal].push(item);
      });
      // Merge dengan jadwal yang sudah ada — pakai functional update agar dapat state terbaru
      setJadwal(function(currentJadwal){
        var n={...currentJadwal};
        // Kumpulkan semua gcalEventId yang balik dari GCal
        var returnedIds={};
        evs.forEach(function(ev){if(ev.id)returnedIds[ev.id]=true;});
        // Tandai orphan: ada di app + punya gcalEventId + gak ada di response + tanggal dalam range pull
        Object.keys(n).forEach(function(date){
          if(date>=dateMin&&date<=dateMax){
            n[date]=(n[date]||[]).map(function(it){
              if(it.gcalEventId&&!returnedIds[it.gcalEventId])return{...it,gcalOrphaned:true};
              if(it.gcalOrphaned&&it.gcalEventId&&returnedIds[it.gcalEventId])return{...it,gcalOrphaned:false};
              return it;
            });
          }
        });
        Object.keys(byDate).forEach(function(date){
          if(!n[date])n[date]=[];
          var existing=n[date].map(function(it){return it.gcalEventId;}).filter(Boolean);
          byDate[date].forEach(function(item){
            if(!item.gcalEventId||!existing.includes(item.gcalEventId)){
              n[date].push(item);
            } else {
              n[date]=n[date].map(function(it){
                return it.gcalEventId===item.gcalEventId?{...it,jamMulai:item.jamMulai,jamSelesai:item.jamSelesai,detailKegiatan:item.detailKegiatan,gcalDesc:item.gcalDesc,gcalOrphaned:false}:it;
              });
            }
          });
        });
        // Save ke localStorage DAN Supabase sekaligus — cegah auto-poll overwrite
        sv('jadwal',n);
        sbSave('jadwal',n);
        return n;
      });
      setPulling(false);
      var pullTs=new Date().toISOString();setLastGCalPull(pullTs);sv('lastGCalPull',pullTs);
      alert('✅ '+evs.length+' event berhasil diimport dari Google Calendar!');

              <div className="text-[10px] font-semibold text-stone-400">PT Raja Sukses Properindo · {new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'short'})}</div>
            </div>
            {/* Desktop: show current tab name */}
            <div className="hidden md:block">
              <div className="text-[18px] font-extrabold text-stone-900 tracking-tight">{AT&&AT.id==='dashboard'?'Dashboard KPI':AT&&AT.id==='jadwal'?'Jadwal CEO':AT&&AT.id==='dump'?'Dump Think':AT&&AT.id==='backlog'?'Backlog':AT&&AT.id==='resume'?'Resume Agenda':'CEO GTD OS'}</div>
              <div className="text-[11px] text-stone-400 font-medium mt-0.5">{new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div className="flex items-center gap-2">
              <div className={`px-3 py-1.5 rounded-full text-[10px] font-bold flex items-center gap-1.5 border ${nc>0?'bg-red-50 text-red-600 border-red-200 shadow-sm':'bg-stone-100 text-stone-500 border-stone-200'}`}>
                <span>{backlog.length} total</span>
                {nc>0&&<><span className="w-1 h-1 rounded-full bg-red-500"/><span>{nc} baru</span></>}
              </div>
              <button onClick={function(){if(getSB())pullFromSB();}} className="w-8 h-8 rounded-full flex items-center justify-center text-[13px] border as st bg-stone-100 border-stone-200 text-stone-500" title="Sync dari Supabase">🔄</button>
              <button onClick={()=>setShowSettings(true)} className={`w-8 h-8 rounded-full flex items-center justify-center text-[14px] border as st ${!getApiKey()?'bg-amber-50 border-amber-200 text-amber-600':'bg-stone-100 border-stone-200 text-stone-500'}`} title="Pengaturan & API Key">⚙️</button>
            </div>
          </div>
          {/* Sub-tabs */}
          {AT&&AT.subs&&(
            <div className="flex bg-stone-50/80 border-t border-stone-200 md:px-2">
              {AT.subs.map(s=>(
                <button key={s.id} className={`flex-1 md:flex-none md:px-6 py-2.5 text-[11px] font-bold st relative flex items-center justify-center gap-1.5 ${sub[tab]===s.id?'text-stone-900':'text-stone-400'}`} onClick={()=>setST(tab,s.id)}>
                  {s.lbl}
                  {s.id==='keputusan'&&belumCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-amber-500 text-white text-[8px] font-black rounded-full">{belumCount}</span>}
                  {s.id==='need_feedback'&&nfCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-violet-600 text-white text-[8px] font-black rounded-full">{nfCount}</span>}
                  {s.id==='kamar_pa'&&paQueueCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-blue-500 text-white text-[8px] font-black rounded-full">{paQueueCount}</span>}
                  {s.id==='pdca'&&pdcaCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-stone-600 text-white text-[8px] font-black rounded-full">{pdcaCount}</span>}
                  {sub[tab]===s.id&&<div className="absolute bottom-0 left-1/4 right-1/4 md:left-4 md:right-4 h-0.5 bg-stone-800 rounded-t-md"/>}
                </button>
              ))}
            </div>
          )}
          {/* Filter chips — jadwal only */}
          {tab==='jadwal'&&<div className="px-3 py-2 flex items-center gap-1.5 flex-wrap border-t border-stone-100 bg-white/90 backdrop-blur overflow-x-auto">
            {[['RSP','bg-blue-100 text-blue-700 border-blue-200'],['BT','bg-emerald-100 text-emerald-700 border-emerald-200'],['TKB','bg-amber-100 text-amber-700 border-amber-200'],['Personal','bg-stone-100 text-stone-600 border-stone-300']].map(([k,ac])=>(
              <button key={k} onClick={()=>toggleKat(k)} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.kategori.indexOf(k)!==-1?ac:'bg-white text-stone-300 border-stone-200'}`}>{k}</button>
            ))}
            <div className="w-px h-4 bg-stone-200 flex-shrink-0 mx-0.5"/>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumOutput:!f.belumOutput}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumOutput?'bg-amber-100 text-amber-700 border-amber-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Output</button>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumSiap:!f.belumSiap}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumSiap?'bg-red-100 text-red-600 border-red-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Siap</button>
            {(jadwalFilter.kategori.length>0||jadwalFilter.belumOutput||jadwalFilter.belumSiap)&&<button onClick={()=>setJadwalFilter({kategori:[],belumOutput:false,belumSiap:false})} className="px-2 py-1 rounded-full text-[9px] font-bold border border-stone-200 bg-stone-50 text-stone-400 as st flex-shrink-0 ml-auto">Reset ✕</button>}
          </div>}
        </div>

        {/* Content */}
        <div className="flex-1 pb-24 md:pb-8 md:max-w-5xl md:w-full md:mx-auto md:px-0">
          {tab==='dashboard'&&<Dashboard weekly={dashWeekly} kpiCorp={kpiCorp} dashMonth={dashMonth} onChangeMonth={setDashMonth} booking={booking} backlog={backlog} jadwal={jadwal}/>}
          {tab==='jadwal'&&sub.jadwal==='harian'&&<JadwalHarian backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onRemoveJadwal={removeFromJadwal} onUpdateJadwal={updateJadwal} onUpdate={updI} onAddKeputusan={addK} filter={jadwalFilter} gcalOn={!!(gTok&&gCalId)} onPushItem={pushItem} onPushDay={pushDay} onAddMomBatch={batchAddMom} lastGCalPull={lastGCalPull} onAddBacklog={addI}/>}
          {tab==='jadwal'&&sub.jadwal==='mingguan'&&<JadwalMingguan backlog={backlog} jadwal={jadwal} filter={jadwalFilter} onUpdateJadwal={updateJadwal} onRemoveJadwal={removeFromJadwal} onUpdateBacklog={updI}/>}
          {tab==='jadwal'&&sub.jadwal==='bulanan'&&<JadwalBulanan jadwal={jadwal} filter={jadwalFilter}/>}
          {tab==='dump'&&<DumpPage onAdd={addI} onAddKeputusan={addK} onAddJadwal={addToJadwal} onBatchAddJadwal={batchAddToJadwal} onUpdateJadwal={updateJadwal} onResetICSBatch={resetJadwalBatch} onSaveKpiCorp={saveKpiCorp} onSaveKpiCeo={saveKpiCeo} onSaveBooking={saveBooking} onAddMom={addMom} jadwal={jadwal} backlog={backlog} onDone={()=>{setTab('backlog');setST('backlog','backlog');}}/>}
          {tab==='backlog'&&sub.backlog==='need_feedback'&&<NeedFeedbackTab backlog={backlog} onUpdate={updI} onAddKeputusan={addK} mom={mom} onUpdateMom={updMom} onAddBacklog={addI} onAddSampah={function(item){var ns=[item,...sampah];setSampah(ns);sv('sampah',ns);}}/>}
          {tab==='backlog'&&sub.backlog==='backlog'&&<BacklogList backlog={backlog} onUpdate={updI} onDelete={delI} onAddKeputusan={addK} onAddMom={addMom}/>}
          {tab==='backlog'&&sub.backlog==='kamar_pa'&&<KamarPATab backlog={backlog} onUpdateBacklog={updI} onAddJadwal={addToJadwal}/>}
          {tab==='backlog'&&sub.backlog==='keputusan'&&<Keputusan keputusan={keputusan} onUpdate={updK} onDelete={delK} onAddKeputusan={addK} onUpdateBacklog={updI} onAddBacklog={addI}/>}
          {tab==='backlog'&&sub.backlog==='pdca'&&<PdcaTab backlog={backlog} jadwal={jadwal} onUpdateBacklog={updI} mom={mom} onUpdateMom={updMom} onDeleteMom={delMom} onAddKeputusan={addK} onSyncMom={trusmiKey?syncTrusmiMom:null} syncingMom={syncingMom} lastMomSync={lastMomSync} onResetMomSync={trusmiKey?function(){var kept=(mom||[]).filter(function(m){return!m._trusmiId;});setMom(kept);sv('mom',kept);sbSave('mom',kept);setLastMomSync('');sv('lastMomSync','');}:null}/>}
          {tab==='backlog'&&sub.backlog==='arsip'&&<RiwayatSampahTab sampah={sampah} onRestore={restoreSampah} onHardDel={hardDelSampah}/>}
          {tab==='resume'&&sub.resume==='analisa'&&<AnalisaTab backlog={backlog} jadwal={jadwal} kpiCorp={kpiCorp} dashMonth={dashMonth} mom={mom} kpiCeo={kpiCeo} targetBobot={targetBobot}/>}
          {tab==='resume'&&sub.resume==='rekomendasi'&&<AnalisaJadwal backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onAddBacklog={addI} onUpdateBacklog={updI}/>}
          {tab==='resume'&&sub.resume==='konsistensi'&&<KonsistensiTab jadwal={jadwal}/>}
          {tab==='resume'&&sub.resume==='ea'&&<PenilaianEATab jadwal={jadwal}/>}
          {tab==='resume'&&sub.resume==='log'&&<LogAktivitasTab jadwal={jadwal}/>}
        </div>

        {/* ── MOBILE BOTTOM NAV (hidden on desktop) ── */}
        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-200 z-50 rounded-t-3xl shadow-nav">
          <div className="flex justify-between items-end h-[68px] relative px-2">
            {[TABS[0],TABS[1]].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} className={`flex flex-col items-center flex-1 pb-3 st ${tab===t.id?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
                <span className="text-[22px] mb-1">{t.ico}</span>
                <span className={`text-[9px] ${tab===t.id?'font-extrabold':'font-semibold'}`}>{t.lbl}</span>
              </button>
            ))}
            <div className="flex-1 flex justify-center pb-5 relative">
              <button onClick={()=>setTab('dump')} className={`absolute bottom-5 w-14 h-14 rounded-full flex items-center justify-center text-[26px] shadow-fab border-[3px] border-white z-50 st as ${tab==='dump'?'bg-stone-900 text-white rotate-45':'bg-stone-800 text-white'}`}>{tab==='dump'?'✕':'＋'}</button>
            </div>
            <button onClick={()=>setTab('backlog')} className={`flex flex-col items-center flex-1 pb-3 relative st ${tab==='backlog'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              {nc>0&&<span className="absolute top-1.5 right-4 w-2 h-2 bg-red-500 rounded-full border border-white"/>}
              <span className="text-[22px] mb-1">📋</span>
              <span className={`text-[9px] ${tab==='backlog'?'font-extrabold':'font-semibold'}`}>Backlog</span>
            </button>
            <button onClick={()=>setTab('resume')} className={`flex flex-col items-center flex-1 pb-3 st ${tab==='resume'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              <span className="text-[22px] mb-1">📈</span>
              <span className={`text-[9px] ${tab==='resume'?'font-extrabold':'font-semibold'}`}>Resume</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
