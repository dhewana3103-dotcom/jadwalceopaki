                  <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Detail Kegiatan</div>
                  <textarea className="w-full px-2.5 py-2 rounded-xl border border-stone-200 text-[12px] focus:outline-none focus:ring-1 focus:ring-stone-400 resize-y" rows={2} value={ef.detailKegiatan||''} onChange={function(e){setEf(function(p){return{...p,detailKegiatan:e.target.value};});}}/>
                </div>
                <div>
                  <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Relate KPI</div>
                  <select className="w-full px-2 py-1.5 rounded-xl border border-stone-200 text-[11px] focus:outline-none" value={ef.relateMilestone||'operasional'} onChange={function(e){setEf(function(p){return{...p,relateMilestone:e.target.value};});}}>
                    {KPI5.map(function(k){return<option key={k.id} value={k.id}>{k.label}</option>;})}
                  </select>
                </div>
                <div>
                  <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Deskripsi Calendar</div>
                  <textarea className="w-full px-2.5 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-1 focus:ring-stone-400 resize-y" rows={3} placeholder="Objective, attendees, agenda, context..." value={ef.gcalDesc||''} onChange={function(e){setEf(function(p){return{...p,gcalDesc:e.target.value};});}}/>
                </div>
              </>}
              {!fromBL&&!isMeeting&&<div>
                <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Output / Keputusan (5W1H)</div>
                <textarea className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] focus:outline-none focus:ring-1 focus:ring-emerald-400 resize-y" rows={4} placeholder="Isi output 5W1H: What/Who/When/Why/How" value={outVal} onChange={function(e){var v=e.target.value;setOutTexts(function(p){var n={...p};n[item.id]=v;return n;});}}/>
              </div>}
              {!fromBL&&isMeeting&&<div className="px-3 py-3 rounded-xl bg-stone-50 border border-stone-200 text-center">
                <div className="text-[10px] text-stone-400">📥 Import MoM setelah meeting selesai</div>
                <div className="text-[10px] text-stone-400 mt-0.5">via Dump Think → Import MoM</div>
              </div>}
              <div className="flex gap-2 items-center pt-1 flex-wrap">
                {!fromBL&&<button className="px-3 py-2 rounded-xl bg-red-50 text-red-500 border border-red-200 text-[10px] font-bold as st" onClick={function(){if(confirm('Hapus kegiatan ini?'))onRemoveJadwal(today,item.id);setExpandId(null);}}>🗑️ Hapus</button>}
                {!fromBL&&gcalOn&&<button className={`px-3 py-2 rounded-xl text-[10px] font-bold border as st ${item.gcalEventId?'bg-emerald-50 text-emerald-600 border-emerald-200':'bg-blue-50 text-blue-600 border-blue-200'}`} onClick={function(){onPushItem(item,function(patch){onUpdateJadwal(today,item.id,patch);}).then(function(ok){alert(ok?(item.gcalEventId?'Event diupdate!':'Masuk Calendar!'):'Gagal. Cek koneksi');});}}>{item.gcalEventId?'📅 Update Cal':'📅 Push Cal'}</button>}
                <div className="flex-1"/>
                <button className="px-4 py-2 rounded-xl border border-stone-200 text-[10px] font-bold text-stone-500 as st bg-white" onClick={function(){setExpandId(null);}}>Tutup</button>
                {!fromBL&&<button className="px-4 py-2 rounded-xl bg-stone-900 text-white text-[10px] font-bold as st" onClick={function(){saveEdit();}}>💾 Simpan{gcalOn&&item.gcalEventId?' + Cal':''}</button>}
                {!fromBL&&!isMeeting&&<button className={`px-4 py-2 rounded-xl text-[10px] font-bold as st ${!outReady?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-emerald-600 text-white'}`} onClick={function(){saveOutput(item);}} disabled={!outReady}>✓ Simpan Output</button>}
              </div>
            </div>
          </div>
        </td>
      </tr>
    );
  }

  function AddForm({blokId}){
    const blok=BLOKS.find(function(b){return b.id===blokId;});
    const defJam=blok?blok.time.split('--').map(function(t){return t.trim().padStart(2,'0')+':00';}):['08:00','10:00'];
    const [lf,setLf]=useState({...EMPTY_F,jamMulai:defJam[0]||'08:00',jamSelesai:defJam[1]||'09:00'});
    function upd(k,v){setLf(function(p){return {...p,[k]:v};});}
    return(
      <div className={`border-t ${blok&&blok.border?blok.border:'border-stone-200'} bg-stone-50/50 p-3 afi`}>
        <div className="flex gap-2 mb-3">
          <div className="flex-1"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Jam Mulai</div><input type="time" className="w-full px-2 py-1.5 rounded-lg border border-stone-200 bg-white text-[12px] font-mono focus:outline-none focus:ring-1 focus:ring-stone-400" value={lf.jamMulai} onChange={function(e){upd('jamMulai',e.target.value);}}/></div>
          <div className="flex-1"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Jam Selesai</div><input type="time" className="w-full px-2 py-1.5 rounded-lg border border-stone-200 bg-white text-[12px] font-mono focus:outline-none focus:ring-1 focus:ring-stone-400" value={lf.jamSelesai} onChange={function(e){upd('jamSelesai',e.target.value);}}/></div>
        </div>
        <div className="mb-3"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Kategori</div><div className="flex gap-1.5 flex-wrap">{KATEGORI_ORG.map(function(k){return<button key={k} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border st as ${lf.kategori===k?'bg-stone-800 text-white border-stone-800 shadow-sm':'bg-white text-stone-600 border-stone-200'}`} onClick={function(){upd('kategori',k);if(k==='Personal')upd('jenisKegiatan','Personal');else if(lf.jenisKegiatan==='Personal')upd('jenisKegiatan','Deepwork Strategic');}}>{k}</button>;})}</div></div>
        <div className="mb-3"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Jenis Kegiatan</div><select className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] font-medium focus:outline-none" value={lf.jenisKegiatan} onChange={function(e){upd('jenisKegiatan',e.target.value);}}>{(lf.kategori==='Personal'?['Personal']:JENIS_KEGIATAN.filter(function(j){return j!=='Personal';})).map(function(j){return<option key={j} value={j}>{j}</option>;})}</select></div>
        <div className="mb-3"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Detail Kegiatan *</div><textarea className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[12px] focus:outline-none focus:ring-1 focus:ring-stone-400 resize-none" rows={2} placeholder="Apa yang akan dilakukan?" value={lf.detailKegiatan} onChange={function(e){upd('detailKegiatan',e.target.value);}}/></div>
        <div className="mb-4"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Relate KPI</div><div className="flex gap-1.5 flex-wrap">{KPI5.map(function(k){return<button key={k.id} className={`px-2.5 py-1.5 rounded-lg text-[10px] font-bold border st as ${lf.relateMilestone===k.id?`${k.bg} ${k.color} ${k.border} shadow-sm`:'bg-white text-stone-500 border-stone-200'}`} onClick={function(){upd('relateMilestone',k.id);}}>{k.short}</button>;})}</div></div>
        <div className="flex gap-2">
          <button className="flex-1 py-2 rounded-xl border border-stone-200 bg-white text-[11px] font-bold text-stone-500 as st" onClick={function(){setAddingBlok(null);}}>Batal</button>
          <button className={`flex-2 py-2 px-4 rounded-xl text-[11px] font-bold as st ${!lf.detailKegiatan.trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-800 text-white'}`} onClick={function(){if(!lf.detailKegiatan.trim())return;onAddJadwal(today,{id:'SJ-'+genId(),tanggal:today,...lf,outputKeputusan:''});setAddingBlok(null);}} disabled={!lf.detailKegiatan.trim()}>+ Tambahkan</button>
        </div>
      </div>
    );
  }

  // Past = sudah selesai, bukan lintas tengah malam (jamMulai < jamSelesai)
  const pastItems=dayItems.filter(function(it){
    if(getItemState(it)!=='past')return false;
    // Skip overnight items (jamMulai > jamSelesai, misal 23:00-05:00)
    if(it.jamMulai&&it.jamSelesai&&timeToMin(it.jamMulai)>timeToMin(it.jamSelesai))return false;
    return true;
  });
  const currentItems=dayItems.filter(function(it){return getItemState(it)==='current';});
  const upcomingItems=dayItems.filter(function(it){
    if(getItemState(it)!=='upcoming')return false;
    // Skip overnight items shown as upcoming (they already happened)
    if(it.jamMulai&&it.jamSelesai&&timeToMin(it.jamMulai)>timeToMin(it.jamSelesai))return false;
    return true;
  });
  // lastPast = item dengan jamMulai terbesar (paling dekat ke sekarang)
  const lastPast=pastItems.length>0?pastItems.slice().sort(function(a,b){return timeToMin(b.jamMulai)-timeToMin(a.jamMulai);})[0]:null;
  const currentItem=currentItems[0]||null;
  const nextItem=upcomingItems[0]||null;

  return(
    <div className="afi pb-4">
      <div className="px-4 pt-4 pb-3 md:px-6">
        {/* Date navigator */}
        <div className="flex items-center gap-2 mb-2">
          <button className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[14px] font-bold text-stone-600 as st flex items-center justify-center flex-shrink-0" onClick={function(){var d=new Date(selectedDate+'T12:00:00');d.setDate(d.getDate()-1);setSelectedDate(d.toISOString().slice(0,10));}}>‹</button>
          <div className="flex-1 relative">
            <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full" value={selectedDate} onChange={function(e){if(e.target.value)setSelectedDate(e.target.value);}}/>
            <div className={`px-3 py-2 rounded-xl border text-center cursor-pointer ${isToday?'bg-stone-900 border-stone-900 text-white':'bg-white border-stone-200 text-stone-700'}`}>
              <div className="text-[13px] font-extrabold">{dayName}</div>
              {!isToday&&<div className="text-[9px] font-semibold mt-0.5 opacity-70">Tap untuk ganti tanggal</div>}
            </div>
          </div>
          <button className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[14px] font-bold text-stone-600 as st flex items-center justify-center flex-shrink-0" onClick={function(){var d=new Date(selectedDate+'T12:00:00');d.setDate(d.getDate()+1);setSelectedDate(d.toISOString().slice(0,10));}}>›</button>
          {!isToday&&<button className="px-2.5 py-2 rounded-xl bg-stone-800 text-white text-[10px] font-bold as st flex-shrink-0" onClick={function(){setSelectedDate(todayActual);}}>Hari ini</button>}
        </div>
        {/* Meta info */}
        <div className="flex justify-between items-center">
          <div className="text-[11px] font-medium text-stone-400">{dayItems.length} kegiatan{hiddenCount>0?' · '+hiddenCount+' disembunyikan':''}{isToday?' · '+nowStr:''}</div>
          <div className="flex items-center gap-2">
            {gcalOn&&<button className="px-2.5 py-1 rounded-lg bg-blue-50 border border-blue-200 text-[10px] font-bold text-blue-600 as st" onClick={function(){onPushDay(today);}}>📅 Push</button>}
            <button className="px-2.5 py-1 rounded-lg bg-stone-100 border border-stone-200 text-[10px] font-bold text-stone-600 as st" onClick={function(){setShowExport(function(p){return !p;});}}>⬇️ Export</button>
            {showExport&&<div className="absolute right-4 mt-1 bg-white border border-stone-200 rounded-2xl shadow-float z-30 overflow-hidden afi" style={{minWidth:160}}>
              <div className="px-3 py-2 text-[9px] font-extrabold text-stone-400 uppercase tracking-wider border-b border-stone-100">Export Jadwal CSV</div>
              {[['today','Hari ini'],['week','Minggu ini'],['all','Semua data']].map(function(r){return(
                <button key={r[0]} className="w-full text-left px-3 py-2.5 text-[11px] font-medium text-stone-700 hover:bg-stone-50 border-b border-stone-100 last:border-0 as" onClick={function(){exportJadwalCSV(jadwal,backlog,r[0]);setShowExport(false);}}>{r[1]}</button>
              );})}
            </div>}
          </div>
        </div>
      </div>


      {/* Now banner */}
      {isToday&&currentItem&&<div className="mx-4 md:mx-6 mb-3 px-3 py-2 bg-blue-50 border border-blue-200 rounded-xl flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse flex-shrink-0"/>
        <span className="text-[11px] font-bold text-blue-700 flex-1">{currentItem.detailKegiatan}</span>
        <span className="text-[10px] text-blue-500 tabular-nums whitespace-nowrap">{currentItem.jamMulai}–{currentItem.jamSelesai}</span>
      </div>}
      {isToday&&!currentItem&&nextItem&&<div className="mx-4 md:mx-6 mb-3 px-3 py-2 bg-stone-50 border border-stone-200 rounded-xl flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"/>
        <span className="text-[11px] text-stone-500 flex-1">Berikutnya: <strong>{nextItem.detailKegiatan}</strong></span>
        <span className="text-[10px] text-stone-400 whitespace-nowrap">{nextItem.jamMulai}</span>
      </div>}

      {/* Full schedule table */}
      <div className="mx-4 md:mx-6 mb-6 rounded-2xl border border-stone-200 overflow-hidden shadow-soft" style={{overflowX:'auto'}}>
        {dayItems.length===0&&blSched.length===0
          ?<div className="py-10 text-center"><div className="text-3xl mb-2 opacity-20">📅</div><div className="text-[12px] font-bold text-stone-400 mb-1">Belum ada kegiatan</div><div className="text-[10px] text-stone-300">Tap + di blok waktu untuk menambah</div></div>
          :<table className="w-full" style={{minWidth:640}}>
            <thead>
              <tr className="bg-stone-50 border-b border-stone-200">
                {['Jam','Kat','Jenis','Detail Kegiatan','KPI','Output',''].map(function(h){return(
                  <th key={h} className="px-3 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">{h}</th>
                );})}
              </tr>
            </thead>
            <tbody>
              {BLOKS.map(function(blok){
                var items=getBlokItems(blok.id);
                var blItems=blSched.filter(function(it){return it.blokWaktu===blok.id;});
                var isAdding=addingBlok===blok.id;
                var hasNow=items.some(function(it){return getItemState(it)==='current';});
                var totalCount=items.length+blItems.length;
                return[
                  <tr key={blok.id+'-hdr'} className={blok.bg+' border-b '+(hasNow?'border-blue-200':blok.border)}>
                    <td colSpan={7} className="px-3 py-2">
                      <div className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <span className={`text-[12px] font-black ${blok.color}`}>{blok.time}</span>
                          <span className={`text-[11px] font-bold ${blok.color}`}>{blok.label}</span>
                          {hasNow&&<span className="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"/>}
                          {totalCount>0&&<span className={`text-[10px] font-bold ${blok.color} opacity-60`}>{totalCount}</span>}
                        </div>
                        <button className={`w-7 h-7 rounded-lg bg-white/70 flex items-center justify-center text-[14px] font-bold ${blok.color} as st border ${blok.border}`} onClick={function(){setAddingBlok(isAdding?null:blok.id);}}>{isAdding?'✕':'+'}</button>
                      </div>
                    </td>
                  </tr>,
                  isAdding&&<tr key={blok.id+'-add'}><td colSpan={7} className="p-0"><AddForm blokId={blok.id}/></td></tr>,
                  items.map(function(it){return renderItemRow(it,false);}),
                  blItems.map(function(it){return renderItemRow(it,true);}),
                  totalCount===0&&!isAdding&&<tr key={blok.id+'-empty'}><td colSpan={7} className="px-3 py-2.5 text-center text-[10px] text-stone-300 italic">Kosong · tap + untuk menambah</td></tr>
                ];
              })}
            </tbody>
          </table>
        }
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
