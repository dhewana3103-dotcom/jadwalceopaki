<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Test Sync MoM – Trusmiverse</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-stone-100 min-h-screen font-sans">
<script type="text/babel">
const {useState,useEffect}=React;

const DEFAULT_URL='https://mom.trusmiverse.com';
const DEFAULT_KEY='trusmi';

// ── Helpers ──────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10);}
function monthsAgo(n){var d=new Date();d.setMonth(d.getMonth()-n);return d.toISOString().slice(0,10);}

function parseTrusmiResponse(data){
  return (data||[]).map(function(m){
    var items=[];
    (m.issues||[]).forEach(function(issue){
      (issue.items||[]).forEach(function(item){
        items.push({
          item_id:item.item_id,
          action:item.action||'',
          pic:item.pic||'',
          deadline:item.deadline||'',
          ekspektasi:item.ekspektasi||'',
          kategori:item.kategori||'',
          level:item.level||'',
          hasil_topik:issue.hasil_topik||'',
          issue:issue.issue||'',
          status_raw:item.owner_verified_status,
          status_label:item.owner_verified_status===1?'✅ Selesai'
                       :item.owner_verified_status===2?'❌ Ditolak'
                       :'⏳ Pending',
          note:item.owner_verified_note||'',
          verified_at:item.owner_verified_at||'',
          verified_by:item.owner_verified_by||'',
        });
      });
    });
    return{
      id_mom:m.id_mom,
      judul:m.judul||'(tanpa judul)',
      tgl:m.tgl||'',
      tempat:m.tempat||'',
      start_time:m.start_time||'',
      end_time:m.end_time||'',
      items:items,
    };
  });
}

// ── App ──────────────────────────────────────────────────────
function App(){
  const [apiUrl,setApiUrl]=useState(function(){return localStorage.getItem('t2_url')||DEFAULT_URL;});
  const [apiKey,setApiKey]=useState(function(){return localStorage.getItem('t2_key')||DEFAULT_KEY;});
  const [startDate,setStartDate]=useState(monthsAgo(6));
  const [endDate,setEndDate]=useState(todayStr());
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null); // {meetings, total, filters, raw}
  const [err,setErr]=useState('');
  const [expandId,setExpandId]=useState(null);
  const [tab,setTab]=useState('mapped'); // 'mapped' | 'raw'

  function saveSettings(){
    localStorage.setItem('t2_url',apiUrl);
    localStorage.setItem('t2_key',apiKey);
  }

  function doSync(){
    setLoading(true);setErr('');setResult(null);setExpandId(null);
    var base=(apiUrl||DEFAULT_URL).replace(/\/$/,'');
    var url=base+'/api/owner/meetings?api_key='+(apiKey||DEFAULT_KEY)
            +'&start_date='+startDate+'&end_date='+endDate+'&sort=desc';
    fetch(url,{headers:{Accept:'application/json','X-API-KEY':apiKey||DEFAULT_KEY}})
      .then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status+': '+r.statusText);
        return r.json();
      })
      .then(function(json){
        if(!json.success)throw new Error(json.message||'API error');
        var meetings=parseTrusmiResponse(json.data||[]);
        setResult({meetings:meetings,total:json.total,filters:json.filters,raw:json});
        setLoading(false);
      })
      .catch(function(e){
        setErr(e.message||'Gagal');
        setLoading(false);
      });
  }

  var STATUS_COLOR={
    '✅ Selesai':'bg-emerald-100 text-emerald-700',
    '❌ Ditolak':'bg-red-100 text-red-700',
    '⏳ Pending':'bg-amber-100 text-amber-700',
  };

  return(
    <div className="max-w-3xl mx-auto py-8 px-4">
      <div className="mb-6">
        <div className="text-[11px] font-extrabold text-stone-400 uppercase tracking-widest mb-1">Trusmiverse MoM Sync</div>
        <div className="text-[22px] font-black text-stone-900">Test Page</div>
        <div className="text-[12px] text-stone-500 mt-0.5">Tes koneksi + preview data sebelum integrate ke CEO GTD OS</div>
      </div>

      {/* Settings */}
      <div className="bg-white rounded-2xl border border-stone-200 shadow-sm p-5 mb-4">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3">⚙️ Konfigurasi API</div>
        <div className="grid grid-cols-1 gap-3 mb-3">
          <div>
            <div className="text-[10px] font-bold text-stone-500 mb-1">Base URL</div>
            <input className="w-full px-3 py-2 rounded-xl border border-stone-200 text-[12px] font-mono focus:outline-none focus:ring-2 focus:ring-stone-400"
              value={apiUrl} onChange={function(e){setApiUrl(e.target.value);}} placeholder="https://mom.trusmiverse.com"/>
          </div>
          <div>
            <div className="text-[10px] font-bold text-stone-500 mb-1">API Key</div>
            <input type="password" className="w-full px-3 py-2 rounded-xl border border-stone-200 text-[12px] font-mono focus:outline-none focus:ring-2 focus:ring-stone-400"
              value={apiKey} onChange={function(e){setApiKey(e.target.value);}} placeholder="trusmi"/>
          </div>
        </div>
        <button className="text-[10px] font-bold text-stone-500 border border-stone-200 px-3 py-1.5 rounded-lg bg-stone-50 hover:bg-stone-100"
          onClick={saveSettings}>💾 Simpan ke localStorage</button>
      </div>

      {/* Date range + sync */}
      <div className="bg-white rounded-2xl border border-stone-200 shadow-sm p-5 mb-4">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3">📅 Filter Tanggal</div>
        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <div className="text-[10px] font-bold text-stone-500 mb-1">Start Date</div>
            <input type="date" className="w-full px-3 py-2 rounded-xl border border-stone-200 text-[12px] font-mono focus:outline-none focus:ring-2 focus:ring-stone-400"
              value={startDate} onChange={function(e){setStartDate(e.target.value);}}/>
          </div>
          <div>
            <div className="text-[10px] font-bold text-stone-500 mb-1">End Date</div>
            <input type="date" className="w-full px-3 py-2 rounded-xl border border-stone-200 text-[12px] font-mono focus:outline-none focus:ring-2 focus:ring-stone-400"
              value={endDate} onChange={function(e){setEndDate(e.target.value);}}/>
          </div>
        </div>
        <div className="bg-stone-50 border border-stone-200 rounded-xl p-3 mb-4">
          <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">URL yang akan di-hit</div>
          <div className="text-[10px] font-mono text-stone-600 break-all">
            {(apiUrl||DEFAULT_URL).replace(/\/$/,'')}/api/owner/meetings?api_key={apiKey||DEFAULT_KEY}&start_date={startDate}&end_date={endDate}&sort=desc
          </div>
        </div>
        <button
          className={'w-full py-3 rounded-xl text-[13px] font-bold '+(loading?'bg-stone-300 text-stone-400 cursor-not-allowed':'bg-stone-900 text-white hover:bg-stone-800')}
          onClick={doSync} disabled={loading}>
          {loading?'⏳ Fetching...':'🔄 Test Sync Sekarang'}
        </button>
        {err&&<div className="mt-3 px-3 py-2.5 bg-red-50 border border-red-200 rounded-xl text-[11px] text-red-700">
          <strong>Error:</strong> {err}
          {err.includes('CORS')||err.includes('Failed to fetch')?<div className="mt-1 text-[10px] text-red-500">Kemungkinan CORS belum diaktifkan di server, atau server tidak bisa diakses dari browser ini.</div>:''}
        </div>}
      </div>

      {/* Results */}
      {result&&<div className="space-y-3">
        {/* Summary */}
        <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 flex items-center gap-4">
          <div className="text-3xl">✅</div>
          <div>
            <div className="text-[14px] font-extrabold text-emerald-800">Berhasil! {result.total} meeting ditemukan</div>
            <div className="text-[10px] text-emerald-600">Range: {result.filters.start_date} → {result.filters.end_date}</div>
          </div>
        </div>

        {/* Tab switcher */}
        <div className="flex gap-2">
          <button className={'flex-1 py-2 rounded-xl text-[11px] font-bold border '+(tab==='mapped'?'bg-stone-900 text-white border-stone-900':'bg-white text-stone-600 border-stone-200')}
            onClick={function(){setTab('mapped');}}>📋 Data Mapped</button>
          <button className={'flex-1 py-2 rounded-xl text-[11px] font-bold border '+(tab==='raw'?'bg-stone-900 text-white border-stone-900':'bg-white text-stone-600 border-stone-200')}
            onClick={function(){setTab('raw');}}>🔧 Raw JSON</button>
        </div>

        {/* Mapped view */}
        {tab==='mapped'&&<div className="space-y-3">
          {result.meetings.length===0&&<div className="bg-white border border-stone-200 rounded-2xl p-6 text-center text-[12px] text-stone-400">Tidak ada meeting di rentang tanggal ini</div>}
          {result.meetings.map(function(m){
            var isExp=expandId===m.id_mom;
            var doneCount=m.items.filter(function(i){return i.status_raw===1;}).length;
            return(
              <div key={m.id_mom} className="bg-white border border-stone-200 rounded-2xl shadow-sm overflow-hidden">
                <div className="p-4 cursor-pointer flex items-start justify-between gap-3"
                  onClick={function(){setExpandId(isExp?null:m.id_mom);}}>
                  <div className="flex-1 min-w-0">
                    <div className="text-[10px] font-bold text-stone-400 mb-0.5">#{m.id_mom} · {m.tgl}{m.tempat?' · '+m.tempat:''}</div>
                    <div className="text-[14px] font-extrabold text-stone-900 leading-snug">{m.judul}</div>
                    <div className="flex gap-2 mt-1.5 flex-wrap">
                      <span className="text-[9px] bg-stone-100 text-stone-600 px-2 py-0.5 rounded-full font-bold">{m.items.length} action item</span>
                      {doneCount>0&&<span className="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">{doneCount} selesai</span>}
                      {m.start_time&&<span className="text-[9px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">{m.start_time.slice(0,5)}–{m.end_time.slice(0,5)}</span>}
                    </div>
                  </div>
                  <span className="text-stone-400 text-[12px] flex-shrink-0">{isExp?'▲':'▼'}</span>
                </div>
                {isExp&&<div className="border-t border-stone-100">
                  {m.items.length===0&&<div className="px-4 py-3 text-[11px] text-stone-400 italic">Tidak ada action item</div>}
                  {m.items.map(function(item,idx){
                    var sc=STATUS_COLOR[item.status_label]||'bg-stone-100 text-stone-600';
                    return(
                      <div key={item.item_id} className={'px-4 py-3 '+(idx<m.items.length-1?'border-b border-stone-100':'')}>
                        <div className="flex items-start justify-between gap-2 mb-1">
                          <span className={'text-[9px] font-bold px-2 py-0.5 rounded-full '+sc}>{item.status_label}</span>
                          <span className="text-[9px] text-stone-400">#{item.item_id}</span>
                        </div>
                        {item.hasil_topik&&<div className="text-[9px] text-blue-500 font-bold mb-0.5">📌 {item.hasil_topik}</div>}
                        <div className="text-[12px] font-semibold text-stone-800 leading-snug mb-1.5">{item.action}</div>
                        <div className="flex flex-wrap gap-2">
                          {item.pic&&<span className="text-[9px] bg-stone-100 px-1.5 py-0.5 rounded text-stone-600">👤 {item.pic}</span>}
                          {item.deadline&&<span className="text-[9px] bg-stone-100 px-1.5 py-0.5 rounded text-stone-600">📅 {item.deadline}</span>}
                          {item.kategori&&<span className="text-[9px] bg-violet-50 px-1.5 py-0.5 rounded text-violet-600">{item.kategori}</span>}
                          {item.level&&<span className="text-[9px] bg-orange-50 px-1.5 py-0.5 rounded text-orange-600">{item.level}</span>}
                        </div>
                        {item.ekspektasi&&<div className="text-[10px] text-stone-500 mt-1.5">💡 {item.ekspektasi}</div>}
                        {item.note&&<div className="mt-1.5 px-2.5 py-2 bg-emerald-50 border border-emerald-100 rounded-lg text-[10px] text-emerald-700">
                          <span className="font-bold">Note verifikasi:</span> {item.note}
                          {item.verified_at&&<span className="ml-2 text-emerald-500">· {item.verified_at.slice(0,10)} oleh {item.verified_by}</span>}
                        </div>}
                      </div>
                    );
                  })}
                </div>}
              </div>
            );
          })}
        </div>}

        {/* Raw JSON */}
        {tab==='raw'&&<div className="bg-stone-900 rounded-2xl p-4 overflow-x-auto">
          <pre className="text-[10px] text-emerald-400 leading-relaxed whitespace-pre-wrap">{JSON.stringify(result.raw,null,2)}</pre>
        </div>}

        {/* Field mapping reference */}
        <div className="bg-white border border-stone-200 rounded-2xl p-4">
          <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3">🗺️ Field Mapping ke CEO GTD OS</div>
          <table className="w-full text-[10px]">
            <thead><tr className="border-b border-stone-100">
              <th className="text-left py-1.5 text-stone-400 font-bold">API Field</th>
              <th className="text-left py-1.5 text-stone-400 font-bold">→</th>
              <th className="text-left py-1.5 text-stone-400 font-bold">App Model</th>
            </tr></thead>
            <tbody>
              {[
                ['id_mom','MoM id / _trusmiId'],
                ['judul','meetingName'],
                ['tgl','tanggal'],
                ['tempat','tempat (info)'],
                ['issues[].hasil_topik','action item: _issueTopik'],
                ['issues[].issue','action item: _issue'],
                ['items[].action','action item: action'],
                ['items[].pic','action item: pic'],
                ['items[].deadline','action item: deadline'],
                ['items[].ekspektasi','action item: ekspektasi'],
                ['items[].kategori','action item: kategori'],
                ['items[].level','action item: level/jenis'],
                ['items[].owner_verified_status','status: null→pending, 1→selesai, 2→ditolak'],
                ['items[].owner_verified_note','hasil / catatan verifikasi'],
              ].map(function(r){return(
                <tr key={r[0]} className="border-b border-stone-50">
                  <td className="py-1.5 font-mono text-violet-600">{r[0]}</td>
                  <td className="py-1.5 text-stone-300">→</td>
                  <td className="py-1.5 text-stone-700">{r[1]}</td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
