      {/* QUANTITATIVE */}
      {!stats&&<div className="px-4 md:px-6 py-8 text-center"><div className="text-5xl mb-3 opacity-30">📊</div><div className="text-[13px] font-bold text-stone-400">Isi output kegiatan di Jadwal dulu untuk melihat analisa otomatis</div></div>}
      {stats&&<>
        <div className="px-4 md:px-6 mb-5">
          <div className="grid grid-cols-3 gap-3">
            {[['Kegiatan',stats.allItems.length],['Total Jam',stats.totalHours+'h'],['Minggu',stats.weekKeys.length]].map(([l,v])=>(
              <div key={l} className="bg-white border border-stone-200 rounded-xl p-3 text-center shadow-soft"><div className="text-2xl font-black text-stone-900">{v}</div><div className="text-[10px] text-stone-400 font-medium mt-0.5">{l}</div></div>
            ))}
          </div>
        </div>
        <div className="mx-4 md:mx-6 bg-white rounded-2xl border border-stone-200 shadow-soft overflow-hidden mb-5">
          <div className="px-4 py-3 border-b border-stone-200 bg-stone-50 text-[12px] font-bold text-stone-800">📅 Alokasi Waktu per Minggu (Jam)</div>
          <div className="overflow-x-auto"><table className="w-full text-[11px]" style={{minWidth:380}}>
            <thead><tr className="bg-stone-50 border-b border-stone-200 text-[10px] text-stone-500 uppercase"><th className="px-3 py-2.5 text-left font-bold">Jenis</th>{stats.weekKeys.map(w=><th key={w} className="px-2 py-2.5 text-center font-bold">{getWeekLabel(w)}</th>)}<th className="px-2 py-2.5 text-center font-bold">Total</th></tr></thead>
            <tbody className="divide-y divide-stone-100">
              {JENIS_KEGIATAN.map(j=>{const wVals=stats.weekKeys.map(w=>stats.byJenis[j][w]||0);const total=Math.round(wVals.reduce((s,v)=>s+v,0)*10)/10;if(wVals.every(v=>!v))return null;return(<tr key={j} className="hover:bg-stone-50/50"><td className="px-3 py-2 font-semibold text-stone-700 whitespace-nowrap">{JENIS_SHORT[j]||j}</td>{wVals.map((v,i)=><td key={i} className="px-2 py-2 text-center"><div className={`h-7 rounded flex items-center justify-center font-bold ${heatCls(v)}`}>{v||'–'}</div></td>)}<td className="px-2 py-2 text-center font-black text-stone-800">{total}h</td></tr>);})}
              <tr className="bg-stone-100 border-t-2 border-stone-200"><td className="px-3 py-2 font-black text-stone-900">Total</td>{stats.weekKeys.map(w=><td key={w} className="px-2 py-2 text-center font-black text-stone-900">{stats.totals[w]||0}h</td>)}<td className="px-2 py-2 text-center font-black text-stone-900">{stats.totalHours}h</td></tr>
            </tbody>
          </table></div>
        </div>
        <div className="px-4 md:px-6 grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">
          <div className="bg-white rounded-2xl border border-stone-200 shadow-soft p-4">
            <div className="text-[12px] font-bold text-stone-800 mb-3">📊 Distribusi (Jam)</div>
            <div className="space-y-3">{stats.distribusi.filter(d=>d.hours>0).map((d,i)=>{const mx=Math.max(...stats.distribusi.map(x=>x.hours),1);return(<div key={d.jenis}><div className="flex justify-between text-[11px] mb-1"><span className="font-medium text-stone-700">{d.jenis}</span><span className="font-bold text-stone-800">{d.count}x / <span className={i===0?'text-red-600 font-black':''}>{d.hours}h</span></span></div><div className="w-full bg-stone-100 rounded-full h-2.5"><div className={`h-2.5 rounded-full ${i===0?'bg-red-500':'bg-blue-400'}`} style={{width:`${Math.round((d.hours/mx)*100)}%`}}/></div></div>);})}</div>
          </div>
          <div className="bg-white rounded-2xl border border-stone-200 shadow-soft p-4">
            <div className="text-[12px] font-bold text-stone-800 mb-3">🎯 Coverage KPI</div>
            <table className="w-full text-[11px]"><thead><tr className="border-b border-stone-200 text-[10px] text-stone-500"><th className="pb-2 text-left">Fungsi</th><th className="pb-2">Jam</th><th className="pb-2 text-center">Target</th></tr></thead>
            <tbody className="divide-y divide-stone-100">{stats.coverage.sort((a,b)=>b.hours-a.hours).map(({kpi,hours})=>{const TARGET={finansial:25,branding:25,riset:15,operasional:30,people:5};const tgt=TARGET[kpi.id]||20;const mx=Math.max(...stats.coverage.map(x=>x.hours),1);return(<tr key={kpi.id} className="hover:bg-stone-50/50"><td className={`py-2.5 font-bold pr-2 ${kpi.color}`}>{kpi.short}</td><td className="py-2.5 pr-3"><div className="flex items-center gap-2"><div className="w-12 bg-stone-100 rounded-full h-1.5 flex-shrink-0"><div className="h-1.5 rounded-full" style={{width:`${Math.min((hours/mx)*100,100)}%`,background:kpi.hex}}/></div><span className="font-bold text-stone-800 whitespace-nowrap">{hours}h</span></div></td><td className="py-2.5 text-center text-[9px]"><span className={`px-1.5 py-0.5 rounded font-bold ${hours>0&&(hours/stats.totalHours*100)>=tgt*0.7?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-600'}`}>{tgt}%</span></td></tr>);})}</tbody></table>
          </div>
        </div>
      </>}

      {/* WEEKLY HORIZONTAL VIEW */}
      {(()=>{
        const weekDays=getWeekDays();
        const BLOK_COLS=[
          {id:'pagi-dalam',label:'Pagi Dalam',time:'05–08',bg:'bg-yellow-50',border:'border-yellow-200',tc:'text-yellow-800',dark:false},
          {id:'pagi-aktif',label:'Pagi Aktif',time:'08–11',bg:'bg-emerald-50',border:'border-emerald-200',tc:'text-emerald-800',dark:false},
          {id:'siang-dinamis',label:'Siang',time:'11–15',bg:'bg-sky-50',border:'border-sky-200',tc:'text-sky-800',dark:false},
          {id:'sore-review',label:'Sore',time:'15–18',bg:'bg-purple-50',border:'border-purple-200',tc:'text-purple-800',dark:false},
          {id:'malam-keputusan',label:'Malam',time:'19–21',bg:'bg-stone-900',border:'border-stone-700',tc:'text-indigo-300',dark:true},
        ];
        const katColor={RSP:'bg-blue-100 text-blue-700',BT:'bg-emerald-100 text-emerald-700',TKB:'bg-amber-100 text-amber-700',Personal:'bg-stone-100 text-stone-500'};
        const katDot={RSP:'bg-blue-500',BT:'bg-emerald-500',TKB:'bg-amber-500',Personal:'bg-stone-400'};
        function filterEvts(items){
          if(!entityFilter||entityFilter==='all')return items||[];
          return(items||[]).filter(it=>it.kategori===entityFilter);
        }
        return(
          <div className="px-4 md:px-6 mb-5">
            <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest mb-3">🗓 Jadwal Mingguan</div>
            <div className="bg-white rounded-2xl border border-stone-200 shadow-soft overflow-hidden">
              {/* Column headers */}
              <div className="grid border-b border-stone-200" style={{gridTemplateColumns:'80px repeat(5,1fr)'}}>
                <div className="px-3 py-2.5 border-r border-stone-200 bg-stone-50"/>
                {BLOK_COLS.map(b=>(
                  <div key={b.id} className={`px-2 py-2.5 border-r border-stone-200 last:border-r-0 ${b.bg}`}>
                    <div className={`text-[9px] font-black ${b.tc}`}>{b.time}</div>
                    <div className={`text-[9px] font-semibold ${b.tc} opacity-80`}>{b.label}</div>
                  </div>
                ))}
              </div>
              {/* Day rows */}
              {weekDays.map(day=>{
                const rawItems=(jadwal[day.dateStr]||[]).sort((a,b)=>(a.jamMulai||'').localeCompare(b.jamMulai||''));
                const dayItems=filterEvts(rawItems);
                const isExp=expandedDays.has(day.dateStr);
                const totalCount=dayItems.length;
                return(
                  <div key={day.dateStr} className={`border-b border-stone-200 last:border-b-0 ${day.isToday?'bg-amber-50/30':''}`}>
                    {/* Summary row */}
                    <div className="grid cursor-pointer hover:bg-stone-50 st as" style={{gridTemplateColumns:'80px repeat(5,1fr)'}} onClick={()=>toggleDay(day.dateStr)}>
                      <div className={`px-3 py-3 border-r border-stone-200 flex flex-col justify-between ${day.isToday?'border-l-4 border-l-amber-400':''}`}>
                        <div>
                          <div className="text-[9px] font-bold text-stone-400 uppercase">{day.dayShort}</div>
                          <div className="text-lg font-black text-stone-900 leading-none">{day.num}</div>
                          {day.isToday&&<div className="text-[8px] font-black text-amber-500 mt-0.5">Hari ini</div>}
                        </div>
                        <div className="flex items-center justify-between mt-1">
                          <span className="text-[9px] text-stone-400">{totalCount}×</span>
                          <span className="text-[9px] text-stone-400">{isExp?'▲':'▼'}</span>
                        </div>
                      </div>
                      {BLOK_COLS.map(b=>{
                        const bevts=dayItems.filter(it=>getBlokFromTime(it.jamMulai)===b.id);
                        return(
                          <div key={b.id} className={`px-2 py-2.5 border-r border-stone-200 last:border-r-0 ${b.dark?'bg-stone-900':'b.bg'}`} style={b.dark?{background:'#1a1a2e'}:{}}>
                            {isExp?(
                              bevts.length?(
                                <div className="space-y-1.5">
                                  {bevts.map((it,i)=>{
                                    const kpi=KPI5.find(k=>k.id===it.relateMilestone);
                                    return(
                                      <div key={i} className={`rounded-lg p-2 text-[9px] border ${b.dark?'bg-stone-800 border-stone-700':'bg-white border-stone-200'} relative overflow-hidden`}>
                                        <div className={`absolute left-0 top-0 bottom-0 w-1 ${it.kategori==='RSP'?'bg-blue-500':it.kategori==='BT'?'bg-emerald-500':it.kategori==='TKB'?'bg-amber-500':'bg-stone-400'}`}/>
                                        <div className="pl-2">
                                          <div className={`font-bold leading-snug mb-1 ${b.dark?'text-slate-200':'text-stone-800'}`} style={{fontSize:'10px'}}>{it.detailKegiatan||'–'}</div>
                                          <div className="flex gap-1 flex-wrap">
                                            <span className={`${katColor[it.kategori]||'bg-stone-100 text-stone-500'} px-1 py-0.5 rounded font-bold`} style={{fontSize:'8px'}}>{it.kategori}</span>
                                            {kpi&&<span className={`${kpi.bg} ${kpi.color} px-1 py-0.5 rounded font-bold border ${kpi.border}`} style={{fontSize:'8px'}}>{kpi.short}</span>}
                                          </div>
                                          <div className={`font-mono mt-1 ${b.dark?'text-stone-500':'text-stone-400'}`} style={{fontSize:'8px'}}>{it.jamMulai}–{it.jamSelesai}</div>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              ):<div className={`text-center ${b.dark?'text-stone-700':'text-stone-300'}`} style={{fontSize:'9px'}}>—</div>
                            ):(
                              <div className="flex flex-wrap gap-1 items-center">
                                {bevts.length?bevts.map((it,i)=><div key={i} className={`w-2 h-2 rounded-full ${katDot[it.kategori]||'bg-stone-400'} flex-shrink-0`} title={it.detailKegiatan}/>):<span className={b.dark?'text-stone-700':'text-stone-300'} style={{fontSize:'9px'}}>—</span>}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="mt-2 text-[10px] text-stone-400 flex items-center gap-1.5 px-1">
              <span>Tap baris untuk expand · dots = kategori kegiatan</span>
              {entityFilter!=='all'&&<span className="font-semibold text-stone-500">· Filter: {entityFilter}</span>}
            </div>
          </div>
        );
      })()}

      {/* AI RESULTS */}
      {showAI&&<div className="px-4 md:px-6">
        <div className="h-px bg-stone-200 mb-5"/>
        {aiLoading&&<div className="text-center py-8"><div className="w-8 h-8 border-2 border-stone-300 border-t-stone-600 rounded-full animate-spin mx-auto mb-3"/><div className="text-[12px] text-stone-400">Menganalisis pola + merancang rekomendasi...</div></div>}
        {aiResult&&!aiLoading&&<>
          {/* Ringkasan */}
          {aiResult.ringkasan?.length>0&&<div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-5">
            {aiResult.ringkasan.map((c,i)=>(<div key={i} className={`bg-white rounded-xl p-4 border ${typeBorderMap[c.type]||'border-stone-200'} shadow-soft relative overflow-hidden`}><div className={`absolute top-0 right-0 w-1.5 h-full ${typeBgMap[c.type]||'bg-stone-300'}`}/><div className={`text-[10px] font-extrabold tracking-wider uppercase mb-1 ${typeMap[c.type]?.split(' ')[1]||'text-stone-500'}`}>{c.tag}</div><div className="text-xl font-black text-stone-900 mb-0.5">{c.value}</div><div className="text-[12px] font-bold text-stone-700 mb-1">{c.label}</div><div className="text-[11px] text-stone-500">{c.sub}</div></div>))}
          </div>}
          {/* Temuan */}
          {aiResult.temuan?.length>0&&<div className="bg-white rounded-2xl border border-stone-200 shadow-soft overflow-hidden mb-5"><table className="w-full text-[11px]"><tbody className="divide-y divide-stone-100">{aiResult.temuan.map((t,i)=>(<tr key={i} className={t.type==='danger'?'bg-red-50/30':'hover:bg-stone-50'}><td className="p-3 font-bold text-stone-800 align-top w-1/4 whitespace-nowrap">{t.fungsi}</td><td className="p-3 align-top"><span className={`inline-flex px-2 py-1 rounded text-[9px] font-bold ${typeMap[t.type]||'bg-stone-100 text-stone-600'}`}>{t.status}</span></td><td className="p-3 text-stone-600 align-top leading-relaxed">{t.txt}</td></tr>))}</tbody></table></div>}
          {/* Pola */}
          {aiResult.pola?.length>0&&<div className="space-y-3 mb-5">{aiResult.pola.map((p,i)=>(<div key={i} className="bg-white border border-stone-200 rounded-xl p-3.5 border-l-4 border-l-amber-400"><div className="text-[12px] font-bold text-stone-800 mb-1.5">{p.slot}</div><div className="text-[11px] text-stone-600 mb-2"><strong>Temuan:</strong> {p.issue}</div><div className="text-[11px] text-emerald-700 bg-emerald-50 p-2 rounded-lg border border-emerald-100"><strong>Harusnya:</strong> {p.fix}</div></div>))}</div>}

          {/* REKOMENDASI */}
          {rekoms.length>0&&<>
            <div className="flex items-center justify-between mb-3">
              <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">🎯 Rekomendasi Jadwal</div>
              <span className="text-[10px] text-stone-400">{pendingRekoms.length} pending · {doneRekoms.length} selesai</span>
            </div>
            <div className="space-y-3 mb-4">
              {rekoms.map(r=>{
                const kpi=KPI5.find(k=>k.id===r.fungsiKPI);
                const jColor=JENIS_COLOR[r.jenisKegiatan]||'bg-stone-100 text-stone-600';
                const kColor=KATEGORI_COLOR[r.kategori]||'bg-stone-100 text-stone-600';
                const dayInfo=remainDays.find(d=>d.dateStr===r.suggestTanggal);
                const isTaking=takingId===r.id;
                if(r.status==='rejected')return null;
                return(
                  <div key={r.id} className={`bg-white rounded-2xl border shadow-soft overflow-hidden afi ${r.status==='taken'?'border-emerald-200 opacity-60':r.status==='postponed'?'border-amber-200 opacity-60':'border-stone-200'}`}>
                    <div className="p-4">
                      {/* Header */}
                      <div className="flex items-start justify-between gap-2 mb-2">
                        <div className="flex-1">
                          <div className="flex items-center gap-1.5 flex-wrap mb-1.5">
                            {r.prioritas==='tinggi'&&<span className="text-[9px] font-black bg-red-100 text-red-600 px-1.5 py-0.5 rounded">🔴 TINGGI</span>}
                            <span className={`px-1.5 py-0.5 rounded-full text-[9px] font-bold ${kColor}`}>{r.kategori}</span>
                            <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold ${jColor}`}>{JENIS_SHORT[r.jenisKegiatan]||r.jenisKegiatan}</span>
                            {kpi&&<KC id={kpi.id} sm/>}
                            {r.fromBacklogId&&<span className="text-[9px] text-violet-600 bg-violet-50 px-1.5 py-0.5 rounded border border-violet-100">📋 Dari Backlog</span>}
                          </div>
                          <div className="text-[13px] font-bold text-stone-900 leading-tight">{r.kegiatan}</div>
                        </div>
                        {r.status!=='pending'&&<span className={`text-[10px] font-bold px-2 py-1 rounded-lg flex-shrink-0 ${r.status==='taken'?'bg-emerald-100 text-emerald-700':r.status==='postponed'?'bg-amber-100 text-amber-700':''}`}>{r.status==='taken'?'✅ Ditambahkan':r.status==='postponed'?'⏩ Postponed':''}</span>}
                      </div>
                      {/* Suggest slot */}
                      <div className="flex items-center gap-2 mb-2">
                        <div className="bg-stone-50 border border-stone-200 rounded-lg px-2.5 py-1.5 flex items-center gap-1.5">
                          <span className="text-[10px] text-stone-500">📅</span>
                          <span className="text-[11px] font-bold text-stone-700">{dayInfo?.dayName||r.suggestTanggal}</span>
                          <span className="text-[10px] font-mono text-stone-500">{r.suggestJam}–{r.suggestJamSelesai}</span>
                        </div>
                        {r.pairing&&<div className="text-[9px] text-violet-600 bg-violet-50 px-2 py-1 rounded border border-violet-100">💡 Pair: {r.pairing}</div>}
                      </div>
                      {/* Alasan */}
                      <div className="text-[11px] text-stone-500 leading-relaxed mb-3">{r.alasan}</div>
                      {/* Actions */}
                      {r.status==='pending'&&!isTaking&&<div className="flex gap-2">
                        <button className="flex-1 py-2 rounded-xl bg-emerald-600 text-white text-[11px] font-bold as st" onClick={()=>handleTake(r)}>✅ Take</button>
                        <button className="flex-1 py-2 rounded-xl bg-amber-100 text-amber-700 text-[11px] font-bold border border-amber-200 as st" onClick={()=>handlePostpone(r)}>⏩ Postpone</button>
                        <button className="px-3 py-2 rounded-xl bg-stone-100 text-stone-500 text-[11px] font-bold border border-stone-200 as st" onClick={()=>handleReject(r)}>✕</button>
                      </div>}
                      {/* Take form */}
                      {isTaking&&<div className="border border-stone-200 rounded-xl overflow-hidden afi mt-1">
                        <div className="px-3 py-2 bg-emerald-50 border-b border-emerald-100 text-[10px] font-bold text-emerald-700">Konfirmasi Jadwal</div>
                        <div className="p-3 space-y-2.5">
                          <div>
                            <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Hari</div>
                            <select className="w-full px-2.5 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.tanggal} onChange={e=>setTakeForm(p=>({...p,tanggal:e.target.value}))}>
                              {remainDays.map(d=><option key={d.dateStr} value={d.dateStr}>{d.dayName}</option>)}
                            </select>
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div><div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Jam Mulai</div><input type="time" className="w-full px-2 py-2 rounded-xl border border-stone-200 text-[11px] font-mono focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.jamMulai} onChange={e=>setTakeForm(p=>({...p,jamMulai:e.target.value}))}/></div>
                            <div><div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Jam Selesai</div><input type="time" className="w-full px-2 py-2 rounded-xl border border-stone-200 text-[11px] font-mono focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.jamSelesai} onChange={e=>setTakeForm(p=>({...p,jamSelesai:e.target.value}))}/></div>
                          </div>
                          <div>
                            <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Detail Kegiatan</div>
                            <input className="w-full px-2.5 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.detailKegiatan||''} onChange={e=>setTakeForm(p=>({...p,detailKegiatan:e.target.value}))}/>
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div><div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Kategori</div><select className="w-full px-2 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.kategori||'RSP'} onChange={e=>setTakeForm(p=>({...p,kategori:e.target.value}))}>{['RSP','BT','TKB','Personal'].map(k=><option key={k}>{k}</option>)}</select></div>
                            <div><div className="text-[9px] font-bold text-stone-400 uppercase mb-1">KPI</div><select className="w-full px-2 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-emerald-400" value={takeForm.relateMilestone||'operasional'} onChange={e=>setTakeForm(p=>({...p,relateMilestone:e.target.value}))}>{KPI5.map(k=><option key={k.id} value={k.id}>{k.short}</option>)}</select></div>
                          </div>
                          <div className="flex gap-2">
                            <button className="flex-1 py-2.5 rounded-xl bg-emerald-600 text-white text-[11px] font-bold as st" onClick={()=>confirmTake(r)}>✅ Masukkan ke Jadwal</button>
                            <button className="px-3 py-2 rounded-xl bg-stone-100 text-stone-500 text-[11px] font-bold border border-stone-200 as st" onClick={()=>setTakingId(null)}>Batal</button>
                          </div>
                        </div>
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </>}
        </>}
      </div>}

      {/* RECYCLE BIN */}
      {recycleBin.length>0&&<div className="px-4 md:px-6 mt-4">
        <div className="h-px bg-stone-200 mb-4"/>
        <button className="flex items-center gap-2 mb-3 as" onClick={()=>setShowBin(p=>!p)}>
          <span className="text-[11px] font-extrabold text-stone-400 uppercase tracking-widest">🗑 Recycle Bin</span>
          <span className="text-[10px] bg-stone-200 text-stone-500 px-2 py-0.5 rounded-full font-bold">{recycleBin.length}</span>
          <span className="text-[10px] text-stone-400">{showBin?'▲':'▼'}</span>
        </button>
        {showBin&&<div className="space-y-2">
          {recycleBin.map(item=>(
            <div key={item.id} className="bg-stone-50 border border-stone-200 rounded-xl p-3 flex items-center gap-3">
              <div className="flex-1 min-w-0">
                <div className="text-[11px] font-bold text-stone-600 truncate">{item.kegiatan}</div>
                <div className="text-[9px] text-stone-400 mt-0.5">{item.suggestTanggal} · {JENIS_SHORT[item.jenisKegiatan]||item.jenisKegiatan} · Ditolak {item.rejectedAt}</div>
              </div>
              <div className="flex gap-1.5 flex-shrink-0">
                <button className="px-2.5 py-1.5 rounded-lg bg-blue-50 text-blue-600 text-[9px] font-bold border border-blue-100 as st" onClick={()=>restoreFromBin(item)}>↩ Restore</button>
                <button className="px-2.5 py-1.5 rounded-lg bg-red-50 text-red-400 text-[9px] font-bold border border-red-100 as st" onClick={()=>{if(confirm('Hapus permanen?'))removeFromBin(item.id);}}>🗑</button>
              </div>
            </div>
          ))}
        </div>}
      </div>}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('dashboard');
  const [sub,setSub]=useState({jadwal:'harian',backlog:'backlog',resume:'analisa'});
  const [jadwalFilter,setJadwalFilter]=useState({kategori:{RSP:true,BT:true,TKB:true,Personal:true},belumOutput:false,belumSiap:false});
  const toggleKat=(k)=>setJadwalFilter(f=>({...f,kategori:{...f.kategori,[k]:!f.kategori[k]}}));
  const [googleToken,setGoogleToken]=useState(null);
  const [googleCalId,setGoogleCalId]=useState(()=>localStorage.getItem('rsp_gcal_id')||'');
  const [googleCals,setGoogleCals]=useState([]);
  const [gcalConnecting,setGcalConnecting]=useState(false);
  async function connectGCal(){
    setGcalConnecting(true);
    try{
      await connectGoogleCalendar(async(token)=>{
        setGoogleToken(token);
        const cals=await listGCalendars(token);
        setGoogleCals(cals);
        setGcalConnecting(false);
      });
    }catch(e){setGcalConnecting(false);}
  }
  function selectGCal(id){setGoogleCalId(id);localStorage.setItem('rsp_gcal_id',id);}
  async function pushItemToGCal(item){
    if(!googleToken||!googleCalId){alert('Connect Google Calendar dulu di ⚙️ Pengaturan.');return;}
    try{await pushEventToGCal(item,googleToken,googleCalId);return true;}catch(e){return false;}
  }
  async function pushDayToGCal(date){
    if(!googleToken||!googleCalId){alert('Connect Google Calendar dulu di ⚙️ Pengaturan.');return;}
    const items=jadwal[date]||[];
    let ok=0;
    for(const item of items){try{await pushEventToGCal(item,googleToken,googleCalId);ok++;}catch(e){}}
    alert(`${ok}/${items.length} kegiatan berhasil dipush ke Google Calendar.`);
  }
  const [kpiCeo,setKpiCeo]=useState(()=>ld('kpi_ceo')||{});
  const [dashMonth,setDashMonth]=useState(()=>new Date().toISOString().slice(0,7));
  function saveKpiCorp(month,data){const n={...kpiCorp,[month]:data};setKpiCorp(n);sv('kpi_corp',n);}
  function saveKpiCeo(month,items){const n={...kpiCeo,[month]:items};setKpiCeo(n);sv('kpi_ceo',n);}
  const dashWeekly=kpiCorp[dashMonth]?.weekly||INIT_W;
  const [weekly]=useState(INIT_W);
  const [backlog,setBacklog]=useState([]);
  const [keputusan,setKeputusan]=useState([]);
  const [jadwal,setJadwal]=useState({});
  const [showSettings,setShowSettings]=useState(false);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    // Load from localStorage first (fast)
    const sb=ld('backlog');const sk=ld('keputusan');const sj=ld('jadwal');
    setBacklog(sb&&sb.length>0?sb:SAMPLE_BL);
    setKeputusan(sk&&sk.length>0?sk:SAMPLE_KPT);
    setJadwal(sj||SJ);
    setReady(true);
    // Then load from Supabase (sync from other devices)
    async function loadFromSB(){
      const keys=[['backlog',(v)=>{if(v&&v.length>0){setBacklog(v);try{localStorage.setItem('rsp_backlog',JSON.stringify(v));}catch(e){}}},],['keputusan',(v)=>{if(v&&v.length>0){setKeputusan(v);try{localStorage.setItem('rsp_keputusan',JSON.stringify(v));}catch(e){}}},],['jadwal',(v)=>{if(v&&Object.keys(v).length>0){setJadwal(v);try{localStorage.setItem('rsp_jadwal',JSON.stringify(v));}catch(e){}}},],['kpi_corp',(v)=>{if(v){setKpiCorp(v);try{localStorage.setItem('rsp_kpi_corp',JSON.stringify(v));}catch(e){}}},],['kpi_ceo',(v)=>{if(v){setKpiCeo(v);try{localStorage.setItem('rsp_kpi_ceo',JSON.stringify(v));}catch(e){}}},],];
      for(const[key,setter] of keys){const data=await sbLoad(key);if(data)setter(data);}
    }
    loadFromSB();
    // Realtime subscription
    const sb2=getSB();
    if(!sb2)return;
    const channel=sb2.channel('app_realtime').on('postgres_changes',{event:'*',schema:'public',table:'app_data'},(payload)=>{
      if(!payload.new)return;
      const{key,value}=payload.new;
      if(!value)return;
      if(key==='backlog'&&value.length>0){setBacklog(value);try{localStorage.setItem('rsp_backlog',JSON.stringify(value));}catch(e){}}
      else if(key==='keputusan'&&value.length>0){setKeputusan(value);try{localStorage.setItem('rsp_keputusan',JSON.stringify(value));}catch(e){}}
      else if(key==='jadwal'&&Object.keys(value).length>0){setJadwal(value);try{localStorage.setItem('rsp_jadwal',JSON.stringify(value));}catch(e){}}
      else if(key==='kpi_corp'){setKpiCorp(value);try{localStorage.setItem('rsp_kpi_corp',JSON.stringify(value));}catch(e){}}
      else if(key==='kpi_ceo'){setKpiCeo(value);try{localStorage.setItem('rsp_kpi_ceo',JSON.stringify(value));}catch(e){}}
    }).subscribe();
    return()=>sb2.removeChannel(channel);
  },[]);

  const addI=(items)=>{const n=[...backlog,...items];setBacklog(n);sv('backlog',n);};
  const updI=(id,patch)=>{const n=backlog.map(it=>it.id===id?{...it,...patch}:it);setBacklog(n);sv('backlog',n);};
  const delI=(id)=>{const n=backlog.filter(it=>it.id!==id);setBacklog(n);sv('backlog',n);};
  const addK=(kpt)=>{const n=[kpt,...keputusan];setKeputusan(n);sv('keputusan',n);};
  const updK=(id,patch)=>{const n=keputusan.map(it=>it.id===id?{...it,...patch}:it);setKeputusan(n);sv('keputusan',n);};
  const delK=(id)=>{const n=keputusan.filter(it=>it.id!==id);setKeputusan(n);sv('keputusan',n);};
  const addToJadwal=(date,item)=>{const n={...jadwal};if(!n[date])n[date]=[];n[date]=[...n[date],item];setJadwal(n);sv('jadwal',n);};
  const batchAddToJadwal=(byDate)=>{const n={...jadwal};Object.entries(byDate).forEach(([date,items])=>{if(!n[date])n[date]=[];n[date]=[...(n[date]||[]),...items];});setJadwal(n);sv('jadwal',n);};
  const removeFromJadwal=(date,itemId)=>{const n={...jadwal};if(n[date])n[date]=n[date].filter(it=>it.id!==itemId);setJadwal(n);sv('jadwal',n);};
  const updateJadwal=(date,itemId,patch)=>{const n={...jadwal};if(n[date])n[date]=n[date].map(it=>it.id===itemId?{...it,...patch}:it);setJadwal(n);sv('jadwal',n);};
  const resetJadwalBatch=(batchId)=>{const n={...jadwal};Object.keys(n).forEach(date=>{n[date]=(n[date]||[]).filter(it=>it._icsBatch!==batchId);});setJadwal(n);sv('jadwal',n);};
  const setST=(t,v)=>setSub(p=>({...p,[t]:v}));

  const nc=backlog.filter(it=>it.status==='baru').length;
  const belumCount=keputusan.filter(k=>k.status==='disampaikan'||k.status==='proses').length;

  const TABS=[
    {id:'dashboard',ico:'📊',lbl:'Dash'},
    {id:'jadwal',ico:'📅',lbl:'Jadwal',subs:[{id:'harian',lbl:'Harian'},{id:'mingguan',lbl:'Mingguan'}]},
    {id:'dump'},
    {id:'backlog',ico:'📋',lbl:'Backlog',subs:[{id:'backlog',lbl:'Backlog'},{id:'keputusan',lbl:'Keputusan & Tracking'}]},
    {id:'resume',ico:'📈',lbl:'Resume'},
  ];
  const AT=TABS.find(t=>t.id===tab);

  if(!ready)return<div className="flex items-center justify-center min-h-screen text-stone-400 font-bold text-sm" style={{fontFamily:'"Plus Jakarta Sans",sans-serif'}}>Memuat...</div>;

  return(
    <div id="ac">
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} googleToken={googleToken} googleCalId={googleCalId} googleCals={googleCals} gcalConnecting={gcalConnecting} onConnectGCal={connectGCal} onSelectGCal={selectGCal}/>}
      {/* ── DESKTOP SIDEBAR ── */}
      <aside className="hidden md:flex md:flex-col md:w-56 md:flex-shrink-0 md:sticky md:top-0 md:h-screen md:border-r md:border-stone-200 md:bg-white md:shadow-[2px_0_12px_rgba(0,0,0,0.04)] md:z-50">
        <Sidebar tab={tab} sub={sub} setTab={setTab} setST={setST} nc={nc} belumCount={belumCount}/>
      </aside>

      {/* ── MAIN CONTENT AREA ── */}
      <div className="flex-1 min-w-0 flex flex-col">
        {/* Header */}
        <div className="sticky top-0 z-40 gn border-b border-stone-200">
          <div className="flex justify-between items-center px-4 py-3 md:px-6">
            {/* Mobile: show app name. Desktop: hidden (shown in sidebar) */}
            <div className="md:hidden">
              <div className="text-[16px] font-black tracking-tight text-stone-900 leading-none mb-1">CEO GTD OS</div>
              <div className="text-[10px] font-semibold text-stone-400">PT Raja Sukses Properindo · {new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'short'})}</div>
            </div>
            {/* Desktop: show current tab name */}
            <div className="hidden md:block">
              <div className="text-[18px] font-extrabold text-stone-900 tracking-tight">{AT?.id==='dashboard'?'Dashboard KPI':AT?.id==='jadwal'?'Jadwal CEO':AT?.id==='dump'?'Dump Think':AT?.id==='backlog'?'Backlog':AT?.id==='resume'?'Resume Agenda':'CEO GTD OS'}</div>
              <div className="text-[11px] text-stone-400 font-medium mt-0.5">{new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div className="flex items-center gap-2">
              <div className={`px-3 py-1.5 rounded-full text-[10px] font-bold flex items-center gap-1.5 border ${nc>0?'bg-red-50 text-red-600 border-red-200 shadow-sm':'bg-stone-100 text-stone-500 border-stone-200'}`}>
                <span>{backlog.length} total</span>
                {nc>0&&<><span className="w-1 h-1 rounded-full bg-red-500"/><span>{nc} baru</span></>}
              </div>
              <button onClick={()=>setShowSettings(true)} className={`w-8 h-8 rounded-full flex items-center justify-center text-[14px] border as st ${!getApiKey()?'bg-amber-50 border-amber-200 text-amber-600':'bg-stone-100 border-stone-200 text-stone-500'}`} title="Pengaturan & API Key">⚙️</button>
            </div>
          </div>
          {/* Sub-tabs */}
          {AT?.subs&&(
            <div className="flex bg-stone-50/80 border-t border-stone-200 md:px-2">
              {AT.subs.map(s=>(
                <button key={s.id} className={`flex-1 md:flex-none md:px-6 py-2.5 text-[11px] font-bold st relative flex items-center justify-center gap-1.5 ${sub[tab]===s.id?'text-stone-900':'text-stone-400'}`} onClick={()=>setST(tab,s.id)}>
                  {s.lbl}
                  {s.id==='keputusan'&&belumCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-amber-500 text-white text-[8px] font-black rounded-full">{belumCount}</span>}
                  {sub[tab]===s.id&&<div className="absolute bottom-0 left-1/4 right-1/4 md:left-4 md:right-4 h-0.5 bg-stone-800 rounded-t-md"/>}
                </button>
              ))}
            </div>
          )}
          {/* Filter chips — jadwal only */}
          {tab==='jadwal'&&<div className="px-3 py-2 flex items-center gap-1.5 flex-wrap border-t border-stone-100 bg-white/90 backdrop-blur overflow-x-auto">
            {[['RSP','bg-blue-100 text-blue-700 border-blue-200'],['BT','bg-emerald-100 text-emerald-700 border-emerald-200'],['TKB','bg-amber-100 text-amber-700 border-amber-200'],['Personal','bg-stone-100 text-stone-600 border-stone-300']].map(([k,ac])=>(
              <button key={k} onClick={()=>toggleKat(k)} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.kategori[k]?ac:'bg-white text-stone-300 border-stone-200'}`}>{k}</button>
            ))}
            <div className="w-px h-4 bg-stone-200 flex-shrink-0 mx-0.5"/>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumOutput:!f.belumOutput}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumOutput?'bg-amber-100 text-amber-700 border-amber-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Output</button>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumSiap:!f.belumSiap}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumSiap?'bg-red-100 text-red-600 border-red-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Siap</button>
            {(!jadwalFilter.kategori.RSP||!jadwalFilter.kategori.BT||!jadwalFilter.kategori.TKB||!jadwalFilter.kategori.Personal||jadwalFilter.belumOutput||jadwalFilter.belumSiap)&&<button onClick={()=>setJadwalFilter({kategori:{RSP:true,BT:true,TKB:true,Personal:true},belumOutput:false,belumSiap:false})} className="px-2 py-1 rounded-full text-[9px] font-bold border border-stone-200 bg-stone-50 text-stone-400 as st flex-shrink-0 ml-auto">Reset ✕</button>}
          </div>}
        </div>

        {/* Content */}
        <div className="flex-1 pb-24 md:pb-8 md:max-w-5xl md:w-full md:mx-auto md:px-0">
          {tab==='dashboard'&&<Dashboard weekly={dashWeekly} kpiCorp={kpiCorp} dashMonth={dashMonth} onChangeMonth={setDashMonth}/>}
          {tab==='jadwal'&&sub.jadwal==='harian'&&<JadwalHarian backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onRemoveJadwal={removeFromJadwal} onUpdateJadwal={updateJadwal} onUpdate={updI} onAddKeputusan={addK} filter={jadwalFilter} onPushItem={pushItemToGCal} onPushDay={pushDayToGCal} gcalReady={!!googleToken&&!!googleCalId}/>}
          {tab==='jadwal'&&sub.jadwal==='mingguan'&&<JadwalMingguan backlog={backlog} jadwal={jadwal} filter={jadwalFilter}/>}
          {tab==='dump'&&<DumpPage onAdd={addI} onAddKeputusan={addK} onAddJadwal={addToJadwal} onBatchAddJadwal={batchAddToJadwal} onUpdateJadwal={updateJadwal} onResetICSBatch={resetJadwalBatch} onSaveKpiCorp={saveKpiCorp} onSaveKpiCeo={saveKpiCeo} jadwal={jadwal} backlog={backlog} onDone={()=>{setTab('backlog');setST('backlog','backlog');}}/>}
          {tab==='backlog'&&sub.backlog==='backlog'&&<BacklogList backlog={backlog} onUpdate={updI} onDelete={delI} onAddKeputusan={addK}/>}
          {tab==='backlog'&&sub.backlog==='keputusan'&&<Keputusan keputusan={keputusan} onUpdate={updK} onDelete={delK} onAddKeputusan={addK}/>}
          {tab==='resume'&&<AnalisaJadwal backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onAddBacklog={addI} onUpdateBacklog={updI}/>}
        </div>

        {/* ── MOBILE BOTTOM NAV (hidden on desktop) ── */}
        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-200 z-50 rounded-t-3xl shadow-nav">
          <div className="flex justify-between items-end h-[68px] relative px-2">
            {[TABS[0],TABS[1]].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} className={`flex flex-col items-center flex-1 pb-3 st ${tab===t.id?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
                <span className="text-[22px] mb-1">{t.ico}</span>
                <span className={`text-[9px] ${tab===t.id?'font-extrabold':'font-semibold'}`}>{t.lbl}</span>
              </button>
            ))}
            <div className="flex-1 flex justify-center pb-5 relative">
              <button onClick={()=>setTab('dump')} className={`absolute bottom-5 w-14 h-14 rounded-full flex items-center justify-center text-[26px] shadow-fab border-[3px] border-white z-50 st as ${tab==='dump'?'bg-stone-900 text-white rotate-45':'bg-stone-800 text-white'}`}>{tab==='dump'?'✕':'＋'}</button>
            </div>
            <button onClick={()=>setTab('backlog')} className={`flex flex-col items-center flex-1 pb-3 relative st ${tab==='backlog'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              {nc>0&&<span className="absolute top-1.5 right-4 w-2 h-2 bg-red-500 rounded-full border border-white"/>}
              <span className="text-[22px] mb-1">📋</span>
              <span className={`text-[9px] ${tab==='backlog'?'font-extrabold':'font-semibold'}`}>Backlog</span>
            </button>
            <button onClick={()=>setTab('resume')} className={`flex flex-col items-center flex-1 pb-3 st ${tab==='resume'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              <span className="text-[22px] mb-1">📈</span>
              <span className={`text-[9px] ${tab==='resume'?'font-extrabold':'font-semibold'}`}>Resume</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
