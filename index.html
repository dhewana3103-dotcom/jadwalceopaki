// ── ICS HELPERS ───────────────────────────────────────────────
function stripHtml(html){
  try{
    var tmp=document.createElement('div');
    var h=html
      .replace(/<br\s*\/?>/gi,'\n')
      .replace(/<\/p>/gi,'\n\n')
      .replace(/<\/div>/gi,'\n')
      .replace(/<\/li>/gi,'\n')
      .replace(/<li[^>]*>/gi,'• ')
      .replace(/<\/h[1-6]>/gi,'\n\n')
      .replace(/<h[1-6][^>]*>/gi,'\n')
      .replace(/<\/tr>/gi,'\n')
      .replace(/<\/td>/gi,' | ');
    tmp.innerHTML=h;
    return(tmp.textContent||tmp.innerText||'').replace(/\n{3,}/g,'\n\n').trim();
  }catch(e){
    return html.replace(/<[^>]+>/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&nbsp;/g,' ').replace(/\s{2,}/g,' ').trim();
  }
}
function linkify(text){
  if(!text)return text;
  var parts=text.split(/(https?:\/\/[^\s]+)/g);
  return parts.map(function(part,i){
    if(/^https?:\/\//.test(part)){
      return <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-blue-600 underline break-all" onClick={function(e){e.stopPropagation();}}>{part}</a>;
    }
    return part;
  });
}
function parseGCalDesc(raw){
  try{
    if(!raw)return{};
    var isHtml=/<[a-z][\s\S]*>/i.test(raw);
    var text=isHtml?stripHtml(raw):raw.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\:/g,':').trim();
    return{desc:text};
  }catch(e){return{};}
}

function parseDTStr(val){
  const isUTC=val.endsWith('Z');
  const c=val.replace('Z','');
  let yr=+c.slice(0,4),mo=+c.slice(4,6),dy=+c.slice(6,8),hr=0,mn=0;
  if(c.length>8){const ti=c.indexOf('T');if(ti>=0){hr=+c.slice(ti+1,ti+3)||0;mn=+c.slice(ti+3,ti+5)||0;}}
  if(isUTC){
    const d=new Date(Date.UTC(yr,mo-1,dy,hr+7,mn));
    return{dateStr:d.toISOString().slice(0,10),timeStr:`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`,ts:d.getTime()};
  }
  const d=new Date(yr,mo-1,dy,hr,mn);
  return{dateStr:`${yr}-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`,timeStr:`${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`,ts:d.getTime()};
}
function expandRRuleICS(dtStartTs,durationMs,rruleStr,rangeStart,rangeEnd){
  const p={};rruleStr.split(';').forEach(s=>{const[k,v]=s.split('=');p[k]=v;});
  const freq=p.FREQ;
  const DAY={'MO':1,'TU':2,'WE':3,'TH':4,'FR':5,'SA':6,'SU':0};
  const days=p.BYDAY?p.BYDAY.split(',').map(d=>DAY[d.replace(/[-+\d]/g,'')]):null;
  const maxC=p.COUNT?+p.COUNT:400;
  const untilTs=p.UNTIL?(()=>{const c=p.UNTIL.replace('Z','');return new Date(+c.slice(0,4),+c.slice(4,6)-1,+c.slice(6,8)).getTime();})():Infinity;
  const rsTs=new Date(rangeStart+'T00:00:00').getTime();
  const reTs=new Date(rangeEnd+'T23:59:59').getTime();
  const limitTs=Math.min(untilTs,reTs);
  const results=[];let cur=new Date(dtStartTs);let count=0;
  while(cur.getTime()<=limitTs&&count<maxC){
    const ok=!days||days.includes(cur.getDay());
    if(ok&&cur.getTime()>=rsTs){results.push({start:new Date(cur),end:new Date(cur.getTime()+durationMs)});count++;}
    if(freq==='DAILY')cur.setDate(cur.getDate()+1);
    else if(freq==='WEEKLY'&&days)cur.setDate(cur.getDate()+1);
    else if(freq==='WEEKLY')cur.setDate(cur.getDate()+7);
    else if(freq==='MONTHLY')cur.setMonth(cur.getMonth()+1);
    else break;
  }
  return results;
}
function mapICSEvent(rawSummary){
  const s=rawSummary.replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\;/g,';').trim();
  const parts=s.split(' - ');
  let prefix='',detail=s,suffix='';
  if(parts.length>=3){prefix=parts[0].trim();suffix=parts[parts.length-1].trim();detail=parts.slice(1,-1).join(' - ').trim();}
  else if(parts.length===2){prefix=parts[0].trim();detail=parts[1].trim();}
  const pU=prefix.toUpperCase().replace(/^\(CANCELLED\) /,'');
  let kat='Personal';
  if(pU==='RSP')kat='RSP';
  else if(['BT','BT & TKB','RSP & BT','BT X TKB'].some(x=>pU===x||pU.endsWith('BT')))kat='BT';
  else if(pU==='TKB'||pU==='HOLDING')kat='TKB';
  const sfU=suffix.toUpperCase();const dtL=detail.toLowerCase();
  let jenis='Personal';
  if(kat!=='Personal'){
    jenis='Meeting Review Operasional + Evaluasi Tim';
    if(sfU.includes('DISCUSSION')||sfU.includes('APPROVAL')||sfU.includes('DECISION')||sfU.includes('BRAINSTORM')||sfU.includes('DISCUSS'))jenis='Meeting Strategic/Problem Solving/Approval';
    else if(sfU.includes('REVIEW')||sfU.includes('UPDATE')||sfU.includes('EVALUASI'))jenis='Meeting Review Operasional + Evaluasi Tim';
    else if(sfU.includes('KONTEN')||sfU.includes('MENULIS')||sfU.includes('PODCAST')||dtL.includes('take konten'))jenis='Bikin Konten';
    else if(sfU.includes('GENBA')||dtL.includes('genba'))jenis='Genba';
    else if(sfU.includes('DEEP')||sfU.includes('THINKING')||sfU.includes('THINK'))jenis='Deepwork Strategic';
    else if(sfU.includes('ENGAGE'))jenis='Employee Engage';
  }
  let kpi='people';
  if(kat==='RSP'){kpi=jenis==='Genba'?'riset':jenis.includes('Review')?'operasional':'operasional';}
  else if(kat==='BT')kpi='branding';
  else if(kat==='TKB')kpi='finansial';
  return{prefix,detail:detail||s,suffix,kategori:kat,jenisKegiatan:jenis,relateMilestone:kpi};
}
function parseICS(icsText,rangeStart,rangeEnd){
  const text=icsText.replace(/\r?\n[ \t]/g,'');
  const blocks=text.split('BEGIN:VEVENT').slice(1).map(b=>b.split('END:VEVENT')[0]);
  const events=[];
  blocks.forEach(block=>{
    const props={};
    block.split('\n').forEach(line=>{
      line=line.trim();const ci=line.indexOf(':');if(ci<0)return;
      const rawKey=line.slice(0,ci);const val=line.slice(ci+1);
      const name=rawKey.split(';')[0];
      if(!props[name])props[name]=val;
    });
    const summary=props['SUMMARY']||'';if(!summary)return;
    if((props['STATUS']||'').toUpperCase()==='CANCELLED')return;
    const dtSV=props['DTSTART'];const dtEV=props['DTEND'];if(!dtSV)return;
    const start=parseDTStr(dtSV);const end=dtEV?parseDTStr(dtEV):start;
    const durMs=Math.max(end.ts-start.ts,900000); // min 15min
    const mapped=mapICSEvent(summary);
    // Parse description for structured fields
    const descRaw=props['DESCRIPTION']||'';
    const brief=parseGCalDesc(descRaw);
    function mk(s,e){
      const ds=new Date(s),de=new Date(e);
      const dateStr=`${ds.getFullYear()}-${String(ds.getMonth()+1).padStart(2,'0')}-${String(ds.getDate()).padStart(2,'0')}`;
      return{id:'SJ-'+genId(),tanggal:dateStr,jamMulai:`${String(ds.getHours()).padStart(2,'0')}:${String(ds.getMinutes()).padStart(2,'0')}`,jamSelesai:`${String(de.getHours()).padStart(2,'0')}:${String(de.getMinutes()).padStart(2,'0')}`,masalahBacklogId:'',masalahText:'',kategori:mapped.kategori,jenisKegiatan:mapped.jenisKegiatan,detailKegiatan:mapped.detail||summary,relateMilestone:mapped.relateMilestone,outputKeputusan:'',gcalDesc:brief.desc||''};
    }
    if(props['RRULE']){
      expandRRuleICS(start.ts,durMs,props['RRULE'],rangeStart,rangeEnd).forEach(({start:s,end:e})=>{
        const item=mk(s,e);if(item.tanggal>=rangeStart&&item.tanggal<=rangeEnd)events.push(item);
      });
    }else{
      if(start.dateStr>=rangeStart&&start.dateStr<=rangeEnd)events.push(mk(new Date(start.ts),new Date(end.ts)));
    }
  });
  return events.sort((a,b)=>a.tanggal.localeCompare(b.tanggal)||(a.jamMulai||'').localeCompare(b.jamMulai||''));
}

// ── IMPORT ICS ────────────────────────────────────────────────
function ImportICS({onBatchAddJadwal,onResetICSBatch}){
  const [icsText,setIcsText]=useState('');
  const [preview,setPreview]=useState(null);
  const [done,setDone]=useState(false);
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [lastBatch,setLastBatch]=useState(()=>{try{const s=localStorage.getItem('rsp_last_ics');return s?JSON.parse(s):null;}catch{return null;}});
  const fileRef=React.useRef();

  const rangeStart=(()=>{const d=new Date();d.setDate(d.getDate()-30);return d.toISOString().slice(0,10);})();
  const rangeEnd=(()=>{const d=new Date();d.setFullYear(d.getFullYear()+1);return d.toISOString().slice(0,10);})();

  function handleFile(e){const f=e.target.files[0];if(!f)return;setErr('');const r=new FileReader();r.onload=ev=>setIcsText(ev.target.result);r.readAsText(f,'UTF-8');}

  function doParse(){
    setErr('');setDone(false);setLoading(true);
    if(!icsText.trim()||!icsText.includes('BEGIN:VCALENDAR')){setErr('File bukan format ICS yang valid.');setLoading(false);return;}
    try{
      const events=parseICS(icsText,rangeStart,rangeEnd);
      if(!events.length){setErr('Tidak ada event dalam range bulan ini s.d. 1 tahun ke depan.');setLoading(false);return;}
      // Stats
      const byKat={},byJenis={},byMonth={};
      events.forEach(it=>{
        byKat[it.kategori]=(byKat[it.kategori]||0)+1;
        byJenis[it.jenisKegiatan]=(byJenis[it.jenisKegiatan]||0)+1;
        const m=it.tanggal.slice(0,7);byMonth[m]=(byMonth[m]||0)+1;
      });
      setPreview({events,byKat,byJenis,byMonth,sample:events.slice(0,8)});
    }catch(e){setErr('Gagal parse: '+e.message);}
    setLoading(false);
  }

  function doConfirm(){
    if(!preview)return;
    const batchId='ICS-'+genId();
    const byDate={};
    preview.events.forEach(it=>{
      const tagged={...it,_icsBatch:batchId};
      if(!byDate[it.tanggal])byDate[it.tanggal]=[];
      byDate[it.tanggal].push(tagged);
    });
    onBatchAddJadwal(byDate);
    // Save batch info for potential reset
    try{localStorage.setItem('rsp_last_ics',JSON.stringify({batchId,count:preview.events.length,at:todayStr()}));}catch(e){}
    setPreview(null);setIcsText('');setDone(true);setLastBatch({batchId,count:preview.events.length,at:todayStr()});
  }

  function doReset(){
    if(!lastBatch)return;
    if(!confirm(`Hapus ${lastBatch.count} event dari import ICS tanggal ${lastBatch.at}?`))return;
    onResetICSBatch(lastBatch.batchId);
    try{localStorage.removeItem('rsp_last_ics');}catch(e){}
    setLastBatch(null);setDone(false);
  }

  return(
    <div className="p-4 pb-10 afi md:px-6">
      <div className="bg-violet-50 border border-violet-100 rounded-2xl p-4 mb-5">
        <div className="text-[12px] font-extrabold text-violet-800 mb-1">🗓 Import dari Google Calendar (.ics)</div>
        <div className="text-[11px] text-violet-700 leading-relaxed mb-1">Di Google Calendar: <strong>⚙️ Settings → Import & Export → Export</strong>, download file .ics, lalu upload di sini.</div>
        <div className="text-[10px] text-violet-600">Range import: <strong>30 hari lalu</strong> s.d. <strong>{rangeEnd}</strong></div>
      </div>

      {/* Reset last batch */}
      {lastBatch&&<div className="bg-stone-50 border border-stone-200 rounded-2xl p-3.5 mb-4 flex items-center justify-between gap-3">
        <div>
          <div className="text-[11px] font-bold text-stone-700">Import terakhir: {lastBatch.count} event ({lastBatch.at})</div>
          <div className="text-[10px] text-stone-400 mt-0.5">Belum pernah direset sejak import</div>
        </div>
        <button className="flex-shrink-0 px-3 py-2 rounded-xl bg-red-50 border border-red-200 text-[10px] font-bold text-red-600 as st hover:bg-red-100" onClick={doReset}>🗑 Batalkan Import</button>
      </div>}

      <input type="file" accept=".ics" ref={fileRef} onChange={handleFile} className="hidden"/>
      <div className={`border-2 border-dashed rounded-2xl p-8 text-center cursor-pointer st mb-4 ${icsText?'border-violet-400 bg-violet-50':'border-stone-300 hover:border-violet-400 hover:bg-violet-50'}`} onClick={()=>fileRef.current&&fileRef.current.click()}>
        <div className="text-3xl mb-2">{icsText?'✅':'📁'}</div>
        {icsText?(
          <div><div className="text-[12px] font-bold text-violet-700">File terbaca</div><div className="text-[10px] text-violet-500 mt-1">{icsText.split('BEGIN:VEVENT').length-1} events dalam file</div></div>
        ):(
          <div><div className="text-[12px] font-bold text-stone-600">Klik untuk upload file .ics</div><div className="text-[10px] text-stone-400 mt-1">Export dari Google Calendar Settings</div></div>
        )}
      </div>

      {err&&<div className="p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
      {done&&<div className="p-3 rounded-xl bg-emerald-50 border border-emerald-100 text-[11px] text-emerald-700 mb-4">✅ Jadwal berhasil diimport dari Google Calendar!</div>}

      <button className={`w-full py-3.5 rounded-2xl text-[12px] font-extrabold st as mb-4 ${!icsText.trim()||loading?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-violet-600 text-white shadow-float'}`} onClick={doParse} disabled={!icsText.trim()||loading}>
        {loading?<span className="animate-pulse">Memproses...</span>:'🔍 Parse & Preview'}
      </button>

      {preview&&<div className="afi">
        <div className="flex items-center justify-between mb-4">
          <div className="text-[12px] font-bold text-stone-800">{preview.events.length} event siap diimport</div>
          <button className="text-[10px] text-stone-400 font-semibold as" onClick={()=>setPreview(null)}>✕ Reset</button>
        </div>

        {/* Stats per kategori */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
          {Object.entries(preview.byKat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
            const c={RSP:'bg-blue-50 border-blue-200 text-blue-700',BT:'bg-emerald-50 border-emerald-200 text-emerald-700',TKB:'bg-amber-50 border-amber-200 text-amber-700',Personal:'bg-stone-50 border-stone-200 text-stone-600'}[k]||'bg-stone-50 border-stone-200 text-stone-600';
            return(<div key={k} className={`rounded-xl p-3 text-center border ${c}`}><div className="text-xl font-black">{v}</div><div className="text-[10px] font-bold mt-0.5">{k}</div></div>);
          })}
        </div>

        {/* Stats per jenis */}
        <div className="bg-white border border-stone-200 rounded-2xl p-4 mb-4 shadow-soft">
          <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-3">Distribusi per Jenis Kegiatan</div>
          <div className="space-y-2">
            {Object.entries(preview.byJenis).sort((a,b)=>b[1]-a[1]).map(([j,v])=>{
              const max=Math.max(...Object.values(preview.byJenis));
              return(<div key={j} className="flex items-center gap-2">
                <div className="text-[10px] text-stone-600 font-medium flex-shrink-0" style={{width:160}}>{JENIS_SHORT[j]||j}</div>
                <div className="flex-1 bg-stone-100 rounded-full h-2"><div className="bg-violet-400 h-2 rounded-full" style={{width:`${(v/max)*100}%`}}/></div>
                <div className="text-[10px] font-bold text-stone-600 w-8 text-right">{v}x</div>
              </div>);
            })}
          </div>
        </div>

        {/* Sample events */}
        <div className="text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2">8 Event Pertama (sample)</div>
        <div className="bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-soft mb-4">
          {preview.sample.map((it,i)=>{
            const kpi=KPI5.find(k=>k.id===it.relateMilestone);
            const kColor=KATEGORI_COLOR[it.kategori]||'bg-stone-100 text-stone-600';
            const jColor=JENIS_COLOR[it.jenisKegiatan]||'bg-stone-100 text-stone-600';
            return(<div key={i} className={`px-4 py-3 flex items-center gap-3 ${i<preview.sample.length-1?'border-b border-stone-100':''}`}>
              <div className="flex-shrink-0 text-right" style={{minWidth:90}}>
                <div className="text-[10px] font-bold text-stone-600">{it.tanggal}</div>
                <div className="text-[10px] text-stone-400 font-mono">{it.jamMulai}–{it.jamSelesai}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-[11px] font-semibold text-stone-800 truncate mb-1">{it.detailKegiatan}</div>
                <div className="flex gap-1 flex-wrap">
                  <span className={`px-1.5 py-0.5 rounded-full text-[8px] font-bold ${kColor}`}>{it.kategori}</span>
                  <span className={`px-1.5 py-0.5 rounded text-[8px] font-bold ${jColor}`}>{JENIS_SHORT[it.jenisKegiatan]||it.jenisKegiatan}</span>
                  {kpi&&<KC id={kpi.id} sm/>}
                </div>
              </div>
            </div>);
          })}
        </div>

        <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 mb-4 text-[10px] text-amber-700 leading-relaxed">
          ⚠️ Import akan <strong>menambah</strong> event ke jadwal yang sudah ada. KPI bisa dikoreksi setelah import via Jadwal Harian.
        </div>
        <button className="w-full py-3.5 rounded-2xl bg-violet-600 text-white text-[12px] font-bold shadow-md as st" onClick={doConfirm}>
          ✓ Import {preview.events.length} event dari Google Calendar
        </button>
      </div>}
    </div>
  );
}


// ── KPI HELPERS ───────────────────────────────────────────────
function parsePct(v){if(!v)return 0;const n=parseFloat(String(v).replace('%','').replace(',','.').trim());return isNaN(n)?0:Math.round(n);}
function parseKPINum(v){if(!v)return null;const s=String(v).trim();if(!s||s==='-'||s==='0')return null;const n=parseFloat(s.replace(/[^0-9.]/g,''));return isNaN(n)?null:n;}
function tsvToWeekly(rows){
  const weekly={W1:{},W2:{},W3:{},W4:{},W5:{}};
  const MAP={'booking':'booking','unit ready':'ready_stock','sp3k':'sp3k','akad':'akad','temuan kecepatan':'kecepatan','temuan fraud':'fraud','complain produk (afs)':'afs','complain non produk':'non_produk','complain utility':'utility','complain berulang':'berulang','lahan baru':'lahan_baru','realisasi sistemasi':'sistemasi','jumlah sistem':'sistem_dampak','kepuasan penggunaan':'kepuasan_sistem','pemenuhan sdm':'sdm_rekrut','perrfomance sdm':'performa_sdm','performance sdm':'performa_sdm','retensi sdm':'retensi_sdm','pencairan':'pencairan','budgeting':'budgeting'};
  function findId(name){const n=(name||'').toLowerCase().trim();for(const[k,v] of Object.entries(MAP)){if(n.includes(k))return v;}return null;}
  rows.forEach(r=>{
    const id=findId(r.sub);if(!id)return;
    [['W1','w1'],['W2','w2'],['W3','w3'],['W4','w4']].forEach(([wk,rk])=>{
      const d=r[rk];if(!d)return;
      weekly[wk][id]={aktual:parseKPINum(d.aktual),pct:parsePct(d.pct)};
    });
  });
  ['W1','W2','W3','W4','W5'].forEach(w=>{if(!Object.keys(weekly[w]).length)weekly[w]=null;});
  return weekly;
}
function parseKPICorpTSV(text){
  const lines=text.trim().split(/\r?\n/);
  let start=0;
  for(let i=0;i<Math.min(6,lines.length);i++){
    const c=lines[i].split('\t');
    if(c[3]&&(c[3].toLowerCase().includes('sub indikator')||c[3].toLowerCase().includes('booking')||c[3].toLowerCase().includes('unit ready'))){start=c[3].toLowerCase().includes('sub')?i+2:i;break;}
  }
  let lastDiv='',lastInd='';
  const rows=[];const totals={W1:null,W2:null,W3:null,W4:null};
  for(let i=start;i<lines.length;i++){
    const c=lines[i].split('\t').map(x=>(x||'').trim());
    if((c[0]||c[1]||'').toLowerCase().includes('total')){
      const rowTxt=lines[i];
      ['1','2','3','4'].forEach(n=>{
        const re=new RegExp('W'+n+'\\t+([\\d.]+%?)\\t+([\\d.]+%?)');
        const m=rowTxt.match(re);
        if(m)totals['W'+n]={bobot:parsePct(m[1]),skor:parsePct(m[2])};
      });
      continue;
    }
    if(c[0])lastDiv=c[0];if(c[1])lastInd=c[1];
    const sub=c[3];
    if(!sub||sub.toLowerCase().includes('target')||sub.toLowerCase().includes('indikator')||sub.toLowerCase().includes('bobot'))continue;
    rows.push({divisi:lastDiv,indikator:lastInd,bobotSub:c[4],sub,
      w1:{target:c[6],aktual:c[7],pct:c[8],nilai:c[9]},
      w2:{target:c[10],aktual:c[11],pct:c[12],nilai:c[13]},
      w3:{target:c[14],aktual:c[15],pct:c[16],nilai:c[17]},
      w4:{target:c[18],aktual:c[19],pct:c[20],nilai:c[21]},
    });
  }
  return{rows,totals,weekly:tsvToWeekly(rows)};
}

      {err&&<div className="p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
      {done&&<div className="p-3 rounded-xl bg-emerald-50 border border-emerald-100 text-[11px] text-emerald-700 mb-4">✅ KPI Corporate {savedMonth?new Date(savedMonth+'-01').toLocaleDateString('id-ID',{month:'long',year:'numeric'}):''} berhasil disimpan! Buka tab Dashboard → pilih bulan yang baru diimport.</div>}

        <div className="grid grid-cols-4 gap-2 mb-4">

            <tr key={i} className="hover:bg-stone-50"><td className="px-3 py-2 font-medium text-stone-700 max-w-[180px]">{r.sub}</td>

// ── BOOKING INPUT ─────────────────────────────────────────────
function BookingInput({onSave}){
  const [mode,setMode]=useState('actuals');
  const [tsv,setTsv]=useState('');
  const [preview,setPreview]=useState(null);
  const [done,setDone]=useState(false);
  const [err,setErr]=useState('');

  function parseTSV(){
    setErr('');setPreview(null);setDone(false);
    const lines=tsv.trim().split(/\r?\n/).filter(function(l){return l.trim();});
    if(lines.length<2){setErr('Data terlalu sedikit');return;}
    var year=new Date().getFullYear()+'';
    var headerLineIdx=0;
    if(mode==='actuals'){
      for(var li=0;li<Math.min(lines.length,3);li++){const ym=lines[li].match(/\b(20\d{2})\b/);if(ym){year=ym[1];break;}}
      headerLineIdx=lines.findIndex(function(l){return Object.keys(MONTH_IDX).some(function(m){return l.includes(m);});});
      if(headerLineIdx===-1){setErr('Header bulan tidak ditemukan');return;}
    }else{
      headerLineIdx=lines.findIndex(function(l){return Object.keys(MONTH_IDX).some(function(m){return l.includes(m);});});
      if(headerLineIdx===-1)headerLineIdx=0;
    }
    const sep=lines[headerLineIdx].includes('\t')?'\t':',';
    const headers=lines[headerLineIdx].split(sep).map(function(h){return h.trim();});
    const colMonths={};
    headers.forEach(function(h,i){if(i===0)return;var m=MONTH_IDX[h];if(m)colMonths[i]=m;});
    if(Object.keys(colMonths).length===0){setErr('Kolom bulan tidak ditemukan');return;}
    const result={};
    const SKIP=['Grand Total','grand total','GRAND TOTAL','Total'];
    lines.slice(headerLineIdx+1).forEach(function(line){
      if(!line.trim())return;
      const parts=line.split(sep);
      const proj=(parts[0]||'').trim();
      if(!proj||SKIP.some(function(s){return proj.startsWith(s);}))return;
      var rowTotal=0;
      const projData={};
      Object.entries(colMonths).forEach(function(e){var ci=parseInt(e[0]),mn=e[1];var raw=(parts[ci]||'').trim().replace(/,/g,'');var val=parseInt(raw);if(!isNaN(val)&&val>0){projData[mn]=val;rowTotal+=val;}});
      if(rowTotal>0)result[proj]=projData;
    });
    const pc=Object.keys(result).length;
    if(pc===0){setErr('Tidak ada data proyek ditemukan — cek format');return;}
    setPreview({year,result,pc});
  }

  function doSave(){
    if(!preview)return;
    var patch={};
    if(mode==='actuals')patch={actuals:{[preview.year]:preview.result}};
    else patch={targets:{[preview.year]:preview.result}};
    onSave(patch);setDone(true);setTsv('');setPreview(null);
  }

  return(
    <div className="p-4 pb-10 md:px-6">
      <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-4">
        <div className="text-[12px] font-extrabold text-blue-800 mb-1">📈 Import Data Booking</div>
        <div className="text-[11px] text-blue-700">Copy dari spreadsheet → paste. Import Aktual dan Target secara terpisah.</div>
      </div>
      <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1 mb-4">
        <button className={`flex-1 py-2.5 rounded-xl text-[11px] font-bold st as ${mode==='actuals'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={function(){setMode('actuals');setPreview(null);setDone(false);}}>📊 Aktual</button>
        <button className={`flex-1 py-2.5 rounded-xl text-[11px] font-bold st as ${mode==='targets'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={function(){setMode('targets');setPreview(null);setDone(false);}}>🎯 Target</button>
      </div>
      <div className="text-[10px] text-stone-400 mb-2">{mode==='actuals'?'Dari spreadsheet BOOKING YYYY → Select All → Ctrl+C → Paste':'Dari spreadsheet target → Select All → Ctrl+C → Paste'}</div>
      <textarea className="w-full min-h-[160px] p-3 rounded-2xl border border-stone-200 bg-stone-50 text-[10px] font-mono focus:outline-none focus:ring-2 focus:ring-stone-400 resize-y mb-4" value={tsv} onChange={function(e){setTsv(e.target.value);setPreview(null);setDone(false);}} placeholder={mode==='actuals'?'BOOKING 2026\n\nProject Area\tJan\tFeb\t...\nProyek A\t10\t15':'Project\tJan\tFeb\t...\nProyek A\t29\t34'}/>
      {err&&<div className="p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
      {done&&<div className="p-3 rounded-xl bg-emerald-50 border border-emerald-100 text-[11px] text-emerald-700 mb-4">✅ Data {mode==='actuals'?'Aktual':'Target'} {preview&&preview.year} tersimpan!</div>}
      <button className={`w-full py-3.5 rounded-2xl text-[12px] font-extrabold st as mb-4 ${!tsv.trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-900 text-white shadow-float'}`} onClick={parseTSV} disabled={!tsv.trim()}>🔍 Parse & Preview</button>
      {preview&&<div className="afi">
        <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-soft mb-4">
          <div className="text-[12px] font-bold text-stone-800 mb-3">{preview.pc} proyek · {preview.year} · {mode==='actuals'?'Aktual':'Target'}</div>
          <div className="overflow-x-auto"><table className="w-full text-[10px]" style={{minWidth:380}}>
            <thead><tr className="bg-stone-50 border-b border-stone-100 text-[9px] text-stone-400 uppercase"><th className="px-2 py-1.5 text-left">Proyek</th>{[1,2,3,4,5,6].map(function(m){return<th key={m} className="px-2 py-1.5 text-center">{MONTH_LBL[m]}</th>;})}<th className="px-2 py-1.5 text-center font-bold">Total</th></tr></thead>

// ── DUMP INPUT ────────────────────────────────────────────────
function DumpInput({onAdd,onDone}){
  const [text,setText]=useState('');
  const [sumber,setSumber]=useState('CEO');
  const [preview,setPreview]=useState([]);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [imgSrc,setImgSrc]=useState(null);
  const [imgB64,setImgB64]=useState(null);
  const [imgMime,setImgMime]=useState(null);
  const fileRef=useRef();

  function handleImg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onloadend=()=>{setImgSrc(r.result);setImgMime(f.type);setImgB64(r.result.replace('data:','').replace(/^.+,/,''));};r.readAsDataURL(f);}
  function removeImg(){setImgSrc(null);setImgB64(null);setImgMime(null);if(fileRef.current)fileRef.current.value='';}

  async function extract(){
    setErr('');setPreview([]);
    if(!text.trim()&&!imgB64){setErr('Tulis atau lampirkan gambar dulu.');return;}
    setLoading(true);
    try{
      const userContent=[];
      if(imgB64)userContent.push({type:'image',source:{type:'base64',media_type:imgMime,data:imgB64}});
      userContent.push({type:'text',text:`Kamu adalah AI assistant untuk CEO GTD OS di PT Raja Sukses Properindo (developer properti syariah).

Extract item-item backlog dari input berikut. Setiap item harus:
- konteks: topik/tema singkat (max 50 karakter)
- isi: issue/situasi/feedback yang perlu direspons CEO (max 150 karakter)
- action: apa yang perlu dilakukan CEO (max 100 karakter)
- fungsiKPI: salah satu dari [finansial, branding, riset, operasional, people]
- kategori: salah satu dari [Deepwork Strategic, Meeting Strategic, Meeting Review Ops, Ketemu External, Bikin Konten, Genba, Employee Engage]
- blokWaktu: salah satu dari [pagi-dalam, pagi-aktif, siang-dinamis, sore-review, malam-keputusan]
- prioritas: salah satu dari [tinggi, sedang, rendah]

Input:
${text||'(lihat gambar)'}

Return HANYA JSON array valid, tidak ada teks lain, tidak ada markdown fences:
[{"konteks":"...","isi":"...","action":"...","fungsiKPI":"...","kategori":"...","blokWaktu":"...","prioritas":"..."}]`});

      const raw=await callAI([{role:'user',content:userContent}],1500);
      const clean=raw.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);
      setPreview(parsed.map(p=>({...p,pic:null,deadline:null,notes:''})));
    }catch(e){
      setErr('Gagal extract: '+e.message+'. Coba lagi atau periksa koneksi.');
    }
    setLoading(false);
  }

  function addAll(){
    onAdd(preview.map(p=>({id:'BL-'+genId(),sumber,tanggal:todayStr(),...p,status:'baru'})));
    setText('');setPreview([]);removeImg();if(onDone)onDone();
  }

  return(
    <div className="p-4 pb-10 afi">
      <div className="bg-white rounded-3xl border border-stone-200 shadow-soft p-5 mb-6">
        <div className="flex justify-between items-center mb-4">
          <div className="text-[14px] font-extrabold text-stone-800 flex items-center gap-2"><span>🧠</span> Brain Dump</div>
          <div className="flex bg-stone-100 p-1 rounded-xl border border-stone-200">
            {['CEO','PA','PDCA'].map(s=><button key={s} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold st ${sumber===s?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setSumber(s)}>{s}</button>)}
          </div>
        </div>
        <textarea className="w-full min-h-[130px] p-4 rounded-2xl border border-stone-200 bg-stone-50 text-[13px] text-stone-800 focus:outline-none focus:ring-2 focus:ring-stone-400 st resize-y placeholder-stone-400 leading-relaxed shadow-inner mb-4" value={text} onChange={e=>setText(e.target.value)} placeholder={"Tumpahkan pikiran, arahan, laporan, atau masalah...\n\nContoh:\nCashflow Bekasi negatif perlu keputusan CEO segera. Konten Q2 belum ada blueprint. Rekrutmen posisi kritis mandek."}/>
        {imgSrc&&<div className="mb-4 relative inline-block"><img src={imgSrc} alt="" className="h-20 w-auto rounded-xl border border-stone-200 shadow-sm object-cover"/><button onClick={removeImg} className="absolute -top-2 -right-2 bg-stone-900 text-white w-5 h-5 rounded-full flex items-center justify-center text-[9px] font-bold shadow-md">✕</button></div>}
        <div className="flex gap-2 mb-4">
          <input type="file" accept="image/*" ref={fileRef} onChange={handleImg} className="hidden"/>
          <button className="flex-1 py-2.5 px-4 rounded-xl border border-stone-200 bg-white text-[11px] font-bold text-stone-700 as st flex items-center justify-center gap-2" onClick={()=>fileRef.current&&fileRef.current.click()}><span>📎</span> Lampirkan Screenshot / MOM</button>
        </div>
        {err&&<div className="p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
        <div className="flex items-start gap-2.5 p-3 rounded-xl bg-blue-50 border border-blue-100 mb-4">
          <span className="text-blue-400 text-sm mt-0.5">✨</span>
          <div className="text-[10px] text-blue-700 leading-relaxed"><strong className="font-bold">AI akan extract</strong> — Konteks · Isi/Issue · Action · Fungsi KPI · Kategori · Blok Waktu · Prioritas. Preview dulu sebelum simpan.</div>
        </div>
        <button className={`w-full py-4 rounded-2xl text-[12px] font-extrabold flex justify-center items-center gap-2 st as ${loading||(!text.trim()&&!imgB64)?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-900 text-white shadow-float'}`} onClick={extract} disabled={loading||(!text.trim()&&!imgB64)}>

          </div>
          <div className="space-y-3 mb-4">
            {preview.map((item,i)=>{const k=KPI5.find(x=>x.id===item.fungsiKPI);return(
              <div key={i} className="bg-white rounded-2xl border border-stone-200 shadow-sm overflow-hidden relative">
                <div className={`absolute left-0 top-0 bottom-0 w-1 ${k?k.bg:'bg-stone-200'}`}/>
                <div className="p-3.5 pl-4">
                  <div className={`text-[9px] font-extrabold uppercase tracking-widest mb-1 ${k?k.color:'text-stone-400'}`}>{item.konteks}</div>
                  <div className="text-[12px] font-bold text-stone-800 leading-snug mb-2">{item.isi}</div>
                  {item.action&&<div className="flex items-start gap-1.5 bg-amber-50 rounded-lg p-2 border border-amber-100 mb-2.5"><span className="text-amber-500 text-xs mt-0.5">⚡</span><div className="text-[10px] font-semibold text-amber-800">{item.action}</div></div>}

function Dashboard({weekly,kpiCorp,dashMonth,onChangeMonth,booking}){

  if(last){if((last.booking&&last.booking.pct||0)<50)crits.push({l:'Booking',p:last.booking&&last.booking.pct,k:'finansial'});if(last.fraud&&last.fraud.pct===0)crits.push({l:'Temuan Fraud',note:'ada 1.29%',k:'operasional'});if((last.lahan_baru&&last.lahan_baru.pct||0)===0)crits.push({l:'Lahan Baru',p:0,k:'riset'});if((last.sdm_rekrut&&last.sdm_rekrut.pct||0)<50)crits.push({l:'SDM Rekrut',p:last.sdm_rekrut&&last.sdm_rekrut.pct,k:'people'});}
  const SC={y:'text-amber-600',r:'text-red-600',g:'text-emerald-600'};
  const scC=(s)=>s>=80?'text-emerald-600':s>=60?'text-amber-600':'text-red-600';

  const currYr=new Date().getFullYear()+'';

  const bkPct=totalTgt>0?Math.round(totalAct/totalTgt*100):null;

        </div>
      </div>
      <div className="flex gap-3 overflow-x-auto px-4 pb-3 scrollbar-hide">
        {WEEKS.map(function(w,wi){const sc=calcScore(weekly[w]);const has=!!weekly[w];const prevW=wi>0?WEEKS[wi-1]:null;const prevSc=prevW&&weekly[prevW]?calcScore(weekly[prevW]):null;const delta=has&&prevSc!==null?sc-prevSc:null;return(
          <div key={w} className={`flex-shrink-0 text-center p-3 rounded-2xl border min-w-[76px] ${has?'bg-white border-stone-200 shadow-soft':'bg-stone-50 border-stone-200/50 opacity-50'}`}>

          </div>
        );})}
      </div>

// ── JADWAL FILTER HELPER ─────────────────────────────────────
function applyJadwalFilter(items,filter){
  return items.filter(it=>{
    const kat=it.kategori||'Personal';
    if(filter.kategori[kat]===false)return false;
    if(filter.belumOutput&&(it.outputKeputusan||'').trim())return false;
    if(filter.belumSiap){
      const clDef=PRE_CHECKLIST[it.jenisKegiatan];
      if(clDef){
        const clItems=clDef._subs?(it.meetingSubType?clDef[it.meetingSubType]||[]:[]):(Array.isArray(clDef)?clDef:[]);
        const done=it.checklistDone||{};
        const allWajibDone=clItems.filter(c=>c.wajib).every(c=>done[c.id]);
        if(allWajibDone)return false;
      }
    }
    return true;
  });
}

// Helper: parse "HH:MM" to minutes since midnight
function timeToMin(t){if(!t)return 0;const p=t.split(':');return parseInt(p[0]||0)*60+parseInt(p[1]||0);}
function nowTimeStr(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function getItemState(item){
  const now=timeToMin(nowTimeStr());
  const start=timeToMin(item.jamMulai||'00:00');
  const end=timeToMin(item.jamSelesai||'23:59');
  if(!item.jamMulai)return'upcoming';
  if(now>=start&&now<end)return'current';
  if(now>=end)return'past';
  return'upcoming';
}
function getChecklistInfo(item){
  var clDef=PRE_CHECKLIST[item.jenisKegiatan]||null;
  if(!clDef)return{total:0,checked:0};
  var hasSubs=clDef._subs;
  var subType=item.meetingSubType||null;
  var clItems=hasSubs?(subType?(clDef[subType]||[]):[]):(Array.isArray(clDef)?clDef:[]);
  var clDone=item.checklistDone||{};
  var total=clItems.length;
  var checked=clItems.filter(function(c){return clDone[c.id];}).length;
  return{total:total,checked:checked};
}

  function renderAddForm(blokId){

  // Past = sudah selesai, bukan lintas tengah malam (jamMulai < jamSelesai)
  const pastItems=dayItems.filter(function(it){
    if(getItemState(it)!=='past')return false;
    // Skip overnight items (jamMulai > jamSelesai, misal 23:00-05:00)
    if(it.jamMulai&&it.jamSelesai&&timeToMin(it.jamMulai)>timeToMin(it.jamSelesai))return false;
    return true;
  });
  const currentItems=dayItems.filter(function(it){return getItemState(it)==='current';});
  const upcomingItems=dayItems.filter(function(it){
    if(getItemState(it)!=='upcoming')return false;
    // Skip overnight items shown as upcoming (they already happened)
    if(it.jamMulai&&it.jamSelesai&&timeToMin(it.jamMulai)>timeToMin(it.jamSelesai))return false;
    return true;
  });
  // lastPast = item dengan jamMulai terbesar (paling dekat ke sekarang)
  const lastPast=pastItems.length>0?pastItems.slice().sort(function(a,b){return timeToMin(b.jamMulai)-timeToMin(a.jamMulai);})[0]:null;
  const currentItem=currentItems[0]||null;
  const nextItem=upcomingItems[0]||null;

  return(
    <div className="afi pb-4">

          {!isToday&&<button className="px-2.5 py-2 rounded-xl bg-stone-800 text-white text-[10px] font-bold as st flex-shrink-0" onClick={function(){setSelectedDate(todayActual);}}>Hari ini</button>}

            {showExport&&<div className="absolute right-4 mt-1 bg-white border border-stone-200 rounded-2xl shadow-float z-30 overflow-hidden afi" style={{minWidth:160}}>

              {[['today','Hari ini'],['week','Minggu ini'],['all','Semua data']].map(function(r){return(
                <button key={r[0]} className="w-full text-left px-3 py-2.5 text-[11px] font-medium text-stone-700 hover:bg-stone-50 border-b border-stone-100 last:border-0 as" onClick={function(){exportJadwalCSV(jadwal,backlog,r[0]);setShowExport(false);}}>{r[1]}</button>
              );})}
            </div>}
          </div>
        </div>
      </div>


      {/* Now banner */}
      {isToday&&currentItem&&<div className="mx-4 md:mx-6 mb-3 px-3 py-2 bg-blue-50 border border-blue-200 rounded-xl flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse flex-shrink-0"/>
        <span className="text-[11px] font-bold text-blue-700 flex-1">{currentItem.detailKegiatan}</span>
        <span className="text-[10px] text-blue-500 tabular-nums whitespace-nowrap">{currentItem.jamMulai}–{currentItem.jamSelesai}</span>
      </div>}
      {isToday&&!currentItem&&nextItem&&<div className="mx-4 md:mx-6 mb-3 px-3 py-2 bg-stone-50 border border-stone-200 rounded-xl flex items-center gap-2">
        <span className="w-2 h-2 rounded-full bg-emerald-400 flex-shrink-0"/>
        <span className="text-[11px] text-stone-500 flex-1">Berikutnya: <strong>{nextItem.detailKegiatan}</strong></span>
        <span className="text-[10px] text-stone-400 whitespace-nowrap">{nextItem.jamMulai}</span>
      </div>}

      {/* Full schedule table */}
      <div className="mx-4 md:mx-6 mb-6 rounded-2xl border border-stone-200 overflow-hidden shadow-soft" style={{overflowX:'auto'}}>
        {dayItems.length===0&&blSched.length===0
          ?<div className="py-10 text-center"><div className="text-3xl mb-2 opacity-20">📅</div><div className="text-[12px] font-bold text-stone-400 mb-1">Belum ada kegiatan</div><div className="text-[10px] text-stone-300">Tap + di blok waktu untuk menambah</div></div>
          :<table className="w-full md:min-w-[640px]">
            <thead>
              <tr className="bg-stone-50 border-b border-stone-200">
                <th className="px-2.5 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Jam</th>
                <th className="px-2 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Kat</th>
                <th className="hidden md:table-cell px-2 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Jenis</th>
                <th className="px-2.5 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Kegiatan</th>
                <th className="hidden md:table-cell px-2 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">KPI</th>
                <th className="px-1.5 py-2.5 text-center text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">✓CL</th>
                <th className="px-1.5 py-2.5 text-center text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">Out</th>
                <th className="px-2 py-2.5"></th>
              </tr>
            </thead>
            <tbody>
              {BLOKS.map(function(blok){
                var items=getBlokItems(blok.id);
                var blItems=blSched.filter(function(it){return it.blokWaktu===blok.id;});
                var isAdding=addingBlok===blok.id;
                var hasNow=items.some(function(it){return getItemState(it)==='current';});
                var totalCount=items.length+blItems.length;
                return[
                  <tr key={blok.id+'-hdr'} className={blok.bg+' border-b '+(hasNow?'border-blue-200':blok.border)}>

                          {totalCount>0&&<span className={`text-[10px] font-bold ${blok.color} opacity-60`}>{totalCount}</span>}
                        </div>
                        <button className={`w-7 h-7 rounded-lg bg-white/70 flex items-center justify-center text-[14px] font-bold ${blok.color} as st border ${blok.border}`} onClick={function(){
                          if(isAdding){setAddingBlok(null);setNf(null);}
                          else{

                  items.map(function(it){return renderItemRow(it,false);}),

                  totalCount===0&&!isAdding&&<tr key={blok.id+'-empty'}><td colSpan={8} className="px-3 py-2.5 text-center text-[10px] text-stone-300 italic">Kosong · tap + untuk menambah</td></tr>
                ];
              })}
            </tbody>
          </table>
        }
      </div>
      {showConvert&&<ConvertOutputModal dayItemsAll={dayItemsAll} today={today} onAddMomBatch={onAddMomBatch} onClose={function(){setShowConvert(false);}}/>}
    </div>
  );
}

// ── CONVERT OUTPUT → MoM (AI batch end-of-day) ──────────────────
function ConvertOutputModal({dayItemsAll,today,onAddMomBatch,onClose}){
  const itemsWithOutput=dayItemsAll.filter(function(it){return(it.outputKeputusan||'').trim().length>0;});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [preview,setPreview]=useState(null); // array of {activityId,activityName,jenisKegiatan,items:[...]}
  const [excluded,setExcluded]=useState({}); // activityId -> true
  const [done,setDone]=useState(false);

  function toggleExclude(aid){setExcluded(function(p){var n={...p};n[aid]=!n[aid];return n;});}

  async function doConvert(){
    setErr('');setLoading(true);
    try{
      var payload=itemsWithOutput.map(function(it){return{activityId:it.id,activityName:it.detailKegiatan||'',jenisKegiatan:it.jenisKegiatan||'',jamMulai:it.jamMulai||'',output:it.outputKeputusan||''};});
      var prompt='Kamu adalah AI assistant untuk CEO GTD OS di PT Raja Sukses Properindo (developer perumahan subsidi).\n\n'
        +'Berikut daftar kegiatan CEO hari ini beserta catatan Output/Keputusan yang ditulis PA setelah kegiatan selesai. Tugasmu: untuk SETIAP kegiatan, analisa apakah ada action item / keputusan konkret / follow-up yang perlu di-track. Kegiatan personal (olahraga, makan, tidur, dll) biasanya TIDAK punya action item — set hasActionItems:false untuk itu.\n\n'
        +'Untuk kegiatan yang punya action item, extract setiap item dengan field:\n'
        +'- konteks: topik singkat (max 40 karakter)\n'
        +'- action: apa yang perlu dilakukan / keputusan yang diambil (max 120 karakter)\n'
        +'- jenis: salah satu dari [Immediately, Konsep Strategis, Feedback]\n'
        +'- pic: nama orang yang bertanggung jawab jika disebutkan di teks, atau null\n'
        +'- deadline: tanggal dalam format YYYY-MM-DD jika disebutkan, atau null\n\n'
        +'Data kegiatan:\n'+JSON.stringify(payload)+'\n\n'
        +'Return HANYA JSON array valid, tidak ada teks lain, tidak ada markdown fences:\n'
        +'[{"activityId":"...","activityName":"...","jenisKegiatan":"...","hasActionItems":true,"items":[{"konteks":"...","action":"...","jenis":"...","pic":null,"deadline":null}]}]';
      var raw=await callAI([{role:'user',content:prompt}],3500);
      var clean=raw.replace(/```json|```/g,'').trim();
      var parsed=JSON.parse(clean);
      var withItems=parsed.filter(function(p){return p.hasActionItems&&p.items&&p.items.length>0;});
      setPreview(withItems);
      setLoading(false);
    }catch(e){
      setErr('Gagal convert: '+e.message);
      setLoading(false);
    }
  }

  function doConfirm(){
    var toSave=preview.filter(function(p){return!excluded[p.activityId];});
    var entries=toSave.map(function(p){
      return{
        id:'MOM-'+genId(),
        tanggal:today,
        meetingName:p.activityName,
        gcalDesc:'',
        items:(p.items||[]).map(function(it){return{id:'MI-'+genId(),konteks:it.konteks||'',action:it.action||'',jenis:it.jenis||'',pic:it.pic||'',deadline:it.deadline||'',status:'pending'};}),
        sumber:p.activityId,
        createdAt:todayStr(),
      };
    });
    if(entries.length>0&&onAddMomBatch)onAddMomBatch(entries);
    setDone(true);
  }

  return(
    <div className="fixed inset-0 bg-black/40 z-40 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] overflow-y-auto shadow-2xl" onClick={function(e){e.stopPropagation();}}>
        <div className="p-5 border-b border-stone-100 flex items-center justify-between sticky top-0 bg-white z-10">
          <div>
            <div className="text-[14px] font-extrabold text-stone-900">🤖 Convert Output → MoM</div>
            <div className="text-[10px] text-stone-400 mt-0.5">{itemsWithOutput.length} kegiatan punya output hari ini</div>
          </div>
          <button className="w-7 h-7 rounded-full bg-stone-100 text-stone-500 flex items-center justify-center as st" onClick={onClose}>✕</button>
        </div>

        <div className="p-5">
          {!preview&&!done&&<>
            {itemsWithOutput.length===0
              ?<div className="text-center py-8"><div className="text-3xl mb-2 opacity-30">📭</div><div className="text-[12px] font-bold text-stone-400">Belum ada output diisi hari ini</div></div>
              :<>
                <div className="text-[11px] text-stone-500 leading-relaxed mb-4">AI akan baca {itemsWithOutput.length} catatan output hari ini, lalu extract action item / keputusan yang konkret jadi format MoM. Kegiatan personal tanpa keputusan akan dilewati otomatis.</div>
                <div className="space-y-1.5 mb-4 max-h-40 overflow-y-auto bg-stone-50 rounded-xl p-2.5 border border-stone-200">
                  {itemsWithOutput.map(function(it){return(
                    <div key={it.id} className="text-[10px] text-stone-600 flex items-center gap-1.5"><span className="text-stone-300">•</span><span className="font-mono text-stone-400">{it.jamMulai}</span><span className="font-semibold truncate">{it.detailKegiatan}</span></div>
                  );})}
                </div>
                {err&&<div className="p-2.5 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
                <button className={'w-full py-3 rounded-xl text-[12px] font-extrabold as st '+(loading?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-violet-600 text-white shadow-md')} disabled={loading} onClick={doConvert}>
                  {loading?'⏳ AI menganalisis...':'✨ Convert Sekarang'}
                </button>
              </>
            }
          </>}

          {preview&&!done&&<>
            {preview.length===0
              ?<div className="text-center py-8"><div className="text-3xl mb-2 opacity-30">🤷</div><div className="text-[12px] font-bold text-stone-400">AI tidak menemukan action item</div><div className="text-[10px] text-stone-300 mt-1">Semua kegiatan personal / tanpa keputusan konkret</div></div>
              :<>
                <div className="text-[11px] font-bold text-stone-600 mb-3">{preview.length} kegiatan menghasilkan action item — cek sebelum simpan</div>
                <div className="space-y-3 mb-4">
                  {preview.map(function(p){
                    var isExcl=!!excluded[p.activityId];
                    return(
                      <div key={p.activityId} className={'rounded-xl border overflow-hidden '+(isExcl?'border-stone-200 bg-stone-50 opacity-50':'border-violet-200 bg-violet-50/30')}>
                        <div className="px-3 py-2 flex items-center justify-between bg-white border-b border-stone-100">
                          <div className="text-[11px] font-bold text-stone-800 truncate flex-1">{p.activityName}</div>
                          <button className="text-[9px] font-bold text-stone-400 as ml-2" onClick={function(){toggleExclude(p.activityId);}}>{isExcl?'↩ Sertakan':'✕ Kecualikan'}</button>
                        </div>
                        <div className="px-3 py-2 space-y-1.5">
                          {(p.items||[]).map(function(it,idx){return(
                            <div key={idx} className="text-[10px] leading-snug">
                              <span className="font-bold text-violet-700">{it.konteks}</span>
                              <span className="text-stone-600"> — {it.action}</span>
                              {it.pic&&<span className="text-stone-400"> · {it.pic}</span>}
                              {it.deadline&&<span className="text-stone-400"> · {it.deadline}</span>}
                            </div>
                          );})}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <button className="w-full py-3 rounded-xl bg-emerald-600 text-white text-[12px] font-extrabold as st shadow-md" onClick={doConfirm}>✓ Simpan {preview.filter(function(p){return!excluded[p.activityId];}).length} MoM Entry</button>
              </>
            }
          </>}

          {done&&<div className="text-center py-8"><div className="text-3xl mb-2">✅</div><div className="text-[12px] font-bold text-emerald-600 mb-3">Berhasil disimpan ke MoM!</div><button className="px-4 py-2 rounded-xl bg-stone-900 text-white text-[11px] font-bold as st" onClick={onClose}>Tutup</button></div>}
        </div>
      </div>
    </div>
  );
}

function JadwalMingguan({backlog,jadwal,filter,onUpdateJadwal,onRemoveJadwal,onUpdateBacklog}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [selDates,setSelDates]=useState({});
  const [expandId,setExpandId]=useState(null);
  const [editOut,setEditOut]=useState({});
  const [editGcal,setEditGcal]=useState({});
  const [editChecklistNotes,setEditChecklistNotes]=useState({});
  const getMon=function(offset){var mon=new Date();var diff=mon.getDay()===0?6:mon.getDay()-1;mon.setDate(mon.getDate()-diff+offset*7);return mon;};
  const mon=getMon(weekOffset);
  const days=Array.from({length:7},function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return{date:d.toISOString().slice(0,10),lbl:d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'}),isToday:d.toISOString().slice(0,10)===todayStr(),dow:d.getDay()};});
  const weekLabel=(function(){var s=days[0];var e=days[6];var sm=new Date(s.date+'T12:00:00').toLocaleDateString('id-ID',{month:'short'});var em=new Date(e.date+'T12:00:00').toLocaleDateString('id-ID',{month:'short'});var sn=new Date(s.date+'T12:00:00').getDate();var en=new Date(e.date+'T12:00:00').getDate();return s.date.slice(0,7)===e.date.slice(0,7)?sn+'–'+en+' '+sm:sn+' '+sm+' – '+en+' '+em;})();

  function goWeek(dir){setWeekOffset(function(p){return p+dir;});setSelDates({});setExpandId(null);}
  function goToday(){setWeekOffset(0);setSelDates({});setExpandId(null);}
  var anySelected=Object.values(selDates).some(function(v){return v;});
  function toggleDate(date){setSelDates(function(p){var n={...p};n[date]=!n[date];return n;});}
  function clearDates(){setSelDates({});}

  var allRows=[];
  days.forEach(function(d){
    if(anySelected&&!selDates[d.date])return;
    var its=filter?applyJadwalFilter(jadwal[d.date]||[],filter):(jadwal[d.date]||[]);
    its.slice().sort(function(a,b){return (a.jamMulai||'').localeCompare(b.jamMulai||'');}).forEach(function(it){
      allRows.push({...it,_date:d.date,_lbl:d.lbl,_isToday:d.isToday,_dow:d.dow});
    });
  });

  var totalItems=allRows.length;
  var adaOutput=allRows.filter(function(it){return it.outputKeputusan&&it.outputKeputusan.trim();}).length;

  function openExpand(it){
    var id=it.id;
    if(expandId===id){setExpandId(null);return;}
    setExpandId(id);
    setEditOut(function(p){var n={...p};if(n[id]===undefined)n[id]=it.outputKeputusan||'';return n;});
    setEditGcal(function(p){var n={...p};if(n[id]===undefined)n[id]=it.gcalDesc||'';return n;});
    setEditChecklistNotes(function(p){var n={...p};if(n[id]===undefined)n[id]=it.checklistNotes||{};return n;});
  }

  function saveRow(it){
    if(!onUpdateJadwal)return;
    onUpdateJadwal(it._date,it.id,{outputKeputusan:editOut[it.id]||'',gcalDesc:editGcal[it.id]||'',checklistNotes:editChecklistNotes[it.id]||{}});
    setExpandId(null);
  }

  function deleteRow(it){
    if(!onRemoveJadwal)return;
    var msg='Hapus kegiatan ini dari Jadwal?';
    if(it.masalahBacklogId)msg+='\n\nItem Backlog terkait akan dikembalikan ke status "Baru".';
    if(!confirm(msg))return;
    onRemoveJadwal(it._date,it.id);
    if(it.masalahBacklogId&&onUpdateBacklog){onUpdateBacklog(it.masalahBacklogId,{status:'baru'});}
    setExpandId(null);
  }

  function toggleCheck(it,cid){
    if(!onUpdateJadwal)return;
    var done=it.checklistDone||{};
    onUpdateJadwal(it._date,it.id,{checklistDone:{...done,[cid]:!done[cid]}});
  }

  return(
    <div className="afi pb-8">
      {/* Week navigator */}
      <div className="px-4 pt-4 pb-3 flex items-center justify-between">
        <div>
          <div className="text-[13px] font-extrabold text-stone-800">{weekLabel}</div>
          <div className="text-[10px] text-stone-400 mt-0.5">{totalItems} kegiatan · {adaOutput} ada output{anySelected?' · filter aktif':''}</div>
        </div>
        <div className="flex items-center gap-1">
          <button onClick={function(){goWeek(-1);}} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">‹</button>
          {weekOffset!==0&&<button onClick={goToday} className="px-2.5 py-1.5 rounded-lg text-[10px] font-bold border as st bg-stone-800 text-white border-stone-800">Minggu ini</button>}
          <button onClick={function(){goWeek(1);}} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">›</button>
        </div>
      </div>

      {/* Day filter pills */}
      <div className="px-4 mb-3">
        <div className="flex gap-1.5 overflow-x-auto pb-1">
          {anySelected&&<button onClick={clearDates} className="flex-shrink-0 px-2.5 py-1.5 rounded-lg border text-[10px] font-bold as st bg-stone-800 text-white border-stone-800">✕ Reset</button>}
          {days.map(function(d){
            var count=(filter?applyJadwalFilter(jadwal[d.date]||[],filter):(jadwal[d.date]||[])).length;
            var isSel=!!selDates[d.date];
            var isWE=d.dow===0||d.dow===6;
            return(
              <button key={d.date} onClick={function(){toggleDate(d.date);}}
                className={`flex-shrink-0 px-2.5 py-1.5 rounded-lg border text-center as st ${
                  isSel?'bg-stone-900 border-stone-900 text-white shadow-sm':
                  d.isToday?'bg-blue-50 border-blue-300 text-blue-700':
                  count>0?'bg-white border-stone-200 text-stone-700 hover:bg-stone-50':
                  'bg-stone-50 border-stone-100 text-stone-300'
                } ${isWE&&!isSel?'opacity-60':''}`}>
                <div className="text-[9px] font-bold whitespace-nowrap">{d.lbl}</div>
                <div className="text-[11px] font-black">{count>0?count:'–'}</div>
              </button>
            );
          })}
        </div>
        {anySelected&&<div className="text-[9px] text-stone-400 mt-1.5">
          Menampilkan: {days.filter(function(d){return selDates[d.date];}).map(function(d){return d.lbl;}).join(', ')}
        </div>}
      </div>

      {/* Table */}
      {allRows.length===0
        ?<div className="px-4 py-12 text-center"><div className="text-3xl mb-2 opacity-30">📅</div><div className="text-[12px] font-bold text-stone-400">{anySelected?'Tidak ada kegiatan di tanggal yang dipilih':'Tidak ada kegiatan minggu ini'}</div></div>
        :<div className="mx-4 rounded-2xl border border-stone-200 overflow-hidden shadow-soft overflow-x-auto">
          <table className="w-full" style={{minWidth:720}}>
            <thead>
              <tr className="bg-stone-50 border-b border-stone-200">
                {['Tanggal','Jam','Kategori','Jenis','Detail Kegiatan','KPI','Output',''].map(function(h){return(
                  <th key={h} className="px-3 py-2.5 text-left text-[9px] font-extrabold text-stone-400 uppercase tracking-wider whitespace-nowrap">{h}</th>
                );})}
              </tr>
            </thead>
            <tbody>
              {allRows.map(function(it,i){
                var kpi=KPI5.find(function(k){return k.id===it.relateMilestone;});
                var jColor=JENIS_COLOR[it.jenisKegiatan]||'bg-stone-100 text-stone-600';
                var kColor=KATEGORI_COLOR[it.kategori]||'bg-stone-100 text-stone-600';
                var hasOut=it.outputKeputusan&&it.outputKeputusan.trim();
                var isFirst=i===0||allRows[i-1]._date!==it._date;
                var dayCount=allRows.filter(function(r){return r._date===it._date;}).length;
                var isExp=expandId===it.id;
                var checklist=PRE_CHECKLIST[it.jenisKegiatan]||[];
                var clDone=it.checklistDone||{};
                var clNotes=editChecklistNotes[it.id]||{};
                return([
                  <tr key={it.id||i} className={`border-b ${isExp?'border-stone-200 bg-violet-50/30':it._isToday?'bg-blue-50/30':i%2===0?'bg-white':'bg-stone-50/40'} hover:bg-stone-50 st cursor-pointer`}
                    onClick={function(){openExpand(it);}}>
                    <td className="px-3 py-2.5 align-top whitespace-nowrap">
                      {isFirst&&<div>
                        <div className={`text-[11px] font-extrabold ${it._isToday?'text-blue-700':'text-stone-800'}`}>{it._lbl}</div>
                        {dayCount>1&&<div className="text-[9px] text-stone-400">{dayCount} kegiatan</div>}
                      </div>}
                    </td>
                    <td className="px-3 py-2.5 whitespace-nowrap">
                      <span className="text-[11px] font-black text-stone-700 tabular-nums">{it.jamMulai||'–'}</span>
                      {it.jamSelesai&&<><span className="text-[9px] text-stone-300 mx-0.5">–</span><span className="text-[10px] text-stone-400 tabular-nums">{it.jamSelesai}</span></>}
                    </td>
                    <td className="px-3 py-2.5">
                      <span className={`px-1.5 py-0.5 rounded-full text-[9px] font-bold whitespace-nowrap ${kColor}`}>{it.kategori||'–'}</span>
                    </td>
                    <td className="px-3 py-2.5">
                      <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold whitespace-nowrap ${jColor}`}>{JENIS_SHORT[it.jenisKegiatan]||it.jenisKegiatan||'–'}</span>
                    </td>
                    <td className="px-3 py-2.5 max-w-[220px]">
                      <div className="text-[11px] font-semibold text-stone-800 leading-snug">{it.detailKegiatan||'–'}</div>
                      {it.gcalDesc&&it.gcalDesc.trim()&&<div className="text-[9px] text-stone-400 mt-0.5 leading-snug" style={{display:'-webkit-box',WebkitLineClamp:1,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{linkify(it.gcalDesc)}</div>}
                    </td>
                    <td className="px-3 py-2.5">
                      {kpi?<KC id={kpi.id} sm/>:<span className="text-[9px] text-stone-300">–</span>}
                    </td>
                    <td className="px-3 py-2.5 max-w-[180px]">
                      {hasOut
                        ?<div className="flex items-start gap-1"><span className="text-emerald-500 flex-shrink-0 text-[10px] mt-0.5">✓</span><span className="text-[10px] text-emerald-700 leading-snug" style={{display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{it.outputKeputusan}</span></div>
                        :<span className="text-[9px] text-stone-300 italic">Belum diisi</span>
                      }
                    </td>
                    <td className="px-2 py-2.5 text-center">
                      <span className={`text-[11px] text-stone-400 ${isExp?'rotate-180 inline-block':''}`}>{isExp?'▲':'▼'}</span>

                  isExp&&<tr key={it.id+'_expand'} className="border-b border-violet-200 bg-violet-50/20">
                    <td colSpan={8} className="px-4 py-3">
                      <div className="flex gap-4 flex-wrap md:flex-nowrap">
                        {/* Checklist */}
                        {checklist.length>0&&<div className="flex-shrink-0 w-full md:w-64">
                          <div className="text-[9px] font-bold text-stone-500 uppercase mb-2">Pre-Meeting Checklist</div>
                          <div className="space-y-2">

                              var isDone=!!clDone[c.id];
                              var noteVal=clNotes[c.id]||'';
                              var firstUrl=(noteVal.match(/https?:\/\/[^\s]+/)||[])[0];
                              return(
                              <div key={c.id}>
                                <label className="flex items-start gap-2 cursor-pointer" onClick={function(e){e.stopPropagation();}}>
                                  <input type="checkbox" checked={isDone} onChange={function(){toggleCheck(it,c.id);}} className="mt-0.5 w-3.5 h-3.5 accent-violet-600 flex-shrink-0"/>
                                  <div className="flex-1 min-w-0">
                                    <span className={`text-[10px] leading-snug ${isDone?'text-stone-400 line-through':'text-stone-700'}`}>{c.item}</span>
                                    <div className="flex gap-1 mt-0.5">
                                      <span className="text-[8px] text-stone-400 bg-stone-100 px-1 rounded">{c.pic}</span>
                                      {c.wajib&&<span className="text-[8px] text-red-600 font-bold">Wajib</span>}
                                    </div>
                                  </div>
                                </label>
                                <div className="flex items-center gap-1 mt-1" style={{paddingLeft:'22px'}} onClick={function(e){e.stopPropagation();}}>
                                  <input type="text" className="flex-1 px-2 py-1 rounded-lg border border-stone-200 bg-stone-50 text-[10px] focus:outline-none focus:ring-1 focus:ring-violet-400 focus:bg-white" placeholder="Isian PA: link / catatan..." value={noteVal} onChange={function(e){var v=e.target.value;setEditChecklistNotes(function(p){var n={...p};n[it.id]={...(n[it.id]||{}),[c.id]:v};return n;});}}/>
                                  {firstUrl&&<a href={firstUrl} target="_blank" rel="noopener noreferrer" className="flex-shrink-0 text-[12px]" title="Buka link">🔗</a>}

                            <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Output / Keputusan</div>

                              value={editOut[it.id]!==undefined?editOut[it.id]:(it.outputKeputusan||'')}
                              onChange={function(e){var v=e.target.value;setEditOut(function(p){var n={...p};n[it.id]=v;return n;});}}
                            />
                          </div>
                          <div>
                            <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Deskripsi Calendar (GCal)</div>
                            <textarea
                              className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] focus:outline-none focus:ring-2 focus:ring-violet-400"
                              style={{overflowY:'hidden',resize:'none',minHeight:'56px'}}
                              ref={function(el){if(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}}}
                              onInput={function(e){e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}}
                              placeholder="Deskripsi untuk Google Calendar..."
                              value={editGcal[it.id]!==undefined?editGcal[it.id]:(it.gcalDesc||'')}
                              onChange={function(e){var v=e.target.value;setEditGcal(function(p){var n={...p};n[it.id]=v;return n;});}}
                            />
                          </div>
                          <div className="flex gap-2 items-center">
                            <button className="px-3 py-2 rounded-xl bg-red-50 text-red-500 border border-red-200 text-[10px] font-bold as st" onClick={function(){deleteRow(it);}}>🗑️ Hapus</button>
                            <div className="flex-1"/>
                            <button className="px-4 py-2 rounded-xl border border-stone-200 text-[10px] font-bold text-stone-500 as st bg-white" onClick={function(){setExpandId(null);}}>Batal</button>
                            <button className="px-4 py-2 rounded-xl bg-emerald-600 text-white text-[10px] font-bold as st" onClick={function(){saveRow(it);}}>✓ Simpan Output</button>
                          </div>
                        </div>
                      </div>
                    </td>
                  </tr>
                ]);
              })}
            </tbody>
          </table>
        </div>
      }
    </div>
  );
}

// ── JADWAL BULANAN ────────────────────────────────────────────
function JadwalBulanan({jadwal,filter}){
  const [monthOffset,setMonthOffset]=useState(0);
  const now=new Date();
  const year=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getFullYear();
  const month=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getMonth();
  const monthStr=new Date(year,month,1).toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  const monthKey=`${year}-${String(month+1).padStart(2,'0')}`;

  // Collect all items in this month
  const allItems=Object.entries(jadwal||{}).flatMap(([date,items])=>{
    if(!date.startsWith(monthKey))return[];
    const its=filter?applyJadwalFilter(items||[],filter):(items||[]);
    return its.map(it=>({...it,tanggal:date}));
  });

  // Stats
  const totalKegiatan=allItems.length;
  const totalJam=Math.round(allItems.reduce((s,it)=>s+getDur(it.jamMulai,it.jamSelesai),0)*10)/10;
  const adaOutput=allItems.filter(it=>it.outputKeputusan&&it.outputKeputusan.trim()).length;

  // Group by jenis
  const byJenis={};
  JENIS_KEGIATAN.forEach(j=>{byJenis[j]=allItems.filter(it=>it.jenisKegiatan===j).length;});

  // Group by KPI
  const byKpi={};
  KPI5.forEach(k=>{byKpi[k.id]=allItems.filter(it=>it.relateMilestone===k.id).length;});

  // Group by kategori
  const byKat={RSP:0,BT:0,TKB:0,Personal:0};
  allItems.forEach(it=>{if(byKat[it.kategori]!==undefined)byKat[it.kategori]++;});

  // Days in month with count
  const daysInMonth=new Date(year,month+1,0).getDate();
  const calDays=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(year,month,i+1);
    const ds=d.toISOString().slice(0,10);
    const its=filter?applyJadwalFilter(jadwal[ds]||[],filter):(jadwal[ds]||[]);
    return{ds,num:i+1,dow:d.getDay(),count:its.length};
  });
  const firstDow=calDays[0].dow;
