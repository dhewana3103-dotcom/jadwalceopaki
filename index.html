}

// Week helpers — week = Mon-Sat
function getWeekKey(dateStr){const d=new Date(dateStr+'T12:00:00');const day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));return mon.toISOString().slice(0,10);}
function getWeekLabel(mondayStr){const mon=new Date(mondayStr+'T12:00:00');const sat=new Date(mondayStr+'T12:00:00');sat.setDate(mon.getDate()+5);return`${mon.getDate()}–${sat.getDate()} ${mon.toLocaleDateString('id-ID',{month:'short'})}`;}
function getDur(jamMulai,jamSelesai){if(!jamMulai||!jamSelesai)return 0;const[h1,m1]=jamMulai.split(':').map(Number);const[h2,m2]=jamSelesai.split(':').map(Number);return Math.max(0,Math.round(((h2*60+m2)-(h1*60+m1))/60*10)/10);}
function computeAnalisa(jadwal){
  const allItems=Object.entries(jadwal).flatMap(([date,items])=>(items||[]).filter(it=>it.outputKeputusan?.trim()).map(it=>({...it,date})));
  if(!allItems.length)return null;
  const weekKeys=[...new Set(allItems.map(it=>getWeekKey(it.date)))].sort();
  // By jenis × week (hours)
  const byJenis={};
  JENIS_KEGIATAN.forEach(j=>{byJenis[j]={};weekKeys.forEach(w=>{byJenis[j][w]=0;});});
  allItems.forEach(it=>{const w=getWeekKey(it.date);if(byJenis[it.jenisKegiatan])byJenis[it.jenisKegiatan][w]=Math.round((byJenis[it.jenisKegiatan][w]+getDur(it.jamMulai,it.jamSelesai))*10)/10;});
  // By fungsi × week (hours)
  const byFungsi={};
  KPI5.forEach(k=>{byFungsi[k.id]={};weekKeys.forEach(w=>{byFungsi[k.id][w]=0;});});
  allItems.forEach(it=>{const w=getWeekKey(it.date);if(byFungsi[it.relateMilestone])byFungsi[it.relateMilestone][w]=Math.round((byFungsi[it.relateMilestone][w]+getDur(it.jamMulai,it.jamSelesai))*10)/10;});
  // Matrix: fungsi × jenis
  const matrix={};
  KPI5.forEach(k=>{matrix[k.id]={};JENIS_KEGIATAN.forEach(j=>{matrix[k.id][j]={count:0,hours:0};});});
  allItems.forEach(it=>{if(matrix[it.relateMilestone]?.[it.jenisKegiatan]){matrix[it.relateMilestone][it.jenisKegiatan].count++;matrix[it.relateMilestone][it.jenisKegiatan].hours=Math.round((matrix[it.relateMilestone][it.jenisKegiatan].hours+getDur(it.jamMulai,it.jamSelesai))*10)/10;}});
  // Totals per week
  const totals={};weekKeys.forEach(w=>{totals[w]=Math.round(allItems.filter(it=>getWeekKey(it.date)===w).reduce((s,it)=>s+getDur(it.jamMulai,it.jamSelesai),0)*10)/10;});
  // Distribusi (total hours per jenis)
  const distribusi=JENIS_KEGIATAN.map(j=>({jenis:j,hours:Math.round(Object.values(byJenis[j]).reduce((s,v)=>s+v,0)*10)/10,count:allItems.filter(it=>it.jenisKegiatan===j).length})).sort((a,b)=>b.hours-a.hours);
  // Coverage per fungsi (hours)
  const coverage=KPI5.map(k=>({kpi:k,hours:Math.round(Object.values(byFungsi[k.id]).reduce((s,v)=>s+v,0)*10)/10,count:allItems.filter(it=>it.relateMilestone===k.id).length}));
  const totalHours=Math.round(allItems.reduce((s,it)=>s+getDur(it.jamMulai,it.jamSelesai),0)*10)/10;
  return{allItems,weekKeys,byJenis,byFungsi,matrix,totals,distribusi,coverage,totalHours};
}

  // Group by sumber activity (which meeting/aktivitas CEO generated this)

    src,
    items:keputusan.filter(k=>(k.sumber||'Lainnya')===src)

  function KptCard({kpt}){
    const k=KPI5.find(x=>x.id===kpt.fungsiKPI);
    const isExp=expKpt===kpt.id;
    const statusBelum=kpt.status==='disampaikan'||kpt.status==='proses';
    return(
      <div className="bg-white rounded-xl border border-stone-200 overflow-hidden relative mb-2 afi">
        <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${k?.bg||'bg-stone-200'}`}/>
        <div className="p-3.5 pl-5">
          {/* Konteks */}
          {kpt.konteks&&<div className={`text-[9px] font-extrabold uppercase tracking-widest mb-1 ${k?.color||'text-stone-400'}`}>{kpt.konteks}</div>}
          {/* Deskripsi keputusan */}
          <div className="flex gap-2 justify-between items-start mb-2.5">
            <div className="text-[12px] font-bold text-stone-800 leading-snug flex-1">{kpt.deskripsi}</div>
            {/* Status tap-to-advance */}
            <button className={`flex-shrink-0 px-2 py-1 rounded-lg text-[9px] font-bold border st as ${SC[kpt.status]||SC.selesai}`} onClick={()=>onUpdate(kpt.id,{status:SN[kpt.status]||kpt.status})} title="Tap untuk update status">
              {SL[kpt.status]||kpt.status}
            </button>
          </div>
          {/* Output / keputusan yang disampaikan */}
          {kpt.output&&(
            <div className="bg-stone-50 border-l-2 border-stone-300 px-2.5 py-2 rounded-r-lg text-[11px] text-stone-700 leading-snug mb-2.5">{kpt.output}</div>
          )}
          {/* Update tindak lanjut (if any) */}
          {kpt.updateTL&&(
            <div className="bg-blue-50 border-l-2 border-blue-300 px-2.5 py-2 rounded-r-lg text-[11px] text-blue-800 leading-snug mb-2.5">
              <span className="text-[9px] font-bold uppercase tracking-wider text-blue-500 block mb-0.5">Update Tindak Lanjut</span>
              {kpt.updateTL}
            </div>
          )}
          {/* Meta chips */}
          <div className="flex gap-1.5 flex-wrap items-center mb-3">
            <KC id={kpt.fungsiKPI} sm/>
            <span className={`px-1.5 py-0.5 rounded font-bold text-[9px] ${kpt.dampak==='tinggi'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}`}>{kpt.dampak}</span>
            <span className="text-[9px] text-stone-400 bg-stone-50 px-1.5 py-0.5 rounded font-mono">{kpt.tanggal}</span>
          </div>
          {/* Actions */}
          <div className="flex gap-1.5">
            {/* Expand update TL */}
            <button className={`flex-1 py-1.5 rounded-lg text-[10px] font-bold border st as ${isExp?'bg-stone-800 text-white border-stone-800':'bg-stone-50 text-stone-600 border-stone-200'}`} onClick={()=>setExpKpt(isExp?null:kpt.id)}>
              {isExp?'Tutup':'✏️ Update TL'}
            </button>
            {/* Mark sesuai/tidak */}
            {statusBelum&&<>
              <button className="flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 st as" onClick={()=>onUpdate(kpt.id,{status:'sesuai'})}>Sesuai ✅</button>
              <button className="flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-red-50 text-red-700 border border-red-200 st as" onClick={()=>onUpdate(kpt.id,{status:'tidak-sesuai'})}>Tidak ❌</button>
            </>}
            <button className="py-1.5 px-2.5 rounded-lg text-[10px] font-bold bg-stone-50 text-red-500 border border-stone-200 st as" onClick={()=>{if(confirm('Hapus?'))onDelete(kpt.id);}}>🗑</button>
          </div>
          {/* Inline update form */}
          {isExp&&(
            <div className="mt-3 afi">
              <div className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1.5">Update tindak lanjut — apa yang sudah/belum terjadi?</div>
              <textarea className="w-full p-2.5 rounded-xl border border-stone-200 text-[12px] focus:outline-none focus:ring-2 focus:ring-stone-400 bg-stone-50 mb-2 resize-y" rows="3" value={updateTexts[kpt.id]||''} onChange={e=>setUpdateTexts(p=>({...p,[kpt.id]:e.target.value}))} placeholder="Contoh: Pak Andyka sudah terima keputusan, dijadwalkan implementasi minggu depan..."/>
              <button className={`w-full py-2 rounded-xl text-[11px] font-bold as st ${!(updateTexts[kpt.id]||'').trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-800 text-white'}`} onClick={()=>saveUpdate(kpt)} disabled={!(updateTexts[kpt.id]||'').trim()}>Simpan Update</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return(
    <div className="pb-4 afi">
      {/* Header summary */}
      <div className="px-4 pt-4 pb-3 border-b border-stone-200">
        <div className="flex items-center justify-between mb-3">
          <div className="text-[12px] font-extrabold text-stone-800">{keputusan.length} keputusan tercatat</div>
          {belumCount>0&&<div className="flex items-center gap-1.5 bg-amber-50 border border-amber-200 px-2.5 py-1 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-amber-500"/><span className="text-[10px] font-bold text-amber-700">{belumCount} belum selesai ditrack</span></div>}
        </div>
        {/* View toggle */}
        <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1">
          <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${view==='aktivitas'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setView('aktivitas')}>📂 Per Aktivitas CEO</button>
          <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${view==='semua'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setView('semua')}>📋 Semua</button>
        </div>
      </div>

      {/* PER AKTIVITAS — grouped by which meeting/activity generated the decision */}
      {view==='aktivitas'&&(
        <div className="px-4 pt-4">
          {groups.length===0?<div className="py-12 text-center"><div className="text-4xl mb-3 opacity-40">📝</div><div className="text-[13px] font-bold text-stone-400">Belum ada keputusan</div></div>
          :<div className="space-y-3">
            {groups.map(({src,items})=>{
              const pendingCnt=items.filter(k=>k.status==='disampaikan'||k.status==='proses').length;
              const isOpen=expGroup===src;
              const srcKPI=KPI5.find(k=>k.id===items[0]?.fungsiKPI);
              return(
                <div key={src} className="bg-white rounded-2xl border border-stone-200 shadow-soft overflow-hidden">
                  <div className={`p-3.5 flex justify-between items-center cursor-pointer st hover:bg-stone-50 ${isOpen?'border-b border-stone-100':''}`} onClick={()=>setExpGroup(isOpen?null:src)}>
                    <div>
                      <div className="text-[12px] font-bold text-stone-800 mb-0.5">{src}</div>
                      <div className="flex gap-1.5 items-center">
                        <span className="text-[10px] text-stone-400">{items.length} keputusan</span>
                        {pendingCnt>0&&<span className="text-[9px] font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded-md border border-amber-100">{pendingCnt} belum selesai</span>}
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      {/* Mini KPI chips */}
                      <div className="flex gap-1">{[...new Set(items.map(i=>i.fungsiKPI))].slice(0,3).map(fid=>{const kk=KPI5.find(x=>x.id===fid);return kk?<div key={fid} className={`w-2 h-2 rounded-full`} style={{background:kk.hex}}/>:null;})}</div>
                      <span className={`text-[10px] text-stone-300 st ${isOpen?'rotate-180':''}`}>▼</span>
                    </div>
                  </div>
                  {isOpen&&<div className="p-3 bg-stone-50/50">{items.map(kpt=><KptCard key={kpt.id} kpt={kpt}/>)}</div>}
                </div>
              );
            })}
          </div>}
        </div>
      )}

      {/* SEMUA — flat list with KPI filter */}
      {view==='semua'&&(
        <div>
          <div className="px-4 pt-3 pb-2 flex gap-2 overflow-x-auto scrollbar-hide">
            <button className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-[11px] font-bold st as border ${fk==='all'?'bg-stone-800 text-white border-stone-800 shadow-md':'bg-white text-stone-600 border-stone-200'}`} onClick={()=>setFk('all')}>Semua ({keputusan.length})</button>
            {KPI5.filter(k=>DC[k.id]>0).map(k=><button key={k.id} className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-[11px] font-bold st as border ${fk===k.id?'bg-stone-800 text-white border-stone-800 shadow-md':`${k.bg} ${k.color} ${k.border}`}`} onClick={()=>setFk(fk===k.id?'all':k.id)}>{k.short} ({DC[k.id]})</button>)}
          </div>
          <div className="px-4 pt-2 md:px-6">
            {shown.length===0?<div className="py-12 text-center"><div className="text-4xl mb-3 opacity-40">📝</div><div className="text-[13px] font-bold text-stone-400">Tidak ada keputusan</div></div>
            :<div className="md:grid md:grid-cols-2 md:gap-3 md:items-start">{shown.map(kpt=><KptCard key={kpt.id} kpt={kpt}/>)}</div>}
          </div>
        </div>
      )}
    </div>
  );
}

function parseCSVLine(line){
  const r=[];let f='',q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){f+='"';i++;}else q=!q;}
    else if((c===','||c==='\t')&&!q){r.push(f.trim());f='';}
    else f+=c;
  }
  r.push(f.trim());return r;
}
function parseMoMCSV(text,meetingName){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return{backlog:[],keputusan:[],error:'Data terlalu sedikit — pastikan ada header + minimal 1 baris data.'};
  // Detect separator
  const sep=lines[0].includes('\t')?'\t':',';
  const header=lines[0].split(sep).map(h=>h.replace(/"/g,'').trim().toLowerCase());
  // Find column indices (flexible header matching)
  const ci=(keywords)=>{const idx=header.findIndex(h=>keywords.some(k=>h.includes(k)));return idx===-1?null:idx;};
  const COL={topik:ci(['topik','judul','hasil']),issue:ci(['issue','feedback','masalah']),action:ci(['action','task','instruksi']),jenis:ci(['jenis']),ekspektasi:ci(['ekspektasi','ekspektas']),pic:ci(['pic']),deadline:ci(['deadline','tenggat'])};
  if(COL.action===null)return{backlog:[],keputusan:[],error:'Kolom Action/Tasklist tidak ditemukan. Pastikan header CSV sesuai.'};
  let lastTopik='',lastIssue='';
  const backlog=[],keputusan=[];
  lines.slice(1).forEach(line=>{
    if(!line.trim())return;
    const f=parseCSVLine(line);
    const get=(col)=>col!==null?(f[col]||'').trim():'';
    const topik=get(COL.topik),issue=get(COL.issue),action=get(COL.action),jenis=get(COL.jenis),ekspektasi=get(COL.ekspektasi),pic=get(COL.pic),deadline=get(COL.deadline);
    const curTopik=topik||lastTopik;const curIssue=issue||lastIssue;
    if(topik)lastTopik=curTopik;if(issue)lastIssue=curIssue;
    if(!action)return;
    const jenisL=jenis.toLowerCase();
    if(jenisL.includes('feedback')){
      keputusan.push({id:'KP-'+genId(),tanggal:todayStr(),backlogId:null,konteks:curTopik,deskripsi:action,fungsiKPI:'operasional',dampak:'sedang',status:'disampaikan',output:`${curIssue?curIssue+' — ':''}${action}`,updateTL:'',sumber:meetingName||'Import MoM'});
    }else{
      const prioritas=jenisL.includes('immediately')?'tinggi':'sedang';
      const kat=jenisL.includes('immediately')?'Meeting Strategic/Problem Solving/Approval':'Meeting Review Operasional + Evaluasi Tim';
      backlog.push({id:'BL-'+genId(),sumber:'PDCA',tanggal:todayStr(),konteks:curTopik,isi:curIssue||curTopik,action,ekspektasi,pic:pic||null,deadline:deadline||null,fungsiKPI:'operasional',kategori:kat,blokWaktu:'sore-review',prioritas,status:'baru',notes:`Jenis: ${jenis}${ekspektasi?' | Ekspektasi: '+ekspektasi:''}`});
    }
  });
  return{backlog,keputusan,error:null};
}
function exportJadwalCSV(jadwal,backlog,range){
  const headers=['Date','Jam Mulai','Jam Selesai','Masalah yang Dievaluasi','Kategori','Jenis Kegiatan','Detail Kegiatan','Relate Milestone/KPI','Output Keputusan/Arahan'];
  const today=todayStr();
  const mon=new Date();const diff=mon.getDay()===0?6:mon.getDay()-1;mon.setDate(mon.getDate()-diff);const monStr=mon.toISOString().slice(0,10);
  const rows=[];
  Object.entries(jadwal).sort().forEach(([date,items])=>{
    if(range==='today'&&date!==today)return;
    if(range==='week'&&(date<monStr||date>new Date(mon.getTime()+6*86400000).toISOString().slice(0,10)))return;
    (items||[]).sort((a,b)=>(a.jamMulai||'').localeCompare(b.jamMulai||'')).forEach(it=>{
      const bl=it.masalahBacklogId?backlog.find(b=>b.id===it.masalahBacklogId):null;
      const masalah=bl?`${bl.konteks}: ${bl.isi}`:(it.masalahText||'');
      const kpiLabel=KPI5.find(k=>k.id===it.relateMilestone)?.label||it.relateMilestone||'';
      rows.push([date,it.jamMulai||'',it.jamSelesai||'',masalah,it.kategori||'',it.jenisKegiatan||'',it.detailKegiatan||'',kpiLabel,it.outputKeputusan||'']);
    });
  });
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`jadwal-ceo-${today}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function kpiLabelToId(label){const l=(label||'').toLowerCase();if(l.includes('fin'))return'finansial';if(l.includes('brand'))return'branding';if(l.includes('riset')||l.includes('future'))return'riset';if(l.includes('ops')||l.includes('operasional'))return'operasional';if(l.includes('people')||l.includes('culture')||l.includes('budaya'))return'people';return'operasional';}
function normalizeJenis(j){const l=(j||'').toLowerCase();if(l.includes('deepwork'))return'Deepwork Strategic';if(l.includes('strategic')||l.includes('approval')||l.includes('problem'))return'Meeting Strategic/Problem Solving/Approval';if(l.includes('review')||l.includes('evaluasi'))return'Meeting Review Operasional + Evaluasi Tim';if(l.includes('external')||l.includes('ekster'))return'Ketemu External';if(l.includes('konten')||l.includes('content'))return'Bikin Konten';if(l.includes('genba'))return'Genba';if(l.includes('engage'))return'Employee Engage';return j||'Meeting Review Operasional + Evaluasi Tim';}

// ── IMPORT JADWAL ─────────────────────────────────────────────
function ImportJadwal({onAddJadwal,onBatchAddJadwal}){
  const [inputMode,setInputMode]=useState('paste');
  const [csvText,setCsvText]=useState('');
  const [preview,setPreview]=useState(null);
  const [err,setErr]=useState('');
  const [done,setDone]=useState(false);
  const fileRef=React.useRef();

  function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setCsvText(ev.target.result);r.readAsText(f,'UTF-8');}

  function parseJadwalCSV(text){
    const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2)return{items:[],error:'Data terlalu sedikit — pastikan ada header + minimal 1 baris.'};
    const sep=lines[0].includes('\t')?'\t':',';
    const header=lines[0].split(sep).map(h=>h.replace(/"/g,'').trim().toLowerCase());
    const ci=(kws)=>{const i=header.findIndex(h=>kws.some(k=>h.includes(k)));return i===-1?null:i;};
    const COL={date:ci(['date','tanggal']),mulai:ci(['mulai','start','jam m']),selesai:ci(['selesai','end','jam s']),masalah:ci(['masalah','dievaluasi','evaluasi']),kategori:ci(['kategori']),jenis:ci(['jenis']),detail:ci(['detail']),kpi:ci(['milestone','kpi','relate']),output:ci(['output','keputusan','arahan'])};
    if(COL.date===null&&COL.detail===null)return{items:[],error:'Kolom Date dan Detail Kegiatan tidak ditemukan. Pastikan format CSV sesuai template export.'};
    const items=[];
    lines.slice(1).forEach(line=>{
      if(!line.trim())return;
      const f=parseCSVLine(line);
      const get=(col)=>col!==null?(f[col]||'').trim():'';
      const date=get(COL.date);if(!date)return;

// ── ICS HELPERS ───────────────────────────────────────────────
function parseDTStr(val){
  const isUTC=val.endsWith('Z');
  const c=val.replace('Z','');
  let yr=+c.slice(0,4),mo=+c.slice(4,6),dy=+c.slice(6,8),hr=0,mn=0;
  if(c.length>8){const ti=c.indexOf('T');if(ti>=0){hr=+c.slice(ti+1,ti+3)||0;mn=+c.slice(ti+3,ti+5)||0;}}
  if(isUTC){
    const d=new Date(Date.UTC(yr,mo-1,dy,hr+7,mn));
    return{dateStr:d.toISOString().slice(0,10),timeStr:`${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`,ts:d.getTime()};
  }
  const d=new Date(yr,mo-1,dy,hr,mn);
  return{dateStr:`${yr}-${String(mo).padStart(2,'0')}-${String(dy).padStart(2,'0')}`,timeStr:`${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`,ts:d.getTime()};
}
function expandRRuleICS(dtStartTs,durationMs,rruleStr,rangeStart,rangeEnd){
  const p={};rruleStr.split(';').forEach(s=>{const[k,v]=s.split('=');p[k]=v;});
  const freq=p.FREQ;
  const DAY={'MO':1,'TU':2,'WE':3,'TH':4,'FR':5,'SA':6,'SU':0};
  const days=p.BYDAY?p.BYDAY.split(',').map(d=>DAY[d.replace(/[-+\d]/g,'')]):null;
  const maxC=p.COUNT?+p.COUNT:400;
  const untilTs=p.UNTIL?(()=>{const c=p.UNTIL.replace('Z','');return new Date(+c.slice(0,4),+c.slice(4,6)-1,+c.slice(6,8)).getTime();})():Infinity;
  const rsTs=new Date(rangeStart+'T00:00:00').getTime();
  const reTs=new Date(rangeEnd+'T23:59:59').getTime();
  const limitTs=Math.min(untilTs,reTs);
  const results=[];let cur=new Date(dtStartTs);let count=0;
  while(cur.getTime()<=limitTs&&count<maxC){
    const ok=!days||days.includes(cur.getDay());
    if(ok&&cur.getTime()>=rsTs){results.push({start:new Date(cur),end:new Date(cur.getTime()+durationMs)});count++;}
    if(freq==='DAILY')cur.setDate(cur.getDate()+1);
    else if(freq==='WEEKLY'&&days)cur.setDate(cur.getDate()+1);
    else if(freq==='WEEKLY')cur.setDate(cur.getDate()+7);
    else if(freq==='MONTHLY')cur.setMonth(cur.getMonth()+1);
    else break;
  }
  return results;
}
function mapICSEvent(rawSummary){
  const s=rawSummary.replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\;/g,';').trim();
  const parts=s.split(' - ');
  let prefix='',detail=s,suffix='';
  if(parts.length>=3){prefix=parts[0].trim();suffix=parts[parts.length-1].trim();detail=parts.slice(1,-1).join(' - ').trim();}
  else if(parts.length===2){prefix=parts[0].trim();detail=parts[1].trim();}
  const pU=prefix.toUpperCase().replace(/^\(CANCELLED\) /,'');
  let kat='Personal';
  if(pU==='RSP')kat='RSP';
  else if(['BT','BT & TKB','RSP & BT','BT X TKB'].some(x=>pU===x||pU.endsWith('BT')))kat='BT';
  else if(pU==='TKB'||pU==='HOLDING')kat='TKB';
  const sfU=suffix.toUpperCase();const dtL=detail.toLowerCase();
  let jenis='Deepwork Strategic';
  if(sfU.includes('DISCUSSION')||sfU.includes('APPROVAL')||sfU.includes('DECISION')||sfU.includes('BRAINSTORM')||sfU.includes('DISCUSS'))jenis='Meeting Strategic/Problem Solving/Approval';
  else if(sfU.includes('REVIEW')||sfU.includes('UPDATE')||sfU.includes('EVALUASI'))jenis='Meeting Review Operasional + Evaluasi Tim';
  else if(sfU.includes('KONTEN')||sfU.includes('MENULIS')||sfU.includes('PODCAST')||dtL.includes('take konten'))jenis='Bikin Konten';
  else if(sfU.includes('GENBA')||dtL.includes('genba'))jenis='Genba';
  else if(sfU.includes('DEEP')||sfU.includes('THINKING')||sfU.includes('THINK'))jenis='Deepwork Strategic';
  else if(kat!=='Personal')jenis='Meeting Review Operasional + Evaluasi Tim';
  let kpi='people';
  if(kat==='RSP'){kpi=jenis==='Genba'?'riset':jenis.includes('Review')?'operasional':'operasional';}
  else if(kat==='BT')kpi='branding';
  else if(kat==='TKB')kpi='finansial';
  return{prefix,detail:detail||s,suffix,kategori:kat,jenisKegiatan:jenis,relateMilestone:kpi};
}
function parseICS(icsText,rangeStart,rangeEnd){
  const text=icsText.replace(/\r?\n[ \t]/g,'');
  const blocks=text.split('BEGIN:VEVENT').slice(1).map(b=>b.split('END:VEVENT')[0]);
  const events=[];
  blocks.forEach(block=>{
    const props={};
    block.split('\n').forEach(line=>{
      line=line.trim();const ci=line.indexOf(':');if(ci<0)return;
      const rawKey=line.slice(0,ci);const val=line.slice(ci+1);
      const name=rawKey.split(';')[0];
      if(!props[name])props[name]=val;
    });
    const summary=props['SUMMARY']||'';if(!summary)return;
    if((props['STATUS']||'').toUpperCase()==='CANCELLED')return;
    const dtSV=props['DTSTART'];const dtEV=props['DTEND'];if(!dtSV)return;
    const start=parseDTStr(dtSV);const end=dtEV?parseDTStr(dtEV):start;
    const durMs=Math.max(end.ts-start.ts,900000); // min 15min
    const mapped=mapICSEvent(summary);
    function mk(s,e){
      const ds=new Date(s),de=new Date(e);
      const dateStr=`${ds.getFullYear()}-${String(ds.getMonth()+1).padStart(2,'0')}-${String(ds.getDate()).padStart(2,'0')}`;
      return{id:'SJ-'+genId(),tanggal:dateStr,jamMulai:`${String(ds.getHours()).padStart(2,'0')}:${String(ds.getMinutes()).padStart(2,'0')}`,jamSelesai:`${String(de.getHours()).padStart(2,'0')}:${String(de.getMinutes()).padStart(2,'0')}`,masalahBacklogId:'',masalahText:'',kategori:mapped.kategori,jenisKegiatan:mapped.jenisKegiatan,detailKegiatan:mapped.detail,relateMilestone:mapped.relateMilestone,outputKeputusan:''};
    }
    if(props['RRULE']){
      expandRRuleICS(start.ts,durMs,props['RRULE'],rangeStart,rangeEnd).forEach(({start:s,end:e})=>{
        const item=mk(s,e);if(item.tanggal>=rangeStart&&item.tanggal<=rangeEnd)events.push(item);
      });
    }else{
      if(start.dateStr>=rangeStart&&start.dateStr<=rangeEnd)events.push(mk(new Date(start.ts),new Date(end.ts)));
    }
  });
  return events.sort((a,b)=>a.tanggal.localeCompare(b.tanggal)||(a.jamMulai||'').localeCompare(b.jamMulai||''));
}

// ── IMPORT ICS ────────────────────────────────────────────────
function ImportICS({onBatchAddJadwal,onResetICSBatch}){
  const [icsText,setIcsText]=useState('');
  const [preview,setPreview]=useState(null);
  const [done,setDone]=useState(false);
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [lastBatch,setLastBatch]=useState(()=>{try{const s=localStorage.getItem('rsp_last_ics');return s?JSON.parse(s):null;}catch{return null;}});
  const fileRef=React.useRef();

  const rangeStart=todayStr();
  const rangeEnd=(()=>{const d=new Date();d.setFullYear(d.getFullYear()+1);return d.toISOString().slice(0,10);})();

  function handleFile(e){const f=e.target.files[0];if(!f)return;setErr('');const r=new FileReader();r.onload=ev=>setIcsText(ev.target.result);r.readAsText(f,'UTF-8');}

  function doParse(){
    setErr('');setDone(false);setLoading(true);
    if(!icsText.trim()||!icsText.includes('BEGIN:VCALENDAR')){setErr('File bukan format ICS yang valid.');setLoading(false);return;}
    try{
      const events=parseICS(icsText,rangeStart,rangeEnd);
      if(!events.length){setErr('Tidak ada event dalam range bulan ini s.d. 1 tahun ke depan.');setLoading(false);return;}
      // Stats
      const byKat={},byJenis={},byMonth={};
      events.forEach(it=>{
        byKat[it.kategori]=(byKat[it.kategori]||0)+1;
        byJenis[it.jenisKegiatan]=(byJenis[it.jenisKegiatan]||0)+1;
        const m=it.tanggal.slice(0,7);byMonth[m]=(byMonth[m]||0)+1;
      });
      setPreview({events,byKat,byJenis,byMonth,sample:events.slice(0,8)});
    }catch(e){setErr('Gagal parse: '+e.message);}
    setLoading(false);
  }

  function doConfirm(){
    if(!preview)return;
    const batchId='ICS-'+genId();
    const byDate={};
    preview.events.forEach(it=>{
      const tagged={...it,_icsBatch:batchId};
      if(!byDate[it.tanggal])byDate[it.tanggal]=[];
      byDate[it.tanggal].push(tagged);
    });
    onBatchAddJadwal(byDate);
    // Save batch info for potential reset
    try{localStorage.setItem('rsp_last_ics',JSON.stringify({batchId,count:preview.events.length,at:todayStr()}));}catch(e){}
    setPreview(null);setIcsText('');setDone(true);setLastBatch({batchId,count:preview.events.length,at:todayStr()});
  }

  function doReset(){
    if(!lastBatch)return;
    if(!confirm(`Hapus ${lastBatch.count} event dari import ICS tanggal ${lastBatch.at}?`))return;
    onResetICSBatch(lastBatch.batchId);
    try{localStorage.removeItem('rsp_last_ics');}catch(e){}
    setLastBatch(null);setDone(false);
  }

        <div className="text-[11px] text-violet-700 leading-relaxed mb-1">Di Google Calendar: <strong>⚙️ Settings → Import & Export → Export</strong>, download file .ics, lalu upload di sini.</div>
        <div className="text-[10px] text-violet-600">Range import: <strong>{rangeStart}</strong> s.d. <strong>{rangeEnd}</strong></div>
      </div>

      {/* Reset last batch */}
      {lastBatch&&<div className="bg-stone-50 border border-stone-200 rounded-2xl p-3.5 mb-4 flex items-center justify-between gap-3">
        <div>
          <div className="text-[11px] font-bold text-stone-700">Import terakhir: {lastBatch.count} event ({lastBatch.at})</div>

        </div>

      </div>}

// ── KPI HELPERS ───────────────────────────────────────────────
function parsePct(v){if(!v)return 0;const n=parseFloat(String(v).replace('%','').replace(',','.').trim());return isNaN(n)?0:Math.round(n);}
function parseKPINum(v){if(!v)return null;const s=String(v).trim();if(!s||s==='-'||s==='0')return null;const n=parseFloat(s.replace(/[^0-9.]/g,''));return isNaN(n)?null:n;}
function tsvToWeekly(rows){
  const weekly={W1:{},W2:{},W3:{},W4:{},W5:{}};
  const MAP={'booking':'booking','unit ready':'ready_stock','sp3k':'sp3k','akad':'akad','temuan kecepatan':'kecepatan','temuan fraud':'fraud','complain produk (afs)':'afs','complain non produk':'non_produk','complain utility':'utility','complain berulang':'berulang','lahan baru':'lahan_baru','realisasi sistemasi':'sistemasi','jumlah sistem':'sistem_dampak','kepuasan penggunaan':'kepuasan_sistem','pemenuhan sdm':'sdm_rekrut','perrfomance sdm':'performa_sdm','performance sdm':'performa_sdm','retensi sdm':'retensi_sdm','pencairan':'pencairan','budgeting':'budgeting'};
  function findId(name){const n=(name||'').toLowerCase().trim();for(const[k,v] of Object.entries(MAP)){if(n.includes(k))return v;}return null;}
  rows.forEach(r=>{
    const id=findId(r.sub);if(!id)return;
    [['W1','w1'],['W2','w2'],['W3','w3'],['W4','w4']].forEach(([wk,rk])=>{
      const d=r[rk];if(!d)return;
      weekly[wk][id]={aktual:parseKPINum(d.aktual),pct:parsePct(d.pct)};
    });
  });
  ['W1','W2','W3','W4','W5'].forEach(w=>{if(!Object.keys(weekly[w]).length)weekly[w]=null;});
  return weekly;
}
function parseKPICorpTSV(text){
  const lines=text.trim().split(/\r?\n/);
  let start=0;
  for(let i=0;i<Math.min(6,lines.length);i++){
    const c=lines[i].split('\t');
    if(c[3]&&(c[3].toLowerCase().includes('sub indikator')||c[3].toLowerCase().includes('booking')||c[3].toLowerCase().includes('unit ready'))){start=c[3].toLowerCase().includes('sub')?i+2:i;break;}
  }
  let lastDiv='',lastInd='';
  const rows=[];const totals={W1:null,W2:null,W3:null,W4:null};
  for(let i=start;i<lines.length;i++){
    const c=lines[i].split('\t').map(x=>(x||'').trim());
    if((c[0]||c[1]||'').toLowerCase().includes('total')){
      const rowTxt=lines[i];
      ['1','2','3','4'].forEach(n=>{
        const re=new RegExp('W'+n+'\\t+([\\d.]+%?)\\t+([\\d.]+%?)');
        const m=rowTxt.match(re);
        if(m)totals['W'+n]={bobot:parsePct(m[1]),skor:parsePct(m[2])};
      });
      continue;
    }
    if(c[0])lastDiv=c[0];if(c[1])lastInd=c[1];
    const sub=c[3];
    if(!sub||sub.toLowerCase().includes('target')||sub.toLowerCase().includes('indikator')||sub.toLowerCase().includes('bobot'))continue;
    rows.push({divisi:lastDiv,indikator:lastInd,bobotSub:c[4],sub,
      w1:{target:c[6],aktual:c[7],pct:c[8],nilai:c[9]},
      w2:{target:c[10],aktual:c[11],pct:c[12],nilai:c[13]},
      w3:{target:c[14],aktual:c[15],pct:c[16],nilai:c[17]},
      w4:{target:c[18],aktual:c[19],pct:c[20],nilai:c[21]},
    });
  }
  return{rows,totals,weekly:tsvToWeekly(rows)};
}

// ── JADWAL FILTER HELPER ─────────────────────────────────────
function applyJadwalFilter(items,filter){
  return items.filter(it=>{
    const kat=it.kategori||'Personal';
    if(filter.kategori[kat]===false)return false;
    if(filter.belumOutput&&(it.outputKeputusan||'').trim())return false;
    if(filter.belumSiap){
      const clDef=PRE_CHECKLIST[it.jenisKegiatan];
      if(clDef){
        const clItems=clDef._subs?(it.meetingSubType?clDef[it.meetingSubType]||[]:[]):(Array.isArray(clDef)?clDef:[]);
        const done=it.checklistDone||{};
        const allWajibDone=clItems.filter(c=>c.wajib).every(c=>done[c.id]);
        if(allWajibDone)return false;
      }
    }
    return true;
  });
}

            <button className={`flex-1 py-1.5 rounded-lg text-[10px] font-bold st as ${isExpOut?'bg-stone-800 text-white':'bg-stone-100 text-stone-600 hover:bg-stone-200'}`} onClick={()=>setExpOutput(isExpOut?null:item.id)}>
              {hasOutput?'📝 Edit Output':'✍️ Isi Output'}
            </button>
            {!fromBacklog&&gcalReady&&<button className="py-1.5 px-2 rounded-lg text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-100 st as" title="Push ke Google Calendar" onClick={async()=>{const ok=await onPushItem(item);if(ok!==false)alert('✅ Berhasil dipush ke Google Calendar!');else alert('❌ Gagal push. Cek koneksi Google Calendar di ⚙️');}}> 📅</button>}

  // Add form per blok
  function AddForm({blokId}){
    const bItems=blBaru.filter(it=>it.status==='baru'||it.status==='dijadwalkan');
    const blok=BLOKS.find(b=>b.id===blokId);
    const defJam=blok?blok.time.split('–').map(t=>t.trim().padStart(2,'0')+':00'):['08:00','10:00'];
    const [lf,setLf]=useState({...EMPTY_F,jamMulai:defJam[0]||'08:00',jamSelesai:defJam[1]||'09:00'});
    function upd(k,v){setLf(p=>({...p,[k]:v}));}
    return(
      <div className={`border-t ${blok?.border||'border-stone-200'} bg-stone-50/50 p-3 afi`}>
        {/* Jam */}
        <div className="flex gap-2 mb-3">
          <div className="flex-1"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Jam Mulai</div><input type="time" className="w-full px-2 py-1.5 rounded-lg border border-stone-200 bg-white text-[12px] font-mono focus:outline-none focus:ring-1 focus:ring-stone-400" value={lf.jamMulai} onChange={e=>upd('jamMulai',e.target.value)}/></div>

        </div>
        {/* Masalah dari backlog atau manual */}
        <div className="mb-3">
          <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Masalah yang Dievaluasi</div>
          <div className="flex bg-stone-100 p-0.5 rounded-lg border border-stone-200 mb-2 gap-0.5">
            <button className={`flex-1 py-1.5 rounded-md text-[10px] font-bold st as ${lf.masalahMode==='backlog'?'bg-white shadow-sm text-stone-800':'text-stone-500'}`} onClick={()=>upd('masalahMode','backlog')}>Dari Backlog</button>
            <button className={`flex-1 py-1.5 rounded-md text-[10px] font-bold st as ${lf.masalahMode==='manual'?'bg-white shadow-sm text-stone-800':'text-stone-500'}`} onClick={()=>upd('masalahMode','manual')}>Tulis Manual</button>
          </div>
          {lf.masalahMode==='backlog'?(
            <select className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] font-medium focus:outline-none" value={lf.masalahBacklogId} onChange={e=>upd('masalahBacklogId',e.target.value)}>
              <option value="">— Pilih dari backlog (opsional) —</option>
              {backlog.map(b=><option key={b.id} value={b.id}>[{KPI5.find(k=>k.id===b.fungsiKPI)?.short}] {b.konteks}: {b.isi.slice(0,60)}</option>)}
            </select>
          ):(
            <input className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[12px] focus:outline-none focus:ring-1 focus:ring-stone-400" placeholder="Tulis masalah yang dievaluasi..." value={lf.masalahText} onChange={e=>upd('masalahText',e.target.value)}/>
          )}
        </div>
        {/* Kategori (Personal/RSP/TKB/BT) */}
        <div className="mb-3">
          <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Kategori</div>
          <div className="flex gap-1.5 flex-wrap">
            {KATEGORI_ORG.map(k=><button key={k} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border st as ${lf.kategori===k?'bg-stone-800 text-white border-stone-800 shadow-sm':'bg-white text-stone-600 border-stone-200'}`} onClick={()=>upd('kategori',k)}>{k}</button>)}
          </div>
        </div>
        {/* Jenis Kegiatan */}
        <div className="mb-3">
          <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Jenis Kegiatan</div>
          <select className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] font-medium focus:outline-none" value={lf.jenisKegiatan} onChange={e=>upd('jenisKegiatan',e.target.value)}>
            {JENIS_KEGIATAN.map(j=><option key={j} value={j}>{j}</option>)}
          </select>
        </div>
        {/* Detail Kegiatan */}
        <div className="mb-3">
          <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Detail Kegiatan *</div>
          <textarea className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[12px] focus:outline-none focus:ring-1 focus:ring-stone-400 resize-none" rows={2} placeholder="Apa yang akan dilakukan / dibahas?" value={lf.detailKegiatan} onChange={e=>upd('detailKegiatan',e.target.value)}/>
        </div>
        {/* Relate Milestone / KPI */}
        <div className="mb-4">
          <div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Relate Milestone / KPI</div>
          <div className="flex gap-1.5 flex-wrap">
            {KPI5.map(k=><button key={k.id} className={`px-2.5 py-1.5 rounded-lg text-[10px] font-bold border st as ${lf.relateMilestone===k.id?`${k.bg} ${k.color} ${k.border} shadow-sm`:'bg-white text-stone-500 border-stone-200'}`} onClick={()=>upd('relateMilestone',k.id)}>{k.short}</button>)}
          </div>
        </div>
        <div className="flex gap-2">
          <button className="flex-1 py-2 rounded-xl border border-stone-200 bg-white text-[11px] font-bold text-stone-500 as st" onClick={()=>setAddingBlok(null)}>Batal</button>
          <button className={`flex-2 py-2 px-4 rounded-xl text-[11px] font-bold as st ${!lf.detailKegiatan.trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-800 text-white'}`} onClick={()=>{if(!lf.detailKegiatan.trim())return;onAddJadwal(today,{id:'SJ-'+genId(),tanggal:today,...lf,outputKeputusan:''});setAddingBlok(null);}} disabled={!lf.detailKegiatan.trim()}>+ Tambahkan</button>
        </div>
      </div>
    );
  }

  return(
    <div className="afi pb-4">
      <div className="px-5 pt-5 pb-3 md:px-6 flex justify-between items-start relative">
        <div>
          <div className="text-xl font-extrabold text-stone-800 tracking-tight">{dayName}</div>
          <div className="text-[11px] font-medium text-stone-400 mt-0.5">{dayItems.length} kegiatan{hiddenCount>0?` · ${hiddenCount} disembunyikan`:''} · tap ✍️ untuk output · + untuk tambah</div>
        </div>
        <div className="flex-shrink-0 flex items-center gap-2 relative">
          {gcalReady&&<button className="px-3 py-1.5 rounded-xl bg-blue-50 border border-blue-200 text-[10px] font-bold text-blue-600 as st flex items-center gap-1" onClick={()=>onPushDay(today)} title="Push semua kegiatan hari ini ke Google Calendar">📅 Push Semua</button>}
          <button className="px-3 py-1.5 rounded-xl bg-stone-100 border border-stone-200 text-[10px] font-bold text-stone-600 as st flex items-center gap-1" onClick={()=>setShowExport(p=>!p)}>⬇️ Export</button>
          {showExport&&<div className="absolute right-0 mt-1 bg-white border border-stone-200 rounded-2xl shadow-float z-30 overflow-hidden afi" style={{minWidth:160}}>
            <div className="px-3 py-2 text-[9px] font-extrabold text-stone-400 uppercase tracking-wider border-b border-stone-100">Export Jadwal CSV</div>
            {[['today','📅 Hari ini'],['week','📆 Minggu ini'],['all','📂 Semua data']].map(([r,lbl])=>(
              <button key={r} className="w-full text-left px-3 py-2.5 text-[11px] font-medium text-stone-700 hover:bg-stone-50 border-b border-stone-100 last:border-0 as" onClick={()=>{exportJadwalCSV(jadwal,backlog,r);setShowExport(false);}}>{lbl}</button>
            ))}
          </div>}
        </div>
      </div>

      {/* Backlog belum dijadwalkan */}
      {blBaru.length>0&&<div className="mx-4 mb-4 md:mx-6">
        <div className="bg-stone-100 border border-stone-200 rounded-2xl overflow-hidden shadow-inner">
          <div className="p-3 flex justify-between items-center cursor-pointer as" onClick={()=>setShowBL(p=>!p)}>
            <div className="text-[11px] font-bold text-stone-700">📋 {blBaru.length} backlog belum dijadwalkan</div>
            <span className="text-[10px] text-stone-400">{showBL?'▲':'▼'}</span>
          </div>
          {showBL&&<div className="border-t border-stone-200 bg-white divide-y divide-stone-100 max-h-48 overflow-y-auto">
            {blBaru.map(item=>{const k=KPI5.find(x=>x.id===item.fungsiKPI);return(
              <div key={item.id} className="p-3 hover:bg-stone-50">
                <div className={`text-[9px] font-extrabold uppercase tracking-widest mb-0.5 ${k?.color}`}>{item.konteks}</div>
                <div className="text-[11px] font-semibold text-stone-800">{item.isi}</div>
              </div>
            );})}
          </div>}
        </div>
      </div>}

      {/* Time blocks */}
      <div className="space-y-4 px-4 md:grid md:grid-cols-2 md:gap-4 md:space-y-0 md:px-6 md:pb-6 md:items-start">
        {BLOKS.map(blok=>{
          const items=getBlokItems(blok.id);
          const blItems=blSched.filter(it=>it.blokWaktu===blok.id);
          const all=[...items,...blItems];
          const isAdding=addingBlok===blok.id;
          return(
            <div key={blok.id} className="bg-white rounded-3xl border border-stone-200 overflow-hidden shadow-soft">
              {/* Blok header */}
              <div className={`p-3.5 flex items-center justify-between ${blok.bg} border-b ${blok.border}`}>
                <div>
                  <div className="flex items-center gap-2"><span className={`text-[15px] font-black ${blok.color}`}>{blok.time}</span><span className={`text-[12px] font-bold ${blok.color}`}>{blok.label}</span></div>
                  <div className={`text-[9px] font-semibold ${blok.color} opacity-70`}>{blok.kat}</div>

                <div className="flex items-center gap-2">
                  <div className={`w-8 h-8 rounded-xl bg-white/50 flex items-center justify-center text-[12px] font-black ${blok.color}`}>{all.length||'–'}</div>
                  <button className={`w-8 h-8 rounded-xl bg-white/70 flex items-center justify-center text-[16px] font-bold ${blok.color} as st border ${blok.border}`} onClick={()=>setAddingBlok(isAdding?null:blok.id)}>{isAdding?'✕':'+'}</button>
                </div>
              </div>
              {/* Add form */}
              {isAdding&&<AddForm blokId={blok.id}/>}
              {/* Items */}
              <div className="p-2.5 bg-stone-50/30">
                {all.length===0?<div className="py-4 text-center text-[10px] text-stone-400 italic">Belum ada kegiatan · tap + untuk menambah</div>
                :<>
                  {items.map(item=><JadwalCard key={item.id} item={item}/>)}
                  {blItems.map(item=><JadwalCard key={item.id} item={item} fromBacklog={true}/>)}
                </>}
              </div>

          );
        })}
      </div>
    </div>

}



// ── JADWAL MINGGUAN ───────────────────────────────────────────
function JadwalMingguan({backlog,jadwal,filter}){
  const [selDate,setSelDate]=useState(null);
  const mon=new Date();const diff=mon.getDay()===0?6:mon.getDay()-1;mon.setDate(mon.getDate()-diff);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return{date:d.toISOString().slice(0,10),lbl:d.toLocaleDateString('id-ID',{weekday:'short'}).slice(0,3),num:d.getDate(),isToday:d.toISOString().slice(0,10)===todayStr()};});
  const blSched=backlog.filter(it=>it.status==='dijadwalkan');
  const filtDays=selDate?days.filter(d=>d.date===selDate):days;
  return(
    <div className="afi pb-4">
      <div className="px-4 pt-4 pb-2 flex justify-between items-end"><div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Minggu Ini</div><div className="text-[10px] text-stone-400">{days[0].num}–{days[6].num} {new Date().toLocaleDateString('id-ID',{month:'long'})}</div></div>
      <div className="grid grid-cols-7 gap-1 px-4 mb-4">
        {days.map(d=>{const dj=filter?applyJadwalFilter(jadwal[d.date]||[],filter):(jadwal[d.date]||[]);const byB=BLOKS.map(b=>({b,items:[...dj.filter(it=>getBlokFromTime(it.jamMulai)===b.id),...blSched.filter(it=>it.tanggal===d.date&&it.blokWaktu===b.id)]}));const isWE=new Date(d.date+'T12:00:00').getDay();const isSel=selDate===d.date;return(
          <div key={d.date} onClick={()=>setSelDate(p=>p===d.date?null:d.date)} className={`rounded-xl overflow-hidden border cursor-pointer st as flex flex-col ${isWE===0||isWE===6?'opacity-60':''} ${isSel?'border-stone-800 shadow-md':d.isToday?'border-blue-300 shadow-sm':'border-stone-200'}`}>
            <div className={`text-center py-1 border-b ${isSel?'bg-stone-800 text-white border-stone-800':d.isToday?'bg-blue-600 text-white border-blue-600':'bg-stone-100 text-stone-600 border-stone-200'}`}><div className="text-[8px] font-bold uppercase">{d.lbl}</div><div className="text-[13px] font-black">{d.num}</div></div>
            <div className="flex-1 p-0.5 bg-white">{byB.map(({b,items})=><div key={b.id} className={`mb-0.5 rounded-sm h-4 flex items-center justify-center ${items.length?b.bg:'bg-transparent'}`}>{items.length>0&&<div className={`w-1 h-1 rounded-full ${b.color.replace('text-','bg-')}`}/>}</div>)}</div>
          </div>
        );})}
      </div>

// ── HEATMAP ───────────────────────────────────────────────────
function Heatmap({backlog}){
  // Kolom: 7 kategori kegiatan
  const COLS=[
    {id:'deepwork',label:'Deepwork Strategic',short:'Deepwork',match:'deepwork'},
    {id:'meet_s',label:'Meeting Strategic',short:'Meet. Strategic',match:'strategic'},
    {id:'meet_r',label:'Meeting Review Ops',short:'Meet. Review',match:'review'},
    {id:'external',label:'Ketemu External',short:'Ketemu Ext.',match:'external'},
    {id:'konten',label:'Bikin Konten',short:'Konten',match:'konten'},
    {id:'genba',label:'Genba',short:'Genba',match:'genba'},
    {id:'engage',label:'Employee Engage',short:'Engage',match:'engage'},
  ];
  // Valid combinations per fungsi KPI
  const VALID={
    finansial:['deepwork','meet_s','meet_r','external'],
    branding:['deepwork','meet_s','meet_r','konten','external'],
    riset:['deepwork','meet_s','meet_r','external','genba'],
    operasional:['meet_s','meet_r','external','genba'],
    people:['deepwork','meet_r','konten','external','engage'],
  };
  const cntCell=(kpiId,colId)=>{
    const col=COLS.find(x=>x.id===colId);if(!col)return 0;
    return backlog.filter(it=>it.fungsiKPI===kpiId&&(it.kategori||'').toLowerCase().includes(col.match)).length;
  };
  const allC=KPI5.flatMap(k=>COLS.map(c=>cntCell(k.id,c.id)));
  const maxC=Math.max(1,...allC);
  const tot=Math.max(1,backlog.length);
  const gaps=KPI5.filter(k=>backlog.filter(it=>it.fungsiKPI===k.id).length===0);

  return(
    <div className="afi pb-4">
      {/* Matrix title */}
      <div className="px-4 pt-5 pb-1 md:px-6">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest mb-0.5">Heatmap — Fungsi KPI × Kategori Kegiatan</div>
        <div className="text-[10px] text-stone-400">✕ = tidak relevan · warna makin gelap = makin banyak aktivitas backlog</div>
      </div>

      {/* Matrix grid */}
      <div className="overflow-x-auto px-4 md:px-6 pb-5 mt-3">
        <div style={{minWidth:480}}>
          {/* Column headers */}
          <div style={{display:'grid',gridTemplateColumns:`88px repeat(7,1fr)`,gap:3,marginBottom:6}}>
            <div/>
            {COLS.map(c=><div key={c.id} style={{textAlign:'center',padding:'0 2px'}}>
              <div style={{fontSize:8,fontWeight:800,color:'#78716c',lineHeight:1.25,letterSpacing:'.05em',textTransform:'uppercase'}}>{c.short}</div>
            </div>)}
          </div>
          {/* KPI rows */}
          {KPI5.map(k=>(
            <div key={k.id} style={{display:'grid',gridTemplateColumns:`88px repeat(7,1fr)`,gap:3,marginBottom:3}}>
              <div style={{display:'flex',alignItems:'center',paddingRight:8}}>
                <span style={{fontSize:10,fontWeight:800,color:k.hex,lineHeight:1.2,letterSpacing:'-.2px'}}>{k.short}</span>
              </div>
              {COLS.map(c=>{
                const valid=(VALID[k.id]||[]).includes(c.id);
                const n=cntCell(k.id,c.id);
                const alpha=n===0?0:Math.round((0.2+(n/maxC)*0.75)*255).toString(16).padStart(2,'0');
                if(!valid)return(
                  <div key={c.id} title={`${k.label} × ${c.label} — tidak relevan`}
                    style={{aspectRatio:'1',borderRadius:5,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#d6d3d1',fontWeight:700}}>✕</div>
                );
                return(
                  <div key={c.id} title={`${k.label} × ${c.label}: ${n} item`}
                    style={{aspectRatio:'1',borderRadius:5,background:n===0?'#fafaf9':`${k.hex}${alpha}`,border:`1px solid ${n===0?'#e7e5e4':k.hex+'33'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:n===0?'transparent':n/maxC>0.5?'#fff':k.hex,transition:'all .15s'}}>
                    {n>0?n:''}
                  </div>
                );
              })}
            </div>
          ))}
          {/* Legend */}
          <div style={{display:'flex',gap:10,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:9,color:'#a8a29e',fontWeight:700}}>LEGEND:</span>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#d6d3d1',fontWeight:700}}>✕</div><span style={{fontSize:9,color:'#a8a29e'}}>Tidak relevan</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#fafaf9',border:'1px solid #e7e5e4'}}/><span style={{fontSize:9,color:'#a8a29e'}}>0 item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED855'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Ada item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED8dd'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Banyak</span></div>
          </div>
        </div>
      </div>

      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>

      {/* Distribusi per kategori (dari backlog) */}
      <div className="px-4 pb-2 md:px-6 text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Distribusi Backlog per Kategori</div>
      <div className="px-4 md:px-6 space-y-2 pb-5">
        {COLS.map(c=>{const n=backlog.filter(it=>(it.kategori||'').toLowerCase().includes(c.match)).length;const maxN=Math.max(1,...COLS.map(x=>backlog.filter(it=>(it.kategori||'').toLowerCase().includes(x.match)).length));return(
          <div key={c.id} className="flex items-center gap-3">
            <div className="text-[10px] font-bold text-stone-500 text-right flex-shrink-0 leading-tight" style={{width:120}}>{c.label}</div>
            <div className="flex-1 h-6 bg-stone-100 rounded-lg overflow-hidden border border-stone-200/50">
              <div className="h-full flex items-center justify-end px-2 min-w-[28px] rounded-lg" style={{width:`${Math.max(n===0?0:(n/maxN)*100,n>0?6:0)}%`,background:n===0?'#e7e5e4':'#44403c'}}>
                <span className="text-[10px] font-bold text-white">{n}x</span>
              </div>
            </div>
          </div>
        );})}
      </div>

      {/* Coverage + gap alert */}
      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>
      <div className="px-4 pb-2 md:px-6 text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Coverage Backlog per Fungsi</div>
      <div className="px-4 md:px-6 space-y-3 pb-4">
        {KPI5.map(k=>{const t=backlog.filter(it=>it.fungsiKPI===k.id).length;const d=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='selesai').length;const b=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='baru').length;return(
          <div key={k.id}><div className="flex justify-between items-end mb-1.5"><span className={`text-[11px] font-bold ${k.color}`}>{k.label}</span><span className="text-[10px] text-stone-400">{d}/{t}{b>0&&<span className="text-red-500 ml-1 font-bold">({b} baru)</span>}</span></div>
          <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden relative border border-stone-200/50"><div className={`absolute left-0 top-0 bottom-0 ${k.bg}`} style={{width:`${(t/tot)*100}%`}}/><div className="absolute left-0 top-0 bottom-0 rounded-full" style={{width:`${(d/tot)*100}%`,background:k.hex}}/></div>
          </div>
        );})}
      </div>
      {gaps.length>0&&<div className="mx-4 md:mx-6 p-3.5 rounded-2xl bg-red-50 border border-red-100"><div className="text-[11px] font-bold text-red-700 mb-1">⚠️ Blind Spot — belum ada backlog:</div><div className="text-[11px] text-red-800">{gaps.map(k=>k.label).join(' · ')}</div></div>}
    </div>
  );
}

function computeAnalisaFiltered(jadwal,entity){
  if(!entity||entity==='all')return computeAnalisa(jadwal);
  const filt={};
  Object.entries(jadwal||{}).forEach(([date,items])=>{filt[date]=(items||[]).filter(it=>it.kategori===entity);});
  return computeAnalisa(filt);
}
function getWeekDays(){
  const days=[];const today=new Date();const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  for(let i=0;i<6;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push({dateStr:d.toISOString().slice(0,10),dayShort:d.toLocaleDateString('id-ID',{weekday:'short'}),num:d.getDate(),isToday:d.toISOString().slice(0,10)===todayStr()});}
  return days;
}

function AnalisaJadwal({backlog,jadwal,onAddJadwal,onBatchAddJadwal,onAddBacklog,onUpdateBacklog}){
  const [entityFilter,setEntityFilter]=useState('all');
  const [expandedDays,setExpandedDays]=useState(()=>new Set([todayStr()]));
  function toggleDay(d){setExpandedDays(p=>{const n=new Set(p);n.has(d)?n.delete(d):n.add(d);return n;});}
  const stats=computeAnalisaFiltered(jadwal||{},entityFilter);
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiErr,setAiErr]=useState('');
  const [showAI,setShowAI]=useState(false);
  const [rekoms,setRekoms]=useState([]);
  const [takingId,setTakingId]=useState(null);
  const [takeForm,setTakeForm]=useState({});
  const [showBin,setShowBin]=useState(false);
  const [recycleBin,setRecycleBin]=useState(()=>{try{return JSON.parse(localStorage.getItem('rsp_recycle_bin')||'[]');}catch{return[];}});

  const remainDays=React.useMemo(()=>{
    const days=[];const today=new Date();const dow=today.getDay();
    const dUntilSat=dow===6?0:(dow===0?6:6-dow);
    for(let i=0;i<=dUntilSat;i++){const d=new Date(today);d.setDate(today.getDate()+i);if(d.getDay()===0)continue;days.push({dateStr:d.toISOString().slice(0,10),dayName:d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'})});}
    return days;
  },[]);
  const satStr=remainDays[remainDays.length-1]?.dateStr||todayStr();

  function syncBin(arr){setRecycleBin(arr);try{localStorage.setItem('rsp_recycle_bin',JSON.stringify(arr));}catch(e){}}
  function addToBin(item){syncBin([...recycleBin,{...item,rejectedAt:todayStr()}]);}
  function removeFromBin(id){syncBin(recycleBin.filter(it=>it.id!==id));}

  function buildPrompt(){
    const td=todayStr();
    const schedLines=remainDays.map(d=>{
      const its=(jadwal[d.dateStr]||[]).sort((a,b)=>(a.jamMulai||'').localeCompare(b.jamMulai||''));
      return `${d.dayName}(${d.dateStr}): ${its.length?its.map(it=>`${it.jamMulai}-${it.jamSelesai} "${it.detailKegiatan}"[${JENIS_SHORT[it.jenisKegiatan]||it.jenisKegiatan}]`).join(' | '):'KOSONG'}`;
    }).join('\n');
    const blLines=backlog.filter(it=>!['selesai','ditolak'].includes(it.status)).slice(0,12)
      .map(it=>`[${it.id}] ${it.konteks}: ${it.action||it.isi} | ${it.prioritas}${it.postponeCount?` | postpone:${it.postponeCount}x`:''}`).join('\n')||'(kosong)';
    const kpiStr=stats?stats.coverage.map(c=>`${c.kpi.short}:${c.hours}h`).join(', '):'(belum ada data)';
    return `PERAN: AI Scheduling Assistant CEO PT Raja Sukses Properindo.

RULES:
R1·WAKTU: 05:00-22:00. Protected: makan 3x30mnt, olahraga 2jam/hari. Senin-Jumat full. Sabtu max 15:00. Minggu off.
R2·KPI TARGET/minggu: Operasional 30%, Finansial 25%, Branding 25%, Riset 15%, People 5%. RSP=semua KPI. BT=Branding(B2B,premium Jkt&Cirebon). TKB=Finansial+People.
R3·KONTEN: min 1x max 3x/minggu. Pair: Genba+Konten, Speech/BedahBuku+Konten.
R4·MEETING COO/CMO: preferensi di luar 09:00-17:00.
R5·DEEPWORK: boleh tiap hari. Pagi <09:00 prioritas marketing/branding.
R6·PERF.APPRAISAL: min 1x/minggu, Meeting Review RSP, bisa gabung COO.
R7·PAIRING: Genba sekalian Konten. Speech/BedahBuku sekalian Konten.
R8·BACKLOG: Immediately ikuti deadline MoM. Postpone>=3 wajib jadwalkan.
R9·PAGI(05-09): Fokus marketing/branding/review konten. Hindari meeting internal tim.

HARI INI: ${td}. SISA MINGGU sampai Sabtu ${satStr}:
${schedLines}

BACKLOG PENDING:
${blLines}

KPI AKTUAL MINGGU INI: ${kpiStr}

Return HANYA JSON valid (no markdown):
{
  "ringkasan":[{"tag":"...","label":"...","value":"...","sub":"...","type":"danger|warning|success|info"}],
  "temuan":[{"fungsi":"...","status":"...","txt":"...","type":"danger|warning|success|info"}],
  "pola":[{"slot":"...","issue":"...","fix":"..."}],
  "rekomendasi":[{"id":"RK-1","kegiatan":"judul singkat","jenisKegiatan":"Deepwork Strategic|Meeting Strategic/Problem Solving/Approval|Meeting Review Operasional + Evaluasi Tim|Ketemu External|Bikin Konten|Genba|Employee Engage","kategori":"RSP|BT|TKB|Personal","fungsiKPI":"finansial|branding|riset|operasional|people","suggestTanggal":"YYYY-MM-DD","suggestJam":"HH:MM","suggestJamSelesai":"HH:MM","alasan":"1-2 kalimat","fromBacklogId":"BL-xxx atau null","prioritas":"tinggi|sedang","pairing":"nama aktivitas atau null"}]
}
Buat 5-8 rekomendasi. Prioritas: backlog tinggi+postpone>=3, lalu gap KPI, lalu rules. Hindari clash slot. suggestTanggal harus ${td} s.d. ${satStr}. Jangan Minggu.`;
  }

  async function runAnalisa(){
    setAiLoading(true);setAiErr('');setShowAI(true);setAiResult(null);setRekoms([]);
    try{
      const txt=await callAI([{role:'user',content:buildPrompt()}],3000);
      const clean=txt.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);
      setAiResult(parsed);
      setRekoms((parsed.rekomendasi||[]).map(r=>({...r,status:'pending',id:r.id||('RK-'+genId())})));
    }catch(e){setAiErr('Gagal: '+e.message);}
    setAiLoading(false);
  }

  function handleTake(r){
    setTakingId(r.id);
    setTakeForm({tanggal:r.suggestTanggal||remainDays[0]?.dateStr||todayStr(),jamMulai:r.suggestJam||'08:00',jamSelesai:r.suggestJamSelesai||'10:00',kategori:r.kategori||'RSP',detailKegiatan:r.kegiatan,jenisKegiatan:r.jenisKegiatan,relateMilestone:r.fungsiKPI});
  }
  function confirmTake(r){
    const item={id:'SJ-'+genId(),tanggal:takeForm.tanggal,jamMulai:takeForm.jamMulai,jamSelesai:takeForm.jamSelesai,kategori:takeForm.kategori,jenisKegiatan:takeForm.jenisKegiatan,detailKegiatan:takeForm.detailKegiatan,masalahBacklogId:r.fromBacklogId||'',masalahText:'',relateMilestone:takeForm.relateMilestone,outputKeputusan:''};
    onAddJadwal(takeForm.tanggal,item);
    setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'taken'}:x));
    setTakingId(null);
  }
  function handlePostpone(r){
    const bl=r.fromBacklogId?backlog.find(b=>b.id===r.fromBacklogId):null;
    const newCount=(bl?.postponeCount||0)+1;
    if(newCount>=3&&!confirm(`Postpone ke-${newCount}x. Sudah melampaui batas — lanjutkan?`))return;
    if(bl){onUpdateBacklog(bl.id,{postponeCount:newCount});}
    else{onAddBacklog([{id:'BL-'+genId(),sumber:'AI',tanggal:todayStr(),konteks:'Rekomendasi AI',isi:r.kegiatan,action:r.kegiatan,ekspektasi:'',pic:null,deadline:null,fungsiKPI:r.fungsiKPI,kategori:r.jenisKegiatan,blokWaktu:'sore-review',prioritas:r.prioritas,status:'baru',postponeCount:1,notes:'Dari rekomendasi AI — postponed'}]);}
    setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'postponed'}:x));
  }
  function handleReject(r){addToBin(r);setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'rejected'}:x));}
  function restoreFromBin(item){removeFromBin(item.id);setRekoms(p=>[...p,{...item,status:'pending',rejectedAt:undefined}]);setShowAI(true);}

  const pendingRekoms=rekoms.filter(r=>r.status==='pending');
  const doneRekoms=rekoms.filter(r=>r.status!=='pending');
  const typeMap={danger:'bg-red-100 text-red-700',warning:'bg-amber-100 text-amber-700',success:'bg-emerald-100 text-emerald-700',info:'bg-blue-100 text-blue-700'};
  const typeBorderMap={danger:'border-red-200',warning:'border-amber-200',success:'border-emerald-200',info:'border-blue-200'};
  const typeBgMap={danger:'bg-red-500',warning:'bg-amber-400',success:'bg-emerald-500',info:'bg-blue-500'};

  function heatCls(v){if(!v)return'bg-stone-100 text-stone-400';if(v<=3)return'bg-sky-100 text-sky-800';if(v<=7)return'bg-sky-300 text-sky-900';if(v<=12)return'bg-sky-500 text-white';return'bg-sky-700 text-white';}

  return(
    <div className="afi pb-8">
      {/* ACTION BUTTON */}
      <div className="px-4 pt-5 pb-4 md:px-6">
        <button className={`w-full py-3.5 rounded-2xl text-[12px] font-extrabold flex justify-center items-center gap-2 st as ${aiLoading?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-900 text-white shadow-float'}`} onClick={runAnalisa} disabled={aiLoading}>
          {aiLoading?<><span className="w-4 h-4 border-2 border-stone-400 border-t-white rounded-full animate-spin"/><span>AI menganalisis & merancang jadwal...</span></>:<span>🤖 Analisa + Rekomendasikan Jadwal</span>}
        </button>
        {aiErr&&<div className="mt-2 p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600">⚠️ {aiErr}</div>}
      </div>

      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-5"/>

      {/* ENTITY FILTER TABS */}
      <div className="px-4 md:px-6 mb-4">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-2">Filter Entitas</div>
        <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1 overflow-x-auto">
          {[['all','🏢 Semua'],['RSP','🏠 RSP'],['BT','🧵 BT'],['TKB','🏗 TKB'],['Personal','👤 Personal']].map(([id,lbl])=>(
            <button key={id} onClick={()=>setEntityFilter(id)} className={`flex-1 py-2 rounded-xl text-[10px] font-bold st as whitespace-nowrap px-2 ${entityFilter===id?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`}>{lbl}</button>

        {entityFilter!=='all'&&<div className="mt-2 text-[10px] text-stone-400 flex items-center gap-1.5">
