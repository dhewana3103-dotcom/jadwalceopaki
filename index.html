function gCalEventToJadwal(ev){
  var startRaw=ev.start&&(ev.start.dateTime||ev.start.date)||'';
  var endRaw=ev.end&&(ev.end.dateTime||ev.end.date)||'';
  // Parse to local time (handles both +07:00 and Z offset)
  function toLocal(s){
    if(!s)return{date:'',time:'00:00'};
    if(s.length<=10)return{date:s,time:'00:00'}; // all-day event
    var d=new Date(s);
    var yr=d.getFullYear();
    var mo=String(d.getMonth()+1).padStart(2,'0');
    var dy=String(d.getDate()).padStart(2,'0');
    var hr=String(d.getHours()).padStart(2,'0');
    var mn=String(d.getMinutes()).padStart(2,'0');
    return{date:yr+'-'+mo+'-'+dy,time:hr+':'+mn};
  }
  var start=toLocal(startRaw);
  var end=toLocal(endRaw);
  var summary=ev.summary||'';
  var mapped=mapICSEvent(summary);
  var gcalDesc=ev.description?stripHtml(ev.description):'';
  var relMilestone=mapped.kategori==='Personal'?'personal':mapped.relateMilestone;

}

  lines.push('['+( item.jenisKegiatan||'')+'] '+item.kategori+' · KPI: '+kl);
  return lines.join('\n');
}

function getWeekKey(dateStr){const d=new Date(dateStr+'T12:00:00');const day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));return mon.toISOString().slice(0,10);}
function getWeekLabel(mondayStr){const mon=new Date(mondayStr+'T12:00:00');const sat=new Date(mondayStr+'T12:00:00');sat.setDate(mon.getDate()+5);return`${mon.getDate()}–${sat.getDate()} ${mon.toLocaleDateString('id-ID',{month:'short'})}`;}
function getDur(jamMulai,jamSelesai){if(!jamMulai||!jamSelesai)return 0;const[h1,m1]=jamMulai.split(':').map(Number);const[h2,m2]=jamSelesai.split(':').map(Number);return Math.max(0,Math.round(((h2*60+m2)-(h1*60+m1))/60*10)/10);}
function computeAnalisa(jadwal){
  const allItems=Object.entries(jadwal).flatMap(([date,items])=>(items||[]).filter(it=>(it.outputKeputusan||"").trim()).map(it=>({...it,date})));
  if(!allItems.length)return null;
  const weekKeys=[...new Set(allItems.map(it=>getWeekKey(it.date)))].sort();
  // By jenis × week (hours)
  const byJenis={};
  JENIS_KEGIATAN.forEach(j=>{byJenis[j]={};weekKeys.forEach(w=>{byJenis[j][w]=0;});});
  allItems.forEach(it=>{const w=getWeekKey(it.date);if(byJenis[it.jenisKegiatan])byJenis[it.jenisKegiatan][w]=Math.round((byJenis[it.jenisKegiatan][w]+getDur(it.jamMulai,it.jamSelesai))*10)/10;});
  // By fungsi × week (hours)
  const byFungsi={};
  KPI5.forEach(k=>{byFungsi[k.id]={};weekKeys.forEach(w=>{byFungsi[k.id][w]=0;});});
  allItems.forEach(it=>{const w=getWeekKey(it.date);if(byFungsi[it.relateMilestone])byFungsi[it.relateMilestone][w]=Math.round((byFungsi[it.relateMilestone][w]+getDur(it.jamMulai,it.jamSelesai))*10)/10;});
  // Matrix: fungsi × jenis
  const matrix={};
  KPI5.forEach(k=>{matrix[k.id]={};JENIS_KEGIATAN.forEach(j=>{matrix[k.id][j]={count:0,hours:0};});});
  allItems.forEach(it=>{if(matrix[it.relateMilestone]&&matrix[it.relateMilestone][it.jenisKegiatan]){matrix[it.relateMilestone][it.jenisKegiatan].count++;matrix[it.relateMilestone][it.jenisKegiatan].hours=Math.round((matrix[it.relateMilestone][it.jenisKegiatan].hours+getDur(it.jamMulai,it.jamSelesai))*10)/10;}});
  // Totals per week
  const totals={};weekKeys.forEach(w=>{totals[w]=Math.round(allItems.filter(it=>getWeekKey(it.date)===w).reduce((s,it)=>s+getDur(it.jamMulai,it.jamSelesai),0)*10)/10;});
  // Distribusi (total hours per jenis)
  const distribusi=JENIS_KEGIATAN.map(j=>({jenis:j,hours:Math.round(Object.values(byJenis[j]).reduce((s,v)=>s+v,0)*10)/10,count:allItems.filter(it=>it.jenisKegiatan===j).length})).sort((a,b)=>b.hours-a.hours);
  // Coverage per fungsi (hours)
  const coverage=KPI5.map(k=>({kpi:k,hours:Math.round(Object.values(byFungsi[k.id]).reduce((s,v)=>s+v,0)*10)/10,count:allItems.filter(it=>it.relateMilestone===k.id).length}));

}

// ── NEED FEEDBACK TAB ─────────────────────────────────────────
function NeedFeedbackTab({backlog,onUpdate,onAddKeputusan,mom,onUpdateMom,onAddBacklog}){
  const [expandCeo,setExpandCeo]=useState(null);
  const [ceoTexts,setCeoTexts]=useState({});
  const [momOutcome,setMomOutcome]=useState({});
  const [momTindakLanjut,setMomTindakLanjut]=useState({});
  const [showDone,setShowDone]=useState(false);

  function qKey(item){return item._type==='mom'?'m_'+item._momEntryId+'_'+item.id:item.id;}

  const blQueue=backlog.filter(function(it){return it.needFeedback&&!it.feedbackStatus;});
  const momQueueRaw=[];
  (mom||[]).forEach(function(entry){(entry.items||[]).forEach(function(item){if(item.needCeoReview&&item.ceoReviewStatus==='queue'){momQueueRaw.push({...item,_type:'mom',_momEntryId:entry.id,_momEntryName:entry.meetingName,_momEntryDate:entry.tanggal});}});});
  const queue=[...blQueue.map(function(it){return{...it,_type:'backlog'};}), ...momQueueRaw];
  const waiting=backlog.filter(function(it){return it.feedbackStatus==='ceo_done'&&!it.momDone;});
  const doneMomRaw=[];
  (mom||[]).forEach(function(entry){(entry.items||[]).forEach(function(item){if(item.needCeoReview&&item.ceoReviewStatus&&item.ceoReviewStatus!=='queue'){doneMomRaw.push({...item,_type:'mom',_momEntryName:entry.meetingName});}});});
  const done=[...backlog.filter(function(it){return it.momDone;}),...doneMomRaw];

  function submitFeedback(item,outcome){
    var k=qKey(item);var txt=ceoTexts[k]||'';if(!txt.trim())return;
    var brief=item._type==='mom'?(item.ceoReviewBrief||{}):(item.feedbackBrief||{});
    var tl=momTindakLanjut[k]||null;
    if(item._type==='mom'){
      var rSt=outcome==='reviewed_ok'?'reviewed_ok':tl==='meeting'?'meeting-scheduled':tl==='tasklist'?'perlu-tasklist':tl==='info-tambahan'?'info-tambahan':'perlu-tindak-lanjut';
      var entry2=(mom||[]).find(function(m){return m.id===item._momEntryId;});
      if(entry2){var ni=entry2.items.map(function(i){return i.id===item.id?{...i,ceoReviewStatus:rSt,ceoReviewFeedback:txt,ceoReviewTs:new Date().toISOString()}:i;});onUpdateMom(entry2.id,{items:ni});}
      if(tl==='meeting'&&onAddBacklog){onAddBacklog([{id:'BL-'+genId(),sumber:'CEO Feedback',tanggal:todayStr(),konteks:item._momEntryName,isi:'Meeting: '+(item.action||'').slice(0,60),action:'PA Office arrange jadwal meeting CEO',ekspektasi:txt,pic:null,deadline:null,fungsiKPI:item.fungsiKPI||'operasional',kategori:'Meeting Strategic/Problem Solving/Approval',blokWaktu:'sore-review',prioritas:'tinggi',status:'baru',notes:txt,postponeHistory:[],hideFromBacklogList:true}]);}
      if(tl!=='info-tambahan'){onAddKeputusan({id:'KP-'+genId(),tanggal:todayStr(),backlogId:null,konteks:item._momEntryName,deskripsi:item.action||'',fungsiKPI:item.fungsiKPI||'operasional',dampak:'sedang',status:outcome==='reviewed_ok'?'sesuai':'proses',output:txt,updateTL:'',sumber:'MoM: '+item._momEntryName,evalStatus:outcome==='reviewed_ok'?'sesuai':'belum',ekspektasiY:brief.pertimbangan||'',needMoMPDCA:tl==='tasklist'});}
    }else{
      onUpdate(item.id,{feedbackStatus:'ceo_done',ceoFeedback:txt,feedbackTs:new Date().toISOString()});
      onAddKeputusan({id:'KP-'+genId(),tanggal:todayStr(),backlogId:item.id,konteks:item.konteks||'',deskripsi:item.isi||'',fungsiKPI:item.fungsiKPI||'operasional',dampak:item.prioritas==='tinggi'?'tinggi':'sedang',status:'proses',output:txt,updateTL:'',sumber:'CEO Feedback',evalStatus:'belum',ekspektasiY:brief.pertimbangan||''});
    }
    setExpandCeo(null);
  }
  function markMoM(item){onUpdate(item.id,{momDone:true,feedbackStatus:'pdca_done'});}
  function scheduleMeeting(item){onUpdate(item.id,{needFeedback:false,feedbackStatus:'scheduled'});}
  function dismiss(item){onUpdate(item.id,{needFeedback:false,feedbackStatus:'dismissed'});}

  function Brief({brief}){
    if(!brief)return null;
    var tc=TIPE_BRIEF[brief.tipe]||TIPE_BRIEF.fyi;
    return(<div className="mt-2 space-y-1.5">
      {brief.tipe&&<span className={'text-[9px] font-extrabold px-2 py-0.5 rounded uppercase '+tc.bg+' '+tc.c}>{tc.lbl}</span>}
      {brief.konteks&&<div className="text-[11px] text-stone-700 leading-snug"><span className="text-[9px] font-bold text-stone-400 uppercase tracking-wide">Konteks </span>{brief.konteks}</div>}
      {brief.pertimbangan&&<div className="text-[11px] text-stone-700 leading-snug"><span className="text-[9px] font-bold text-stone-400 uppercase tracking-wide">Pertimbangan </span>{brief.pertimbangan}</div>}
      {brief.tipe==='decision'&&brief.opsi&&<div className="text-[11px] text-stone-700 leading-snug"><span className="text-[9px] font-bold text-stone-400 uppercase tracking-wide">Opsi </span>{brief.opsi}</div>}
      {brief.link&&<a href={brief.link} target="_blank" className="block text-[11px] text-blue-600 underline break-all mt-0.5">🔗 {brief.link}</a>}
      {brief.noTApproval&&<div className="text-[10px] text-stone-400">T-Approval: <span className="font-bold text-stone-600">{brief.noTApproval}</span></div>}
    </div>);
  }

  return(
    <div className="pb-8 px-4 pt-4 md:px-6">
      <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-3">💬 Queue — {queue.length} menunggu feedback</div>
      {queue.length===0
        ?<div className="bg-stone-50 border border-stone-200 rounded-2xl p-6 text-center mb-5"><div className="text-3xl mb-2 opacity-20">✓</div><div className="text-[12px] font-bold text-stone-400 mb-1">Queue kosong</div><div className="text-[10px] text-stone-300">Flag dari Backlog (⚑) atau MoM (Perlu Review CEO)</div></div>
        :<div className="space-y-3 mb-5">{queue.map(function(item){
          var k=qKey(item);var isExp=expandCeo===k;
          var brief=item._type==='mom'?item.ceoReviewBrief:item.feedbackBrief;
          var isMom=item._type==='mom';
          var tl=momTindakLanjut[k]||null;
          var canSubmit=(ceoTexts[k]||'').trim()&&(!isMom||momOutcome[k])&&(!(isMom&&momOutcome[k]==='perlu-tindak-lanjut')||tl);
          return(
            <div key={k} className="bg-white border border-violet-200 rounded-2xl shadow-soft overflow-hidden">
              <div className="p-4">
                <div className="flex items-start justify-between gap-2 mb-1">
                  <div>{isMom?<><div className="text-[10px] font-bold text-blue-500">MoM · {item._momEntryName}</div><div className="text-[9px] text-stone-400">{item._momEntryDate}</div></>:<div className="text-[10px] font-bold text-violet-500">{item.id} · {item.kategori}</div>}</div>
                  <KC id={item.fungsiKPI} sm/>
                </div>
                <div className="text-[13px] font-bold text-stone-900 leading-snug mb-1">{isMom?item.action:item.isi}</div>
                {isMom&&item.hasil&&<div className="mt-2 p-2.5 bg-emerald-50 border border-emerald-100 rounded-xl"><div className="text-[9px] font-bold text-emerald-600 uppercase mb-0.5">Hasil PIC</div><div className="text-[11px] text-emerald-800 leading-snug">{item.hasil}</div></div>}
                {item.pdcaNotes&&<div className="mt-2 p-2.5 bg-stone-50 border border-stone-200 rounded-xl"><div className="text-[9px] font-bold text-stone-400 uppercase mb-0.5">📊 Catatan PDCA</div><div className="text-[11px] text-stone-700 leading-snug">{linkify(item.pdcaNotes)}</div></div>}
                <Brief brief={brief}/>
                {isExp&&<div className="mt-3 pt-3 border-t border-violet-100">
                  <div className="text-[9px] font-extrabold text-stone-400 uppercase mb-1.5">Feedback CEO</div>
                  <textarea className="w-full px-3 py-2 rounded-xl border border-stone-200 bg-stone-50 text-[12px] focus:outline-none focus:ring-2 focus:ring-violet-400 resize-y mb-2" rows={3} placeholder="Arahan, keputusan, atau catatan Pak Ibnu..." value={ceoTexts[k]||''} onChange={function(e){var v=e.target.value;setCeoTexts(function(p){var n={...p};n[k]=v;return n;});}}/>
                  {isMom&&<>
                    <div className="text-[9px] font-bold text-stone-400 uppercase mb-1.5">Outcome</div>
                    <div className="flex gap-2 mb-2">
                      <button className={'flex-1 py-2 rounded-xl text-[10px] font-bold border as st '+(momOutcome[k]==='reviewed_ok'?'bg-emerald-600 text-white border-emerald-600':'bg-emerald-50 text-emerald-700 border-emerald-200')} onClick={function(){setMomOutcome(function(p){var n={...p};n[k]='reviewed_ok';return n;});setMomTindakLanjut(function(p){var n={...p};delete n[k];return n;});}}>✓ OK</button>
                      <button className={'flex-1 py-2 rounded-xl text-[10px] font-bold border as st '+(momOutcome[k]==='perlu-tindak-lanjut'?'bg-red-500 text-white border-red-500':'bg-red-50 text-red-600 border-red-200')} onClick={function(){setMomOutcome(function(p){var n={...p};n[k]='perlu-tindak-lanjut';return n;});}}>⚠️ Tindak Lanjut</button>
                    </div>
                    {momOutcome[k]==='perlu-tindak-lanjut'&&<>
                      <div className="text-[9px] font-bold text-stone-400 uppercase mb-1.5">Jenis Tindak Lanjut</div>
                      <div className="space-y-1.5 mb-2">
                        {[['meeting','📅 Jadwalkan Meeting','Masuk Backlog → PA Office arrange'],['tasklist','📋 Perlu Tasklist Baru','Masuk Keputusan → PDCA input ke Trusmiverse'],['info-tambahan','🔍 Perlu Info Tambahan','Masuk Kamar PDCA → investigasi ulang']].map(function(opt){var id=opt[0],lbl=opt[1],desc=opt[2];var isA=tl===id;return(<button key={id} className={'w-full py-2 px-3 rounded-xl text-left text-[10px] font-bold border as st '+(isA?'bg-stone-800 text-white border-stone-800':'bg-white text-stone-700 border-stone-200')} onClick={function(){setMomTindakLanjut(function(p){var n={...p};n[k]=id;return n;});}}>
                          <div>{lbl}</div><div className={'text-[9px] font-normal mt-0.5 '+(isA?'text-stone-300':'text-stone-400')}>{desc}</div>
                        </button>);})}</div>
                    </>}

  const [syncEnd,setSyncEnd]=useState(todayStr());
  const [syncErr,setSyncErr]=useState('');
  const [syncMsg,setSyncMsg]=useState('');
  const momItems=[];
  (mom||[]).forEach(function(entry){(entry.items||[]).forEach(function(item){if(item.ceoReviewStatus==='info-tambahan'||item.pdcaFlag){momItems.push({...item,_momEntryId:entry.id,_momEntryName:entry.meetingName});}});});
  const blItems=backlog.filter(function(it){return it.pdcaFlag;});

  function reflagNF(item,type,nk){
var notes=noteTexts[nk]||'';
if(type==='mom'){updateMomItem(item._momEntryId,item.id,{needCeoReview:true,ceoReviewStatus:'queue',ceoReviewBrief:null,pdcaFlag:false,pdcaNotes:notes});}
else{

}

function KamarPATab({backlog,onUpdateBacklog,onAddJadwal}){
  const [forms,setForms]=useState({});
  const queue = backlog.filter(it => (it.status === 'baru' || it.status === 'postponed') && !it.needFeedback && !it.pdcaFlag);

  function updateForm(id,field,val){setForms(function(p){var n={...p};n[id]={...(p[id]||{}),[field]:val};return n;});}

  function buildContextDesc(item){
    var lines=[];
    if(item.konteks)lines.push('KONTEKS: '+item.konteks);
    if(item.ekspektasi)lines.push('EKSPEKTASI: '+item.ekspektasi);
    if(item.feedbackBrief){
      var b=item.feedbackBrief;
      if(b.pertimbangan)lines.push('PERTIMBANGAN PA: '+b.pertimbangan);
      if(b.opsi)lines.push('OPSI: '+b.opsi);
      if(b.link)lines.push('LINK: '+b.link);
      if(b.noTApproval)lines.push('NO. T-APPROVAL: '+b.noTApproval);
    }
    if(item.ceoFeedback){
      var ts=item.feedbackTs?' ('+new Date(item.feedbackTs).toLocaleDateString('id-ID')+')':'';
      lines.push('');
      lines.push('FEEDBACK CEO'+ts+':');
      lines.push(item.ceoFeedback);
    }
    if(item.pdcaNotes){
      lines.push('');
      lines.push('CATATAN PDCA:');
      lines.push(item.pdcaNotes);
    }
    if(item.flowHistory&&item.flowHistory.length>0){
      lines.push('');
      lines.push('RIWAYAT PING-PONG CEO ⇄ PDCA:');
      item.flowHistory.forEach(function(h){lines.push('['+h.tanggal+'] '+h.role+': '+h.teks);});
    }
    return lines.join('\n');
  }

  function doSchedule(item){
    var f=forms[item.id]||{};
    if(!f.tanggal||!f.jamMulai||!f.jamSelesai){alert('Lengkapi tanggal, jam mulai, dan jam selesai dulu!');return;}
    var jadwalItem={id:'SJ-'+genId(),tanggal:f.tanggal,jamMulai:f.jamMulai,jamSelesai:f.jamSelesai,masalahBacklogId:item.id,masalahText:item.isi,kategori:'RSP',jenisKegiatan:normalizeJenis(item.kategori),detailKegiatan:'['+item.konteks+'] '+item.isi,relateMilestone:item.fungsiKPI||'operasional',outputKeputusan:'',gcalDesc:buildContextDesc(item)};
    onAddJadwal(f.tanggal,jadwalItem);
    onUpdateBacklog(item.id,{status:'dijadwalkan',tanggal:f.tanggal,blokWaktu:getBlokFromTime(f.jamMulai)});
    setForms(function(p){var n={...p};delete n[item.id];return n;});
  }

  return(
    <div className="pb-8 px-4 pt-4 md:px-6 afi">
      <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-widest mb-1">📅 Kamar PA</div>
      <div className="text-[10px] text-stone-400 mb-4">Tempat PA assign jam spesifik untuk backlog → masuk Jadwal Harian</div>
      {queue.length===0
        ?<div className="bg-stone-50 border border-stone-200 rounded-2xl p-6 text-center"><div className="text-3xl mb-2 opacity-20">📭</div><div className="text-[12px] font-bold text-stone-400 mb-1">Kamar PA Kosong</div><div className="text-[10px] text-stone-300">Semua backlog sudah dijadwalkan atau belum ada item baru</div></div>
        :<div className="space-y-4">{queue.map(function(item){
          var f=forms[item.id]||{};
          var isPostponed=item.status==='postponed';
          var k=KPI5.find(function(x){return x.id===item.fungsiKPI;});
          var ready=f.tanggal&&f.jamMulai&&f.jamSelesai;
          return(
            <div key={item.id} className={'bg-white border rounded-2xl shadow-soft p-4 '+(isPostponed?'border-orange-300':'border-stone-200')}>
              <div className="flex justify-between items-start mb-2">
                <div>
                  <div className="flex gap-1.5 mb-1">
                    <span className={'text-[9px] font-bold px-1.5 py-0.5 rounded-full '+(isPostponed?'bg-orange-100 text-orange-700':'bg-blue-100 text-blue-700')}>{isPostponed?'⏩ Postponed':'✨ Baru'}</span>
                    {k&&<KC id={k.id} sm/>}
                  </div>
                  <div className="text-[10px] font-bold text-stone-400">{item.id} · {item.konteks}</div>
                </div>
                <PriBadge p={item.prioritas}/>
              </div>
              <div className="text-[13px] font-bold text-stone-900 leading-snug mb-3">{item.isi}</div>
              <div className="bg-stone-50 border border-stone-200 rounded-xl p-3">
                <div className="text-[9px] font-bold text-stone-500 uppercase mb-2">Atur Waktu Jadwal</div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
                  <div><div className="text-[9px] text-stone-400 mb-1">Tanggal</div><input type="date" className="w-full px-2 py-1.5 text-[11px] font-mono rounded-lg border border-stone-200 focus:outline-none focus:ring-1 focus:ring-stone-400" value={f.tanggal||''} onChange={function(e){updateForm(item.id,'tanggal',e.target.value);}}/></div>
                  <div><div className="text-[9px] text-stone-400 mb-1">Jam Mulai</div><input type="time" className="w-full px-2 py-1.5 text-[11px] font-mono rounded-lg border border-stone-200 focus:outline-none focus:ring-1 focus:ring-stone-400" value={f.jamMulai||''} onChange={function(e){updateForm(item.id,'jamMulai',e.target.value);}}/></div>
                  <div><div className="text-[9px] text-stone-400 mb-1">Jam Selesai</div><input type="time" className="w-full px-2 py-1.5 text-[11px] font-mono rounded-lg border border-stone-200 focus:outline-none focus:ring-1 focus:ring-stone-400" value={f.jamSelesai||''} onChange={function(e){updateForm(item.id,'jamSelesai',e.target.value);}}/></div>
                </div>
                <button className={'w-full py-2.5 rounded-xl text-[11px] font-bold st as '+(ready?'bg-stone-900 text-white shadow-md':'bg-stone-200 text-stone-400 cursor-not-allowed')} onClick={function(){doSchedule(item);}} disabled={!ready}>📅 Eksekusi & Masukkan ke Jadwal</button>
              </div>
            </div>
          );
        })}</div>
      }
    </div>
  );
}

function BacklogList({backlog,onUpdate,onDelete,onAddKeputusan,onAddMom}){
  const [fk,setFk]=useState('all');
  const [fs,setFs]=useState('all');
  const [actItem,setActItem]=useState(null);
  const [actType,setActType]=useState(null);
  function openAct(item,type){if(actItem&&actItem.id===item&&item.id&&actType===type){setActItem(null);setActType(null);}else{setActItem(item);setActType(type);}}

  const nc=backlog.filter(x=>x.status==='baru'&&!x.hideFromBacklogList).length;
  const np=backlog.filter(x=>x.status==='postponed'&&!x.hideFromBacklogList).length;
  const totalPostpones=backlog.reduce(function(s,it){return s+((it.postponeHistory||[]).length);},0);

  const filtered=backlog.filter(function(it){
    return!it.hideFromBacklogList&&(fk==='all'||it.fungsiKPI===fk)&&(fs==='all'||it.status===fs);
  });

  // Sort: by prioritas then by postponeCount desc
  const priOrder={tinggi:0,sedang:1,rendah:2};
  const shown=filtered.slice().sort(function(a,b){
    const pa=priOrder[a.prioritas]||1;const pb=priOrder[b.prioritas]||1;
    if(pa!==pb)return pa-pb;
    return((b.postponeHistory||[]).length)-((a.postponeHistory||[]).length);
  });

  // Group by prioritas (only when showing all statuses or non-postponed)
  const showGroups=fs==='all'||fs==='baru'||fs==='dijadwalkan';
  const groups=showGroups?[
    {label:'🔴 Tinggi',p:'tinggi',items:shown.filter(function(it){return it.prioritas==='tinggi';})},
    {label:'🟡 Sedang',p:'sedang',items:shown.filter(function(it){return it.prioritas==='sedang';})},
    {label:'🟢 Rendah',p:'rendah',items:shown.filter(function(it){return !it.prioritas||it.prioritas==='rendah';})},
  ].filter(function(g){return g.items.length>0;}):[{label:'',p:'',items:shown}];

  // Postponed stats
  const postponedClear=backlog.filter(function(it){
    if(it.status!=='postponed')return false;
    const h=it.postponeHistory||[];
    return h.length>0&&h[h.length-1].tipe==='clear';
  });
  const postponedUnclear=backlog.filter(function(it){
    if(it.status!=='postponed')return false;
    const h=it.postponeHistory||[];
    return h.length===0||h[h.length-1].tipe==='unclear';
  });

  return(
    <div className="pb-4 afi">
      {/* KPI filter */}
      <div className="px-4 pt-4 pb-2 flex gap-2 overflow-x-auto scrollbar-hide">
        <button className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-[11px] font-bold st as border ${fk==='all'?'bg-stone-800 text-white border-stone-800 shadow-md':'bg-white text-stone-600 border-stone-200'}`} onClick={()=>setFk('all')}>Semua</button>
        {KPI5.map(k=><button key={k.id} className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-[11px] font-bold st as border ${fk===k.id?'bg-stone-800 text-white border-stone-800 shadow-md':`${k.bg} ${k.color} ${k.border}`}`} onClick={()=>setFk(fk===k.id?'all':k.id)}>{k.short}</button>)}
      </div>
      {/* Status filter */}
      <div className="px-4 pb-3 flex gap-2 overflow-x-auto scrollbar-hide border-b border-stone-200">
        {[
          {id:'all',lbl:'Semua'},
          {id:'baru',lbl:nc>0?`Baru (${nc})`:'Baru'},
          {id:'dijadwalkan',lbl:'Dijadwalkan'},
          {id:'postponed',lbl:np>0?`Postponed (${np})`:'Postponed'},
          {id:'didelegasikan',lbl:'Didelegasikan'},
          {id:'selesai',lbl:'Selesai'},
        ].map(s=><button key={s.id} className={`flex-shrink-0 px-3 py-1.5 rounded-lg text-[10px] font-semibold st as ${fs===s.id?'bg-stone-200 text-stone-800':'bg-transparent text-stone-500'}`} onClick={()=>setFs(s.id)}>{s.lbl}</button>)}
      </div>

      {/* Postponed stats bar — show when viewing postponed */}
      {fs==='postponed'&&np>0&&<div className="mx-4 mt-3 p-3.5 bg-orange-50 border border-orange-100 rounded-2xl">
        <div className="text-[11px] font-extrabold text-orange-800 mb-2">⏩ Ringkasan Postpone CEO</div>
        <div className="grid grid-cols-3 gap-2 mb-2">
          <div className="bg-white rounded-xl p-2.5 text-center border border-orange-100">
            <div className="text-xl font-black text-orange-600">{np}</div>
            <div className="text-[9px] text-orange-500 font-bold">Total Postponed</div>
          </div>
          <div className="bg-white rounded-xl p-2.5 text-center border border-orange-100">
            <div className="text-xl font-black text-emerald-600">{postponedClear.length}</div>
            <div className="text-[9px] text-emerald-600 font-bold">Ada Jadwal Baru</div>
          </div>
          <div className="bg-white rounded-xl p-2.5 text-center border border-orange-100">
            <div className="text-xl font-black text-stone-500">{postponedUnclear.length}</div>
            <div className="text-[9px] text-stone-400 font-bold">Belum Jelas</div>
          </div>
        </div>
        <div className="text-[10px] text-orange-600">Total postpone tercatat: <strong>{totalPostpones}x</strong> — data ini masuk ke analisa Resume untuk evaluasi pola reschedule CEO.</div>
      </div>}

      {/* Count */}
      <div className="px-4 py-3 flex items-center justify-between">
        <div className="text-[11px] font-medium text-stone-400">{shown.length} item</div>
        {totalPostpones>0&&fs!=='postponed'&&<button className="text-[10px] font-bold text-orange-500 as" onClick={()=>setFs('postponed')}>⏩ {totalPostpones}x postpone</button>}
      </div>

      {shown.length===0?<div className="py-12 text-center"><div className="text-4xl mb-3 opacity-40">{fs==='postponed'?'⏩':'📋'}</div><div className="text-[13px] font-bold text-stone-400">{fs==='postponed'?'Belum ada item yang dipostpone':backlog.length===0?'Dump pikiran dulu di tab Dump':'Tidak ada item sesuai filter'}</div></div>
      :<div className="px-4 md:px-6">
        {groups.map(function(g){return(
          <div key={g.p||'all'} className="mb-4">
            {g.label&&<div className="flex items-center gap-2 mb-2.5">
              <span className="text-[11px] font-extrabold text-stone-600">{g.label}</span>
              <span className="text-[9px] text-stone-400 bg-stone-100 px-2 py-0.5 rounded-full font-bold">{g.items.length} item</span>
              <div className="flex-1 h-px bg-stone-200"/>
            </div>}
            <div className="space-y-3 md:grid md:grid-cols-2 md:gap-4 md:space-y-0 md:items-start">
              {g.items.map(function(item){return(
                <BacklogCard key={item.id} item={item} onUpdate={onUpdate} onDelete={onDelete} onAddKeputusan={onAddKeputusan} onAddMom={onAddMom} isActOpen={actItem&&actItem.id===item.id} actType={actType} onOpenAct={openAct}/>
              );})}
            </div>
          </div>
        );})}
      </div>}
    </div>
  );
}

// ── KEPUTUSAN & TRACKING (MERGED) ────────────────────────────
// Keputusan = keputusan yang sudah disampaikan CEO.
// Tracking = nge-track apakah keputusan itu sudah dijalankan & sesuai.
// Keduanya satu tab karena yang ditrack ya keputusannya itu sendiri.
function Keputusan({keputusan,onUpdate,onDelete,onAddKeputusan}){
  const [view,setView]=useState('aktivitas'); // 'aktivitas' | 'semua'
  const [expGroup,setExpGroup]=useState(null);
  const [expKpt,setExpKpt]=useState(null);
  const [updateTexts,setUpdateTexts]=useState({});

  // Status labels & styles
  const SL={'disampaikan':'Disampaikan','proses':'Sedang Proses','sesuai':'Sesuai ✅','tidak-sesuai':'Tidak Sesuai ❌','selesai':'Selesai'};
  const SC={'disampaikan':'bg-blue-50 text-blue-700 border-blue-200','proses':'bg-amber-50 text-amber-700 border-amber-200','sesuai':'bg-emerald-50 text-emerald-700 border-emerald-200','tidak-sesuai':'bg-red-50 text-red-700 border-red-200','selesai':'bg-stone-100 text-stone-600 border-stone-200'};
  // Status next (tap to advance)
  const SN={'disampaikan':'proses','proses':'sesuai','sesuai':'sesuai','tidak-sesuai':'tidak-sesuai','selesai':'selesai'};

  // belum ditrack = status masih 'disampaikan' atau 'proses'
  const belumCount=keputusan.filter(k=>k.status==='disampaikan'||k.status==='proses').length;

  // Group by sumber activity (which meeting/aktivitas CEO generated this)
  const groups=[...new Set(keputusan.map(k=>k.sumber||'Lainnya'))].map(src=>({
    src,
    items:keputusan.filter(k=>(k.sumber||'Lainnya')===src)
  }));

  // Flat list filter
  const [fk,setFk]=useState('all');
  const [srcF,setSrcF]=useState('all');
  const DC={};KPI5.forEach(k=>{DC[k.id]=keputusan.filter(x=>x.fungsiKPI===k.id).length;});
  const momPdcaCount=keputusan.filter(function(it){return it.needMoMPDCA;}).length;
  const shown=keputusan.filter(function(it){
    var fkMatch=fk==='all'||it.fungsiKPI===fk;
    var srcMatch=srcF==='all'?true:srcF==='mom-pdca'?it.needMoMPDCA:(it.sumber||'Manual')===srcF;
    return fkMatch&&srcMatch;
  });

  function saveUpdate(kpt){
    const txt=updateTexts[kpt.id]||'';if(!txt.trim())return;
    onUpdate(kpt.id,{updateTL:txt,status:'proses'});
    setUpdateTexts(p=>({...p,[kpt.id]:''}));setExpKpt(null);
  }

  // Single keputusan card — shared between both views
  function renderKptCard(kpt){
    const k=KPI5.find(x=>x.id===kpt.fungsiKPI);
    const isExp=expKpt===kpt.id;
    const statusBelum=kpt.status==='disampaikan'||kpt.status==='proses';
    return(
      <div key={kpt.id} className="bg-white rounded-xl border border-stone-200 overflow-hidden relative mb-2 afi">
        <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${k?k.bg:'bg-stone-200'}`}/>
        <div className="p-3.5 pl-5">
          {/* Konteks */}
          {kpt.konteks&&<div className={`text-[9px] font-extrabold uppercase tracking-widest mb-1 ${k?k.color:'text-stone-400'}`}>{kpt.konteks}</div>}
          {/* Deskripsi keputusan */}
          <div className="flex gap-2 justify-between items-start mb-2.5">
            <div className="text-[12px] font-bold text-stone-800 leading-snug flex-1">{kpt.deskripsi}</div>
            {/* Status tap-to-advance */}
            <button className={`flex-shrink-0 px-2 py-1 rounded-lg text-[9px] font-bold border st as ${SC[kpt.status]||SC.selesai}`} onClick={()=>onUpdate(kpt.id,{status:SN[kpt.status]||kpt.status})} title="Tap untuk update status">
              {SL[kpt.status]||kpt.status}
            </button>
          </div>
          {/* Output / keputusan yang disampaikan */}
          {kpt.output&&(
            <div className="bg-stone-50 border-l-2 border-stone-300 px-2.5 py-2 rounded-r-lg text-[11px] text-stone-700 leading-snug mb-2.5">{kpt.output}</div>
          )}
          {/* Update tindak lanjut (if any) */}
          {kpt.updateTL&&(
            <div className="bg-blue-50 border-l-2 border-blue-300 px-2.5 py-2 rounded-r-lg text-[11px] text-blue-800 leading-snug mb-2.5">
              <span className="text-[9px] font-bold uppercase tracking-wider text-blue-500 block mb-0.5">Update Tindak Lanjut</span>
              {kpt.updateTL}
            </div>
          )}
          {/* Meta chips */}
          <div className="flex gap-1.5 flex-wrap items-center mb-3">
            <KC id={kpt.fungsiKPI} sm/>
            <span className={`px-1.5 py-0.5 rounded font-bold text-[9px] ${kpt.dampak==='tinggi'?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}`}>{kpt.dampak}</span>
            <span className="text-[9px] text-stone-400 bg-stone-50 px-1.5 py-0.5 rounded font-mono">{kpt.tanggal}</span>
          </div>
          {/* Actions */}
          <div className="flex gap-1.5">
            {/* Expand update TL */}
            <button className={`flex-1 py-1.5 rounded-lg text-[10px] font-bold border st as ${isExp?'bg-stone-800 text-white border-stone-800':'bg-stone-50 text-stone-600 border-stone-200'}`} onClick={()=>setExpKpt(isExp?null:kpt.id)}>
              {isExp?'Tutup':'✏️ Update TL'}
            </button>
            {/* Mark sesuai/tidak */}
            {statusBelum&&<>
              <button className="flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 st as" onClick={()=>onUpdate(kpt.id,{status:'sesuai'})}>Sesuai ✅</button>
              <button className="flex-1 py-1.5 rounded-lg text-[10px] font-bold bg-red-50 text-red-700 border border-red-200 st as" onClick={()=>onUpdate(kpt.id,{status:'tidak-sesuai'})}>Tidak ❌</button>
            </>}
            <button className="py-1.5 px-2.5 rounded-lg text-[10px] font-bold bg-stone-50 text-red-500 border border-stone-200 st as" onClick={()=>{if(confirm('Hapus?'))onDelete(kpt.id);}}>🗑</button>
          </div>
          {/* Inline update form */}
          {isExp&&(
            <div className="mt-3 afi">
              <div className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1.5">Update tindak lanjut — apa yang sudah/belum terjadi?</div>
              <textarea className="w-full p-2.5 rounded-xl border border-stone-200 text-[12px] focus:outline-none focus:ring-2 focus:ring-stone-400 bg-stone-50 mb-2 resize-y" rows="3" value={updateTexts[kpt.id]||''} onChange={e=>setUpdateTexts(p=>({...p,[kpt.id]:e.target.value}))} placeholder="Contoh: Pak Andyka sudah terima keputusan, dijadwalkan implementasi minggu depan..."/>
              <button className={`w-full py-2 rounded-xl text-[11px] font-bold as st ${!(updateTexts[kpt.id]||'').trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-800 text-white'}`} onClick={()=>saveUpdate(kpt)} disabled={!(updateTexts[kpt.id]||'').trim()}>Simpan Update</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return(
    <div className="pb-4 afi">
      {/* Header summary */}
      <div className="px-4 pt-4 pb-3 border-b border-stone-200">
        <div className="flex items-center justify-between mb-3">
          <div className="text-[12px] font-extrabold text-stone-800">{keputusan.length} keputusan tercatat</div>
          {belumCount>0&&<div className="flex items-center gap-1.5 bg-amber-50 border border-amber-200 px-2.5 py-1 rounded-full"><span className="w-1.5 h-1.5 rounded-full bg-amber-500"/><span className="text-[10px] font-bold text-amber-700">{belumCount} belum selesai ditrack</span></div>}
        </div>
        {/* View toggle */}
        <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1">
          <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${view==='aktivitas'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setView('aktivitas')}>📂 Per Aktivitas CEO</button>
          <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${view==='semua'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setView('semua')}>📋 Semua</button>
        </div>
      </div>

      {/* PER AKTIVITAS — grouped by which meeting/activity generated the decision */}
      {view==='aktivitas'&&(
        <div className="px-4 pt-4">
          {groups.length===0?<div className="py-12 text-center"><div className="text-4xl mb-3 opacity-40">📝</div><div className="text-[13px] font-bold text-stone-400">Belum ada keputusan</div></div>
          :<div className="space-y-3">
            {groups.map(({src,items})=>{
              const pendingCnt=items.filter(k=>k.status==='disampaikan'||k.status==='proses').length;
              const isOpen=expGroup===src;
              const srcKPI=KPI5.find(k=>k.id===items[0]&&items[0].fungsiKPI);
              return(
                <div key={src} className="bg-white rounded-2xl border border-stone-200 shadow-soft overflow-hidden">
                  <div className={`p-3.5 flex justify-between items-center cursor-pointer st hover:bg-stone-50 ${isOpen?'border-b border-stone-100':''}`} onClick={()=>setExpGroup(isOpen?null:src)}>
                    <div>
                      <div className="text-[12px] font-bold text-stone-800 mb-0.5">{src}</div>
                      <div className="flex gap-1.5 items-center">
                        <span className="text-[10px] text-stone-400">{items.length} keputusan</span>
                        {pendingCnt>0&&<span className="text-[9px] font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded-md border border-amber-100">{pendingCnt} belum selesai</span>}
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      {/* Mini KPI chips */}
                      <div className="flex gap-1">{[...new Set(items.map(i=>i.fungsiKPI))].slice(0,3).map(fid=>{const kk=KPI5.find(x=>x.id===fid);return kk?<div key={fid} className={`w-2 h-2 rounded-full`} style={{background:kk.hex}}/>:null;})}</div>
                      <span className={`text-[10px] text-stone-300 st ${isOpen?'rotate-180':''}`}>▼</span>
                    </div>
                  </div>
                  {isOpen&&<div className="p-3 bg-stone-50/50">{items.map(function(kpt){return renderKptCard(kpt);})}</div>}
                </div>
              );
            })}
          </div>}
        </div>
      )}

      {/* SEMUA — flat list with KPI filter */}
      {view==='semua'&&(
        <div>
          <div className="px-4 pt-3 pb-2 flex gap-2 overflow-x-auto scrollbar-hide">
            <button className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-[11px] font-bold st as border ${fk==='all'?'bg-stone-800 text-white border-stone-800 shadow-md':'bg-white text-stone-600 border-stone-200'}`} onClick={()=>setFk('all')}>Semua ({keputusan.length})</button>
            {KPI5.filter(k=>DC[k.id]>0).map(k=><button key={k.id} className={`flex-shrink-0 px-3 py-1.5 rounded-xl text-[11px] font-bold st as border ${fk===k.id?'bg-stone-800 text-white border-stone-800 shadow-md':`${k.bg} ${k.color} ${k.border}`}`} onClick={()=>setFk(fk===k.id?'all':k.id)}>{k.short} ({DC[k.id]})</button>)}
          </div>
          <div className="px-4 pb-2 flex gap-1.5 overflow-x-auto scrollbar-hide">
            {['all','CEO Feedback','MoM: action item','Manual','mom-pdca'].map(function(s){var isA=srcF===s;var lbl=s==='all'?'Semua':s==='mom-pdca'?'📋 Perlu di-MoM PDCA'+(momPdcaCount>0?' ('+momPdcaCount+')':''):s;return(<button key={s} className={'flex-shrink-0 px-2.5 py-1 rounded-lg text-[9px] font-bold border st as '+(isA?'bg-violet-600 text-white border-violet-600':'bg-white text-stone-500 border-stone-200')} onClick={function(){setSrcF(s);}}>{lbl}</button>);})}
          </div>
          <div className="px-4 pt-2 md:px-6">
            {shown.length===0?<div className="py-12 text-center"><div className="text-4xl mb-3 opacity-40">📝</div><div className="text-[13px] font-bold text-stone-400">Tidak ada keputusan</div></div>
            :<div className="md:grid md:grid-cols-2 md:gap-3 md:items-start">{shown.map(function(kpt){return renderKptCard(kpt);})}</div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── CSV HELPERS ────────────────────────────────────────────────
function parseCSVLine(line){
  const r=[];let f='',q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(q&&line[i+1]==='"'){f+='"';i++;}else q=!q;}
    else if((c===','||c==='\t')&&!q){r.push(f.trim());f='';}
    else f+=c;
  }
  r.push(f.trim());return r;
}
function parseMoMCSV(text,meetingName){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return{backlog:[],keputusan:[],error:'Data terlalu sedikit — pastikan ada header + minimal 1 baris data.'};
  // Detect separator
  const sep=lines[0].includes('\t')?'\t':',';
  const header=lines[0].split(sep).map(h=>h.replace(/"/g,'').trim().toLowerCase());
  // Find column indices (flexible header matching)
  const ci=(keywords)=>{const idx=header.findIndex(h=>keywords.some(k=>h.includes(k)));return idx===-1?null:idx;};
  const COL={topik:ci(['topik','judul','hasil']),issue:ci(['issue','feedback','masalah']),action:ci(['action','task','instruksi']),jenis:ci(['jenis']),ekspektasi:ci(['ekspektasi','ekspektas']),pic:ci(['pic']),deadline:ci(['deadline','tenggat'])};
  if(COL.action===null)return{backlog:[],keputusan:[],error:'Kolom Action/Tasklist tidak ditemukan. Pastikan header CSV sesuai.'};
  let lastTopik='',lastIssue='';
  const backlog=[],keputusan=[];
  lines.slice(1).forEach(line=>{
    if(!line.trim())return;
    const f=parseCSVLine(line);
    const get=(col)=>col!==null?(f[col]||'').trim():'';
    const topik=get(COL.topik),issue=get(COL.issue),action=get(COL.action),jenis=get(COL.jenis),ekspektasi=get(COL.ekspektasi),pic=get(COL.pic),deadline=get(COL.deadline);
    const curTopik=topik||lastTopik;const curIssue=issue||lastIssue;
    if(topik)lastTopik=curTopik;if(issue)lastIssue=curIssue;
    if(!action)return;
    const jenisL=jenis.toLowerCase();
    if(jenisL.includes('feedback')){
      keputusan.push({id:'KP-'+genId(),tanggal:todayStr(),backlogId:null,konteks:curTopik,deskripsi:action,fungsiKPI:'operasional',dampak:'sedang',status:'disampaikan',output:`${curIssue?curIssue+' — ':''}${action}`,updateTL:'',sumber:meetingName||'Import MoM'});
    }else{
      const prioritas=jenisL.includes('immediately')?'tinggi':'sedang';
      const kat=jenisL.includes('immediately')?'Meeting Strategic/Problem Solving/Approval':'Meeting Review Operasional + Evaluasi Tim';
      backlog.push({id:'BL-'+genId(),sumber:'PDCA',tanggal:todayStr(),konteks:curTopik,isi:curIssue||curTopik,action,ekspektasi,pic:pic||null,deadline:deadline||null,fungsiKPI:'operasional',kategori:kat,blokWaktu:'sore-review',prioritas,status:'baru',notes:`Jenis: ${jenis}${ekspektasi?' | Ekspektasi: '+ekspektasi:''}`});
    }
  });
  return{backlog,keputusan,error:null};
}
function exportJadwalCSV(jadwal,backlog,range){
  const headers=['Date','Jam Mulai','Jam Selesai','Masalah yang Dievaluasi','Kategori','Jenis Kegiatan','Detail Kegiatan','Relate Milestone/KPI','Output Keputusan/Arahan'];
  const today=todayStr();
  const mon=new Date();const diff=mon.getDay()===0?6:mon.getDay()-1;mon.setDate(mon.getDate()-diff);const monStr=mon.toISOString().slice(0,10);
  const rows=[];
  Object.entries(jadwal).sort().forEach(([date,items])=>{
    if(range==='today'&&date!==today)return;
    if(range==='week'&&(date<monStr||date>new Date(mon.getTime()+6*86400000).toISOString().slice(0,10)))return;
    (items||[]).sort((a,b)=>(a.jamMulai||'').localeCompare(b.jamMulai||'')).forEach(it=>{
      const bl=it.masalahBacklogId?backlog.find(b=>b.id===it.masalahBacklogId):null;
      const masalah=bl?`${bl.konteks}: ${bl.isi}`:(it.masalahText||'');
      const kpiLabel=(KPI5.find(function(k){return k.id===it.relateMilestone;})||{}).label||it.relateMilestone||'';
      rows.push([date,it.jamMulai||'',it.jamSelesai||'',masalah,it.kategori||'',it.jenisKegiatan||'',it.detailKegiatan||'',kpiLabel,it.outputKeputusan||'']);
    });
  });
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`jadwal-ceo-${today}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function ImportMoM({onAddMom,onAddKeputusan,backlog,jadwal,onUpdateJadwal}){
  const [inputMode,setInputMode]=useState('paste');
  const [csvText,setCsvText]=useState('');

  const [freeText,setFreeText]=useState('');
  const [linkMode,setLinkMode]=useState('jadwal'); // 'jadwal' or 'free'
  const [preview,setPreview]=useState(null);
  const [destOvr,setDestOvr]=useState({}); // {idx: 'backlog'|'keputusan'}
  const [err,setErr]=useState('');
  const [done,setDone]=useState(false);
  const fileRef=React.useRef();

  // Meetings from last 7 days
  const MEET_TYPES=['Meeting Strategic/Problem Solving/Approval','Meeting Review Operasional + Evaluasi Tim','Ketemu External'];
  const meetOpts=React.useMemo(()=>{
    const opts=[];const td=new Date();
    for(let i=0;i<7;i++){const d=new Date(td);d.setDate(td.getDate()-i);const ds=d.toISOString().slice(0,10);(jadwal[ds]||[]).filter(it=>MEET_TYPES.includes(it.jenisKegiatan)).forEach(it=>opts.push({...it,tanggal:ds}));}
    return opts.sort((a,b)=>b.tanggal.localeCompare(a.tanggal)||(a.jamMulai||'').localeCompare(b.jamMulai||''));
  },[jadwal]);

  const selAct=meetOpts.find(m=>m.id===selectedId);
  function mLabel(m){const d=new Date(m.tanggal+'T12:00:00');return`${d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'})} · ${m.jamMulai||'–'}–${m.jamSelesai||'–'} · ${(m.detailKegiatan||m.jenisKegiatan).slice(0,40)}`;}

  function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setCsvText(ev.target.result);r.readAsText(f,'UTF-8');}

  function doParse(){
    setErr('');setDone(false);setDestOvr({});
    if(!csvText.trim()){setErr('Isi atau upload CSV dulu.');return;}
    if(linkMode==='jadwal'&&!selectedId){setErr('Pilih aktivitas meeting dulu di Step 1, atau pilih mode "Input Bebas".');return;}
    const meetName=linkMode==='free'?(freeText.trim()||'Import MoM'):(selAct?mLabel(selAct):'Import MoM');
    const result=parseMoMCSV(csvText,meetName);
    if(result.error){setErr(result.error);return;}
    if(!result.backlog.length&&!result.keputusan.length){setErr('Tidak ada item yang berhasil diparsing. Cek format CSV.');return;}
    setPreview(result);
  }

  // Unified flat list for preview
  function allItems(){if(!preview)return[];
    return[...preview.backlog.map((it,i)=>({...it,_orig:'backlog',_idx:i,_jenis:it.prioritas==='tinggi'?'Immediately':'Konsep Strategis',_action:it.action})),
           ...preview.keputusan.map((kpt,i)=>({...kpt,_orig:'keputusan',_idx:preview.backlog.length+i,_jenis:'Feedback',_action:kpt.deskripsi}))];
  }
  const items=allItems();
  const getDest=(it)=>destOvr[it._idx]!==undefined?destOvr[it._idx]:it._orig;
  const toggleDest=(it)=>setDestOvr(p=>({...p,[it._idx]:getDest(it)==='backlog'?'keputusan':'backlog'}));

  function doConfirm(){
    if(!preview)return;
    const allIt=items;
    const meetName=linkMode==='free'?(freeText.trim()||'Import MoM'):(selAct?mLabel(selAct):'Import MoM');
    const meetDate=selAct&&linkMode==='jadwal'?selAct.tanggal:todayStr();
    const gcalDescVal=selAct&&linkMode==='jadwal'?(selAct.gcalDesc||''):'';
    // Save to MoM (single entry per meeting)
    const momEntry={
      id:'MOM-'+genId(),
      tanggal:meetDate,
      meetingName:meetName,
      gcalDesc:gcalDescVal,
      items:allIt.map(it=>({id:it.id||('MI-'+genId()),konteks:it.konteks||'',action:it._action||'',jenis:it._jenis||'',pic:it.pic||'',deadline:it.deadline||'',status:'pending'})),
      sumber:linkMode==='jadwal'&&selAct?selAct.id:'',
      createdAt:todayStr()
    };
    if(onAddMom)onAddMom(momEntry);
    // Auto-fill output on linked jadwal item
    if(selAct&&linkMode==='jadwal'){
      const actionLines=allIt.filter(it=>it._jenis!=='Feedback').map((it,i)=>`${i+1}. ${it._action}${it.pic?' \u2192 '+it.pic:''}${it.deadline?' ('+it.deadline+')':''}`);
      const fbLines=allIt.filter(it=>it._jenis==='Feedback').map((it,i)=>`${i+1}. ${it._action}`);
      const out=[`[MoM — ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}]`,actionLines.length?`\nAction (${actionLines.length}):\n${actionLines.join('\n')}` :'',fbLines.length?`\nFeedback (${fbLines.length}):\n${fbLines.join('\n')}` :''].filter(Boolean).join('');
      onUpdateJadwal(selAct.tanggal,selAct.id,{outputKeputusan:out});
    }
    setPreview(null);setCsvText('');setDestOvr({});setDone(true);
  }

  const toBacklogCount=items.filter(it=>getDest(it)==='backlog').length;
  const toKptCount=items.filter(it=>getDest(it)==='keputusan').length;

  return(
    <div className="p-4 pb-10 afi md:px-6">
      <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-5">
        <div className="text-[12px] font-extrabold text-blue-800 mb-1">📥 Import Notulensi MoM</div>
        <div className="text-[11px] text-blue-700 leading-relaxed">Import CSV notulensi → otomatis masuk Backlog atau Keputusan & Tracking.</div>
      </div>

      {/* STEP 1: Link ke meeting atau input bebas */}
      <div className="mb-5">
        <div className="flex items-center gap-2 mb-2">
          <span className="w-5 h-5 rounded-full bg-stone-800 text-white text-[10px] font-black flex items-center justify-center flex-shrink-0">1</span>
          <div className="text-[11px] font-extrabold text-stone-700">Link Meeting</div>
        </div>
        {/* Mode toggle */}
        <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1 mb-3">
          <button className={`flex-1 py-2 rounded-xl text-[10px] font-bold st as ${linkMode==='jadwal'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setLinkMode('jadwal')}>📅 Dari Jadwal</button>
          <button className={`flex-1 py-2 rounded-xl text-[10px] font-bold st as ${linkMode==='free'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setLinkMode('free')}>✏️ Input Bebas</button>
        </div>
        {linkMode==='jadwal'?(
          <div>
            <div className="text-[10px] text-stone-400 mb-1.5">Pilih dari aktivitas meeting 7 hari terakhir. Output jadwal akan otomatis diisi.</div>
            {meetOpts.length===0?(
              <div className="p-3 bg-amber-50 border border-amber-100 rounded-xl text-[11px] text-amber-700">⚠️ Tidak ada aktivitas meeting dalam 7 hari terakhir. Gunakan mode "Input Bebas".</div>
            ):(
              <select className="w-full px-3 py-2.5 rounded-xl border border-stone-200 bg-white text-[11px] font-medium focus:outline-none focus:ring-2 focus:ring-stone-400" value={selectedId} onChange={e=>setSelectedId(e.target.value)}>
                <option value="">— Pilih meeting (opsional) —</option>
                {meetOpts.map(m=><option key={m.id} value={m.id}>{mLabel(m)}</option>)}
              </select>
            )}
            {selAct&&<div className="mt-2 px-3 py-2.5 bg-blue-50 border border-blue-100 rounded-xl flex items-center gap-2">
              <div className="flex-1">
                <div className="text-[11px] font-bold text-blue-800">{selAct.detailKegiatan}</div>
                <div className="flex gap-1.5 mt-1 flex-wrap">
                  <span className="text-[9px] font-mono text-blue-600">{selAct.tanggal}</span>
                  <span className="text-[9px] text-blue-600">{selAct.jamMulai}–{selAct.jamSelesai}</span>
                  <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${JENIS_COLOR[selAct.jenisKegiatan]||''}`}>{JENIS_SHORT[selAct.jenisKegiatan]||selAct.jenisKegiatan}</span>
                </div>
              </div>
              <span className="text-emerald-500 text-lg">✓</span>
            </div>}
          </div>
        ):(
          <div>
            <div className="text-[10px] text-stone-400 mb-1.5">Nama meeting / sumber notulensi (opsional — untuk label referensi)</div>
            <input className="w-full px-3 py-2.5 rounded-xl border border-stone-200 bg-white text-[11px] focus:outline-none focus:ring-2 focus:ring-stone-400" value={freeText} onChange={e=>setFreeText(e.target.value)} placeholder="Contoh: Rapat COO 3 Juni, Review Keuangan Mei, One-on-one dengan Pak Andyka..."/>
          </div>
        )}
      </div>

      {/* STEP 2: CSV */}
      <div className="mb-4">
        <div className="flex items-center gap-2 mb-2">
          <span className="w-5 h-5 rounded-full bg-stone-800 text-white text-[10px] font-black flex items-center justify-center flex-shrink-0">2</span>
          <div className="text-[11px] font-extrabold text-stone-700">Upload atau Paste CSV MoM</div>
        </div>
        <div className="text-[10px] text-stone-400 mb-2 ml-7">Header: <span className="font-mono">Hasil/Topik · Issue · Action · Jenis Task · Ekspektasi · PIC · Deadline</span></div>
        <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1 mb-3">
          <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${inputMode==='paste'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setInputMode('paste')}>📋 Paste</button>
          <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${inputMode==='upload'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setInputMode('upload')}>📁 Upload</button>
        </div>
        {inputMode==='paste'?(
          <textarea className="w-full min-h-[140px] p-3 rounded-2xl border border-stone-200 bg-stone-50 text-[11px] font-mono text-stone-700 focus:outline-none focus:ring-2 focus:ring-stone-400 resize-y" value={csvText} onChange={e=>setCsvText(e.target.value)} placeholder={'Paste isi CSV MoM di sini...\n\nContoh:\nHasil/Topik,Issue,Action,Jenis Task,Ekspektasi,PIC,Deadline\nCashflow Bekasi,Negatif 2 minggu,Review laporan,Immediately,Laporan siap,Pak Andyka,30 Mei'}/>
        ):(
          <div>
            <input type="file" accept=".csv,.tsv,.txt" ref={fileRef} onChange={handleFile} className="hidden"/>
            <div className="border-2 border-dashed border-stone-300 rounded-2xl p-6 text-center cursor-pointer hover:border-stone-400 hover:bg-stone-50 st" onClick={()=>fileRef.current&&fileRef.current.click()}>
              <div className="text-2xl mb-1.5">📁</div>
              <div className="text-[12px] font-bold text-stone-600">Klik untuk pilih file CSV</div>
            </div>
            {csvText&&<div className="mt-2 p-2 bg-emerald-50 border border-emerald-100 rounded-xl text-[11px] text-emerald-700">✅ Terbaca — {csvText.split('\n').length} baris</div>}
          </div>
        )}
      </div>

      {err&&<div className="p-3 rounded-xl bg-red-50 border border-red-100 text-[11px] text-red-600 mb-4">⚠️ {err}</div>}
      {done&&<div className="p-3 rounded-xl bg-emerald-50 border border-emerald-100 text-[11px] text-emerald-700 mb-4">✅ MoM disimpan ke tab Backlog → MoM! {selAct&&linkMode==='jadwal'?'Output jadwal otomatis diperbarui.':''}</div>}

      <button className={`w-full py-3.5 rounded-2xl text-[12px] font-extrabold st as mb-4 ${!csvText.trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-900 text-white shadow-float'}`} onClick={doParse} disabled={!csvText.trim()}>🔍 Parse & Preview</button>

      {/* STEP 3: Preview */}
      {preview&&<div className="afi">
        <div className="flex items-center gap-2 mb-3">
          <span className="w-5 h-5 rounded-full bg-stone-800 text-white text-[10px] font-black flex items-center justify-center flex-shrink-0">3</span>
          <div>
            <div className="text-[12px] font-bold text-stone-800">{items.length} item — cek & atur destinasi</div>
            <div className="text-[10px] text-stone-400">Tap badge biru/orange untuk pindahkan destinasi per baris</div>
          </div>
          <button className="ml-auto text-[10px] text-stone-400 font-semibold as" onClick={()=>{setPreview(null);setDestOvr({});}}>✕</button>
        </div>

        <div className="grid grid-cols-2 gap-2 mb-4">
          <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 text-center">
            <div className="text-2xl font-black text-orange-700">{toBacklogCount}</div>
            <div className="text-[10px] text-orange-600 font-bold">→ Backlog</div>
          </div>
          <div className="bg-stone-50 border border-stone-200 rounded-xl p-3 text-center">
            <div className="text-2xl font-black text-stone-600">{toKptCount}</div>
            <div className="text-[10px] text-stone-500 font-bold">→ Keputusan & Tracking</div>
          </div>
        </div>

        <div className="bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-soft mb-4 overflow-x-auto">
          <table className="w-full text-[10px]" style={{minWidth:520}}>
            <thead><tr className="bg-stone-50 border-b border-stone-200 text-[9px] text-stone-500 uppercase">
              <th className="px-3 py-2 text-left">Topik</th>
              <th className="px-3 py-2 text-left">Action</th>
              <th className="px-2 py-2 text-left">Jenis</th>
              <th className="px-2 py-2 text-left">PIC</th>
              <th className="px-2 py-2 text-left">DL</th>
              <th className="px-2 py-2 text-center font-bold">Destinasi ↕</th>
            </tr></thead>
            <tbody className="divide-y divide-stone-100">
              {items.map((item,i)=>{
                const dest=getDest(item);const ovr=destOvr[item._idx]!==undefined;
                return(<tr key={i} className={dest==='backlog'?'bg-orange-50/40':'hover:bg-stone-50'}>
                  <td className="px-3 py-2.5 font-semibold text-stone-700 max-w-[80px] truncate">{item.konteks||'–'}</td>
                  <td className="px-3 py-2.5 text-stone-700 max-w-[140px] leading-snug">{item._action}</td>
                  <td className="px-2 py-2.5 whitespace-nowrap">
                    <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold ${item._jenis==='Immediately'?'bg-orange-100 text-orange-700':item._jenis==='Konsep Strategis'?'bg-blue-100 text-blue-700':'bg-stone-100 text-stone-600'}`}>{item._jenis}</span>
                  </td>
                  <td className="px-2 py-2.5 text-stone-500">{item.pic||'–'}</td>
                  <td className="px-2 py-2.5 text-stone-500 whitespace-nowrap">{item.deadline||'–'}</td>
                  <td className="px-2 py-2.5 text-center">
                    <button className={`px-2 py-1 rounded-lg text-[9px] font-black border as st ${dest==='backlog'?'bg-orange-100 text-orange-700 border-orange-200':'bg-stone-100 text-stone-600 border-stone-200'} ${ovr?'ring-1 ring-stone-400':''}`} onClick={()=>toggleDest(item)}>
                      {dest==='backlog'?'Backlog':'Keputusan'}
                    </button>
                  </td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>

        {selAct&&linkMode==='jadwal'&&<div className="bg-stone-50 border border-stone-200 rounded-xl p-3 mb-4">
          <div className="text-[9px] font-extrabold text-stone-400 uppercase tracking-wider mb-1.5">Output yang akan ditulis ke jadwal item ini</div>
          <div className="text-[10px] font-mono text-stone-600 leading-relaxed whitespace-pre-wrap">{`[MoM — ${new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short'})}]\nAction (${toBacklogCount}x):\n${items.filter(it=>getDest(it)==='backlog').map((it,i)=>`${i+1}. ${it._action}${it.pic?' → '+it.pic:''}${it.deadline?' ('+it.deadline+')':''}`).join('\n')}\nFeedback (${toKptCount}x):\n${items.filter(it=>getDest(it)==='keputusan').map((it,i)=>`${i+1}. ${it._action}`).join('\n')}`}</div>
        </div>}

        <button className="w-full py-3.5 rounded-2xl bg-emerald-600 text-white text-[12px] font-bold shadow-md as st" onClick={doConfirm}>
          ✓ Simpan {items.length} item ke MoM{selAct&&linkMode==='jadwal'?' + Update Output Jadwal':''}
        </button>
      </div>}
    </div>
  );
}

function kpiLabelToId(label){const l=(label||'').toLowerCase();if(l.includes('fin'))return'finansial';if(l.includes('brand'))return'branding';if(l.includes('riset')||l.includes('future'))return'riset';if(l.includes('ops')||l.includes('operasional'))return'operasional';if(l.includes('people')||l.includes('culture')||l.includes('budaya'))return'people';return'operasional';}
function normalizeJenis(j){const l=(j||'').toLowerCase();if(l.includes('deepwork'))return'Deepwork Strategic';if(l.includes('strategic')||l.includes('approval')||l.includes('problem'))return'Meeting Strategic/Problem Solving/Approval';if(l.includes('review')||l.includes('evaluasi'))return'Meeting Review Operasional + Evaluasi Tim';if(l.includes('external')||l.includes('ekster'))return'Ketemu External';if(l.includes('konten')||l.includes('content'))return'Bikin Konten';if(l.includes('genba'))return'Genba';if(l.includes('engage'))return'Employee Engage';return j||'Meeting Review Operasional + Evaluasi Tim';}

// ── IMPORT JADWAL ─────────────────────────────────────────────
function ImportJadwal({onAddJadwal,onBatchAddJadwal}){
  const [inputMode,setInputMode]=useState('paste');
  const [csvText,setCsvText]=useState('');
  const [preview,setPreview]=useState(null);
  const [err,setErr]=useState('');
  const [done,setDone]=useState(false);
  const [rangeFrom,setRangeFrom]=useState('');
  const [rangeTo,setRangeTo]=useState('');
  const fileRef=React.useRef();

  function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setCsvText(ev.target.result);r.readAsText(f,'UTF-8');}

  function parseJadwalCSV(text){
    const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2)return{items:[],error:'Data terlalu sedikit — pastikan ada header + minimal 1 baris.'};
    const sep=lines[0].includes('\t')?'\t':',';
    const header=lines[0].split(sep).map(h=>h.replace(/"/g,'').trim().toLowerCase());
    const ci=(kws)=>{const i=header.findIndex(h=>kws.some(k=>h.includes(k)));return i===-1?null:i;};
    const COL={date:ci(['date','tanggal']),mulai:ci(['mulai','start','jam m']),selesai:ci(['selesai','end','jam s']),masalah:ci(['masalah','dievaluasi','evaluasi']),kategori:ci(['kategori']),jenis:ci(['jenis']),detail:ci(['detail']),kpi:ci(['milestone','kpi','relate']),output:ci(['output','keputusan','arahan'])};
    if(COL.date===null&&COL.detail===null)return{items:[],error:'Kolom Date dan Detail Kegiatan tidak ditemukan. Pastikan format CSV sesuai template export.'};
    const items=[];
    lines.slice(1).forEach(line=>{
      if(!line.trim())return;
      const f=parseCSVLine(line);
      const get=(col)=>col!==null?(f[col]||'').trim():'';
      const date=get(COL.date);if(!date)return;
      // Apply range filter if set
      if(rangeFrom&&date<rangeFrom)return;
      if(rangeTo&&date>rangeTo)return;
      items.push({id:'SJ-'+genId(),tanggal:date,jamMulai:get(COL.mulai),jamSelesai:get(COL.selesai),masalahBacklogId:'',masalahText:get(COL.masalah),kategori:get(COL.kategori)||'RSP',jenisKegiatan:normalizeJenis(get(COL.jenis)),detailKegiatan:get(COL.detail),relateMilestone:kpiLabelToId(get(COL.kpi)),outputKeputusan:get(COL.output)});
    });
    return{items,error:null};
  }

  function doParse(){
    setErr('');setDone(false);
    if(!csvText.trim()){setErr('Isi atau upload CSV dulu.');return;}
    const result=parseJadwalCSV(csvText);
    if(result.error){setErr(result.error);return;}
    if(!result.items.length){setErr('Tidak ada baris yang berhasil diparsing. Cek kolom "Date" harus terisi, atau coba sesuaikan filter range tanggal.');return;}
    setPreview(result);
  }

  function doConfirm(){
    if(!preview)return;
    const byDate={};
    preview.items.forEach(it=>{if(!byDate[it.tanggal])byDate[it.tanggal]=[];byDate[it.tanggal].push(it);});
    onBatchAddJadwal(byDate);
    setPreview(null);setCsvText('');setDone(true);
  }

  // Group preview by date
  const groupedPreview=preview?[...new Set(preview.items.map(it=>it.tanggal))].sort().map(date=>({date,items:preview.items.filter(it=>it.tanggal===date)})):[];

  return(
    <div className="p-4 pb-10 afi md:px-6">
      <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 mb-5">
        <div className="text-[12px] font-extrabold text-emerald-800 mb-2">📅 Import Jadwal CEO</div>
        <div className="text-[11px] text-emerald-700 leading-relaxed mb-2">Import data jadwal dari CSV. Format kolom harus sesuai dengan template export dari aplikasi ini.</div>
        <div className="text-[10px] text-emerald-600 font-semibold">Kolom yang dikenali: <span className="font-mono bg-emerald-100 px-1 rounded">Date</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Jam Mulai</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Jam Selesai</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Masalah yang Dievaluasi</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Kategori</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Jenis Kegiatan</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Detail Kegiatan</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Relate Milestone/KPI</span> · <span className="font-mono bg-emerald-100 px-1 rounded">Output Keputusan/Arahan</span></div>
      </div>

      {/* Range filter */}
      <div className="bg-stone-50 border border-stone-200 rounded-2xl p-3.5 mb-4">
        <div className="text-[10px] font-extrabold text-stone-500 uppercase tracking-wider mb-2">Filter Range Tanggal <span className="font-normal normal-case text-stone-400">(opsional — kosongkan untuk import semua)</span></div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <div className="text-[9px] font-bold text-stone-400 mb-1">Dari tanggal</div>
            <input type="date" className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] focus:outline-none focus:ring-2 focus:ring-stone-400" value={rangeFrom} onChange={e=>setRangeFrom(e.target.value)}/>
          </div>
          <div>
            <div className="text-[9px] font-bold text-stone-400 mb-1">Sampai tanggal</div>
            <input type="date" className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] focus:outline-none focus:ring-2 focus:ring-stone-400" value={rangeTo} onChange={e=>setRangeTo(e.target.value)}/>
          </div>
        </div>
        {(rangeFrom||rangeTo)&&<div className="mt-2 flex items-center justify-between">
          <div className="text-[10px] text-stone-500">Filter aktif: {rangeFrom||'awal'} → {rangeTo||'akhir'}</div>
          <button className="text-[10px] text-stone-400 underline as" onClick={()=>{setRangeFrom('');setRangeTo('');}}>Reset filter</button>
        </div>}
      </div>

      <div className="flex bg-stone-100 p-1 rounded-2xl border border-stone-200 gap-1 mb-3">
        <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${inputMode==='paste'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setInputMode('paste')}>📋 Paste CSV</button>
        <button className={`flex-1 py-2 rounded-xl text-[11px] font-bold st as ${inputMode==='upload'?'bg-white shadow-sm text-stone-900 border border-stone-200/60':'text-stone-500'}`} onClick={()=>setInputMode('upload')}>📁 Upload File</button>
      </div>

      {inputMode==='paste'?(
        <textarea className="w-full min-h-[160px] p-3 rounded-2xl border border-stone-200 bg-stone-50 text-[11px] font-mono text-stone-700 focus:outline-none focus:ring-2 focus:ring-stone-400 resize-y mb-4" value={csvText} onChange={e=>setCsvText(e.target.value)} placeholder={'Paste isi CSV jadwal di sini...\n\nTip: Export dulu dari tab Jadwal → ⬇️ Export, edit di Sheets, lalu reimport di sini'}/>
      ):(
        <div className="mb-4">
          <input type="file" accept=".csv,.tsv,.txt" ref={fileRef} onChange={handleFile} className="hidden"/>
          <div className="border-2 border-dashed border-stone-300 rounded-2xl p-8 text-center cursor-pointer hover:border-stone-400 hover:bg-stone-50 st" onClick={()=>fileRef.current&&fileRef.current.click()}>
            <div className="text-3xl mb-2">📁</div>
