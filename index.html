              <div><div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Relate KPI</div><select className="w-full px-2 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-stone-400" value={ef.relateMilestone} onChange={function(e){setEf(function(p){return {...p,relateMilestone:e.target.value};});}}>{KPI5.map(function(k){return<option key={k.id} value={k.id}>{k.label}</option>;})}</select></div>
              <div>
                <div className="text-[9px] font-bold text-stone-400 uppercase mb-1">Deskripsi Calendar</div>
                <textarea className="w-full px-2.5 py-2 rounded-xl border border-stone-200 text-[11px] focus:outline-none focus:ring-2 focus:ring-stone-400 resize-y" rows={3} value={ef.gcalDesc} onChange={function(e){setEf(function(p){return {...p,gcalDesc:e.target.value};});}} placeholder="Konteks, peserta, agenda..."/>
              </div>
              <button className="w-full py-2.5 rounded-xl bg-stone-900 text-white text-[11px] font-bold as st" onClick={saveEdit}>Simpan{gcalOn&&item.gcalEventId?' + Push Calendar':''}</button>
            </div>
          </div>}
          {!fromBL&&!isMeeting&&isExpOut&&<div className="mt-3 afi">
            <div className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-0.5">Output -- 5W1H</div>
            <div className="text-[9px] text-stone-400 mb-2">What Who When Why How -- isi spesifik</div>
            <textarea className="w-full p-2.5 rounded-xl border border-stone-200 bg-stone-50 text-[12px] focus:outline-none focus:ring-2 focus:ring-stone-400 mb-2 resize-y" rows={5} value={outTexts[item.id]!==undefined?outTexts[item.id]:(item.outputKeputusan||'')} onChange={function(e){setOutTexts(function(p){const n={...p};n[item.id]=e.target.value;return n;});}} placeholder={outputPlaceholder}/>
            <button className={`w-full py-2 rounded-xl text-[11px] font-bold as st ${!(outTexts[item.id]!==undefined?outTexts[item.id]:(item.outputKeputusan||'')).trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-emerald-600 text-white'}`} onClick={function(){saveOutput(item);}} disabled={!(outTexts[item.id]!==undefined?outTexts[item.id]:(item.outputKeputusan||'')).trim()}>Simpan Output</button>
          </div>}
        </div>
      </div>
    );
  }

  function AddForm({blokId}){
    const blok=BLOKS.find(function(b){return b.id===blokId;});
    const defJam=blok?blok.time.split('--').map(function(t){return t.trim().padStart(2,'0')+':00';}):['08:00','10:00'];
    const [lf,setLf]=useState({...EMPTY_F,jamMulai:defJam[0]||'08:00',jamSelesai:defJam[1]||'09:00'});
    function upd(k,v){setLf(function(p){return {...p,[k]:v};});}
    return(
      <div className={`border-t ${blok&&blok.border?blok.border:'border-stone-200'} bg-stone-50/50 p-3 afi`}>
        <div className="flex gap-2 mb-3">
          <div className="flex-1"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Jam Mulai</div><input type="time" className="w-full px-2 py-1.5 rounded-lg border border-stone-200 bg-white text-[12px] font-mono focus:outline-none focus:ring-1 focus:ring-stone-400" value={lf.jamMulai} onChange={function(e){upd('jamMulai',e.target.value);}}/></div>
          <div className="flex-1"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1">Jam Selesai</div><input type="time" className="w-full px-2 py-1.5 rounded-lg border border-stone-200 bg-white text-[12px] font-mono focus:outline-none focus:ring-1 focus:ring-stone-400" value={lf.jamSelesai} onChange={function(e){upd('jamSelesai',e.target.value);}}/></div>
        </div>
        <div className="mb-3"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Kategori</div><div className="flex gap-1.5 flex-wrap">{KATEGORI_ORG.map(function(k){return<button key={k} className={`px-3 py-1.5 rounded-lg text-[10px] font-bold border st as ${lf.kategori===k?'bg-stone-800 text-white border-stone-800 shadow-sm':'bg-white text-stone-600 border-stone-200'}`} onClick={function(){upd('kategori',k);}}>{k}</button>;})}</div></div>
        <div className="mb-3"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Jenis Kegiatan</div><select className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[11px] font-medium focus:outline-none" value={lf.jenisKegiatan} onChange={function(e){upd('jenisKegiatan',e.target.value);}}>{JENIS_KEGIATAN.map(function(j){return<option key={j} value={j}>{j}</option>;})}</select></div>
        <div className="mb-3"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Detail Kegiatan *</div><textarea className="w-full px-2.5 py-2 rounded-xl border border-stone-200 bg-white text-[12px] focus:outline-none focus:ring-1 focus:ring-stone-400 resize-none" rows={2} placeholder="Apa yang akan dilakukan?" value={lf.detailKegiatan} onChange={function(e){upd('detailKegiatan',e.target.value);}}/></div>
        <div className="mb-4"><div className="text-[9px] font-bold text-stone-500 uppercase mb-1.5">Relate KPI</div><div className="flex gap-1.5 flex-wrap">{KPI5.map(function(k){return<button key={k.id} className={`px-2.5 py-1.5 rounded-lg text-[10px] font-bold border st as ${lf.relateMilestone===k.id?`${k.bg} ${k.color} ${k.border} shadow-sm`:'bg-white text-stone-500 border-stone-200'}`} onClick={function(){upd('relateMilestone',k.id);}}>{k.short}</button>;})}</div></div>
        <div className="flex gap-2">
          <button className="flex-1 py-2 rounded-xl border border-stone-200 bg-white text-[11px] font-bold text-stone-500 as st" onClick={function(){setAddingBlok(null);}}>Batal</button>
          <button className={`flex-2 py-2 px-4 rounded-xl text-[11px] font-bold as st ${!lf.detailKegiatan.trim()?'bg-stone-200 text-stone-400 cursor-not-allowed':'bg-stone-800 text-white'}`} onClick={function(){if(!lf.detailKegiatan.trim())return;onAddJadwal(today,{id:'SJ-'+genId(),tanggal:today,...lf,outputKeputusan:''});setAddingBlok(null);}} disabled={!lf.detailKegiatan.trim()}>+ Tambahkan</button>
        </div>
      </div>
    );
  }

  // Past = sudah selesai, bukan lintas tengah malam (jamMulai < jamSelesai)
  const pastItems=dayItems.filter(function(it){
    if(getItemState(it)!=='past')return false;
    // Skip overnight items (jamMulai > jamSelesai, misal 23:00-05:00)
    if(it.jamMulai&&it.jamSelesai&&timeToMin(it.jamMulai)>timeToMin(it.jamSelesai))return false;
    return true;
  });
  const currentItems=dayItems.filter(function(it){return getItemState(it)==='current';});
  const upcomingItems=dayItems.filter(function(it){
    if(getItemState(it)!=='upcoming')return false;
    // Skip overnight items shown as upcoming (they already happened)
    if(it.jamMulai&&it.jamSelesai&&timeToMin(it.jamMulai)>timeToMin(it.jamSelesai))return false;
    return true;
  });
  // lastPast = item dengan jamMulai terbesar (paling dekat ke sekarang)
  const lastPast=pastItems.length>0?pastItems.slice().sort(function(a,b){return timeToMin(b.jamMulai)-timeToMin(a.jamMulai);})[0]:null;
  const currentItem=currentItems[0]||null;
  const nextItem=upcomingItems[0]||null;

  return(
    <div className="afi pb-4">
      <div className="px-4 pt-4 pb-3 md:px-6">
        {/* Date navigator */}
        <div className="flex items-center gap-2 mb-2">
          <button className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[14px] font-bold text-stone-600 as st flex items-center justify-center flex-shrink-0" onClick={function(){var d=new Date(selectedDate+'T12:00:00');d.setDate(d.getDate()-1);setSelectedDate(d.toISOString().slice(0,10));}}>‹</button>
          <div className="flex-1 relative">
            <input type="date" className="absolute inset-0 opacity-0 cursor-pointer w-full" value={selectedDate} onChange={function(e){if(e.target.value)setSelectedDate(e.target.value);}}/>
            <div className={`px-3 py-2 rounded-xl border text-center cursor-pointer ${isToday?'bg-stone-900 border-stone-900 text-white':'bg-white border-stone-200 text-stone-700'}`}>
              <div className="text-[13px] font-extrabold">{dayName}</div>
              {!isToday&&<div className="text-[9px] font-semibold mt-0.5 opacity-70">Tap untuk ganti tanggal</div>}
            </div>
          </div>
          <button className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[14px] font-bold text-stone-600 as st flex items-center justify-center flex-shrink-0" onClick={function(){var d=new Date(selectedDate+'T12:00:00');d.setDate(d.getDate()+1);setSelectedDate(d.toISOString().slice(0,10));}}>›</button>
          {!isToday&&<button className="px-2.5 py-2 rounded-xl bg-stone-800 text-white text-[10px] font-bold as st flex-shrink-0" onClick={function(){setSelectedDate(todayActual);}}>Hari ini</button>}
        </div>
        {/* Meta info */}
        <div className="flex justify-between items-center">
          <div className="text-[11px] font-medium text-stone-400">{dayItems.length} kegiatan{hiddenCount>0?' · '+hiddenCount+' disembunyikan':''}{isToday?' · '+nowStr:''}</div>
          <div className="flex items-center gap-2">
            {gcalOn&&<button className="px-2.5 py-1 rounded-lg bg-blue-50 border border-blue-200 text-[10px] font-bold text-blue-600 as st" onClick={function(){onPushDay(today);}}>📅 Push</button>}
            <button className="px-2.5 py-1 rounded-lg bg-stone-100 border border-stone-200 text-[10px] font-bold text-stone-600 as st" onClick={function(){setShowExport(function(p){return !p;});}}>⬇️ Export</button>
            {showExport&&<div className="absolute right-4 mt-1 bg-white border border-stone-200 rounded-2xl shadow-float z-30 overflow-hidden afi" style={{minWidth:160}}>
              <div className="px-3 py-2 text-[9px] font-extrabold text-stone-400 uppercase tracking-wider border-b border-stone-100">Export Jadwal CSV</div>
              {[['today','Hari ini'],['week','Minggu ini'],['all','Semua data']].map(function(r){return(
                <button key={r[0]} className="w-full text-left px-3 py-2.5 text-[11px] font-medium text-stone-700 hover:bg-stone-50 border-b border-stone-100 last:border-0 as" onClick={function(){exportJadwalCSV(jadwal,backlog,r[0]);setShowExport(false);}}>{r[1]}</button>
              );})}
            </div>}
          </div>
        </div>
      </div>

      {/* TIMELINE — hanya tampil kalau lihat hari ini */}
      {isToday&&<div className="px-4 md:px-6 mb-4">
        <div className="flex items-center gap-3 mb-2.5">
          <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-stone-300"/><span className="text-[10px] text-stone-400">Selesai</span></div>
          <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"/><span className="text-[10px] text-stone-400">Berlangsung</span></div>
          <div className="flex items-center gap-1.5"><span className="w-2 h-2 rounded-full bg-emerald-400"/><span className="text-[10px] text-stone-400">Upcoming</span></div>
          {pastItems.length>1&&<span className="text-[10px] text-stone-300 ml-auto">{pastItems.length} kegiatan selesai</span>}
        </div>

        {/* Past — hanya 1 terakhir */}
        {lastPast&&<JadwalCard key={lastPast.id} item={lastPast}/>}

        {/* Current / Idle */}
        {currentItem
          ?<JadwalCard key={currentItem.id} item={currentItem}/>
          :<div className="bg-stone-50 border border-dashed border-stone-200 rounded-xl p-3 mb-2 flex items-center gap-3">
            <span className="w-2 h-2 rounded-full bg-stone-300 flex-shrink-0"/>
            <div>
              <div className="text-[11px] font-bold text-stone-500">Tidak ada kegiatan saat ini</div>
              {nextItem&&<div className="text-[10px] text-stone-400">Berikutnya: <strong>{nextItem.detailKegiatan}</strong> jam {nextItem.jamMulai}</div>}
              {!nextItem&&pastItems.length>0&&<div className="text-[10px] text-stone-400">Semua kegiatan hari ini sudah selesai</div>}
            </div>
          </div>
        }

        {/* Upcoming — hanya 1 berikutnya */}
        {nextItem&&<JadwalCard key={nextItem.id} item={nextItem}/>}

        {dayItems.length===0&&<div className="py-6 text-center"><div className="text-3xl mb-2 opacity-30">📅</div><div className="text-[12px] font-bold text-stone-400">Belum ada kegiatan hari ini</div></div>}
      </div>}

      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>

      {/* Time blocks — tampil penuh semua kegiatan per blok */}
      <div className="space-y-3 px-4 md:grid md:grid-cols-2 md:gap-4 md:space-y-0 md:px-6 md:pb-6 md:items-start">
        {BLOKS.map(function(blok){
          const items=getBlokItems(blok.id);
          const blItems=blSched.filter(function(it){return it.blokWaktu===blok.id;});
          const allItems=[...items,...blItems];
          const isAdding=addingBlok===blok.id;
          const hasNow=items.some(function(it){return getItemState(it)==='current';});
          return(
            <div key={blok.id} className={`bg-white rounded-2xl border overflow-hidden shadow-soft ${hasNow?'border-blue-200':'border-stone-200'}`}>
              <div className={`px-3 py-2.5 flex items-center justify-between ${blok.bg} border-b ${hasNow?'border-blue-200':blok.border}`}>
                <div className="flex items-center gap-2">
                  <span className={`text-[13px] font-black ${blok.color}`}>{blok.time}</span>
                  <span className={`text-[11px] font-bold ${blok.color}`}>{blok.label}</span>
                  {hasNow&&<span className="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"/>}
                </div>
                <div className="flex items-center gap-1.5">
                  <span className={`text-[11px] font-black ${blok.color} opacity-60`}>{allItems.length||'–'}</span>
                  <button className={`w-7 h-7 rounded-lg bg-white/70 flex items-center justify-center text-[13px] font-bold ${blok.color} as st border ${blok.border}`} onClick={function(){setAddingBlok(isAdding?null:blok.id);}}>{isAdding?'✕':'+'}</button>
                </div>
              </div>
              {isAdding&&<AddForm blokId={blok.id}/>}
              <div className="p-2.5">
                {allItems.length===0&&!isAdding&&<div className="py-3 text-center text-[10px] text-stone-400 italic">Belum ada kegiatan · tap + untuk menambah</div>}
                {items.map(function(it){return<JadwalCard key={it.id} item={it}/>;} )}
                {blItems.map(function(it){return<JadwalCard key={it.id} item={it} fromBL={true}/>;} )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── JADWAL MINGGUAN ───────────────────────────────────────────
function JadwalMingguan({backlog,jadwal,filter}){
  const [selDate,setSelDate]=useState(null);
  // Week offset: 0=this week, -1=last week, +1=next week etc
  const [weekOffset,setWeekOffset]=useState(0);
  const getMon=(offset)=>{const mon=new Date();const diff=mon.getDay()===0?6:mon.getDay()-1;mon.setDate(mon.getDate()-diff+offset*7);return mon;};
  const mon=getMon(weekOffset);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return{date:d.toISOString().slice(0,10),lbl:d.toLocaleDateString('id-ID',{weekday:'short'}).slice(0,3),num:d.getDate(),month:d.getMonth(),isToday:d.toISOString().slice(0,10)===todayStr()};});
  const weekLabel=(()=>{const s=days[0];const e=days[6];const sm=new Date(s.date+'T12:00:00').toLocaleDateString('id-ID',{month:'short'});const em=new Date(e.date+'T12:00:00').toLocaleDateString('id-ID',{month:'short'});return s.month===e.month?`${s.num}–${e.num} ${sm}`:`${s.num} ${sm} – ${e.num} ${em}`;})();
  const blSched=backlog.filter(it=>it.status==='dijadwalkan');
  const filtDays=selDate?days.filter(d=>d.date===selDate):days;
  return(
    <div className="afi pb-4">
      {/* Week navigator */}
      <div className="px-4 pt-4 pb-2 flex justify-between items-center">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Jadwal Mingguan</div>
        <div className="flex items-center gap-1">
          <button onClick={()=>{setWeekOffset(p=>p-1);setSelDate(null);}} className="w-7 h-7 rounded-lg bg-stone-100 border border-stone-200 text-[12px] font-bold text-stone-600 as st flex items-center justify-center">‹</button>
          <button onClick={()=>{setWeekOffset(0);setSelDate(null);}} className={`px-2.5 py-1 rounded-lg text-[10px] font-bold border as st ${weekOffset===0?'bg-stone-800 text-white border-stone-800':'bg-white text-stone-600 border-stone-200'}`}>{weekOffset===0?'Minggu ini':weekLabel}</button>
          <button onClick={()=>{setWeekOffset(p=>p+1);setSelDate(null);}} className="w-7 h-7 rounded-lg bg-stone-100 border border-stone-200 text-[12px] font-bold text-stone-600 as st flex items-center justify-center">›</button>
        </div>
      </div>
      <div className="grid grid-cols-7 gap-1 px-4 mb-4">
        {days.map(d=>{const dj=filter?applyJadwalFilter(jadwal[d.date]||[],filter):(jadwal[d.date]||[]);const byB=BLOKS.map(b=>({b,items:[...dj.filter(it=>getBlokFromTime(it.jamMulai)===b.id),...blSched.filter(it=>it.tanggal===d.date&&it.blokWaktu===b.id)]}));const isWE=new Date(d.date+'T12:00:00').getDay();const isSel=selDate===d.date;return(
          <div key={d.date} onClick={()=>setSelDate(p=>p===d.date?null:d.date)} className={`rounded-xl overflow-hidden border cursor-pointer st as flex flex-col ${isWE===0||isWE===6?'opacity-60':''} ${isSel?'border-stone-800 shadow-md':d.isToday?'border-blue-300 shadow-sm':'border-stone-200'}`}>
            <div className={`text-center py-1 border-b ${isSel?'bg-stone-800 text-white border-stone-800':d.isToday?'bg-blue-600 text-white border-blue-600':'bg-stone-100 text-stone-600 border-stone-200'}`}><div className="text-[8px] font-bold uppercase">{d.lbl}</div><div className="text-[13px] font-black">{d.num}</div></div>
            <div className="flex-1 p-0.5 bg-white">{byB.map(({b,items})=><div key={b.id} className={`mb-0.5 rounded-sm h-4 flex items-center justify-center ${items.length?b.bg:'bg-transparent'}`}>{items.length>0&&<div className={`w-1 h-1 rounded-full ${b.color.replace('text-','bg-')}`}/>}</div>)}</div>
          </div>
        );})}
      </div>
      <div className="px-4 pb-4 border-b border-stone-200 flex flex-wrap gap-1.5 justify-center">
        {selDate&&<button onClick={()=>setSelDate(null)} className="px-2.5 py-1 rounded-lg text-[9px] font-bold bg-stone-800 text-white as st mr-2">✕ Semua</button>}
        {BLOKS.map(b=><span key={b.id} className={`text-[9px] font-bold px-2 py-0.5 rounded-md ${b.color} ${b.bg}`}>{b.time}</span>)}
      </div>
      <div className="pt-2">
        {filtDays.map(d=>{
          const dj=filter?applyJadwalFilter(jadwal[d.date]||[],filter):(jadwal[d.date]||[]);const blI=blSched.filter(it=>it.tanggal===d.date);const allI=[...dj,...blI];if(!allI.length)return selDate?<div key={d.date} className="p-8 text-center text-[12px] text-stone-400">Tidak ada agenda hari ini.</div>:null;
          return(
            <div key={d.date} className="mb-6 afi">
              <div className="px-5 mb-3 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-stone-400"/><div className="text-[13px] font-extrabold text-stone-800">{d.lbl}, {d.num}</div></div>
              <div className="space-y-2 px-4">
                {BLOKS.map(b=>{const items=[...dj.filter(it=>getBlokFromTime(it.jamMulai)===b.id),...blI.filter(it=>it.blokWaktu===b.id)];if(!items.length)return null;return(
                  <div key={b.id} className="bg-white rounded-2xl border border-stone-200 shadow-sm overflow-hidden">
                    <div className={`px-3 py-1.5 border-b ${b.bg} ${b.border}`}><span className={`text-[10px] font-bold uppercase tracking-wider ${b.color}`}>{b.time} {b.label}</span></div>
                    <div className="divide-y divide-stone-100">
                      {items.map((it,i)=>{
                        const kpi=KPI5.find(x=>x.id==(it.relateMilestone||it.fungsiKPI));
                        const isNew=!!it.jenisKegiatan;
                        const jColor=JENIS_COLOR[it.jenisKegiatan]||'bg-stone-100 text-stone-600';
                        const kColor=KATEGORI_COLOR[it.kategori]||'bg-stone-100 text-stone-600';
                        return(
                        <div key={i} className="p-3 pl-4 relative">
                          <div className={`absolute left-0 top-0 bottom-0 w-1 ${kpi&&kpi.bg?kpi.bg:'bg-stone-200'}`}/>
                          <div className="flex items-center gap-1.5 flex-wrap mb-1">
                            {isNew&&<span className="text-[11px] font-black text-stone-700 tabular-nums">{it.jamMulai}–{it.jamSelesai}</span>}
                            {isNew&&<span className={`px-1.5 py-0.5 rounded-full text-[8px] font-bold ${kColor}`}>{it.kategori}</span>}
                            <span className={`px-1.5 py-0.5 rounded text-[8px] font-bold ${isNew?jColor:'bg-stone-100 text-stone-500'}`}>{isNew?(JENIS_SHORT[it.jenisKegiatan]||it.jenisKegiatan):(it.kategori||'–')}</span>
                          </div>
                          <div className="text-[12px] font-semibold text-stone-800 leading-snug mb-1.5">{isNew?it.detailKegiatan:(it.isi||it.deskripsi)}</div>
                          {kpi&&<KC id={kpi.id} sm/>}
                          {isNew&&it.outputKeputusan&&<div className="mt-1.5 text-[10px] text-emerald-700 bg-emerald-50 px-2 py-1 rounded-lg border border-emerald-100">✅ {it.outputKeputusan.slice(0,60)}{it.outputKeputusan.length>60?'...':''}</div>}
                        </div>
                      );})}
                    </div>
                  </div>
                );})}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── JADWAL BULANAN ────────────────────────────────────────────
function JadwalBulanan({jadwal,filter}){
  const [monthOffset,setMonthOffset]=useState(0);
  const now=new Date();
  const year=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getFullYear();
  const month=new Date(now.getFullYear(),now.getMonth()+monthOffset,1).getMonth();
  const monthStr=new Date(year,month,1).toLocaleDateString('id-ID',{month:'long',year:'numeric'});
  const monthKey=`${year}-${String(month+1).padStart(2,'0')}`;

  // Collect all items in this month
  const allItems=Object.entries(jadwal||{}).flatMap(([date,items])=>{
    if(!date.startsWith(monthKey))return[];
    const its=filter?applyJadwalFilter(items||[],filter):(items||[]);
    return its.map(it=>({...it,tanggal:date}));
  });

  // Stats
  const totalKegiatan=allItems.length;
  const totalJam=Math.round(allItems.reduce((s,it)=>s+getDur(it.jamMulai,it.jamSelesai),0)*10)/10;
  const adaOutput=allItems.filter(it=>it.outputKeputusan&&it.outputKeputusan.trim()).length;

  // Group by jenis
  const byJenis={};
  JENIS_KEGIATAN.forEach(j=>{byJenis[j]=allItems.filter(it=>it.jenisKegiatan===j).length;});

  // Group by KPI
  const byKpi={};
  KPI5.forEach(k=>{byKpi[k.id]=allItems.filter(it=>it.relateMilestone===k.id).length;});

  // Group by kategori
  const byKat={RSP:0,BT:0,TKB:0,Personal:0};
  allItems.forEach(it=>{if(byKat[it.kategori]!==undefined)byKat[it.kategori]++;});

  // Days in month with count
  const daysInMonth=new Date(year,month+1,0).getDate();
  const calDays=Array.from({length:daysInMonth},(_,i)=>{
    const d=new Date(year,month,i+1);
    const ds=d.toISOString().slice(0,10);
    const its=filter?applyJadwalFilter(jadwal[ds]||[],filter):(jadwal[ds]||[]);
    return{ds,num:i+1,dow:d.getDay(),count:its.length};
  });
  const firstDow=calDays[0].dow;
  const padStart=firstDow===0?6:firstDow-1;
  const maxCount=Math.max(1,...calDays.map(d=>d.count));

  return(
    <div className="afi pb-8">
      {/* Month navigator */}
      <div className="px-4 pt-4 pb-3 flex items-center justify-between">
        <button onClick={()=>setMonthOffset(p=>p-1)} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">‹</button>
        <div className="text-center">
          <div className="text-[14px] font-extrabold text-stone-900">{monthStr}</div>
          {monthOffset!==0&&<button onClick={()=>setMonthOffset(0)} className="text-[10px] text-stone-400 underline as">Kembali ke bulan ini</button>}
        </div>
        <button onClick={()=>setMonthOffset(p=>p+1)} className="w-8 h-8 rounded-xl bg-stone-100 border border-stone-200 text-[13px] font-bold text-stone-600 as st flex items-center justify-center">›</button>
      </div>

      {/* Summary cards */}
      <div className="px-4 grid grid-cols-3 gap-3 mb-5">
        {[['Total Kegiatan',totalKegiatan,'📅'],['Total Jam',totalJam+'h','⏱'],['Ada Output',adaOutput+'x','✅']].map(([l,v,e])=>(
          <div key={l} className="bg-white border border-stone-200 rounded-2xl p-3 text-center shadow-soft">
            <div className="text-xl mb-0.5">{e}</div>
            <div className="text-xl font-black text-stone-900">{v}</div>
            <div className="text-[9px] text-stone-400 font-medium">{l}</div>
          </div>
        ))}
      </div>

      {/* Calendar heatmap */}
      <div className="px-4 mb-5">
        <div className="bg-white border border-stone-200 rounded-2xl p-3 shadow-soft">
          <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-2">Kalender — kepadatan kegiatan</div>
          <div className="grid grid-cols-7 gap-1 mb-1">
            {['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map(d=><div key={d} className="text-center text-[8px] font-bold text-stone-400">{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {Array.from({length:padStart},(_,i)=><div key={'p'+i}/>)}
            {calDays.map(d=>{
              const intensity=d.count===0?'bg-stone-100 text-stone-400':d.count<3?'bg-blue-100 text-blue-700':d.count<6?'bg-blue-300 text-blue-900':d.count<9?'bg-blue-500 text-white':'bg-blue-700 text-white';
              const isToday=d.ds===todayStr();
              return(
                <div key={d.ds} className={`rounded-lg h-8 flex flex-col items-center justify-center ${intensity} ${isToday?'ring-2 ring-amber-400':''}`}>
                  <div className="text-[9px] font-bold leading-none">{d.num}</div>
                  {d.count>0&&<div className="text-[7px] leading-none opacity-80">{d.count}x</div>}

      </div>

      {/* Breakdown by kategori */}
      <div className="px-4 mb-4">
        <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-2">Per Entitas</div>
        <div className="grid grid-cols-4 gap-2">
          {[['RSP','bg-blue-50 border-blue-200 text-blue-700'],['BT','bg-emerald-50 border-emerald-200 text-emerald-700'],['TKB','bg-amber-50 border-amber-200 text-amber-700'],['Personal','bg-stone-50 border-stone-200 text-stone-600']].map(([k,c])=>(
            <div key={k} className={`rounded-xl p-2.5 text-center border ${c}`}>
              <div className="text-xl font-black">{byKat[k]||0}</div>

      {/* Breakdown by jenis */}
      <div className="px-4 mb-4">
        <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-soft">
          <div className="text-[10px] font-extrabold text-stone-400 uppercase tracking-wider mb-3">Per Jenis Kegiatan</div>

            {JENIS_KEGIATAN.map(j=>{const n=byJenis[j]||0;const pct=totalKegiatan>0?Math.round((n/totalKegiatan)*100):0;const jc=JENIS_COLOR[j]||'bg-stone-100 text-stone-600';return(

    {id:'meet_s',label:'Meeting Strategic',short:'Meet. Strategic',match:'strategic'},

    {id:'external',label:'Ketemu External',short:'Ketemu Ext.',match:'external'},
    {id:'konten',label:'Bikin Konten',short:'Konten',match:'konten'},
    {id:'genba',label:'Genba',short:'Genba',match:'genba'},
    {id:'engage',label:'Employee Engage',short:'Engage',match:'engage'},
  ];
  // Valid combinations per fungsi KPI
  const VALID={
    finansial:['deepwork','meet_s','meet_r','external'],
    branding:['deepwork','meet_s','meet_r','konten','external'],

  };
  const allC=KPI5.flatMap(k=>COLS.map(c=>cntCell(k.id,c.id)));
  const maxC=Math.max(1,...allC);

  const gaps=KPI5.filter(k=>backlog.filter(it=>it.fungsiKPI===k.id).length===0);

  return(
    <div className="afi pb-4">
      {/* Matrix title */}
      <div className="px-4 pt-5 pb-1 md:px-6">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest mb-0.5">Heatmap — Fungsi KPI × Kategori Kegiatan</div>
        <div className="text-[10px] text-stone-400">✕ = tidak relevan · warna makin gelap = makin banyak aktivitas backlog</div>

        <div style={{minWidth:480}}>

            <div/>

              <div style={{fontSize:8,fontWeight:800,color:'#78716c',lineHeight:1.25,letterSpacing:'.05em',textTransform:'uppercase'}}>{c.short}</div>
            </div>)}
          </div>
          {/* KPI rows */}
          {KPI5.map(k=>(
            <div key={k.id} style={{display:'grid',gridTemplateColumns:`88px repeat(7,1fr)`,gap:3,marginBottom:3}}>
              <div style={{display:'flex',alignItems:'center',paddingRight:8}}>
                <span style={{fontSize:10,fontWeight:800,color:k.hex,lineHeight:1.2,letterSpacing:'-.2px'}}>{k.short}</span>
              </div>
              {COLS.map(c=>{
                const valid=(VALID[k.id]||[]).includes(c.id);
                const n=cntCell(k.id,c.id);
                const alpha=n===0?0:Math.round((0.2+(n/maxC)*0.75)*255).toString(16).padStart(2,'0');
                if(!valid)return(
                  <div key={c.id} title={`${k.label} × ${c.label} — tidak relevan`}
                    style={{aspectRatio:'1',borderRadius:5,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#d6d3d1',fontWeight:700}}>✕</div>
                );
                return(
                  <div key={c.id} title={`${k.label} × ${c.label}: ${n} item`}
                    style={{aspectRatio:'1',borderRadius:5,background:n===0?'#fafaf9':`${k.hex}${alpha}`,border:`1px solid ${n===0?'#e7e5e4':k.hex+'33'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:n===0?'transparent':n/maxC>0.5?'#fff':k.hex,transition:'all .15s'}}>
                    {n>0?n:''}
                  </div>
                );
              })}
            </div>
          ))}
          {/* Legend */}
          <div style={{display:'flex',gap:10,marginTop:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:9,color:'#a8a29e',fontWeight:700}}>LEGEND:</span>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#f5f5f4',border:'1px solid #e7e5e4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#d6d3d1',fontWeight:700}}>✕</div><span style={{fontSize:9,color:'#a8a29e'}}>Tidak relevan</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#fafaf9',border:'1px solid #e7e5e4'}}/><span style={{fontSize:9,color:'#a8a29e'}}>0 item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED855'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Ada item</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:14,height:14,borderRadius:3,background:'#1D4ED8dd'}}/><span style={{fontSize:9,color:'#a8a29e'}}>Banyak</span></div>
          </div>
        </div>
      </div>

      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>

      {/* Distribusi per kategori (dari backlog) */}

      <div className="px-4 md:px-6 space-y-2 pb-5">
        {COLS.map(c=>{const n=backlog.filter(it=>(it.kategori||'').toLowerCase().includes(c.match)).length;const maxN=Math.max(1,...COLS.map(x=>backlog.filter(it=>(it.kategori||'').toLowerCase().includes(x.match)).length));return(
          <div key={c.id} className="flex items-center gap-3">
            <div className="text-[10px] font-bold text-stone-500 text-right flex-shrink-0 leading-tight" style={{width:120}}>{c.label}</div>
            <div className="flex-1 h-6 bg-stone-100 rounded-lg overflow-hidden border border-stone-200/50">
              <div className="h-full flex items-center justify-end px-2 min-w-[28px] rounded-lg" style={{width:`${Math.max(n===0?0:(n/maxN)*100,n>0?6:0)}%`,background:n===0?'#e7e5e4':'#44403c'}}>
                <span className="text-[10px] font-bold text-white">{n}x</span>
              </div>
            </div>
          </div>
        );})}
      </div>

      {/* Coverage + gap alert */}
      <div className="h-px bg-stone-200 mx-4 md:mx-6 mb-4"/>
      <div className="px-4 pb-2 md:px-6 text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Coverage Backlog per Fungsi</div>
      <div className="px-4 md:px-6 space-y-3 pb-4">
        {KPI5.map(k=>{const t=backlog.filter(it=>it.fungsiKPI===k.id).length;const d=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='selesai').length;const b=backlog.filter(it=>it.fungsiKPI===k.id&&it.status==='baru').length;return(
          <div key={k.id}><div className="flex justify-between items-end mb-1.5"><span className={`text-[11px] font-bold ${k.color}`}>{k.label}</span><span className="text-[10px] text-stone-400">{d}/{t}{b>0&&<span className="text-red-500 ml-1 font-bold">({b} baru)</span>}</span></div>
          <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden relative border border-stone-200/50"><div className={`absolute left-0 top-0 bottom-0 ${k.bg}`} style={{width:`${(t/tot)*100}%`}}/><div className="absolute left-0 top-0 bottom-0 rounded-full" style={{width:`${(d/tot)*100}%`,background:k.hex}}/></div>
          </div>
        );})}
      </div>
      {gaps.length>0&&<div className="mx-4 md:mx-6 p-3.5 rounded-2xl bg-red-50 border border-red-100"><div className="text-[11px] font-bold text-red-700 mb-1">⚠️ Blind Spot — belum ada backlog:</div><div className="text-[11px] text-red-800">{gaps.map(k=>k.label).join(' · ')}</div></div>}
    </div>
  );
}

function computeAnalisaFiltered(jadwal,entity){
  if(!entity||entity==='all')return computeAnalisa(jadwal);
  const filt={};
  Object.entries(jadwal||{}).forEach(([date,items])=>{filt[date]=(items||[]).filter(it=>it.kategori===entity);});
  return computeAnalisa(filt);
}
function getWeekDays(){
  const days=[];const today=new Date();const dow=today.getDay();
  const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
  for(let i=0;i<6;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push({dateStr:d.toISOString().slice(0,10),dayShort:d.toLocaleDateString('id-ID',{weekday:'short'}),num:d.getDate(),isToday:d.toISOString().slice(0,10)===todayStr()});}
  return days;
}

function AnalisaJadwal({backlog,jadwal,onAddJadwal,onBatchAddJadwal,onAddBacklog,onUpdateBacklog}){
  const [entityFilter,setEntityFilter]=useState('all');
  const [expandedDays,setExpandedDays]=useState(()=>new Set([todayStr()]));
  function toggleDay(d){setExpandedDays(p=>{const n=new Set(p);n.has(d)?n.delete(d):n.add(d);return n;});}
  const stats=computeAnalisaFiltered(jadwal||{},entityFilter);
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiErr,setAiErr]=useState('');
  const [showAI,setShowAI]=useState(false);
  const [rekoms,setRekoms]=useState([]);
  const [takingId,setTakingId]=useState(null);
  const [takeForm,setTakeForm]=useState({});
  const [showBin,setShowBin]=useState(false);
  const [recycleBin,setRecycleBin]=useState(()=>{try{return JSON.parse(localStorage.getItem('rsp_recycle_bin')||'[]');}catch{return[];}});

  const remainDays=React.useMemo(()=>{
    const days=[];const today=new Date();const dow=today.getDay();
    const dUntilSat=dow===6?0:(dow===0?6:6-dow);
    for(let i=0;i<=dUntilSat;i++){const d=new Date(today);d.setDate(today.getDate()+i);if(d.getDay()===0)continue;days.push({dateStr:d.toISOString().slice(0,10),dayName:d.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'})});}
    return days;
  },[]);
  const satStr=remainDays.length>0?remainDays[remainDays.length-1].dateStr:todayStr()||todayStr();

  function syncBin(arr){setRecycleBin(arr);try{localStorage.setItem('rsp_recycle_bin',JSON.stringify(arr));}catch(e){}}
  function addToBin(item){syncBin([...recycleBin,{...item,rejectedAt:todayStr()}]);}
  function removeFromBin(id){syncBin(recycleBin.filter(it=>it.id!==id));}

  function buildPrompt(){
    const td=todayStr();
    const schedLines=remainDays.map(d=>{
      const its=(jadwal[d.dateStr]||[]).sort((a,b)=>(a.jamMulai||'').localeCompare(b.jamMulai||''));
      return `${d.dayName}(${d.dateStr}): ${its.length?its.map(it=>`${it.jamMulai}-${it.jamSelesai} "${it.detailKegiatan}"[${JENIS_SHORT[it.jenisKegiatan]||it.jenisKegiatan}]`).join(' | '):'KOSONG'}`;
    }).join('\n');
    const blLines=backlog.filter(it=>!['selesai','ditolak'].includes(it.status)).slice(0,12)
      .map(it=>`[${it.id}] ${it.konteks}: ${it.action||it.isi} | ${it.prioritas}${it.postponeCount?` | postpone:${it.postponeCount}x`:''}`).join('\n')||'(kosong)';
    const kpiStr=stats?stats.coverage.map(c=>`${c.kpi.short}:${c.hours}h`).join(', '):'(belum ada data)';
    // Postpone stats for pattern analysis
    const postponedItems=backlog.filter(function(it){return(it.postponeHistory||[]).length>0;});
    const totalPp=backlog.reduce(function(s,it){return s+((it.postponeHistory||[]).length);},0);
    const ppByClear=postponedItems.filter(function(it){const h=it.postponeHistory||[];return h.length>0&&h[h.length-1].tipe==='clear';}).length;
    const ppByUnclear=postponedItems.filter(function(it){const h=it.postponeHistory||[];return h.length>0&&h[h.length-1].tipe==='unclear';}).length;
    const ppByKPI={};KPI5.forEach(function(k){ppByKPI[k.short]=postponedItems.filter(function(it){return it.fungsiKPI===k.id;}).length;});
    const ppKPIStr=Object.entries(ppByKPI).filter(function(e){return e[1]>0;}).map(function(e){return e[0]+':'+e[1];}).join(', ')||'tidak ada';
    const ppAlasanStr=postponedItems.slice(0,5).map(function(it){const h=it.postponeHistory||[];return h.map(function(p){return `"${p.alasan}"`;}).join(', ');}).join(' | ')||'tidak ada';
    const postponeBlock=totalPp>0?`\nPOSTIPONE CEO (R6 — harus dianalisa):\n- Total item pernah dipostpone: ${postponedItems.length} item, ${totalPp}x total\n- Ada jadwal baru: ${ppByClear}x | Belum jelas: ${ppByUnclear}x\n- KPI paling sering dipostpone: ${ppKPIStr}\n- Alasan yang tercatat: ${ppAlasanStr}\n`:'';
    return `PERAN: AI Scheduling Assistant CEO PT Raja Sukses Properindo.

RULES:
R1·WAKTU: 05:00-22:00. Protected: makan 3x30mnt, olahraga 2jam/hari. Senin-Jumat full. Sabtu max 15:00. Minggu off.
R2·KPI TARGET/minggu: Operasional 30%, Finansial 25%, Branding 25%, Riset 15%, People 5%. RSP=semua KPI. BT=Branding(B2B,premium Jkt&Cirebon). TKB=Finansial+People.
R3·KONTEN: min 1x max 3x/minggu. Pair: Genba+Konten, Speech/BedahBuku+Konten.
R4·MEETING COO/CMO: preferensi di luar 09:00-17:00.
R5·DEEPWORK: boleh tiap hari. Pagi <09:00 prioritas marketing/branding.
R6·PERF.APPRAISAL: min 1x/minggu, Meeting Review RSP, bisa gabung COO.
R7·PAIRING: Genba sekalian Konten. Speech/BedahBuku sekalian Konten.
R8·BACKLOG: Immediately ikuti deadline MoM. Postpone>=3 wajib jadwalkan.
R9·PAGI(05-09): Fokus marketing/branding/review konten. Hindari meeting internal tim.${postponeBlock}

HARI INI: ${td}. SISA MINGGU sampai Sabtu ${satStr}:
${schedLines}

BACKLOG PENDING:
${blLines}

KPI AKTUAL MINGGU INI: ${kpiStr}

Return HANYA JSON valid (no markdown):
{

  async function runAnalisa(){

      setAiResult(parsed);
      setRekoms((parsed.rekomendasi||[]).map(r=>({...r,status:'pending',id:r.id||('RK-'+genId())})));
    }catch(e){setAiErr('Gagal: '+e.message);}

  function handleTake(r){
    setTakingId(r.id);
    setTakeForm({tanggal:r.suggestTanggal||remainDays[0]&&remainDays[0].dateStr||todayStr(),jamMulai:r.suggestJam||'08:00',jamSelesai:r.suggestJamSelesai||'10:00',kategori:r.kategori||'RSP',detailKegiatan:r.kegiatan,jenisKegiatan:r.jenisKegiatan,relateMilestone:r.fungsiKPI});

  }
  function handlePostpone(r){
    const bl=r.fromBacklogId?backlog.find(b=>b.id===r.fromBacklogId):null;
    const newCount=(bl&&bl.postponeCount||0)+1;
    if(newCount>=3&&!confirm(`Postpone ke-${newCount}x. Sudah melampaui batas — lanjutkan?`))return;
    if(bl){onUpdateBacklog(bl.id,{postponeCount:newCount});}
    else{onAddBacklog([{id:'BL-'+genId(),sumber:'AI',tanggal:todayStr(),konteks:'Rekomendasi AI',isi:r.kegiatan,action:r.kegiatan,ekspektasi:'',pic:null,deadline:null,fungsiKPI:r.fungsiKPI,kategori:r.jenisKegiatan,blokWaktu:'sore-review',prioritas:r.prioritas,status:'baru',postponeCount:1,notes:'Dari rekomendasi AI — postponed'}]);}
    setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'postponed'}:x));
  }
  function handleReject(r){addToBin(r);setRekoms(p=>p.map(x=>x.id===r.id?{...x,status:'rejected'}:x));}
  function restoreFromBin(item){removeFromBin(item.id);setRekoms(p=>[...p,{...item,status:'pending',rejectedAt:undefined}]);setShowAI(true);}

  function heatCls(v){if(!v)return'bg-stone-100 text-stone-400';if(v<=3)return'bg-sky-100 text-sky-800';if(v<=7)return'bg-sky-300 text-sky-900';if(v<=12)return'bg-sky-500 text-white';return'bg-sky-700 text-white';}

function MoMList({mom,onDelete,onUpdateMom,onAddKeputusan}){
  const [expId,setExpId]=useState(null);
  const [expItemId,setExpItemId]=useState(null); // which action item is open for update
  const [hasilTexts,setHasilTexts]=useState({}); // {itemId: text}
  const sorted=[...mom].sort((a,b)=>b.tanggal.localeCompare(a.tanggal));

  function updateItemStatus(momId,itemId,patch){
    const entry=mom.find(m=>m.id===momId);if(!entry)return;
    const newItems=entry.items.map(it=>it.id===itemId?{...it,...patch}:it);
    onUpdateMom(momId,{items:newItems});
  }

  function saveHasil(momEntry,item){
    const txt=hasilTexts[item.id]||'';if(!txt.trim())return;
    // Update status item di MoM
    updateItemStatus(momEntry.id,item.id,{hasil:txt,status:'selesai'});
    // Kirim ke Keputusan & Tracking
    onAddKeputusan({
      id:'KP-'+genId(),
      tanggal:todayStr(),
      backlogId:null,
      konteks:momEntry.meetingName.slice(0,50),
      deskripsi:item.action,
      fungsiKPI:'operasional',
      dampak:item.jenis==='Immediately'?'tinggi':'sedang',
      status:'disampaikan',
      output:txt,
      updateTL:'',
      sumber:'MoM: '+momEntry.meetingName
    });
    setHasilTexts(p=>({...p,[item.id]:''}));
    setExpItemId(null);
  }

  const STATUS_CFG={
    pending:{lbl:'Pending',bg:'bg-stone-100',color:'text-stone-500'},
    'in-progress':{lbl:'Dikerjakan',bg:'bg-amber-50',color:'text-amber-700'},
    selesai:{lbl:'Selesai',bg:'bg-emerald-50',color:'text-emerald-700'},
    'perlu-review':{lbl:'Perlu Review CEO',bg:'bg-blue-50',color:'text-blue-700'},
  };

    <div className="px-4 py-16 text-center">
      <div className="text-4xl mb-3 opacity-30">📝</div>

      <div className="text-[11px] text-stone-300 mt-1">Import notulensi via Dump → 📥 MoM</div>
    </div>
  );

  return(
    <div className="pb-8 afi">
      <div className="px-4 pt-4 pb-2 flex items-center justify-between">
        <div className="text-[11px] font-extrabold text-stone-500 uppercase tracking-widest">Minutes of Meeting</div>
        <span className="text-[10px] bg-stone-100 text-stone-500 px-2.5 py-1 rounded-full font-bold">{sorted.length} meeting</span>
      </div>
      <div className="px-4 space-y-3 md:px-6">
        {sorted.map(entry=>{
          const isExp=expId===entry.id;
          const actionItems=entry.items.filter(it=>it.jenis!=='Feedback');
          const feedbackItems=entry.items.filter(it=>it.jenis==='Feedback');
          const doneCount=entry.items.filter(it=>it.status==='selesai').length;
          const reviewCount=entry.items.filter(it=>it.status==='perlu-review').length;
          const dateLabel=new Date(entry.tanggal+'T12:00:00').toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
          return(
            <div key={entry.id} className="bg-white rounded-2xl border border-stone-200 shadow-soft overflow-hidden">
              {/* Header */}
              <div className="p-4 cursor-pointer hover:bg-stone-50 st" onClick={()=>setExpId(isExp?null:entry.id)}>
                <div className="flex items-start justify-between gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="text-[12px] font-extrabold text-stone-900 leading-snug mb-1.5">{entry.meetingName}</div>
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <span className="text-[10px] font-mono text-stone-400">{dateLabel}</span>
                      <span className="text-[10px] bg-stone-100 text-stone-500 px-1.5 py-0.5 rounded font-bold">{entry.items.length} item</span>
                      {actionItems.length>0&&<span className="text-[10px] bg-amber-50 text-amber-700 px-1.5 py-0.5 rounded font-bold border border-amber-100">{actionItems.length} action</span>}
                      {doneCount>0&&<span className="text-[10px] bg-emerald-50 text-emerald-700 px-1.5 py-0.5 rounded font-bold border border-emerald-100">✓ {doneCount} selesai</span>}
                      {reviewCount>0&&<span className="text-[10px] bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded font-bold border border-blue-100">⚑ {reviewCount} review CEO</span>}
                    </div>
                  </div>
                  <div className="flex items-center gap-1.5 flex-shrink-0">
                    <button className="py-1 px-2 rounded-lg text-[9px] font-bold bg-red-50 text-red-400 border border-red-100 as st" onClick={e=>{e.stopPropagation();if(confirm('Hapus MoM ini?'))onDelete(entry.id);}}>🗑</button>

                                return(

                                {hasHasil?'✏️ Edit Hasil':'✍️ Input Hasil'}
                              </button>
                            </div>
                          </div>

                          {/* Expand: input hasil */}
                          {isExpItem&&<div className="border-t border-stone-200 p-3 bg-stone-50">
                            <div className="text-[9px] font-extrabold text-stone-500 uppercase tracking-wider mb-1.5">Hasil / Update dari PIC</div>
                            <div className="text-[9px] text-stone-400 mb-2">Setelah simpan → otomatis masuk ke Keputusan & Tracking</div>

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('dashboard');
  const [sub,setSub]=useState({jadwal:'harian',backlog:'backlog',resume:'analisa'});
  const [jadwalFilter,setJadwalFilter]=useState({kategori:{RSP:true,BT:true,TKB:true,Personal:true},belumOutput:false,belumSiap:false});
  const toggleKat=(k)=>setJadwalFilter(f=>({...f,kategori:{...f.kategori,[k]:!f.kategori[k]}}));
  const [gTok,setGTok]=useState(null);
  const [gCalId,setGCalId]=useState(()=>localStorage.getItem('rsp_gcal_id')||'');
  const [gCals,setGCals]=useState([]);
  const [gBusy,setGBusy]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');
  function connectCal(){setGBusy(true);doConnectGCal(function(tok){setGTok(tok);listGCals(tok).then(function(cs){setGCals(cs);setGBusy(false);}).catch(function(){setGBusy(false);});},function(e){alert('Gagal: '+e);setGBusy(false);});}
  function pickCal(id){setGCalId(id);localStorage.setItem('rsp_gcal_id',id);}
  function pushItem(item,onUpdateItem){
    if(!gTok||!gCalId)return Promise.resolve(false);
    return upsertGCalEvent(item,gTok,gCalId).then(function(r){
      if(r.error)return false;
      if(r.id&&onUpdateItem)onUpdateItem({gcalEventId:r.id});
      return true;
    }).catch(function(){return false;});
  }
  function pushDay(date){if(!gTok||!gCalId){alert('Connect Google Calendar dulu di ⚙️');return;}var its=jadwal[date]||[];var done=0;var chain=Promise.resolve();its.forEach(function(it){chain=chain.then(function(){return upsertGCalEvent(it,gTok,gCalId).then(function(r){if(!r.error){done++;updateJadwal(date,it.id,{gcalEventId:r.id});}});});});chain.then(function(){alert(done+'/'+its.length+' berhasil. Update = tidak numpuk di Calendar!');});}
  function resetJadwal(){var e={};setJadwal(e);sv('jadwal',e);sbSave('jadwal',e);alert('✓ Semua jadwal dihapus.');}
  function resetBacklog(){setBacklog([]);sv('backlog',[]);sbSave('backlog',[]);alert('✓ Semua backlog dihapus.');}
  function resetKeputusan(){setKeputusan([]);sv('keputusan',[]);sbSave('keputusan',[]);alert('✓ Semua keputusan dihapus.');}
  const [pulling,setPulling]=useState(false);
  function pullFromGCal(dateMin,dateMax){
    if(!gTok||!gCalId){alert('Connect Google Calendar dulu di ⚙️');return;}
    setPulling(true);
    fetchGCalEvents(gTok,gCalId,dateMin,dateMax).then(function(evs){
      var byDate={};
      evs.forEach(function(ev){
        if(!ev.start)return;
        var item=gCalEventToJadwal(ev);
        if(!item.tanggal)return;
        if(!byDate[item.tanggal])byDate[item.tanggal]=[];
        byDate[item.tanggal].push(item);
      });
      // Merge dengan jadwal yang sudah ada — pakai functional update agar dapat state terbaru
      setJadwal(function(currentJadwal){
        var n={...currentJadwal};
        Object.keys(byDate).forEach(function(date){
          if(!n[date])n[date]=[];
          var existing=n[date].map(function(it){return it.gcalEventId;}).filter(Boolean);
          byDate[date].forEach(function(item){
            if(!item.gcalEventId||!existing.includes(item.gcalEventId)){
              n[date].push(item);
            } else {
              n[date]=n[date].map(function(it){
                return it.gcalEventId===item.gcalEventId?{...it,jamMulai:item.jamMulai,jamSelesai:item.jamSelesai,detailKegiatan:item.detailKegiatan,gcalDesc:item.gcalDesc}:it;
              });
            }
          });
        });
        // Save ke localStorage DAN Supabase sekaligus — cegah auto-poll overwrite
        sv('jadwal',n);
        sbSave('jadwal',n);
        return n;
      });
      setPulling(false);
      alert('✅ '+evs.length+' event berhasil diimport dari Google Calendar!');
    }).catch(function(e){setPulling(false);alert('❌ Gagal: '+e.message+'\nCoba reconnect Google Calendar.');});
  }
  function forceSyncNow(){setSyncMsg('Syncing...');var p=[];if(backlog.length>0)p.push(new Promise(function(res){sbSave('backlog',backlog);res();}));if(keputusan.length>0)p.push(new Promise(function(res){sbSave('keputusan',keputusan);res();}));if(Object.keys(jadwal).length>0)p.push(new Promise(function(res){sbSave('jadwal',jadwal);res();}));Promise.all(p).then(function(){setSyncMsg('✓ Sync selesai!');setTimeout(function(){setSyncMsg('');},3000);});}
  const [kpiCorp,setKpiCorp]=useState(()=>ld('kpi_corp')||{});
  const [kpiCeo,setKpiCeo]=useState(()=>ld('kpi_ceo')||{});
  const [dashMonth,setDashMonth]=useState(()=>new Date().toISOString().slice(0,7));
  function saveKpiCorp(month,data){const n={...kpiCorp,[month]:data};setKpiCorp(n);sv('kpi_corp',n);setDashMonth(month);}
  function saveKpiCeo(month,items){const n={...kpiCeo,[month]:items};setKpiCeo(n);sv('kpi_ceo',n);}
  const dashWeekly=kpiCorp[dashMonth]&&kpiCorp[dashMonth].weekly||INIT_W;
  const [weekly]=useState(INIT_W);
  const [backlog,setBacklog]=useState([]);
  const [keputusan,setKeputusan]=useState([]);
  const [jadwal,setJadwal]=useState({});
  const [mom,setMom]=useState([]);
  const [showSettings,setShowSettings]=useState(false);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    const sb=ld('backlog');const sk=ld('keputusan');const sj=ld('jadwal');const sm=ld('mom');
    setBacklog(sb||[]);
    setKeputusan(sk||[]);
    setJadwal(sj||{});
    setMom(sm||[]);
    setReady(true);
    var script=document.createElement('script');
    script.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    script.onload=function(){
      setTimeout(function(){
        var localBL=ld('backlog')||[];
        var localKE=ld('keputusan')||[];
        var localJA=ld('jadwal')||{};
        sbLoad('backlog').then(function(v){if(v!==null){setBacklog(v);try{localStorage.setItem('rsp_backlog',JSON.stringify(v));}catch(e){}}else if(localBL.length>0){sbSave('backlog',localBL);}});
        sbLoad('keputusan').then(function(v){if(v!==null){setKeputusan(v);try{localStorage.setItem('rsp_keputusan',JSON.stringify(v));}catch(e){}}else if(localKE.length>0){sbSave('keputusan',localKE);}});
        sbLoad('jadwal').then(function(v){if(v!==null){setJadwal(v);try{localStorage.setItem('rsp_jadwal',JSON.stringify(v));}catch(e){}}else if(Object.keys(localJA).length>0){sbSave('jadwal',localJA);}});
        var sb2=getSB();
        if(!sb2)return;
        sb2.channel('rsp_live').on('postgres_changes',{event:'*',schema:'public',table:'app_data'},function(pl){
          try{var key=pl.new.key;var val=pl.new.value;if(!val)return;
            if(key==='backlog'){setBacklog(val);try{localStorage.setItem('rsp_backlog',JSON.stringify(val));}catch(e){}}
            else if(key==='keputusan'){setKeputusan(val);try{localStorage.setItem('rsp_keputusan',JSON.stringify(val));}catch(e){}}
            else if(key==='jadwal'){setJadwal(val);try{localStorage.setItem('rsp_jadwal',JSON.stringify(val));}catch(e){}}
          }catch(e){}
        }).subscribe();
      },800);
    };
    document.head.appendChild(script);
  },[]);

  function pullFromSB(){
    sbLoad('backlog').then(function(v){if(v!==null){setBacklog(v);try{localStorage.setItem('rsp_backlog',JSON.stringify(v));}catch(e){}}});
    sbLoad('keputusan').then(function(v){if(v!==null){setKeputusan(v);try{localStorage.setItem('rsp_keputusan',JSON.stringify(v));}catch(e){}}});
    sbLoad('jadwal').then(function(v){if(v!==null){setJadwal(v);try{localStorage.setItem('rsp_jadwal',JSON.stringify(v));}catch(e){}}});
  }
  useEffect(()=>{
    var t=setInterval(function(){if(getSB())pullFromSB();},30000);
    return function(){clearInterval(t);};
  },[]);
  const addI=(items)=>{const n=[...backlog,...items];setBacklog(n);sv('backlog',n);};
  const updI=(id,patch)=>{const n=backlog.map(it=>it.id===id?{...it,...patch}:it);setBacklog(n);sv('backlog',n);};
  const delI=(id)=>{const n=backlog.filter(it=>it.id!==id);setBacklog(n);sv('backlog',n);};
  const addK=(kpt)=>{const n=[kpt,...keputusan];setKeputusan(n);sv('keputusan',n);};
  const updK=(id,patch)=>{const n=keputusan.map(it=>it.id===id?{...it,...patch}:it);setKeputusan(n);sv('keputusan',n);};
  const delK=(id)=>{const n=keputusan.filter(it=>it.id!==id);setKeputusan(n);sv('keputusan',n);};
  const addMom=(entry)=>{const n=[entry,...mom];setMom(n);sv('mom',n);};
  const updMom=(id,patch)=>{const n=mom.map(it=>it.id===id?{...it,...patch}:it);setMom(n);sv('mom',n);};
  const delMom=(id)=>{const n=mom.filter(it=>it.id!==id);setMom(n);sv('mom',n);};
  const addToJadwal=(date,item)=>{const n={...jadwal};if(!n[date])n[date]=[];n[date]=[...n[date],item];setJadwal(n);sv('jadwal',n);sbSave('jadwal',n);};
  const batchAddToJadwal=(byDate)=>{const n={...jadwal};Object.entries(byDate).forEach(([date,items])=>{if(!n[date])n[date]=[];n[date]=[...(n[date]||[]),...items];});setJadwal(n);sv('jadwal',n);sbSave('jadwal',n);};
  const removeFromJadwal=(date,itemId)=>{
    const item=(jadwal[date]||[]).find(function(it){return it.id===itemId;});
    if(item&&item.gcalEventId&&gTok&&gCalId){
      deleteGCalEvent(item.gcalEventId,gTok,gCalId).catch(function(){});
    }
    const n={...jadwal};if(n[date])n[date]=n[date].filter(it=>it.id!==itemId);setJadwal(n);sv('jadwal',n);sbSave('jadwal',n);
  };
  const updateJadwal=(date,itemId,patch)=>{const n={...jadwal};if(n[date])n[date]=n[date].map(it=>it.id===itemId?{...it,...patch}:it);setJadwal(n);sv('jadwal',n);sbSave('jadwal',n);};
  const resetJadwalBatch=(batchId)=>{const n={...jadwal};Object.keys(n).forEach(date=>{n[date]=(n[date]||[]).filter(it=>it._icsBatch!==batchId);});setJadwal(n);sv('jadwal',n);sbSave('jadwal',n);};
  const setST=(t,v)=>setSub(p=>({...p,[t]:v}));

  const nc=backlog.filter(it=>it.status==='baru').length;
  const belumCount=keputusan.filter(k=>k.status==='disampaikan'||k.status==='proses').length;

  const TABS=[
    {id:'dashboard',ico:'📊',lbl:'Dash'},
    {id:'jadwal',ico:'📅',lbl:'Jadwal',subs:[{id:'harian',lbl:'Harian'},{id:'mingguan',lbl:'Mingguan'},{id:'bulanan',lbl:'Bulanan'}]},
    {id:'dump'},
    {id:'backlog',ico:'📋',lbl:'Backlog',subs:[{id:'backlog',lbl:'Backlog'},{id:'keputusan',lbl:'Keputusan & Tracking'},{id:'mom',lbl:'MoM'}]},
    {id:'resume',ico:'📈',lbl:'Resume'},
  ];
  const AT=TABS.find(t=>t.id===tab);

  if(!ready)return<div className="flex items-center justify-center min-h-screen text-stone-400 font-bold text-sm" style={{fontFamily:'"Plus Jakarta Sans",sans-serif'}}>Memuat...</div>;

  return(
    <div id="ac">
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)} gTok={gTok} gCalId={gCalId} gCals={gCals} gBusy={gBusy} onConnect={connectCal} onPickCal={pickCal} onForceSync={forceSyncNow} syncMsg={syncMsg} onResetJadwal={resetJadwal} onResetBacklog={resetBacklog} onResetKeputusan={resetKeputusan} onPullGCal={pullFromGCal} pulling={pulling}/>}
      {/* ── DESKTOP SIDEBAR ── */}
      <aside className="hidden md:flex md:flex-col md:w-56 md:flex-shrink-0 md:sticky md:top-0 md:h-screen md:border-r md:border-stone-200 md:bg-white md:shadow-[2px_0_12px_rgba(0,0,0,0.04)] md:z-50">
        <Sidebar tab={tab} sub={sub} setTab={setTab} setST={setST} nc={nc} belumCount={belumCount}/>
      </aside>

      {/* ── MAIN CONTENT AREA ── */}
      <div className="flex-1 min-w-0 flex flex-col">
        {/* Header */}
        <div className="sticky top-0 z-40 gn border-b border-stone-200">
          <div className="flex justify-between items-center px-4 py-3 md:px-6">
            {/* Mobile: show app name. Desktop: hidden (shown in sidebar) */}
            <div className="md:hidden">
              <div className="text-[16px] font-black tracking-tight text-stone-900 leading-none mb-1">CEO GTD OS</div>
              <div className="text-[10px] font-semibold text-stone-400">PT Raja Sukses Properindo · {new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'short'})}</div>
            </div>
            {/* Desktop: show current tab name */}
            <div className="hidden md:block">
              <div className="text-[18px] font-extrabold text-stone-900 tracking-tight">{AT&&AT.id==='dashboard'?'Dashboard KPI':AT&&AT.id==='jadwal'?'Jadwal CEO':AT&&AT.id==='dump'?'Dump Think':AT&&AT.id==='backlog'?'Backlog':AT&&AT.id==='resume'?'Resume Agenda':'CEO GTD OS'}</div>
              <div className="text-[11px] text-stone-400 font-medium mt-0.5">{new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
            </div>
            <div className="flex items-center gap-2">
              <div className={`px-3 py-1.5 rounded-full text-[10px] font-bold flex items-center gap-1.5 border ${nc>0?'bg-red-50 text-red-600 border-red-200 shadow-sm':'bg-stone-100 text-stone-500 border-stone-200'}`}>
                <span>{backlog.length} total</span>
                {nc>0&&<><span className="w-1 h-1 rounded-full bg-red-500"/><span>{nc} baru</span></>}
              </div>
              <button onClick={function(){if(getSB())pullFromSB();}} className="w-8 h-8 rounded-full flex items-center justify-center text-[13px] border as st bg-stone-100 border-stone-200 text-stone-500" title="Sync dari Supabase">🔄</button>
              <button onClick={()=>setShowSettings(true)} className={`w-8 h-8 rounded-full flex items-center justify-center text-[14px] border as st ${!getApiKey()?'bg-amber-50 border-amber-200 text-amber-600':'bg-stone-100 border-stone-200 text-stone-500'}`} title="Pengaturan & API Key">⚙️</button>
            </div>
          </div>
          {/* Sub-tabs */}
          {AT&&AT.subs&&(
            <div className="flex bg-stone-50/80 border-t border-stone-200 md:px-2">
              {AT.subs.map(s=>(
                <button key={s.id} className={`flex-1 md:flex-none md:px-6 py-2.5 text-[11px] font-bold st relative flex items-center justify-center gap-1.5 ${sub[tab]===s.id?'text-stone-900':'text-stone-400'}`} onClick={()=>setST(tab,s.id)}>
                  {s.lbl}
                  {s.id==='keputusan'&&belumCount>0&&<span className="inline-flex items-center justify-center w-4 h-4 bg-amber-500 text-white text-[8px] font-black rounded-full">{belumCount}</span>}
                  {sub[tab]===s.id&&<div className="absolute bottom-0 left-1/4 right-1/4 md:left-4 md:right-4 h-0.5 bg-stone-800 rounded-t-md"/>}
                </button>
              ))}
            </div>
          )}
          {/* Filter chips — jadwal only */}
          {tab==='jadwal'&&<div className="px-3 py-2 flex items-center gap-1.5 flex-wrap border-t border-stone-100 bg-white/90 backdrop-blur overflow-x-auto">
            {[['RSP','bg-blue-100 text-blue-700 border-blue-200'],['BT','bg-emerald-100 text-emerald-700 border-emerald-200'],['TKB','bg-amber-100 text-amber-700 border-amber-200'],['Personal','bg-stone-100 text-stone-600 border-stone-300']].map(([k,ac])=>(
              <button key={k} onClick={()=>toggleKat(k)} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.kategori[k]?ac:'bg-white text-stone-300 border-stone-200'}`}>{k}</button>
            ))}
            <div className="w-px h-4 bg-stone-200 flex-shrink-0 mx-0.5"/>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumOutput:!f.belumOutput}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumOutput?'bg-amber-100 text-amber-700 border-amber-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Output</button>
            <button onClick={()=>setJadwalFilter(f=>({...f,belumSiap:!f.belumSiap}))} className={`px-2.5 py-1 rounded-full text-[10px] font-bold border as st flex-shrink-0 ${jadwalFilter.belumSiap?'bg-red-100 text-red-600 border-red-200':'bg-white text-stone-400 border-stone-200'}`}>Belum Siap</button>
            {(!jadwalFilter.kategori.RSP||!jadwalFilter.kategori.BT||!jadwalFilter.kategori.TKB||!jadwalFilter.kategori.Personal||jadwalFilter.belumOutput||jadwalFilter.belumSiap)&&<button onClick={()=>setJadwalFilter({kategori:{RSP:true,BT:true,TKB:true,Personal:true},belumOutput:false,belumSiap:false})} className="px-2 py-1 rounded-full text-[9px] font-bold border border-stone-200 bg-stone-50 text-stone-400 as st flex-shrink-0 ml-auto">Reset ✕</button>}
          </div>}
        </div>

        {/* Content */}
        <div className="flex-1 pb-24 md:pb-8 md:max-w-5xl md:w-full md:mx-auto md:px-0">
          {tab==='dashboard'&&<Dashboard weekly={dashWeekly} kpiCorp={kpiCorp} dashMonth={dashMonth} onChangeMonth={setDashMonth}/>}
          {tab==='jadwal'&&sub.jadwal==='harian'&&<JadwalHarian backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onRemoveJadwal={removeFromJadwal} onUpdateJadwal={updateJadwal} onUpdate={updI} onAddKeputusan={addK} filter={jadwalFilter} gcalOn={!!(gTok&&gCalId)} onPushItem={pushItem} onPushDay={pushDay}/>}
          {tab==='jadwal'&&sub.jadwal==='mingguan'&&<JadwalMingguan backlog={backlog} jadwal={jadwal} filter={jadwalFilter}/>}
          {tab==='jadwal'&&sub.jadwal==='bulanan'&&<JadwalBulanan jadwal={jadwal} filter={jadwalFilter}/>}
          {tab==='dump'&&<DumpPage onAdd={addI} onAddKeputusan={addK} onAddJadwal={addToJadwal} onBatchAddJadwal={batchAddToJadwal} onUpdateJadwal={updateJadwal} onResetICSBatch={resetJadwalBatch} onSaveKpiCorp={saveKpiCorp} onSaveKpiCeo={saveKpiCeo} onAddMom={addMom} jadwal={jadwal} backlog={backlog} onDone={()=>{setTab('backlog');setST('backlog','backlog');}}/>}
          {tab==='backlog'&&sub.backlog==='backlog'&&<BacklogList backlog={backlog} onUpdate={updI} onDelete={delI} onAddKeputusan={addK}/>}
          {tab==='backlog'&&sub.backlog==='keputusan'&&<Keputusan keputusan={keputusan} onUpdate={updK} onDelete={delK} onAddKeputusan={addK}/>}
          {tab==='backlog'&&sub.backlog==='mom'&&<MoMList mom={mom} onDelete={delMom} onUpdateMom={updMom} onAddKeputusan={addK}/>}
          {tab==='resume'&&<AnalisaJadwal backlog={backlog} jadwal={jadwal} onAddJadwal={addToJadwal} onAddBacklog={addI} onUpdateBacklog={updI}/>}
        </div>

        {/* ── MOBILE BOTTOM NAV (hidden on desktop) ── */}
        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-200 z-50 rounded-t-3xl shadow-nav">
          <div className="flex justify-between items-end h-[68px] relative px-2">
            {[TABS[0],TABS[1]].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} className={`flex flex-col items-center flex-1 pb-3 st ${tab===t.id?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
                <span className="text-[22px] mb-1">{t.ico}</span>
                <span className={`text-[9px] ${tab===t.id?'font-extrabold':'font-semibold'}`}>{t.lbl}</span>
              </button>
            ))}
            <div className="flex-1 flex justify-center pb-5 relative">
              <button onClick={()=>setTab('dump')} className={`absolute bottom-5 w-14 h-14 rounded-full flex items-center justify-center text-[26px] shadow-fab border-[3px] border-white z-50 st as ${tab==='dump'?'bg-stone-900 text-white rotate-45':'bg-stone-800 text-white'}`}>{tab==='dump'?'✕':'＋'}</button>
            </div>
            <button onClick={()=>setTab('backlog')} className={`flex flex-col items-center flex-1 pb-3 relative st ${tab==='backlog'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              {nc>0&&<span className="absolute top-1.5 right-4 w-2 h-2 bg-red-500 rounded-full border border-white"/>}
              <span className="text-[22px] mb-1">📋</span>
              <span className={`text-[9px] ${tab==='backlog'?'font-extrabold':'font-semibold'}`}>Backlog</span>
            </button>
            <button onClick={()=>setTab('resume')} className={`flex flex-col items-center flex-1 pb-3 st ${tab==='resume'?'text-stone-900 -translate-y-1':'text-stone-400'}`}>
              <span className="text-[22px] mb-1">📈</span>
              <span className={`text-[9px] ${tab==='resume'?'font-extrabold':'font-semibold'}`}>Resume</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
